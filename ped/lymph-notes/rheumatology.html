      "systemic onset juvenile rheumatoid arthritis",
      "poly articular JRA",
      "pauciarticular JRA"

    "explanation": "Systemic onset juvenile rheumatoid arthritis (Still's disease) is the most likely diagnosis because the presentation includes intermittent fever lasting 2 months along with symmetric polyarticular involvement of both large and small joints. Juvenile SLE would typically present with different features such as malar rash, renal involvement, or hematologic abnormalities. Polyarticular JRA involves 5 or more joints but lacks the characteristic intermittent fever of systemic onset. Pauciarticular JRA involves 4 or fewer joints and does not present with systemic fever."

    "question": "Which of the following drugs is increasingly used early to control joint manifestation?",

  },
