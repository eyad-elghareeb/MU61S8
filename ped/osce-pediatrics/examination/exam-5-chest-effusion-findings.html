      {
        "title": "Chest Examination Findings",
        "headers": [
          "Item",
          "Finding"
        ],
        "rows": [
          [
            "Inspection",
            "Unilateral bulge of affected side; ↓↓ movement; respiratory distress (tachypnea, retraction, grunting, cyanosis)"
          ],
          [
            "Palpation",
            "↓↓ Tactile Vocal Fremitus (TVF) on affected side; trachea shifted to OPPOSITE side"
          ],
          [
            "Percussion",
            "STONY DULLNESS on affected side"
          ],
          [
            "Auscultation — breath sounds",
            "↓↓ Intensity / absent"
          ],
          [
            "Added sounds",
            "None (or faint pleural rub)"
          ],
          [
            "Vocal resonance",
            "Egophony at upper border of effusion; ↓↓ below"
          ],
          [
            "Investigations",
            "Chest X-ray, pleural fluid aspiration"
          ]
        ]
      }
    ]
  },
  "questions": [
    {
      "id": "q1",
      "question": "What is the diagnosis?",
      "answer": "Pleural effusion (likely parapneumonic in this febrile child). Triad: stony dullness + ↓↓ breath sounds + ↓↓ TVF.",
      "rubric": "Stony dullness = effusion"
    },
    {
      "id": "q2",
      "question": "What are the causes of pleural effusion in children?",
      "answer": "TRANSUDATE: heart failure, nephrotic syndrome, liver cirrhosis, hypoalbuminemia. EXUDATE: parapneumonic (most common), TB, empyema, malignancy (leukemia/lymphoma), pulmonary embolism, autoimmune (SLE).",

    },
    {
      "id": "q3",
      "question": "What are the causes of stony dullness on chest percussion?",
      "answer": "1. Pleural effusion (most common). 2. Empyema. 3. Hemothorax. 4. Chylothorax. 5. Massive consolidation (rarely — usually impaired dullness).",
      "rubric": "Fluid in pleural space"
    },
    {
      "id": "q4",
      "question": "What investigations would you order?",
      "answer": "1. Chest X-ray (PA + lateral decubitus for small effusions). 2. Chest ultrasound (loculations, guide thoracentesis). 3. CT chest (complex cases, before surgery). 4. Pleural fluid analysis: protein, LDH, glucose, pH, cell count, Gram stain, culture, AFB, cytology. 5. Blood tests: CBC, CRP, blood culture, electrolytes. 6. Tuberculin test / IGRA.",
