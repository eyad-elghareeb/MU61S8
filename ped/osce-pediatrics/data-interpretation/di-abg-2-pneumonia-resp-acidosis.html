  "dataPresented": {
    "scenario": "A 7-month-old male presented to the ED with dyspnea, interrupted feeding for one day preceded by coryza, low-grade fever for 2 days. On examination: fever, respiratory distress grade III with grunting, bilateral fine crepitations. CXR shows bilateral heterogeneous infiltrations. ABG done showing:",
    "tables": [
      {
        "title": "Arterial Blood Gas + Electrolytes",
        "headers": [
          "Parameter",
          "Result",
          "Normal Range"
        ],
        "rows": [
          [
            "pH",
            "7.20",
            "7.35–7.45  →  ACIDEMIA"
          ],
          [
            "PaCO2",
            "67 mmHg",
            "35–45  →  HIGH"
          ],
          [
            "HCO3",
            "28 mEq/L",
            "20–28  →  Upper normal (compensation)"
          ],
          [
            "Na+",
            "130 mEq/L",
            "135–145"
          ],
          [

          ]
        ]
      }
    ]
  },
  "questions": [
    {
      "id": "q1",
      "question": "The primary disorder here is:",
      "answer": "c) Respiratory acidosis. pH low + PaCO2 very high → respiratory acidosis from hypoventilation (severe pneumonia).",
      "rubric": "Acidemia + high CO2 = respiratory acidosis"
    },
    {
      "id": "q2",
      "question": "The compensatory mechanism here is:",
      "answer": "d) Metabolic alkalosis. HCO3 is at upper normal limit (28) — kidneys retaining bicarbonate to compensate. However, since this is acute (1 day), full renal compensation hasn't occurred yet — takes days.",
      "rubric": "HCO3 retention = metabolic compensation"
    },
    {
      "id": "q3",
      "question": "The proper interpretation is:",
      "answer": "d) A & C (acidemia AND decompensated respiratory acidosis). Even with renal compensation (HCO3 28), the pH is still very low (7.20), so compensation is partial → decompensated.",
      "rubric": "Partial compensation = decompensated"
    },
    {
      "id": "q4",
      "question": "The anion gap here is:",
      "answer": "b) Normal. AG = Na - (Cl + HCO3) = 130 - (97 + 28) = 5. Actually slightly low because Na is low. Normal anion gap respiratory acidosis.",
      "rubric": "Calculate AG; recognize normal"
    },
    {
      "id": "q5",
      "question": "The cause of increased PaCO2 is:",
      "answer": "d) A & C (respiratory failure AND impaired ventilation). Severe pneumonia → alveolar hypoventilation → CO2 retention. This is type 2 respiratory failure.",
      "rubric": "Type 2 respiratory failure"
    },
    {
      "id": "q6",
      "question": "Proper management?",
      "answer": "c) Endotracheal intubation and ICU calling. Severe respiratory acidosis with PaCO2 67 and pH 7.20 in an infant with grunting and severe distress → impending respiratory failure. Needs intubation and mechanical ventilation.",
      "rubric": "Intubate and ventilate"
    }

  }
