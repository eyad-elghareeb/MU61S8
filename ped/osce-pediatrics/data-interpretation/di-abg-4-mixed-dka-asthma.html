  "dataPresented": {
    "scenario": "A 3-year-old child weighing 9 kg has prolonged polyuria and polydipsia. He develops respiratory illness with tachypnea, audible wheeze, and difficulty breathing. ABG shows:",
    "tables": [
      {
        "title": "Arterial Blood Gas + Electrolytes",
        "headers": [
          "Parameter",
          "Result",
          "Normal Range"
        ],
        "rows": [
          [
            "pH",
            "7.10",
            "7.35–7.45  →  ACIDEMIA"
          ],
          [
            "PaCO2",
            "70 mmHg",
            "35–45  →  HIGH"
          ],
          [
            "HCO3",
            "14 mEq/L",
            "20–28  →  LOW"
          ],
          [
            "Na+",
            "120 mEq/L",
            "135–145  →  LOW"
          ],
          [
            "K+",
            "2.5 mEq/L",

        ]

    ]

  "questions": [

      "id": "q1",
      "question": "The primary disorder here is:",
      "answer": "d) Mixed disorder. pH very low (acidemia) with BOTH low HCO3 (metabolic acidosis from DKA) and high PaCO2 (respiratory acidosis from asthma fatigue). This is MIXED metabolic and respiratory acidosis.",
      "rubric": "Low HCO3 AND high CO2 = mixed acidosis"
    },
    {
      "id": "q2",
      "question": "The compensatory mechanism here is:",
      "answer": "d) No compensation. The two processes are pushing pH in the same direction (both acidoses) — no effective compensation possible.",
      "rubric": "Both processes same direction = no compensation"
    },
    {
      "id": "q3",
      "question": "The anion gap here is:",
      "answer": "a) High. AG = Na - (Cl + HCO3) = 120 - (95 + 14) = 11. Hmm, but if Na is low (120), correction factor: for every 4 mEq/L Na below 138, add 4 to AG. Correction = 18/4 × 4 = +18. So corrected AG = 11 + 18 = 29 → high. This is DKA (high AG metabolic acidosis) PLUS respiratory acidosis from asthma.",
      "rubric": "Calculate AG, correct for hypoalbuminemia/hyponatremia"

      "id": "q4",
      "question": "What does the low HCO3 indicate?",

    },

      "id": "q5",
      "question": "First emergency management?",
      "answer": "a) Endotracheal intubation. Severe respiratory acidosis (PaCO2 70 in asthma = fatigue, impending arrest) + metabolic acidosis + hypoxia → secure airway first. THEN start DKA protocol (fluids, insulin, K+).",

    },
    {
      "id": "q6",
      "question": "With correction of acid-base and not interfering with potassium, what will K+ do?",
