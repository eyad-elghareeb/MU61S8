    "tables": [
      {
        "title": "Complete Blood Count — Raw Values",
        "headers": [
          "Parameter",
          "Result"
        ],
        "rows": [
          [
            "Hb",
            "6 g/dl"
          ],
          [
            "WBCs",
            "2,200 cells/mm³"
          ],

            "2,000,000 cells/mm³"

          [

            "18%"

        ]
      },
      {
        "title": "Formulas",
        "headers": [
          "Index",
          "Formula"
        ],
        "rows": [
          [
            "MCV",

          ],
          [
            "MCH",

  "questions": [

      "id": "q1",
      "question": "Mean corpuscular volume (MCV) is:",

      "question": "Mean corpuscular hemoglobin (MCH) is:",

    },
    {
      "id": "q3",
      "question": "Mean corpuscular hemoglobin concentration (MCHC) is:",
      "answer": "b) 33 gram%. MCHC = Hb × 100 / Hct = 6 × 100 / 18 = 33.3 g/dl. Normochromic.",
      "rubric": "Apply formula correctly: 6 × 100 / 18 = 33"
    },
    {
      "id": "q4",
      "question": "This blood picture shows:",
      "answer": "a) Pancytopenia (all three cell lines reduced: Hb low, WBC low, platelets low).",

    },

      "id": "q5",
      "question": "The etiology of this condition may be:",
