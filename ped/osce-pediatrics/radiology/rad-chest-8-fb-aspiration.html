  "questions": [
    {
      "id": "q1",
      "question": "Comment on the findings.",
      "answer": "1. Inspiration: both lungs look similar, left slightly hyper-translucent. 2. Expiration: left lung remains hyperlucent (fixed air trapping); heart shifted to the right. 3. Indicates fixed air trapping in the left hemithorax.",
      "rubric": "Fixed air trapping on expiration"
    },
    {
      "id": "q2",
      "question": "What is the diagnosis?",
      "answer": "Foreign body aspiration. Most commonly affects the RIGHT main bronchus in older children (wider, more vertical) and LEFT main bronchus in infants (similar angle). NOTE: PDF says 'FB aspiration can occur in Rt or Lt main bronchus as both have similar angle in children.'",
      "rubric": "FB aspiration — most common cause of unilateral hyperlucency"
    },
    {
      "id": "q3",
      "question": "Why is inspiration/expiration film necessary?",
      "answer": "Most FBs are non-radiopaque (organic — peanuts, seeds). On inspiration, the affected lung can still inflate. On expiration, the obstructed airway traps air (ball-valve effect) → hyperinflation on affected side + mediastinal shift. In infants unable to cooperate, lateral decubitus films can substitute.",
      "rubric": "Ball-valve effect"
    },
    {
      "id": "q4",
      "question": "What is the management?",
      "answer": "1. Bronchoscopy (rigid) for removal — diagnostic and therapeutic. 2. DO NOT dislodge FB distally (may convert partial to complete obstruction). 3. After removal: chest physiotherapy, observe for post-obstructive pneumonia or atelectasis. 4. Prevention: avoid peanuts, hard candies, small toys in children < 3–5 years.",
      "rubric": "Rigid bronchoscopy"
    }
  ],

      "Bronchoscopy"
