      "id": "q1",
      "question": "Comment on the findings.",
      "answer": "1. Increased cardiothoracic ratio. 2. Increased pulmonary vascular markings. 3. EGG-SHAPED cardiac silhouette (pathognomonic). 4. Narrow mediastinum.",
      "rubric": "Egg-shaped heart + narrow mediastinum"
    },
    {
      "id": "q2",
      "question": "What is the provisional diagnosis?",
      "answer": "D-Transposition of the Great Arteries (D-TGA). The aorta arises from the RV and pulmonary artery from the LV, with the great vessels lying anterior-posterior (not side-by-side) → narrow mediastinum on AP view.",
      "rubric": "D-TGA = egg on string"
    },
    {
      "id": "q3",
      "question": "Why is the neonate cyanotic?",
      "answer": "Two parallel circulations: systemic venous blood → RV → aorta → body (unoxygenated); pulmonary venous blood → LV → PA → lungs (oxygenated). Mixing is essential for survival — through PDA, ASD, or VSD. Without mixing, severe hypoxemia and death.",
      "rubric": "Parallel circulations require mixing"
    },
    {
      "id": "q4",
      "question": "What is the emergency management?",
      "answer": "1. Prostaglandin E1 to maintain PDA patency (allows mixing). 2. Balloon atrial septostomy (Rashkind) if ASD restrictive. 3. Definitive: arterial switch operation (Jatene) in first 2 weeks of life (before LV involutes).",
      "rubric": "PGE1 → septostomy → switch"
    }
