      "question": "What is the diagnosis?",
      "answer": "Pulmonary TB (miliary — disseminated hematogenous spread). May also see Ghon focus + hilar lymphadenopathy (primary complex) in primary TB, or pleural effusion.",
      "rubric": "Miliary TB"
    },

      "id": "q3",
      "question": "What investigations would confirm TB?",
      "answer": "1. Sputum/GA (gastric aspirate in young children) for AFB smear and culture (gold standard). 2. Mantoux / tuberculin skin test (TST). 3. Interferon-gamma release assay (IGRA, e.g., QuantiFERON). 4. Nucleic acid amplification (GeneXpert MTB/RIF — detects resistance). 5. Bronchoscopy with BAL. 6. Lymph node biopsy if peripheral LN involved.",
      "rubric": "GA + culture + GeneXpert"

      "rubric": "RIPE × 2 mo then RI × 4 mo"
