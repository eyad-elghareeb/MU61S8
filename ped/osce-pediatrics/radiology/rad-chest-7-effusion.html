  "questions": [
    {
      "id": "q1",
      "question": "Comment on the findings.",
      "answer": "1. Obliteration of left costophrenic angle by homogeneous opacity. 2. Shift of mediastinum to the right (away). Indicates left pleural effusion.",
      "rubric": "Meniscus + mediastinal shift = effusion"
    },
    {
      "id": "q2",
      "question": "What is the clinical diagnosis?",
      "answer": "Pneumonia complicated with parapneumonic effusion (a pneumonia + effusion on the same side). This is a common pediatric complication of bacterial pneumonia.",
      "rubric": "Pneumonia + effusion"
    },
    {
      "id": "q3",
      "question": "How would you differentiate free-flowing from loculated effusion?",
      "answer": "1. Lateral decubitus film (free-flowing layers, loculated doesn't). 2. Chest ultrasound (most useful — detects loculations, septations, guides drainage). 3. CT chest (most detailed, but radiation).",
      "rubric": "Lateral decubitus + ultrasound"
    },
    {
      "id": "q4",
      "question": "What is the management?",
      "answer": "1. Antibiotics (IV ceftriaxone ± vancomycin, based on severity). 2. Chest tube drainage if effusion moderate or large, especially if complicated (empyema). 3. Intrapleural fibrinolytics (tPA, urokinase) if loculated. 4. VATS (video-assisted thoracoscopic surgery) if failure of medical management or organized empyema. 5. Supportive: O2, hydration, analgesia.",
      "rubric": "Antibiotics + chest tube ± fibrinolytics ± VATS"
    }
  ],
  "rubric": {
    "mustAsk": [
      "Identify pleural effusion",
      "Recognize parapneumonic",
      "Management ladder"
    ],
    "bonus": [
      "Ultrasound for loculations"
    ]
  }
