      "question": "What is the thumb sign and what does it indicate?",
      "answer": "Thumb sign on lateral neck X-ray = enlarged, swollen epiglottis (looks like a thumb). Indicates acute epiglottitis (Hib). NOTE: Don't send a child with suspected epiglottitis for X-ray — secure airway FIRST.",

      "question": "What is the steeple sign?",
      "answer": "Steeple sign on AP neck X-ray = symmetric narrowing of the subglottic airway, narrowing toward the apex like a church steeple. Indicates viral croup (laryngotracheobronchitis).",

    },
    {
      "id": "q3",
      "question": "Why is X-ray NOT recommended as first-line in suspected epiglottitis?",
