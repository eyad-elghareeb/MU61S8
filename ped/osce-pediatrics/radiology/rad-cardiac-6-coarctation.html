  "questions": [
    {
      "id": "q1",
      "question": "Comment on the findings.",
      "answer": "1. Figure-of-3 sign (formed by pre-stenotic dilation of ascending aorta + indentation at coarctation + post-stenotic dilation of descending aorta). 2. Rib notching (3rd–8th ribs, inferior surface, from enlarged intercostal collaterals).",
      "rubric": "Figure-of-3 + rib notching"
    },
    {
      "id": "q2",
      "question": "What is the diagnosis?",
      "answer": "Coarctation of the aorta (CoA).",
      "rubric": "CoA"
    },
    {
      "id": "q3",
      "question": "What is the clinical presentation?",
      "answer": "1. Neonatal critical CoA: circulatory collapse when duct closes; differential cyanosis; absent femoral pulses. 2. Older child / adolescent: upper limb hypertension, radio-femoral delay, weak/absent femoral pulses, leg claudication, headaches, epistaxis. 3. Murmur: systolic murmur left 2nd ICS / interscapular.",
      "rubric": "Differential cyanosis neonate / HTN older"
    },
    {
      "id": "q4",
      "question": "What is the management?",
      "answer": "Medical: PGE1 in neonates to maintain duct patency; anti-congestive measures (diuretics, inotropes) if HF. Surgical: 1. Resection with end-to-end anastomosis (most common). 2. Subclavian flap aortoplasty. 3. Patch aortoplasty. 4. Balloon angioplasty (especially for recoarctation). 5. Stent placement in older children.",
      "rubric": "PGE1 + surgery"
    }
  ],

      "Management"
