  "questions": [
    {
      "id": "q1",
      "question": "Comment on the findings.",
      "answer": "1. Plain X-ray of skull with good quality. 2. PA and lateral views. 3. Widening of the diploic space. 4. Hair-on-end appearance.",
      "rubric": "Hair-on-end + widened diploic space"
    },
    {
      "id": "q2",
      "question": "What is the diagnosis and pathophysiology?",
      "answer": "Erythroid hyperplasia of bone marrow (from chronic hemolytic anemia), mostly Beta thalassemia major. Marrow expansion → cortical thinning → trabecular pattern perpendicular to skull table → hair-on-end. Other causes: SCA, severe iron deficiency anemia (rare), hereditary spherocytosis.",
      "rubric": "Chronic hemolytic anemia → marrow expansion"
    },
    {
      "id": "q3",
      "question": "What other skeletal findings occur in thalassemia?",
      "answer": "1. Long bones: widened medulla, thinned cortex, trabeculations, pathological fractures. 2. Hand X-ray: 'sausage-shaped' metacarpals from marrow expansion. 3. Facial bones: maxillary hyperplasia → chipmunk facies, dental malocclusion. 4. Spine: osteoporosis, compression fractures. 5. Ribs: 'rib-within-a-rib' appearance.",
      "rubric": "Multiple skeletal sites involved"
    },
    {
      "id": "q4",
      "question": "What other investigations are diagnostic?",
      "answer": "1. CBC: microcytic hypochromic anemia, target cells, anisocytosis. 2. Hb electrophoresis: ↑HbF, ↑HbA2, absent/reduced HbA. 3. Bone marrow: erythroid hyperplasia, increased iron stores (Prussian blue). 4. Serum iron, ferritin (elevated). 5. Genetic testing.",
      "rubric": "Hb electrophoresis is diagnostic"
    }
  ],
