      "question": "Comment on the findings.",
      "answer": "1. Decreased pulmonary vascular markings (lung oligemia). 2. Right-sided aortic arch (in 25%). 3. Normal cardiothoracic ratio. 4. Concave main PA segment. 5. Exaggerated cardiac waist. 6. Boot-shaped heart.",

      "question": "What is the provisional diagnosis?",
      "answer": "Tetralogy of Fallot (TOF). The four features: 1. VSD. 2. Right ventricular outflow tract obstruction (pulmonary stenosis). 3. Overriding aorta. 4. Right ventricular hypertrophy.",
      "rubric": "TOF = boot-shaped heart"
    },
    {
      "id": "q3",
      "question": "What are the clinical features of TOF?",
      "answer": "1. Cyanosis (often after neonatal period, weeks-months). 2. Hypercyanotic spells (Tet spells) — precipitated by crying, feeding, exertion. 3. Squatting (older children). 4. Failure to thrive. 5. Single S2 (pulmonary component quiet). 6. Ejection systolic murmur left 2nd ICS (PS). 7. Clubbing in older children.",
      "rubric": "Cyanosis, Tet spells, squatting, single S2"
    },
    {
      "id": "q4",
      "question": "What is the management of TOF?",

      "rubric": "Medical + surgical (BT shunt or definitive repair)"
