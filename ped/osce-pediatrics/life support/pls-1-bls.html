  "examiner": {
    "name": "Dr. Manar",
    "title": "PICU Consultant"
  },
  "dataPresented": {
    "scenario": "Case: You are walking down the street when a 2-year-old child suddenly collapses in front of you. There is no suspected trauma. The child is unresponsive.",
    "tables": [
      {
        "title": "BLS Algorithm",
        "headers": [
          "Step",
          "Action"

        "rows": [
          [
            "1. Safety",
            "Check scene safety for yourself and the victim"
          ],
          [
            "2. Response",
            "Tap shoulders gently + shout 'Are you okay?'"
          ],
          [
            "3. Shout for help",
            "If no response, shout for help"
          ],
          [
            "4. Airway",
            "Head tilt–chin lift (no trauma) OR jaw thrust (trauma). Infant: neutral position. Small child: sniffing. Older: extension."

          [
            "5. Breathing (10 sec)",
            "Look (chest rise), Listen (nose/mouth), Feel (breath on cheek)"

          [
            "6. If no breathing",

          ],
          [
            "7. Pulse check (10 sec)",

          [
            "8. Chest compressions",

          [
            "9. Ratio",
            "1 rescuer: 30:2. 2 rescuers: 15:2. Change operator every 2 min."

        ]
      }

  "questions": [

      "id": "q2",
      "question": "How do you check the child's response?",

      "id": "q3",
      "question": "How do you open the airway?",

      "rubric": "Different positions by age"
    },
    {
      "id": "q4",
      "question": "How do you check for breathing?",
      "answer": "Look (chest rise), Listen (air from nose/mouth), Feel (breath on cheek) for 10 seconds. If breathing: place in recovery position. If no breathing: give 5 effective rescue breaths.",
      "rubric": "Look-listen-feel 10 sec"
    },
    {
      "id": "q5",
      "question": "The child is not breathing, what do you do?",
      "answer": "Give 5 effective rescue breaths. If breathing resumes → recovery position. If no breathing and no pulse (or < 60 bpm in infant) → start chest compressions.",
      "rubric": "5 rescue breaths → check pulse → CPR"
    },
    {
      "id": "q6",
      "question": "How do you perform chest compressions in a 2-year-old?",
      "answer": "Use ONE hand on the lower half of the sternum. Depth: 1/3 of chest depth (~5 cm). Rate: 100–120 compressions/min. Ratio: 30:2 (1 rescuer) or 15:2 (2 rescuers). Change operator every 2 min.",
      "rubric": "1 hand, 1/3 depth, 100-120/min, 30:2 or 15:2"
    },
    {
      "id": "q7",
      "question": "What are possible complications of CPR?",
      "answer": "1. Rib fractures (especially in older children). 2. Pneumothorax. 3. Pneumoperitoneum. 4. Hemorrhage (liver, spleen). 5. Retinal hemorrhage. 6. Gastric insufflation.",
      "rubric": "Multiple complications"
    },
    {
      "id": "q8",
      "question": "When to stop CPR?",
      "answer": "1. Signs of life return (movement, breathing, pulse). 2. Help (EMS) arrives and takes over. 3. You become exhausted. 4. Authorized person declares death (in hospital).",
      "rubric": "3 conditions to stop"
    }
  ],

    "mustAsk": [

      "Ratio single vs two rescuers",
      "When to stop"

    ]
  }
