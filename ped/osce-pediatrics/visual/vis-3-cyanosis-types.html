  "questions": [
    {
      "id": "q1",
      "question": "Define cyanosis and what level of deoxyhemoglobin is needed to see it?",
      "answer": "Cyanosis = bluish discoloration of skin, mucous membranes, and nails. Visible when reduced (deoxygenated) hemoglobin > 5 g/dL in capillary blood. NOTE: In severe anemia, cyanosis may NOT be visible even with marked hypoxia (not enough Hb to show 5 g/dL deoxyHb).",
      "rubric": "Reduced Hb > 5 g/dL"
    },
    {
      "id": "q2",
      "question": "What is differential cyanosis?",
      "answer": "Cyanosis affecting only one part of the body: 1. LOWER half cyanosis (upper normal) = PDA with reversed (right-to-left) shunt (Eisenmenger). 2. UPPER half cyanosis (lower normal) = D-TGA with PDA (and usually pulmonary hypertension). Recognized by comparing pre- and post-ductal SpO2.",
      "rubric": "Differential cyanosis patterns"
    },
    {
      "id": "q3",
      "question": "What is the differential diagnosis of central cyanosis?",
      "answer": "1. Pulmonary: severe pneumonia, bronchiolitis, asthma, ARDS, pulmonary edema, pneumothorax, congenital diaphragmatic hernia, pulmonary hypoplasia. 2. Cardiac: cyanotic CHD (TOF, TGA, tricuspid atresia, truncus, TAPVR, Ebstein, pulmonary atresia). 3. Hematological: methemoglobinemia, sulfhemoglobinemia. 4. Neurological: hypoventilation (neuromuscular, CNS depression).",
      "rubric": "Pulmonary + cardiac + hematological + neurological"
    }
  ],
