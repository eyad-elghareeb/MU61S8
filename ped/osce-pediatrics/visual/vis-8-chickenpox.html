  "questions": [
    {
      "id": "q1",
      "question": "What is the diagnosis?",
      "answer": "Chickenpox (varicella) — caused by varicella-zoster virus (VZV, human herpesvirus 3).",
      "rubric": "Varicella"
    },
    {
      "id": "q2",
      "question": "What is the characteristic feature that distinguishes chickenpox from smallpox?",
      "answer": "1. Lesions in DIFFERENT STAGES simultaneously (chickenpox) vs all same stage (smallpox). 2. Centripetal distribution (trunk predominant) vs centrifugal (extremities predominant, smallpox). 3. Superficial vs deep lesions. 4. Less severe systemic illness.",
      "rubric": "Different stages + centripetal"
    },
    {
      "id": "q3",
      "question": "What are the complications?",
      "answer": "1. Secondary bacterial infection (S. pyogenes, S. aureus) — cellulitis, necrotizing fasciitis. 2. Pneumonia (viral or bacterial). 3. Encephalitis, cerebellar ataxia. 4. Reye syndrome (if aspirin given — NEVER give aspirin to child with viral illness). 5. Hepatitis. 6. Congenital varicella (if maternal infection in pregnancy). 7. Reactivation as shingles (herpes zoster) years later.",
      "rubric": "Bacterial + pneumonia + Reye + zoster"
    },
    {
      "id": "q4",
      "question": "What is the management?",
      "answer": "1. Symptomatic: antipyretics (paracetamol — AVOID aspirin/ibuprofen), antihistamines for itch, calamine lotion, nail hygiene. 2. Acyclovir (IV) for high-risk: immunocompromised, neonates, pregnant adolescents, severe disease. 3. Isolation until all lesions crusted (usually 5–7 days). 4. Prevention: varicella vaccine (1 dose at 12–15 mo, 2nd at 4–6 yr). Post-exposure: VZIG within 96 hr for high-risk contacts.",
      "rubric": "Symptomatic + acyclovir for high-risk + vaccine"
    }
  ],
