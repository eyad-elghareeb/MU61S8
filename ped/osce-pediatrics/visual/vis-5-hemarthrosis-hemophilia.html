  "questions": [
    {
      "id": "q1",
      "question": "What is the diagnosis?",
      "answer": "Hemarthrosis in a child with hemophilia. Acute bleeding into the joint cavity — most common bleeding site in severe hemophilia.",
      "rubric": "Hemarthrosis"
    },
    {
      "id": "q2",
      "question": "What is the pathophysiology?",
      "answer": "Deficient factor VIII (hemophilia A) or IX (B) → impaired intrinsic pathway → defective thrombin generation → recurrent bleeding into joints (knees, elbows, ankles), muscles, and after procedures. Repeated hemarthroses → chronic arthropathy (synovial hypertrophy, cartilage damage, ankylosis).",
      "rubric": "Deficient factor → joint bleeding → arthropathy"
    },
    {
      "id": "q3",
      "question": "What is the acute management of hemarthrosis?",
      "answer": "1. FACTOR REPLACEMENT IMMEDIATELY (factor VIII 25–50 IU/kg for hemophilia A; factor IX for B). 2. Rest the joint; immobilize in comfortable position. 3. Cold compresses. 4. Analgesia (paracetamol; AVOID aspirin/NSAIDs). 5. Do NOT aspirate unless septic arthritis suspected. 6. Physiotherapy once bleeding controlled. 7. For chronic synovitis: radioisotope synovectomy (yttrium-90), surgical synovectomy.",
      "rubric": "Factor + rest + cold + analgesia"
    },
    {
      "id": "q4",
      "question": "What is prophylactic treatment?",
      "answer": "Regular factor infusions (1–3×/week) starting after first joint bleed or before age 2 — prevents hemarthrosis and arthropathy. Now standard of care in severe hemophilia. Improves quality of life dramatically.",
      "rubric": "Prophylactic factor infusions"
    }
  ],
