  "questions": [
    {
      "id": "q1",
      "question": "What is the diagnosis?",
      "answer": "Beta thalassemia major — chronic hemolytic anemia causing bone marrow expansion (erythroid hyperplasia) and characteristic facial changes.",
      "rubric": "Thalassemia major"
    },
    {
      "id": "q2",
      "question": "What is the pathophysiology of these facial changes?",
      "answer": "Ineffective erythropoiesis → erythroid hyperplasia → bone marrow expansion → cortical thinning and bony distortion. Skull shows hair-on-end appearance; facial bones expand → characteristic 'mongoloid' or 'chipmunk' facies with maxillary protrusion.",
      "rubric": "Marrow expansion → bone changes"
    },
    {
      "id": "q3",
      "question": "What investigations confirm the diagnosis?",
      "answer": "1. CBC: microcytic hypochromic anemia (low MCV, MCH, MCHC). 2. Peripheral smear: target cells, anisocytosis, poikilocytosis, nucleated RBCs, basophilic stippling. 3. Hb electrophoresis (diagnostic): ↑↑HbF, ↑HbA2, absent/markedly reduced HbA. 4. Bone marrow: erythroid hyperplasia, increased iron (Prussian blue). 5. Skull X-ray: hair-on-end. 6. Serum iron, ferritin (high). 7. Genetic testing.",
      "rubric": "Hb electrophoresis is diagnostic"
    },
    {
      "id": "q4",
      "question": "What is the management?",
      "answer": "1. Lifelong regular blood transfusions (every 3–4 weeks) to maintain Hb > 9–10 g/dl. 2. Iron chelation (deferoxamine SC, deferasirox PO, deferiprone) — starts after 10–20 transfusions. 3. Folic acid. 4. Splenectomy if hypersplenism (after age 5, vaccinate pre-op). 5. Bone marrow transplant (curative, HLA-matched sibling). 6. Endocrine monitoring (DM, hypogonadism, hypothyroid). 7. Genetic counseling.",
      "rubric": "Transfusion + chelation + BMT"
    }
  ],

      "Bone marrow transplant curative"
