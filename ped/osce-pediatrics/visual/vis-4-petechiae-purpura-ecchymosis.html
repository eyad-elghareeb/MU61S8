      "question": "Differentiate petechiae, purpura, and ecchymosis.",
      "answer": "PETECHIAE: < 3 mm, flat, red, non-blanching — from capillary bleeding (platelet/vessel issue). PURPURA: 3–10 mm, can be flat or raised — palpable purpura suggests vasculitis. ECCHYMOSIS: > 1 cm, subcutaneous bruise, color changes as it heals.",

      "question": "What is the differential diagnosis of petechial rash?",
      "answer": "1. ITP. 2. Meningococcal sepsis (DKA: rapid onset, fever, toxic child). 3. Leukemia (with other cytopenias). 4. Aplastic anemia. 5. Viral infections (EBV, enterovirus, dengue). 6. Sepsis / DIC. 7. Trauma (including NAI). 8. Valsalva (coughing, vomiting) — above clavicles. 9. Severe scurvy.",
      "rubric": "Multiple causes; rule out meningococcemia quickly"

      "rubric": "Emergency — antibiotics before tests"

    Math.max(0, location.pathname.split('/').filter(Boolean).length - 2)
  );
  var candidates = location.protocol === 'file:'
    ? ['', computedBase, '../', '../../', '../../../']
    : [computedBase, '', '../', '../../', '../../../'];
  var tried = {};
  function loadNext() {
    var base = candidates.shift();
    if (base === undefined) return;
    if (tried[base]) return loadNext();
    tried[base] = true;
    window.__OSCE_ENGINE_BASE = base;
    var script = document.createElement('script');
    script.src = base + 'osce-engine.js';
    script.onerror = loadNext;
    document.body.appendChild(script);
  }
  loadNext();
})();
</script>
</body>
</html>
