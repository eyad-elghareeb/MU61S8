      "id": "q2",
      "question": "What are the major Jones criteria?",
      "answer": "Mnemonic 'JONES': J — Joints (migratory polyarthritis, 75%); O — Obvious cardiac involvement (carditis, 40–60%); N — Nodules (subcutaneous nodules, rare < 10%); E — Erythema marginatum (rare < 10%); S — Sydenham chorea (10–30%). Diagnosis: 2 major OR 1 major + 2 minor + evidence of preceding strep.",
      "rubric": "5 major criteria + JONES mnemonic"
    },
    {
      "id": "q3",
      "question": "What are the minor Jones criteria?",
