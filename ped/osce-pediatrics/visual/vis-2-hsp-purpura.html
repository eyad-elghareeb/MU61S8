  "questions": [
    {
      "id": "q1",
      "question": "What is your provisional diagnosis?",
      "answer": "Henoch-Schönlein purpura (HSP), also called anaphylactoid purpura or IgA vasculitis.",
      "rubric": "HSP — palpable purpura on lower limbs/buttocks"
    },
    {
      "id": "q2",
      "question": "What is the clinical picture of HSP?",
      "answer": "1. SKIN (100%): palpable purpura on buttocks & extremities (mainly lower limbs). 2. JOINT (75%): migratory polyarthritis (knees, ankles). 3. GIT (50%): abdominal pain, diarrhea, bloody stool. 4. RENAL (25%): asymptomatic hematuria/proteinuria; nephritic/nephrotic syndrome; AKI.",
      "rubric": "4 systems involved"
    },
    {
      "id": "q3",
      "question": "Enumerate 4 investigations.",
      "answer": "All bleeding profile tests are normal EXCEPT Hiss test (capillary fragility) which is positive. 1. Bleeding time — normal. 2. Clotting time — normal. 3. Hiss test — positive. 4. ASO titre — elevated (post-strep). 5. Serum IgA — elevated. 6. Stool analysis — occult blood. 7. Urinalysis — for renal involvement. 8. Skin biopsy — leukocytoclastic vasculitis with IgA deposition (definite).",
      "rubric": "Bleeding profile normal + Hiss + biopsy"
    },
    {
      "id": "q4",
      "question": "Enumerate 4 complications.",
      "answer": "1. Intussusception (ileoileal — most common surgical complication). 2. Chronic renal failure (50% of those with renal involvement — most dangerous long-term). 3. Subarachnoid or cerebral hemorrhage. 4. Testicular torsion (infrequent).",
      "rubric": "Intussusception + CRF"
    },
    {
      "id": "q5",
      "question": "Enumerate the treatment.",
      "answer": "HSP is usually self-limited (resolves in 4–6 weeks); recurrence within 6 months in 1/3. 1. Penicillin — if 2° to strep. 2. Arthritis: aspirin (acetyl salicylic acid). 3. GIT affection: corticosteroids (prednisone 1–2 mg/kg/day). 4. Renal: immunosuppressants (cyclophosphamide, azathioprine) for severe involvement.",
      "rubric": "Self-limited; steroids for GI/renal"
    }
  ],

    ],

      "Skin biopsy IgA deposition"
