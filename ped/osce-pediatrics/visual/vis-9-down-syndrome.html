  "questions": [
    {
      "id": "q1",
      "question": "What is the diagnosis?",
      "answer": "Down syndrome (Trisomy 21) — most common autosomal chromosomal disorder.",
      "rubric": "Down syndrome"
    },
    {
      "id": "q2",
      "question": "What are the types of Down syndrome?",
      "answer": "1. Non-disjunction (95%): 47 chromosomes, XX/XY +21. 2. Translocation (4%): 46 chromosomes but extra chromosome 21 material attached to another chromosome (usually 14 or 21); risk of recurrence higher (especially if parental balanced translocation). 3. Mosaicism (1%): mixture of normal and trisomy 21 cells; milder phenotype.",
      "rubric": "3 types with percentages"
    },
    {
      "id": "q3",
      "question": "What medical conditions are associated with Down syndrome?",
      "answer": "1. Cardiac: AVSD (most characteristic), VSD, ASD, PDA, TOF (40–50% have CHD). 2. GIT: duodenal atresia (double bubble), Hirschsprung, TEF, imperforate anus. 3. Endocrine: hypothyroidism, diabetes. 4. Hematology: increased leukemia risk (ALL, AML, transient myeloproliferative disorder). 5. Atlantoaxial instability (C1-C2). 6. Hearing loss (conductive). 7. Vision problems (refractive errors, cataracts, nystagmus). 8. Intellectual disability (mild-moderate, IQ 30–70). 9. Early-onset Alzheimer's disease.",
      "rubric": "Multi-system involvement"
    },
    {
      "id": "q4",
      "question": "What surveillance is needed?",
      "answer": "1. Echocardiogram at birth. 2. Thyroid function (TSH) at birth, 6 mo, 12 mo, then annually. 3. Audiology at birth, 6 mo, annually. 4. Ophthalmology by 6 mo, then annually. 5. CBC annually (leukemia risk). 6. Cervical spine X-rays at 3 years (atlantoaxial instability). 7. Developmental assessment and early intervention. 8. Sleep study if symptoms of OSA.",
      "rubric": "Multi-system surveillance"
    }
  ],
