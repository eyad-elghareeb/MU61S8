  {
    "question": "Which of the following is an inguinoscrotal swelling:",

    "correct": 1,
    "explanation": "Acute and chronic endemic funiculo-epididymitis is an inguinoscrotal swelling involving the testis, epididymis, and spermatic cord together. A bubonocele is only in the inguinal canal, not the scrotum. Inguinal lymph nodes are inguinal only. Pelvic-type undescended testis is in the pelvis. Early testicular tumour presents as a testicular mass, not typically inguinoscrotal."
  },
  {
    "question": "The main line of treatment of haematocele is:",

      "Elevation of the scrotum"
    ],
    "correct": 0,
    "explanation": "Haematocele (blood in the tunica vaginalis) requires IMMEDIATE surgical exploration (exposure operation) to: evacuate the clot, achieve haemostasis, and evert the tunica vaginalis to prevent recurrence. Delay risks fibrosis and testicular atrophy. Plication and eversion are operations for hydrocele. Delta operation is for varicocele. Elevation alone is conservative and inadequate."
  },

    "correct": 3,
    "explanation": "A small secondary (reactive) hydrocele is a common finding in epididymo-orchitis due to inflammatory exudate. Correct features: painful swelling, hot scrotal wall with loss of skin rugae, POSITIVE Prehn sign (elevation RELIEVES pain — differentiating from torsion where elevation WORSENS pain). The secondary hydrocele is reactive and not the primary pathology."
  },
  {
    "question": "As regard the pathology of epigastric hernia, which of the following is TRUE?",

  },
  {
    "question": "Which of the following is NOT a complication of paraumblical hernia:",

  {
    "question": "Palliative hormonal therapy for stage IV is indicated for:",

  },
  {
    "question": "The time for surgical closure of Ventricular Septal Defect (VSD) is:",

  },
  {
    "question": "The commonest cause of hemoptysis is:",

      "Cancer lung",
      "Bronchial carcinoid",
      "Tuberculosis",
      "Bronchitis",

    "correct": 3,
    "explanation": "Bronchitis (acute and chronic) is the most common cause of hemoptysis overall, accounting for the majority of cases presenting to clinicians — often blood-streaked sputum rather than frank hemoptysis. Tuberculosis is the most common cause of massive hemoptysis worldwide. Lung cancer is an important cause especially in smokers. Bronchial carcinoid and trauma are less common causes."
  },
  {
    "question": "Which of the following should be requested for a patient presented by sudden onset of refractory cough with suspected history of foreign body inhalation and the chest x ray is normal:",

      "Computerized tomography (CT) scan of the chest",

      "Rigid bronchoscope",

      "Just follow up"

    "explanation": "Rigid bronchoscopy is the investigation of choice (both diagnostic AND therapeutic) for suspected foreign body inhalation when chest X-ray is normal. Many inhaled foreign bodies (especially organic material like nuts) are radiolucent and won't show on X-ray. Rigid bronchoscope allows direct visualization AND immediate extraction. CT can be used if bronchoscopy is unavailable, but rigid bronchoscopy is the definitive step."
  },
  {
    "question": "The best treatment for a patient with malignant lung cancer and hoarseness of voice is:",

      "Surgery",
      "Chemoradiotherapy",
      "Symptomatic treatment",
      "Hormonal Therapy",
      "Physiotherapy"
    ],
    "correct": 1,
    "explanation": "Hoarseness of voice in lung cancer indicates recurrent laryngeal nerve (left RLN) invasion, which is a sign of mediastinal involvement making the tumor INOPERABLE (Stage IIIB/IV). Chemoradiotherapy is the appropriate palliative/potentially curative treatment for inoperable non-small cell lung cancer. Surgery is contraindicated once RLN is invaded. Symptomatic treatment alone is insufficient for potentially treatable disease."
  },
  {
    "question": "After surgical treatment by mechanical mitral valve replacement, the patient is maintained on:",

      "Short course of oral anticoagulation",
      "Lifelong oral anticoagulation",
      "Lifelong heparin",

  },
  {
    "question": "Congenital cyanotic heart diseases include:",
    "options": [
      "Atrial Septal Defect",
      "Transposition of The Great Arteries",

      "Patent ductus Arteriosus",
      "Mitral stenosis"

  }
