<meta name="description" content="MU61 Interactive Quiz. Test your medical knowledge.">
<meta property="og:title" content="MU61 Quiz - Gynecology">
<meta property="og:description" content="MU61 Interactive Quiz. Test your medical knowledge.">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary">
<meta name="twitter:title" content="MU61 Quiz - Gynecology">

<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🩺</text></svg>">
</head>
<body>

  <!-- TOP NAVIGATION -->
  <div class="topbar">
    <a href="../index.html" class="icon-btn back-btn" title="Back to Home">←</a>
    <div class="topbar-title">MU61 Quiz - Gynecology</div>
    <button class="icon-btn" id="theme-toggle" onclick="toggleTheme()" title="Toggle theme">☀</button>
  </div>

  <div class="container">
    <!-- HERO SECTION -->
    <header class="hero">
      <h1>Select your <span>Gynecology exam</span></h1>
      <p>Test your knowledge across various gynecology topics. Choose an exam below to begin.</p>
    </header>

    <!-- EXAMS GRID -->
    <div class="quiz-grid" id="quiz-grid">
      <!-- Cards are generated here via JavaScript -->
    </div>

    <!-- FOOTNOTE -->
    <div class="footer-note">
      Made By: <a href="https://github.com/eyad-elghareeb/QuizTool" target="_blank" rel="noopener noreferrer">QuizTool</a>
    </div>
  </div>

<script>
/* ─────────────────────────────────────────────────────────────────
   QUIZ CONFIGURATION — Easily add your separate HTML exams here!
──────────────────────────────────────────────────────────────────*/
const QUIZZES =[
  {
    title: "📁 Gynecology Department book questions",
    description: "Gynecology Department lectures and book questions",
    icon: "🩺",
    tags: ["Folder"],
    url: "dep/index.html"
  },
  {
    title: "📁 Gynecology Past batchs Exams",
    description: "Gynecology Past batchs Exams and resources",
    icon: "🩺",
    tags: ["Folder"],
    url: "past years/index.html"
  }
];


/* ─────────────────────────────────────────────────────────────────
   ENGINE LOGIC
──────────────────────────────────────────────────────────────────*/

// 1. Render the Quiz Cards dynamically
function renderQuizzes() {
  const grid = document.getElementById('quiz-grid');
  grid.innerHTML = QUIZZES.map(quiz => `
    <div class="quiz-card">
      <div class="card-icon">${quiz.icon}</div>
      <h2 class="card-title">${quiz.title}</h2>
      <p class="card-desc">${quiz.description}</p>
      <div class="card-meta">
        ${quiz.tags.map(tag => `<span class="meta-badge">${tag}</span>`).join('')}
      </div>
      <a href="${quiz.url}" class="btn-take-quiz">Start Exam →</a>
    </div>
  `).join('');
}

// 2. Handle Theme Toggle (Maintains same theme logic as your templates)
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('quiz-theme', newTheme); // Save preference
  updateThemeIcon();
}

function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-toggle').textContent = isDark ? '☀' : '☾';
}

// 3. Initialize on page load
function init() {
  // Check for saved theme preference
  const savedTheme = localStorage.getItem('quiz-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
  }
  
  updateThemeIcon();
  renderQuizzes();
}

init();
</script>
</body>
</html>
