/* ═══════════════════════════════════════════
   CSS VARIABLES & THEME (Matching your engine)
═══════════════════════════════════════════ */
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1c2330;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --accent:     #f0a500;
  --accent-dim: rgba(240,165,0,0.12);
  --radius:     12px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease-out;

  --wrong:        #da3633;
  --wrong-bg:     rgba(218,54,51,0.12);
  --flagged:      #58a6ff;
  --flagged-bg:   rgba(88,166,255,0.12);
  --correct:      #2ea043;
  --correct-bg:   rgba(46,160,67,0.12);
}
[data-theme="light"] {
  --bg:         #f3f0eb;
  --surface:    #ffffff;
  --surface2:   #f8f6f1;
  --border:     #d0ccc5;
  --text:       #1c1917;
  --text-muted: #78716c;
  --accent:     #c27803;
  --accent-dim: rgba(194,120,3,0.10);
  --shadow:     0 4px 24px rgba(0,0,0,0.10);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  display: flex;
  flex-direction: column;
}
button, a { cursor: pointer; font-family: inherit; border: none; outline: none; text-decoration: none; }

/* ═══════════════════════════════════════════
   TOP BAR
═══════════════════════════════════════════ */
.topbar {
  display: flex;
  align-items: center;
  padding: 0.75rem 1.5rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  position: sticky;
  top: 0;
  z-index: 10;
}
.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.2rem;
  font-weight: 700;
  flex: 1;
  color: var(--text);
}
.icon-btn {
  width: 38px; height: 38px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: all var(--transition);
  font-size: 1.1rem;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); }
.icon-btn.back-btn { text-decoration: none; margin-right: 1rem; }

/* ═══════════════════════════════════════════
   MAIN LAYOUT & HERO
═══════════════════════════════════════════ */
.container {
  flex: 1;
  overflow-y: auto;
  padding: 3rem 1.5rem;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.hero {
  text-align: center;
  max-width: 600px;
  margin-bottom: 3.5rem;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.2rem, 5vw, 3.2rem);
  line-height: 1.1;
  margin-bottom: 1rem;
}
.hero h1 span { color: var(--accent); }
.hero p {
  color: var(--text-muted);
  font-size: 1.05rem;
}

/* ═══════════════════════════════════════════
   QUIZ GRID & CARDS
═══════════════════════════════════════════ */
.quiz-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 1.5rem;
  width: 100%;
  max-width: 1100px;
}
.quiz-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 2rem;
  box-shadow: var(--shadow);
  display: flex;
  flex-direction: column;
  transition: transform 0.3s ease, border-color 0.3s ease;
}
.quiz-card:hover {
  transform: translateY(-5px);
  border-color: var(--accent);
}
.card-icon {
  width: 56px; height: 56px;
  background: var(--accent-dim);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.6rem;
  margin-bottom: 1.25rem;
}
.card-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  color: var(--text);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}
.card-desc {
  color: var(--text-muted);
  font-size: 0.9rem;
  margin-bottom: 1.5rem;
  flex: 1;
}
.card-meta {
  display: flex;
  gap: 1rem;
  margin-bottom: 1.5rem;
}
.meta-badge {
  background: var(--surface2);
  border: 1px solid var(--border);
  padding: 0.35rem 0.75rem;
  border-radius: 8px;
  font-size: 0.75rem;
  font-weight: 600;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-take-quiz {
  display: inline-block;
  text-align: center;
  width: 100%;
  padding: 0.85rem;
  border-radius: var(--radius);
  background: var(--accent);
  color: #000;
  font-weight: 700;
  font-size: 0.95rem;
  transition: opacity var(--transition), transform var(--transition);
}
.btn-take-quiz:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-take-quiz:active { transform: translateY(0); }

/* ═══════════════════════════════════════════
   FOOTNOTE
═══════════════════════════════════════════ */
.footer-note {
  margin-top: 3rem;
  text-align: center;
  color: var(--text-muted);
  font-size: 0.85rem;
}
.footer-note a {
  color: var(--accent);
  text-decoration: none;
  transition: opacity var(--transition);
}
.footer-note a:hover {
  opacity: 0.8;
}
</style>
