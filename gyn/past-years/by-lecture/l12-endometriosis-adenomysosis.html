  {
    "question": "Endometriosis is defined as:",
    "options": [
      "The presence of endometrial glands outside the uterus.",

      "A disease primarily occurring after menopause."

  {
    "question": "A 43-year-old woman is complaining of chronic pelvic pain and menorrhagia that is unresponsive to hormonal therapy. The uterus is symmetrically enlarged and tender. The most likely diagnosis is:",

      "Endometriosis",
      "Adenomyosis",
      "Endometrial Carcinoma",
      "Ovarian Carcinoma"
    ],
    "correct": 1,
    "explanation": "Adenomyosis typically presents with a 'globular' or symmetrically enlarged, tender uterus accompanied by heavy menstrual bleeding (menorrhagia) and painful periods. Endometriosis usually presents with a normal-sized uterus and adnexal masses (endometriomas)."

  {
    "question": "Endometriosis characteristically occurs in women who are:",

    "correct": 2,

  {

      "Laparoscopy",

      "CA-125 serum marker"

  {
    "question": "Which of the following is not an appropriate medical treatment for adenomyosis?",

    "explanation": "A transverse vaginal septum causes an outflow obstruction of menstrual blood, leading to increased retrograde menstruation into the pelvic cavity, which is a major theory for the development of endometriosis."

  {
    "question": "A 39-year-old G3P3 complains of severe, progressive secondary dysmenorrhea and menorrhagia. Pelvic examination demonstrates a tender, diffusely enlarged uterus with no adnexal tenderness. Results of endometrial biopsy are normal. Which of the following is the most likely diagnosis?",

  {
    "question": "Which of the following is the most likely etiology for infertility in women with endometriosis?",

      "Tubal obstruction"

    "explanation": "In severe endometriosis, pelvic adhesions and anatomical distortion often lead to tubal obstruction or impaired tubo-ovarian pickup, preventing the sperm from reaching the egg or the embryo from reaching the uterus."
  },
  {
    "question": "Which of the following statements concerning endometriosis is true?",
    "options": [
      "Malignant changes are common",
      "Accurate diagnosis is established by history and physical examination",
      "It is more common in perimenopausal women",
      "Affected women may present with subfertility"
    ],
    "correct": 3,
    "explanation": "Up to 30-50% of women with endometriosis experience subfertility or infertility. While history and exam provide clues, they are not sufficient for an 'accurate' (definitive) diagnosis without laparoscopy."
  },
  {
    "question": "In a 20-year-old single woman complaining of severe dysmenorrhea because of endometriosis, the treatment of choice is:",

      "Levonorgestrel intrauterine system (LNG-IUS)",
      "Cyclical COCP",
      "Bilateral oophorectomy"

    "correct": 0,

  },
  {
    "question": "Which of the following is a recognized risk factor for adenomyosis?",
    "options": [
      "Previous uterine surgery",
      "Nulliparity",
      "Smoking",
      "Third decade of life"
    ],
    "correct": 0,
    "explanation": "Previous uterine surgeries (like C-sections or D&C) are thought to disrupt the endo-myometrial interface, allowing endometrial tissue to 'invade' the myometrium, leading to adenomyosis."
  },
  {
    "question": "The first-line medical treatment for pain management in endometriosis is:",
    "options": [
      "NSAIDS",
      "Combined oral contraceptives",
      "Danazol",
      "GnRH agonists"
    ],
    "correct": 0,
    "explanation": "NSAIDs are usually the first-line medical intervention to manage the pain (dysmenorrhea) associated with endometriosis before moving to hormonal suppression like COCPs."
  },
  {
    "question": "Dyspareunia (painful intercourse) is most strongly associated with:",
    "options": [
      "Vaginismus",
      "Endometriosis",
      "Cervicitis",
      "Uterine fibroids"
    ],
    "correct": 1,
    "explanation": "Endometriosis involving the pouch of Douglas or uterosacral ligaments causes deep dyspareunia. While vaginismus causes pain, it is usually at the start of intercourse, whereas endometriosis causes deep-seated pain."
  },
  {
    "question": "The gold standard for diagnosing endometriosis is:",
    "options": [
      "Ultrasound",
      "MRI",
      "Laparoscopy",
      "Biopsy"
    ],
    "correct": 2,
    "explanation": "Diagnostic laparoscopy is the gold standard because it allows for direct visualization of even small peritoneal implants that cannot be seen on imaging."
  },
  {
    "question": "Adenomyosis is best diagnosed (non-surgically) by:",

      "Transvaginal ultrasound",
      "MRI",
      "Hysteroscopy",
      "Laparoscopy"

    "correct": 1,
    "explanation": "While transvaginal ultrasound is a good screening tool, MRI has higher sensitivity and specificity for diagnosing adenomyosis and distinguishing it from uterine fibroids."
  },

    "question": "The definitive treatment for adenomyosis is:",

      "Hysterectomy",
      "Hormonal intrauterine device.",
      "GnRH agonists",
      "Endometrial ablation"
    ],
    "correct": 0,
    "explanation": "Since adenomyosis involves the growth of endometrial tissue deep within the myometrium, hysterectomy is the only definitive cure. Other options provide only temporary symptom relief."
  }
];
