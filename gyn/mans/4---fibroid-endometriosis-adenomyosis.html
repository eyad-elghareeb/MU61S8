const QUESTIONS = [
  {
    "question": "A 26 years old woman at 28 weeks gestation. Her history and physical examination are normal Except for the presence of a 2 cm posterior cervical leiomyoma. The patient is asymptomatic. Which of the following is the best management?",
    "options": [
      "Myomectomy at 36 weeks",
      "Myomectomy now with steroids and tocolytics",
      "Progesterone therapy to decrease the myoma size",
      "Elective cesarean delivery at term",
      "Watchful waiting"
    ],
    "correct": 4,
    "explanation": "Small, asymptomatic fibroids (like a 2 cm cervical myoma) found during pregnancy generally require no intervention. Surgery during pregnancy risks severe hemorrhage and preterm labor. Therefore, watchful waiting is the best approach."
  },
  {
    "question": "What is wrong about uterine fibroid with pregnancy:",
    "options": [
      "The tumor increases in size during pregnancy",
      "It may predispose to abortion",
      "It is commonly complicated with fatty degeneration during pregnancy",
      "It increases the risk of postpartum hemorrhage",
      "May predispose to abruption placenta"
    ],
    "correct": 2,
    "explanation": "During pregnancy, fibroids are most commonly complicated by 'red (carneous) degeneration' due to rapid growth outstripping their blood supply, not fatty degeneration."
  },
  {
    "question": "Which procedure that could visualize pelvic endometriosis:",
    "options": [
      "Colposcopy",
      "Laparoscopy",
      "Hysteroscopy",
      "HSG",
      "Sonohysterography"
    ],
    "correct": 1,
    "explanation": "Laparoscopy is the gold standard for diagnosing endometriosis because it allows direct visualization of the endometrial implants on the pelvic organs and peritoneum."
  },
  {
    "question": "The most common site of endometriosis is:",
    "options": [
      "Uterine surface",
      "Anterior cul-de-sac",
      "Uterosacral ligaments",
      "Ovary",
      "Rectovaginal septum"
    ],
    "correct": 3,
    "explanation": "The ovaries are the most frequent location for endometriosis, often leading to the formation of endometriomas (chocolate cysts)."
  },
  {
    "question": "A 35-year-old complains of primary infertility, increasing dysmenorrhea & pelvic pain. Her pelvic examination demonstrates tenderness & nodularity over her uterosacral ligaments and a 4 cm right ovarian cyst. Which of the following is her most likely diagnosis?",
    "options": [
      "Adenomyosis",
      "Pelvic congestion syndrome",
      "Chronic ectopic pregnancy",
      "Endometriosis",
      "Chronic pelvic inflammatory disease"
    ],
    "correct": 3,
    "explanation": "The classic triad of infertility, dysmenorrhea, and chronic pelvic pain, combined with physical findings of uterosacral nodularity and an ovarian cyst (likely an endometrioma), strongly points to endometriosis."
  },
  {
    "question": "Pelvic examination of a 39-year-old woman who complains of menorrhagia reveals an asymmetrically enlarged uterus felt at the umbilicus. The most likely diagnosis is:",
    "options": [
      "Multiple uterine fibroids",
      "Uterine carcinoma",
      "Uterine sarcoma",
      "Broad ligament fibroid",
      "Cervical carcinoma"
    ],
    "correct": 0,
    "explanation": "A large, irregularly (asymmetrically) enlarged uterus in a woman presenting with heavy menstrual bleeding (menorrhagia) is the classic clinical picture of multiple uterine fibroids (leiomyomas)."
  },
  {
    "question": "Which of the following symptoms is most consistent with adenomyosis?",
    "options": [
      "Dyspareunia",
      "Mood swings",
      "Painful defecation",
      "Dysmenorrhea",
      "Infertility"
    ],
    "correct": 3,
    "explanation": "Adenomyosis classically presents with heavy menstrual bleeding and increasingly severe, cramping pelvic pain during menstruation (secondary dysmenorrhea)."
  },
  {
    "question": "Which is the most common symptom of uterine leiomyoma?",

      "Infertility",
      "Rapid enlargement",
      "Pain",
      "Excessive uterine bleeding",
      "Pressure on another organ"
    ],
    "correct": 3,
    "explanation": "While many fibroids are asymptomatic, when they do cause symptoms, abnormal/excessive uterine bleeding (menorrhagia) is by far the most common."
  },
  {
    "question": "Which of the following is the most common uterine neoplasm?",
    "options": [
      "Sarcoma",
      "Adenocarcinoma",
      "Adenomyosis",
      "Choricocarcinoma",
      "Leiomyoma"
    ],
    "correct": 4,
    "explanation": "Leiomyomas (fibroids) are benign smooth muscle tumors and are the most common solid pelvic tumors in women."
  },
  {
    "question": "A 43-year-old woman is complaining of chronic pelvic pain & menorrhagia that is unresponsive to hormonal therapy. The uterus is symmetrically enlarged and tender. The most likely diagnosis is:",
    "options": [
      "Endometriosis",
      "Adenomyosis",
      "Endometrial carcinoma",
      "Ovarian carcinoma",
      "Uterine fibroids"

    "correct": 1,

  },
  {
    "question": "The most common uterine tumors in the reproductive age is?",
    "options": [
      "Sarcoma",
      "Adenocarcinoma",
      "Adenomyosis",
      "Choriocarcinoma",
      "Leiomyoma"
    ],
    "correct": 4,
    "explanation": "Leiomyomas (fibroids) are the most frequently occurring uterine tumors during a woman's reproductive years, as their growth is stimulated by estrogen and progesterone."
  },
  {
    "question": "Which of the following is the gold standard for diagnosis of endometriosis?",
    "options": [
      "Hysterosalpingogram",
      "Laparoscopy",
      "CA-125",
      "Ultrasonography",
      "Hysteroscopy"

    "correct": 1,

  },
  {
    "question": "Which of the following degeneration in uterine fibroid may occur during pregnancy?",
    "options": [
      "Hyaline",
      "Fatty",
      "Red",
      "Cystic",
      "Sarcomatous changes"
    ],

    "explanation": "Red (carneous) degeneration is a hemorrhagic infarction of a uterine fibroid that typically occurs during pregnancy when the rapidly growing fibroid outgrows its blood supply."
  },
  {
    "question": "All of the following about uterine fibroids are correct Except:",
    "options": [
      "Are estrogen dependent",
      "Shrink in response to treatment with GnRH agonist",
      "Increase in size during pregnancy",
      "Can be treated by endoscopic surgery",
      "Fibroids found at caesarean section should be removed"
    ],
    "correct": 4,
    "explanation": "Myomectomy (removal of fibroids) is generally contraindicated during a cesarean section due to the extremely high risk of uncontrollable, life-threatening hemorrhage from the highly vascular pregnant uterus."
  },
  {
    "question": "Endometriosis treated with prolonged estrogen & progesterone combination therapy exhibits which of the following histologic characteristics?",
    "options": [
      "Marked edema",
      "Glandular atrophy",
      "Glandular hypertrophy",
      "Inflammatory infiltrate",
      "Cyclic changes"
    ],
    "correct": 1,
    "explanation": "Continuous, prolonged exposure to combined estrogen/progestin (like OCPs used continuously) induces a state of pseudopregnancy, leading to decidualization of the stroma and subsequent glandular atrophy in endometriotic tissue."
  },
  {
    "question": "The following procedures can be used for treating uterine fibroids Except:",

      "Laparoscopic myomectomy",
      "Hysterectomy",
      "Uterine artery embolization",
      "Fothergill's operation",
      "Hysteroscopic resection"
    ],
    "correct": 3,
    "explanation": "Fothergill's operation (Manchester repair) is a surgical procedure designed to treat uterine prolapse, not uterine fibroids."
  },
  {
    "question": "The following are correct as regards adenomyosis Except:",
    "options": [
      "Multiparty is a predisposing factor",
      "May be diffuse or localized",
      "Cause irregular vaginal bleeding",
      "Metastasize",
      "Cause severe dysmenorrhea"
    ],
    "correct": 3,
    "explanation": "Adenomyosis is a benign condition where endometrial tissue grows into the uterine muscle. Unlike malignant cancers, it does not metastasize to distant organs."
  },
  {
    "question": "The incidence of Sarcomatous degeneration in uterine leiomyoma is:",
    "options": [
      "<1%",
      "3%",
      "10%",
      "15%",
      "30%"
    ],
    "correct": 0,
    "explanation": "Malignant transformation of a benign uterine fibroid into a leiomyosarcoma is extremely rare, occurring in less than 1% (often cited as 0.1% to 0.5%) of cases."
  },
  {
    "question": "Which type of fibroid is associated with much symptoms:",
    "options": [
      "Subserous uterine fibroid",
      "Intramural uterine fibroid",
      "Submucous uterine fibroid",
      "Broad ligament fibroid",
      "Cervical fibroid"
    ],
    "correct": 2,
    "explanation": "Submucous fibroids project into the uterine cavity. Because they disrupt the endometrial lining, they are the most likely type to cause severe symptoms, particularly heavy menstrual bleeding (menorrhagia) and infertility."
  },
  {
    "question": "The treatment of endometriosis include all the following Except:",
    "options": [
      "Birth control pills (BCP)",
      "Oral gestagen therapy",
      "Estrogen",
      "Depo-Provera",
      "GnRH analogue"
    ],
    "correct": 2,
    "explanation": "Endometriosis is an estrogen-dependent disease. Giving unopposed estrogen would stimulate the growth of endometriotic lesions and worsen the condition."
  },
  {
    "question": "The most common clinical presentation of subserous fibroid is:",
    "options": [
      "Menorrhagia",
      "Metrohagia",
      "Polymenorrhea",
      "Amenorrhea",
      "Pelviabdominal mass"
    ],
    "correct": 4,
    "explanation": "Subserous fibroids grow outward from the uterus into the pelvic cavity. They usually do not affect menstrual bleeding but can grow very large, presenting primarily as a palpable pelvic/abdominal mass or causing pressure symptoms."
  },
  {
    "question": "Pelvic examination of a 39-year woman reveals a normal sized uterus that is pushed to one side by a firm mass, the most likely diagnosis is:",
    "options": [
      "Uterine fibroids",
      "Uterine carcinoma",
      "Uterine sarcoma",
      "Broad ligamentary fibroid",
      "Cervical carcinoma"
    ],
    "correct": 3,
    "explanation": "A broad ligament fibroid grows out from the side of the uterus into the space between the leaves of the broad ligament. As it grows, it will push the normal-sized uterus to the opposite contralateral side."
  },
  {
    "question": "The most common clinical presentation of submucous fibroids is:",
    "options": [
      "Menorrhagia",
      "Metrorrhagia",
      "Polymenorrhea",
      "Amenorrhea",
      "Oligomenorrhea"
    ],
    "correct": 0,
    "explanation": "Because submucous fibroids distort the uterine cavity and increase the surface area of the bleeding endometrium, their hallmark symptom is very heavy, prolonged menstrual bleeding (menorrhagia)."
  },
  {
    "question": "The best low cost imaging method to diagnose uterine fibroids is:",

      "MRI scan",
      "CT scan",
      "Ultrasound scan",
      "PET scan",
      "Hysterosalpingography"
    ],
    "correct": 2,
    "explanation": "Pelvic ultrasound (particularly transvaginal) is the most widely available, cost-effective, and highly accurate initial imaging modality for diagnosing and mapping uterine fibroids."
  },
  {
    "question": "Adenomyosis is the presence of endometrial tissue within:",
    "options": [
      "Uterine surface",
      "Anterior Cul-de-sac",
      "Uterosacral ligaments",
      "The myometrium",
      "Rectovaginal septum"
    ],
    "correct": 3,
    "explanation": "Adenomyosis is defined pathologically as the benign invasion of ectopic endometrial glands and stroma deep into the myometrium (the muscular wall of the uterus)."
  },
  {
    "question": "The commonest uterine fibroid to cause excessive bleeding is:",
    "options": [
      "Submucous fibroid",
      "Subserous fibroid",
      "Intramural fibroid",
      "Cervical fibroid",
      "Broad ligament fibroid"
    ],
    "correct": 0,
    "explanation": "Submucous fibroids bulge into the endometrial cavity, interfering with normal uterine contractility and increasing the endometrial surface area, which leads to heavy menstrual bleeding."
  },
  {
    "question": "Acceptable treatment for uterine fibroids include all of the following Except:",
    "options": [
      "No treatment",
      "Myomectomy during pregnancy if red degeneration occurs",
      "Myomectomy",
      "Hysterectomy",
      "GnRH agonist"
    ],
    "correct": 1,
    "explanation": "Red degeneration during pregnancy is treated conservatively with bed rest and analgesics (pain relief). Surgical removal (myomectomy) is contraindicated due to the extreme risk of severe hemorrhage and pregnancy loss."
  }
