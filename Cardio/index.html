<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MU61 Quiz - Cardiology</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   CSS VARIABLES & THEME
═══════════════════════════════════════════ */
:root {
  --bg:         #0d1117;
  --surface:    #161b22;
  --surface2:   #1c2330;
  --border:     #30363d;
  --text:       #e6edf3;
  --text-muted: #8b949e;
  --accent:     #f0a500;
  --accent-dim: rgba(240,165,0,0.12);
  --correct:    #2ea043;
  --correct-bg: rgba(46,160,67,0.12);
  --wrong:      #da3633;
  --wrong-bg:   rgba(218,54,51,0.12);
  --flagged:    #58a6ff;
  --flagged-bg: rgba(88,166,255,0.12);
  --skip:       #6e7681;
  --radius:     12px;
  --shadow:     0 4px 24px rgba(0,0,0,0.4);
  --transition: 0.2s ease;
  --nav-size:   280px;
  --nav-size-sm:72px;
}
[data-theme="light"] {
  --bg:         #f3f0eb;
  --surface:    #ffffff;
  --surface2:   #f8f6f1;
  --border:     #d0ccc5;
  --text:       #1c1917;
  --text-muted: #78716c;
  --accent:     #c27803;
  --accent-dim: rgba(194,120,3,0.10);
  --correct:    #16a34a;
  --correct-bg: rgba(22,163,74,0.10);
  --wrong:      #dc2626;
  --wrong-bg:   rgba(220,38,38,0.10);
  --flagged:    #2563eb;
  --flagged-bg: rgba(37,99,235,0.10);
  --shadow:     0 4px 24px rgba(0,0,0,0.10);
}

/* ═══════════════════════════════════════════
   RESET & BASE
═══════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  transition: background var(--transition), color var(--transition);
  overflow: hidden;
}
button { cursor: pointer; font-family: inherit; border: none; outline: none; }
input[type=radio] { display: none; }

/* ═══════════════════════════════════════════
   SCREENS
═══════════════════════════════════════════ */
.screen { display: none; width: 100%; height: 100%; position: relative; }
.screen.active { display: flex; }

/* ═══════════════════════════════════════════
   START SCREEN
═══════════════════════════════════════════ */
#start-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
  overflow-y: auto;
}
.hub-back-btn {
  position: absolute;
  top: 1.5rem;
  left: 1.5rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
  color: var(--text-muted);
  text-decoration: none;
  font-weight: 600;
  font-size: 0.95rem;
  transition: color var(--transition);
  z-index: 10;
}
.hub-back-btn:hover { color: var(--text); }
.hub-back-btn svg { transition: transform var(--transition); }
.hub-back-btn:hover svg { transform: translateX(-3px); }

.start-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3rem 2.5rem;
  max-width: 520px;
  width: 100%;
  box-shadow: var(--shadow);
  text-align: center;
}
.start-icon {
  width: 72px; height: 72px;
  background: var(--accent-dim);
  border-radius: 18px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 1.5rem;
  font-size: 2rem;
}
.start-card h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(1.8rem, 4vw, 2.4rem);
  color: var(--text);
  margin-bottom: 0.5rem;
  line-height: 1.2;
}
.start-card .subtitle {
  color: var(--text-muted);
  font-size: 0.95rem;
  margin-bottom: 2rem;
}
.meta-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 1rem;
  margin-bottom: 2rem;
}
.meta-item {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 1rem;
  text-align: center;
}
.meta-item .val {
  font-size: 1.5rem;
  font-weight: 700;
  color: var(--accent);
  display: block;
}
.meta-item .lbl {
  font-size: 0.75rem;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}
.btn-start {
  width: 100%;
  padding: 0.95rem 2rem;
  border-radius: var(--radius);
  background: var(--accent);
  color: #000;
  font-weight: 700;
  font-size: 1rem;
  letter-spacing: 0.02em;
  transition: opacity var(--transition), transform var(--transition);
}
.btn-start:hover { opacity: 0.88; transform: translateY(-1px); }
.btn-start:active { transform: translateY(0); }

/* Mode options - ensure equal height on mobile */
.mode-option {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 80px;
}

@media (max-width: 480px) {
  .mode-option {
    min-height: 90px;
  }
  .start-card {
    padding: 2rem 1.5rem;
  }
}

/* ═══════════════════════════════════════════
   QUIZ SCREEN LAYOUT
═══════════════════════════════════════════ */
#quiz-screen {
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1.25rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 10;
}
.topbar-title {
  font-family: 'Playfair Display', serif;
  font-size: 1.05rem;
  font-weight: 700;
  flex: 1;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.timer-wrap {
  display: flex;
  align-items: center;
  gap: 0.5rem;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 0.4rem 0.85rem;
  font-size: 0.9rem;
  font-weight: 600;
  min-width: 90px;
  justify-content: center;
}
.timer-wrap svg { flex-shrink: 0; }
.timer-wrap.warn { border-color: #da3633; color: #da3633; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100%{ opacity:1 } 50%{ opacity:0.6 } }

.topbar-actions { display: flex; gap: 0.5rem; align-items: center; }
.icon-btn {
  width: 36px; height: 36px;
  border-radius: 8px;
  background: var(--surface2);
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  color: var(--text-muted);
  transition: all var(--transition);
  font-size: 1rem;
  text-decoration: none;
}
.icon-btn:hover { color: var(--text); border-color: var(--accent); }
.icon-btn.danger:hover { border-color: var(--wrong); color: var(--wrong); }

/* MAIN BODY */
.quiz-body {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* QUESTION AREA */
.question-area {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.25rem;
}
.question-area::-webkit-scrollbar { width: 6px; }
.question-area::-webkit-scrollbar-track { background: transparent; }
.question-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

.q-header {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
}
.q-number-badge {
  background: var(--accent-dim);
  color: var(--accent);
  border: 1px solid var(--accent);
  border-radius: 8px;
  padding: 0.2rem 0.65rem;
  font-size: 0.8rem;
  font-weight: 700;
  white-space: nowrap;
  margin-top: 0.25rem;
  flex-shrink: 0;
  letter-spacing: 0.04em;
  text-transform: uppercase;
}
.q-actions { margin-left: auto; display: flex; gap: 0.5rem; }
.flag-btn {
  padding: 0.3rem 0.75rem;
  border-radius: 7px;
  background: var(--surface2);
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-size: 0.8rem;
  font-weight: 500;
  display: flex; align-items: center; gap: 0.35rem;
  transition: all var(--transition);
}
.flag-btn:hover, .flag-btn.active {
  background: var(--flagged-bg);
  border-color: var(--flagged);
  color: var(--flagged);
}
.flag-btn svg { transition: transform 0.2s; }
.flag-btn.active svg { transform: scale(1.1); }

.q-text {
  font-size: clamp(1rem, 2.5vw, 1.2rem);
  font-weight: 500;
  color: var(--text);
  line-height: 1.7;
  flex: 1;
}

/* OPTIONS */
.options-list {
  display: flex;
  flex-direction: column;
  gap: 0.65rem;
}
.option-label {
  display: flex;
  align-items: flex-start;
  gap: 0.85rem;
  padding: 0.95rem 1.15rem;
  border-radius: var(--radius);
  border: 1.5px solid var(--border);
  background: var(--surface);
  cursor: pointer;
  transition: all var(--transition);
  position: relative;
  overflow: hidden;
}
.option-label::before {
  content: '';
  position: absolute; inset: 0;
  background: var(--accent-dim);
  opacity: 0;
  transition: opacity var(--transition);
}
.option-label:hover { border-color: var(--accent); }
.option-label:hover::before { opacity: 1; }
input[type=radio]:checked + .option-label {
  border-color: var(--accent);
  background: var(--accent-dim);
}
.option-key {
  width: 28px; height: 28px;
  border-radius: 7px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 0.75rem;
  font-weight: 700;
  flex-shrink: 0;
  transition: all var(--transition);
  z-index: 1;
  text-transform: uppercase;
}
input[type=radio]:checked + .option-label .option-key {
  background: var(--accent);
  border-color: var(--accent);
  color: #000;
}
.option-text { font-size: 0.95rem; line-height: 1.5; z-index: 1; padding-top: 0.05rem; }

/* NAVIGATION BUTTONS */
.q-nav-btns {
  display: flex;
  gap: 0.75rem;
  padding-top: 0.5rem;
  flex-wrap: wrap;
}
.btn-nav {
  display: flex; align-items: center; gap: 0.4rem;
  padding: 0.75rem 1.25rem;
  border-radius: var(--radius);
  font-size: 0.9rem;
  font-weight: 600;
  transition: all var(--transition);
  border: 1.5px solid var(--border);
  background: var(--surface);
  color: var(--text);
}
.btn-nav:hover { border-color: var(--accent); color: var(--accent); }
.btn-nav.primary {
  background: var(--accent);
  color: #000;
  border-color: var(--accent);
  margin-left: auto;
}
.btn-nav.primary:hover { opacity: 0.85; }
.btn-nav.submit-btn {
  background: var(--correct);
  border-color: var(--correct);
  color: #fff;
  margin-left: auto;
}
.btn-nav.submit-btn:hover { opacity: 0.85; }

/* ═══════════════════════════════════════════
   NAVIGATION PANE
═══════════════════════════════════════════ */
.nav-pane {
  width: var(--nav-size);
  background: var(--surface);
  border-left: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow: hidden;
}
.nav-pane-header {
  padding: 1rem 1.1rem 0.75rem;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.nav-pane-header h3 {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-muted);
  margin-bottom: 0.65rem;
  font-weight: 600;
}
.legend {
  display: flex; flex-wrap: wrap; gap: 0.4rem 0.75rem;
}
.legend-item {
  display: flex; align-items: center; gap: 0.3rem;
  font-size: 0.72rem; color: var(--text-muted);
}
.dot {
  width: 10px; height: 10px; border-radius: 3px; flex-shrink: 0;
}
.dot.answered  { background: var(--correct); }
.dot.wrong     { background: var(--wrong); }
.dot.flagged   { background: var(--flagged); }
.dot.current   { background: var(--accent); }
.dot.unanswered{ background: var(--surface2); border: 1.5px solid var(--border); }

.nav-grid-wrap {
  flex: 1;
  overflow-y: auto;
  padding: 0.85rem;
}
.nav-grid-wrap::-webkit-scrollbar { width: 4px; }
.nav-grid-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
.nav-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(38px, 1fr));
  gap: 6px;
}
.nav-btn {
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1.5px solid var(--border);
  background: var(--surface2);
  color: var(--text-muted);
  font-size: 0.78rem;
  font-weight: 600;
  display: flex; align-items: center; justify-content: center;
  transition: all var(--transition);
  position: relative;
}
.nav-btn:hover { border-color: var(--accent); color: var(--accent); }
.nav-btn.answered { background: var(--correct-bg); border-color: var(--correct); color: var(--correct); }
.nav-btn.wrong    { background: var(--wrong-bg); border-color: var(--wrong); color: var(--wrong); }
.nav-btn.flagged  { background: var(--flagged-bg); border-color: var(--flagged); color: var(--flagged); }
.nav-btn.current  { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); box-shadow: 0 0 0 2px var(--accent-dim); }
.nav-btn .flag-dot {
  position: absolute; top: 2px; right: 2px;
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--flagged);
}

/* Nav pane bottom stats */
.nav-stats {
  padding: 0.75rem 1rem;
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 0.5rem;
  flex-shrink: 0;
}
.stat-item { text-align: center; }
.stat-item .sv { font-size: 1rem; font-weight: 700; }
.stat-item .sl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
.sv.green { color: var(--correct); }
.sv.blue  { color: var(--flagged); }
.sv.muted { color: var(--text-muted); }

/* ═══════════════════════════════════════════
   PORTRAIT / BOTTOM NAV PANE
═══════════════════════════════════════════ */
@media (orientation: portrait) {
  .quiz-body { flex-direction: column; }
  .nav-pane {
    width: 100%;
    height: auto;
    border-left: none;
    border-top: 1px solid var(--border);
    max-height: 200px;
  }
  .nav-pane-header {
    padding: 0.6rem 1rem 0.5rem;
  }
  .nav-grid-wrap {
    padding: 0.5rem 0.85rem;
    overflow-x: auto;
    overflow-y: hidden;
  }
  .nav-grid {
    grid-template-columns: repeat(var(--q-count, 20), 38px);
    grid-template-rows: 38px;
    grid-auto-flow: column;
    gap: 5px;
  }
  .nav-btn { width: 38px; height: 38px; aspect-ratio: unset; }
  .nav-stats { padding: 0.5rem 1rem; }
  .stat-item .sv { font-size: 0.9rem; }
}

/* ═══════════════════════════════════════════
   RESULTS SCREEN
═══════════════════════════════════════════ */
#result-screen {
  flex-direction: column;
  height: 100%;
  overflow: hidden;
}
.result-topbar {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 0.75rem 1.25rem;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.result-topbar h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.1rem;
}
.result-topbar .topbar-actions { margin-left: auto; }

.result-body {
  flex: 1;
  overflow-y: auto;
  padding: 1.5rem;
  display: flex;
  flex-direction: column;
  gap: 1.5rem;
  max-width: 820px;
  margin: 0 auto;
  width: 100%;
}
.result-body::-webkit-scrollbar { width: 6px; }
.result-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Score banner */
.score-banner {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 1.75rem 2rem;
  display: flex;
  align-items: center;
  gap: 2rem;
  flex-wrap: wrap;
  box-shadow: var(--shadow);
}
.score-circle {
  width: 110px; height: 110px;
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border: 4px solid var(--accent);
  flex-shrink: 0;
  position: relative;
  background: var(--accent-dim);
}
.score-circle .pct { font-size: 1.8rem; font-weight: 700; color: var(--accent); line-height: 1; }
.score-circle .lbl { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }

.score-details { flex: 1; min-width: 180px; }
.score-details h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.4rem;
  margin-bottom: 0.75rem;
}
.score-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 0.65rem;
}
.score-stat {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.65rem 0.85rem;
}
.score-stat .n { font-size: 1.2rem; font-weight: 700; }
.score-stat .t { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.03em; }
.n.green { color: var(--correct); }
.n.red   { color: var(--wrong); }
.n.blue  { color: var(--flagged); }

/* Result filter tabs */
.result-tabs {
  display: flex; gap: 0.5rem; flex-wrap: wrap;
}
.tab-btn {
  padding: 0.45rem 1rem;
  border-radius: 8px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  color: var(--text-muted);
  font-size: 0.85rem;
  font-weight: 500;
  transition: all var(--transition);
}
.tab-btn:hover { border-color: var(--accent); color: var(--accent); }
.tab-btn.active { background: var(--accent-dim); border-color: var(--accent); color: var(--accent); }

/* Result items */
.result-list { display: flex; flex-direction: column; gap: 1rem; }
.result-item {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
  transition: border-color var(--transition);
}
.result-item.correct { border-color: var(--correct); }
.result-item.wrong   { border-color: var(--wrong); }
.result-item.skipped { border-color: var(--skip); }

.result-item-header {
  display: flex;
  align-items: flex-start;
  gap: 0.75rem;
  padding: 1rem 1.25rem;
  cursor: pointer;
}
.result-status-icon {
  width: 28px; height: 28px; border-radius: 8px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; font-size: 0.9rem; font-weight: 700;
  margin-top: 0.15rem;
}
.result-item.correct .result-status-icon { background: var(--correct-bg); color: var(--correct); }
.result-item.wrong   .result-status-icon { background: var(--wrong-bg);   color: var(--wrong); }
.result-item.skipped .result-status-icon { background: var(--surface2);   color: var(--skip); }

.result-q-meta { flex: 1; }
.result-q-num  { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.2rem; font-weight: 600; }
.result-q-text { font-size: 0.95rem; font-weight: 500; line-height: 1.5; }
.expand-arrow { color: var(--text-muted); font-size: 0.8rem; margin-top: 0.2rem; transition: transform 0.2s; }
.result-item-header.open .expand-arrow { transform: rotate(180deg); }

.result-item-body {
  display: none;
  padding: 0 1.25rem 1.1rem;
  border-top: 1px solid var(--border);
}
.result-item-body.open { display: block; }

.answer-row {
  display: flex; align-items: flex-start; gap: 0.65rem;
  padding: 0.6rem 0.75rem;
  border-radius: 8px;
  margin-top: 0.5rem;
  font-size: 0.88rem;
}
.answer-row.your-answer { background: var(--wrong-bg); }
.answer-row.correct-answer { background: var(--correct-bg); }
.answer-row.your-answer.is-correct { background: var(--correct-bg); }
.answer-row .ar-label {
  font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.05em;
  font-weight: 700; white-space: nowrap; margin-top: 0.1rem; opacity: 0.7;
}
.explanation-box {
  margin-top: 0.75rem;
  padding: 0.75rem 1rem;
  background: var(--surface2);
  border-left: 3px solid var(--accent);
  border-radius: 0 8px 8px 0;
  font-size: 0.875rem;
  line-height: 1.6;
  color: var(--text-muted);
}
.explanation-box strong { color: var(--text); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-bottom: 0.25rem; }

/* Result Actions (Bottom buttons) */
.result-actions {
  display: flex;
  gap: 1rem;
  flex-wrap: wrap;
  margin-bottom: 1rem;
}
.btn-restart {
  display: flex; align-items: center; gap: 0.5rem;
  padding: 0.85rem 1.75rem;
  border-radius: var(--radius);
  background: var(--accent);
  color: #000;
  font-weight: 700;
  font-size: 0.95rem;
  border: 1.5px solid var(--accent);
  transition: all var(--transition);
  text-decoration: none;
}
.btn-restart:hover { opacity: 0.85; transform: translateY(-1px); }

.btn-secondary {
  background: var(--surface2);
  color: var(--text);
  border-color: var(--border);
}
.btn-secondary:hover {
  border-color: var(--accent);
  color: var(--accent);
  opacity: 1;
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
.toast {
  position: fixed;
  bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(80px);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 0.65rem 1.2rem;
  font-size: 0.88rem;
  font-weight: 500;
  box-shadow: var(--shadow);
  z-index: 9999;
  transition: transform 0.3s ease;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }

/* ═══════════════════════════════════════════
   MODAL (Confirm submit)
═══════════════════════════════════════════ */
.modal-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.6);
  backdrop-filter: blur(4px);
  z-index: 1000;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 1rem;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 2rem;
  max-width: 420px;
  width: 100%;
  box-shadow: var(--shadow);
  animation: slideUp 0.25s ease;
}
@keyframes slideUp { from { opacity:0; transform: translateY(20px); } to { opacity:1; transform: translateY(0); } }
.modal h3 { font-family: 'Playfair Display', serif; font-size: 1.3rem; margin-bottom: 0.75rem; }
.modal p  { color: var(--text-muted); font-size: 0.9rem; line-height: 1.6; margin-bottom: 1.25rem; }
.modal-unanswered { font-weight: 600; color: var(--wrong); }
.modal-actions { display: flex; gap: 0.75rem; }
.modal-actions .btn-cancel {
  flex: 1;
  padding: 0.75rem;
  border-radius: 10px;
  background: var(--surface2);
  border: 1.5px solid var(--border);
  color: var(--text);
  font-weight: 600;
  font-size: 0.9rem;
  transition: all var(--transition);
}
.modal-actions .btn-cancel:hover { border-color: var(--accent); }
.modal-actions .btn-confirm {
  flex: 1;
  padding: 0.75rem;
  border-radius: 10px;
  background: var(--correct);
  border: none;
  color: #fff;
  font-weight: 700;
  font-size: 0.9rem;
  transition: all var(--transition);
}
.modal-actions .btn-confirm:hover { opacity: 0.85; }

/* ═══════════════════════════════════════════
   PROGRESS BAR
═══════════════════════════════════════════ */
.progress-bar-wrap {
  height: 3px;
  background: var(--surface2);
  position: relative;
  flex-shrink: 0;
}
.progress-bar-fill {
  height: 100%;
  background: var(--accent);
  transition: width 0.4s ease;
  border-radius: 0 2px 2px 0;
}

/* ═══════════════════════════════════════════
   MISC
═══════════════════════════════════════════ */
.hidden { display: none !important; }

// 2. Handle Theme Toggle (Maintains same theme logic as your templates)
function toggleTheme() {
  const html = document.documentElement;
  const isDark = html.getAttribute('data-theme') === 'dark';
  const newTheme = isDark ? 'light' : 'dark';
  
  html.setAttribute('data-theme', newTheme);
  localStorage.setItem('quiz-theme', newTheme); // Save preference
  updateThemeIcon();
}

function updateThemeIcon() {
  const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
  document.getElementById('theme-toggle').textContent = isDark ? '☀' : '☾';
}

// 3. Initialize on page load
function init() {
  // Check for saved theme preference
  const savedTheme = localStorage.getItem('quiz-theme');
  if (savedTheme) {
    document.documentElement.setAttribute('data-theme', savedTheme);
  }
  
  updateThemeIcon();
  renderQuizzes();
}
