  "dataPresented": {

    "tables": [
      {
        "title": "Examination Technique",
        "headers": [
          "Step",
          "Action"
        ],
        "rows": [
          [
            "1. Position",
            "Patient lying at 45° angle to the bed"
          ],
          [
            "2. Head position",
            "Ask patient to look to the left (to see right internal jugular vein)"
          ],
          [
            "3. Identify pulsation",
            "Find the highest point of pulsation in the vein"
          ],
          [
            "4. Measure",
            "Place a ruler perpendicular to the Angle of Lewis (sternal angle); place another ruler horizontally to reach the pulsation point"
          ],
          [
            "5. Add 5",
            "Add 5 cm to the measured value (vertical distance from right atrium to Angle of Lewis)"
          ]
        ]
      },
      {
        "title": "Normal CVP",
        "headers": [
          "Parameter",
          "Value"
        ],
        "rows": [
          [
            "Normal CVP",
            "7-9 cm H₂O"
          ],
          [
            "Distance: right atrium to Angle of Lewis",
            "5 cm"
          ],
          [
            "Blood elevated above clavicle",
            "2-4 cm"
          ]
        ]
      },
      {
        "title": "Items to Comment On",
        "headers": [
          "Item",
          "Description"
        ],
        "rows": [
          [
            "Unilateral vs bilateral",

          [
            "Congested vs not",
            "Distended or normal"
          ],
          [
            "Pulsating vs non-pulsating",
            "JVP pulsates; carotid doesn't"
          ],
          [
            "↑ with inspiration?",
            "Kussmaul's sign if paradoxical filling with inspiration"
          ]
        ]
      }
    ]

  "questions": [
    {
      "id": "q1",
      "question": "Examine the neck veins.",
      "answer": "Patient at 45°, head turned left. Identify highest pulsation point in right IJV. Use two rulers: one perpendicular to Angle of Lewis, one horizontal to pulsation. Add 5 cm to the measured value. Normal 7-9 cm H₂O.",
      "rubric": "45°, look left, measure vertical height, add 5"
    },
    {
      "id": "q2",
      "question": "What is the normal CVP value?",
      "answer": "Normal 7-9 cm H₂O. Distance from right atrium to Angle of Lewis = 5 cm. Blood elevated above clavicle = 2-4 cm.",
      "rubric": "7-9 cm H₂O + components"
    },
    {
      "id": "q3",
      "question": "Why is the patient sitting at a 45° angle?",
      "answer": "To make the level of blood in the right atrium at the level of the Angle of Lewis & clavicle. So the angle is the zero point for measurement.",
      "rubric": "Zero point at Angle of Lewis"
    },
    {
      "id": "q4",
      "question": "What do you comment on when examining neck veins?",
      "answer": "4 items: 1) Unilateral or bilateral. 2) Congested or not. 3) Pulsating or non-pulsating. 4) ↑ with inspiration (Kussmaul's sign).",
      "rubric": "4 items"
    },
    {
      "id": "q5",
      "question": "Causes of congested non-pulsating neck veins?",
      "answer": "1. SVC obstruction (from inside: thrombosis; from outside: mass/tumor = mediastinal syndrome). 2. Severe constrictive pericarditis. 3. Severe pericardial effusion. 4. Severe right-sided heart failure.",
      "rubric": "4 causes — SVC, constrictive, effusion, RSHF"
    },
    {
      "id": "q6",
      "question": "Causes of congested pulsating neck veins?",
      "answer": "1. TS. 2. TR. 3. Mild constrictive pericarditis. 4. Mild pericardial effusion. 5. Mild RSHF. 6. ↑ Intra-thoracic pressure (pneumothorax, emphysema, effusion). 7. ↑ Intra-abdominal pressure (ascites, obesity). 8. ↑ Blood volume (pregnancy, premenstrual, acute nephritis). 9. Space-occupying lesion in right atrium (thrombus, tumor).",
      "rubric": "9 categories"
    },
    {
      "id": "q7",
      "question": "What is Kussmaul's sign? What are its causes?",
      "answer": "Normally JVP rises with expiration and falls with inspiration (due to ↑ negative intrathoracic pressure). If veins fill with inspiration → Kussmaul's sign (paradoxical venous filling). Causes: CHF, restrictive disease (constrictive pericarditis, restrictive cardiomyopathy), pulmonary embolism, SVC obstruction.",
      "rubric": "Paradoxical filling + causes"
    },
    {
      "id": "q8",
      "question": "Causes of giant 'a' wave?",
      "answer": "1. TS. 2. PS. 3. Pulmonary HTN. 4. Pulmonary embolism.",
      "rubric": "4 causes — TS, PS, PHT, PE"
    },
    {
      "id": "q9",
      "question": "Causes of cannon 'a' wave?",
      "answer": "Regular: nodal rhythm. Occasional: complete heart block, ventricular tachycardia.",
      "rubric": "Nodal rhythm + CHB + VT"
    },
    {
      "id": "q10",
      "question": "Causes of absent 'a' wave?",
      "answer": "Atrial fibrillation (no atrial contraction).",
      "rubric": "AF"
    }
  ],
  "rubric": {
    "mustAsk": [

      "Normal CVP",
      "Congested non-pulsating vs pulsating",
      "Kussmaul's sign",
