      "answer": "2nd degree heart block Type I (Mobitz I, Wenckebach) — progressive prolongation of PR interval, then drop QRS, then repeat. Represents skip conduction or dropped beats.",

      "question": "What is the pathology and where is the block?",

    },
    {
      "id": "q3",
      "question": "What is the treatment?",
      "answer": "Usually no treatment if asymptomatic. Stop offending drugs. Atropine if symptomatic bradycardia. Permanent pacemaker rarely needed (only if symptomatic and refractory).",
