      "question": "Identify this ECG pattern.",
      "answer": "Atrial fibrillation — P wave absent & replaced by fibrillation (f) waves. QRS normal in shape but IRREGULAR in rhythm ('irregularly irregular').",
      "rubric": "AF + absent P + f waves + irregularly irregular"

      "id": "q2",
      "question": "What is the treatment?",
      "answer": "RATE CONTROL (first line for most patients): amiodarone, BB, CCB, digoxin (only in HF/hypotension). RHYTHM CONTROL (cardioversion): DC if unstable; drugs (dofetilide, flecainide, propafenone) if stable. ANTICOAGULATION: warfarin INR 2-3 or NOACs. Use CHADS₂ score to guide anticoagulation.",
      "rubric": "Rate + rhythm + anticoagulation"
    },

      "id": "q3",
      "question": "What is the CHADS₂ score?",

      "rubric": "5 components with points"
    },

      "id": "q4",
      "question": "What are the causes of AF?",
