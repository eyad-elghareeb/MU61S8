<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PTB-XL ECG Explorer</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }

        /* ── Back to Hub button (fallback — only shown if iframe injection fails) */
        .hub-back-btn {
            position: fixed;
            top: 12px;
            left: 12px;
            z-index: 99999;
            display: none;
            align-items: center;
            gap: 0.5rem;
            color: #8b949e;
            background: rgba(22, 27, 34, 0.92);
            backdrop-filter: blur(10px);
            border: 1.5px solid #30363d;
            border-radius: 8px;
            padding: 0.45rem 0.85rem;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.88rem;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            transition: color 0.22s cubic-bezier(0.16, 1, 0.3, 1),
                        transform 0.22s cubic-bezier(0.16, 1, 0.3, 1),
                        border-color 0.22s,
                        background 0.22s;
            white-space: nowrap;
            letter-spacing: 0.01em;
            cursor: pointer;
        }
        .hub-back-btn:hover {
            color: #e6edf3;
            border-color: #f0a500;
            background: rgba(22, 27, 34, 0.98);
            transform: translateY(-1px);
        }
        .hub-back-btn:active {
            transform: scale(0.93);
            transition-duration: 0.08s;
        }
        .hub-back-btn i {
            transition: transform 0.22s cubic-bezier(0.16, 1, 0.3, 1);
            flex-shrink: 0;
        }
        .hub-back-btn:hover i {
            transform: translateX(-3px);
        }
    </style>
</head>
<body>
    <iframe id="ecg-iframe" src="https://ptb-xl-ecg-explorer.vercel.app/" allowfullscreen></iframe>

    <!-- Fallback button (hidden by default, shown only if iframe injection fails) -->
    <a href="index.html" class="hub-back-btn" id="hub-back-fallback">
        <i class="fa-solid fa-arrow-left"></i>
    </a>

    <script>
        // ── Dynamically inject "Back to Hub" button into the iframe's own topbar ──
        (function injectBackToHubButton() {
            var fallback = document.getElementById('hub-back-fallback');
            var iframe = document.getElementById('ecg-iframe');

            function tryInject() {
                try {
                    var doc = iframe.contentDocument || iframe.contentWindow.document;
                    // Look for the iframe's topbar (class or tag heuristic)
                    var topbar = doc.querySelector('.topbar, header, nav, [role="navigation"], .navbar, .toolbar');

                    if (topbar) {
                        // Inject styles into the iframe
                        var style = doc.createElement('style');
                        style.textContent = '\
                            .hub-back-btn {\
                                display: flex;\
                                align-items: center;\
                                gap: 0.5rem;\
                                color: #8b949e;\
                                text-decoration: none;\
                                font-weight: 600;\
                                font-size: 0.88rem;\
                                transition: color 0.22s ease, transform 0.22s ease;\
                                white-space: nowrap;\
                                padding: 0.2rem 0;\
                                letter-spacing: 0.01em;\
                            }\
                            .hub-back-btn:hover {\
                                color: #e6edf3;\
                                transform: translateY(-1px);\
                            }\
                            .hub-back-btn:active {\
                                transform: scale(0.93);\
                                transition-duration: 0.08s;\
                            }\
                            .hub-back-btn i {\
                                transition: transform 0.22s ease;\
                                flex-shrink: 0;\
                            }\
                            .hub-back-btn:hover i {\
                                transform: translateX(-3px);\
                            }';
                        doc.head.appendChild(style);

                        // Create and insert the button as first child of the topbar
                        var btn = doc.createElement('a');
                        btn.href = 'index.html';
                        btn.className = 'hub-back-btn';
                        btn.innerHTML = '<i class="fa-solid fa-arrow-left"></i>';
                        btn.addEventListener('click', function(e) {
                            e.preventDefault();
                            window.top.location.href = 'index.html';
                        });

                        topbar.insertBefore(btn, topbar.firstChild);
                        // Success — hide fallback
                        if (fallback) fallback.style.display = 'none';
                    } else {
                        // No topbar found — show fallback
                        if (fallback) fallback.style.display = 'flex';
                    }
                } catch (err) {
                    // Cross-origin blocked — show the floating fallback button
                    if (fallback) fallback.style.display = 'flex';
                }
            }

            // Try once iframe has loaded
            iframe.addEventListener('load', tryInject);
            // Also try after a short delay in case load already fired
            setTimeout(tryInject, 3000);
        })();
    </script>
</body>
</html>
