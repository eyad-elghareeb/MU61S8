imal conduction system associated with calcific aortic stenosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case453/1350x900.gif", "_type": "mcq", "_caseId": 453}, {"question": "Challenging ECG from a middle-age man who shortly thereafter developed atrial fibrillation, while taking COPD medications. Which ONE of the following is most likely?", "options": ["Sinus rhythm with complete AV heart block", "Sinus rhythm with WPW pre-excitation", "Idioventricular escape rhythm", "Accelerated junctional rhythm with occasional sinus beats", "Sinus rhythm with 2:1 SA exit block"], "correct": 3, "explanation": "The ECG shows a narrow (normal QRS duration) rhythm at a rate of about 70/min. Most of the beats (e.g., 1-5) are junctional in origin, with retrograde P waves (negative in lead II), apparent just after the QRS. In the 6th beat there is more retrograde AV delay, so the P wave appears at the end of the T wave (longer R-P interval). Following that beat, there is an upright P wave in lead II, partly merged with the QRS, most likely due to sinus rhythm with AV dissociation. The next beat is sinus in origin, followed by the resumption of the accelerated junctional rhythm. The term �accelerated� is applied here to contrast this type of junctional rhythm with classical junctional escape rhythms in which the rate is usually 60/min or less. Accelerated junctional rhythms may be seen in a variety of contexts. Usually they do not cause hemodynamic compromise, although right atrial contraction may occur against a closed tricuspid valve, causing cannon A waves, visible on exam of the neck. Digitalis toxicity is one of the most clinically important causes because more severe arrhythmias may ensue. However, the absence of digitalis effect (shortening of the QT interval with scooping of the ST-T) makes this unlikely. In this case, the rhythm was probably related to the sympathomimetic drugs the patient was taking for chronic obstructive pulmonary disease (COPD). Other reported contexts for accelerated junctional rhythms include recent cardiac surgery, hyperkalemia, acute myocardial infarction, and following AV node ablation procedures. The rhythm may also occur transiently in healthy individuals. From an electrophysiologic viewpoint, these narrow complex rhythms originate above the bifurcation of the bundle of His, either in the His bundle itself, or in the vicinity of the AV node. They have been ascribed to increased automaticity of pacemaker tissue or to triggered activity (i.e., afterdepolarizations). Finally. the term �non-paroxysmal junctional tachycardia� is sometimes used to describe accelerated junctional rhythms (rates 70-130/min). However, some authors balk at using the term �tachycardia� for rhythms with rates below 100/min.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case454/1350x900.gif", "_type": "mcq", "_caseId": 454}, {"question": "ECG from a 70 year old man. All of the following abnormalities are present EXCEPT for which ONE?", "options": ["Marked sinus bradycardia", "Mild AV conduction delay (first degree AV block)", "QT/QTc prolongation", "Left anterior fascicular block", "Borderline voltage criterion for left ventricular hypertrophy"], "correct": 3, "explanation": "The ECG shows prominent sinus bradycardia (about 40/min), a slightly prolonged PR interval of 220 msec (first degree AV �block�) and QT/QTc prolongation (by Hodges formula) at 520/485 msec. (Note: especially at slower rates, the QT can be prominently prolonged and not be more than � the RR interval.) Borderline voltage criterion for LVH (SV1 + RV6 = 32 mm) is also present. The mean frontal plane QRS axis is about +10 degrees, so left anterior fascicular block is not present. The patient was taking a beta-blocker and dofetilide for paroxysmal atrial fibrillation, accounting for the bradycardia and ventricular repolarization prolongation. The latter drug, a class III antiarrhythmic, which blocks the slow outward K+ rectifier current, was stopped due to enhanced risk of torsades de pointes and the pharmacologic therapy adjusted. The lateral T waves are prominent but not peaked, as with hyperkalemia, or associated with ST elevation as with acute STEMI. Prominent broad, positive waves have been reported with LV volume overload states (e.g,, mitral or aortic regurgitation) and with subarachnoid hemorrhage. However, this patient�s echocardiogram showed only mild mitral regurgitation (without LV dilation and only mild left atrial enlargement). Neurologic examination was normal.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case455/1350x900.gif", "_type": "mcq", "_caseId": 455}, {"question": "Challenging ECG from a 79 year old woman, with coronary artery disease, pulmonary hypertension and biventricular heart failure, who presents with nausea. The ECG is most consistent with all of the following, EXCEPT for which ONE?", "options": ["Left anterior fascicular block", "Digitalis excess", "Ischemia and possible myocardial infarction", "Right ventricular hypertrophy", "Hypokalemia"], "correct": 0, "explanation": "The ECG shows baseline artifact, with atrial fibrillation (no true P waves) with a very slow and at times regularized ventricular response averaging around 50/mn at rest. This finding suggests a high degree of AV conduction slowing/block, perhaps with a junctional escape pacemaker. Right bundle branch block (RBBB) with right axis deviation (RAD) are present, raising the question of right ventricular hypertrophy (RVH). Prominent ventricular repolarization abnormalities are also noted in the inferior and anterolateral leads, along with QTc prolongation. The AF, with a very slow, regularized ventricular response, should immediately raise consideration of digitalis excess (the serum level was high at 3.0 ng/mL). Digitalis, however, typically shortens both the ventricular action potential and, hence, the QT�prolongation of the latter interval with digitalis excess implies the presence of an additional factor or factors (e.g., electrolyte. The K+ here was 3.2 mEq/L and she was taking escitalopram, which may also prolong the QT, as may chronic ischemia. Her echocardiogram showed: right ventricular cavity dilation with free wall hypokinesis with severely elevated right ventricular systolic and estimated pulmonary pressures; moderate to severe mitral regurgitation, without mitral stenosis; moderate to severe tricuspid regurgitation and normal left ventricular cavity size and free wall motion. She ruled in for a small non-Q-wave infarct with mildly elevated cardiac enzyme levels. The differential diagnosis of RBBB and RAD, in addition to RVH (most common in younger individuals), also includes RBBB with antero-lateral MI and RBBB with left posterior fascicular block (the latter is a diagnosis of exclusion).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case456/1350x900.gif", "_type": "mcq", "_caseId": 456}, {"question": "Elderly man with palpitations. What is the rhythm?", "options": ["Sinus tachycardia with atrial premature complexes (APCs)", "Multifocal atrial tachycardia (MAT)", "Atrial flutter with variable block", "Atrial fibrillation", "Sinus tachycardia with artifact"], "correct": 3, "explanation": "The ECG shows atrial fibrillation with a moderate ventricular response (on beta-blocker therapy). Low limb lead voltage, a nonspecific finding, is present. The mean (resting) ventricular rate over 10 seconds is about 70/minute and irregular, without any discernable pattern. Note that the continuous atrial activity (lead V1) is coarse (large amplitude) and nonstationary (variable in appearance and intra-atrial rate), in contrast to atrial flutter where all the atrial waves are identical in appearance and atrial rate. Note: there are two classes of atrial activity: continuous, including fibrillation and flutter, and discrete (including sinus, paroxysmal supraventricular tachycardias, multifocal atrial tachycardias, etc). The latter are associated with discrete P waves (which may be hidden in the QRS, in the case of junctional rhythms or AV nodal reentrant tachycardia). In atrial fibrillation (present here) and atrial flutter, particularly in lead V1, the continuous waves are sometimes mistaken for discrete P waves, leading to misdiagnosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case457/1350x900.gif", "_type": "mcq", "_caseId": 457}, {"question": "Elderly man with a history of atrial fibrillation. Medications include atenolol and dofetilide. The ECG findings show or are consistent with all of the following EXCEPT which ONE?", "options": ["Sinus bradycardia", "Low limb lead voltage", "Left posterior fascicular block", "Biatrial abnormality", "Mild QT/QTc prolongation"], "correct": 2, "explanation": "The ECG shows sinus bradycardia (about 54/min on a beta-1 receptor selective blocking agent), with borderline low limb lead voltage, normal QRS axis and normal QRS duration. Mild QT/QTc prolongation is noted (about 0.47/0.46 sec measured by computer) on the dofetilide. Small U waves are present, (e.g., V2/V3). The P waves are the most notable finding, being both broad (e.g., leads II, V1) and initially peaked (V1), consistent with biatrial abnormality. The latter was documented on transthoracic echocardiogram, which showed left and right atrial dilation, as well as moderate-severe mitral regurgitation, moderate aortic regurgitation and pulmonary hypertension. The precordial voltages are somewhat prominent; however, strict ECG criteria for left ventricular hypertrophy (LVH), due in this case to an LV volume load state, are not met.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case458/1350x900.gif", "_type": "mcq", "_caseId": 458}, {"question": "This ECG, from an elderly woman, is consistent with which ONE of the following conditions?", "options": ["Acute anterior-lateral ST elevation myocardial infarction (STEMI)", "Acute pericarditis", "Hyperkalemia", "Systemic hypothermia", "Brugada pattern"], "correct": 0, "explanation": "The ECG shows sinus rhythm at a rate of about 70/min. Marked left axis deviation of the mean frontal plane QRS axis is present, consistent with left anterior fascicular block (with normal QRS duration). The PR interval is at the upper limits of normal (about 200 msec). The most dramatic findings are ST elevations, sometimes in association with hyperacute T waves in leads V2-V6, I and aVL, with reciprocal ST depressions in lead III, and slightly in lead aVF. The ST segment is also depressed in lead V1. These findings are consistent with relatively proximal occlusion of the left anterior descending (LAD) coronary artery, probably below the origin of the septal perforators but before the take-off of first diagonal branch, to account for the orientation of the ST (current of injury vector) antero-laterally. The key point is that a very large amount of myocardium is jeopardized. There has been interest in precise localization of the area of LAD blockage from the 12-lead ECG. However, factors such as multivessel involvement (especially with jeopardized collaterals), anatomic variations, and evolving size and location of the �culprit� clot, etc. preclude algorithmic predictions about the location of occlusion within the LAD system, which have both high sensitivity and specificity. In cases showing new RBBB and/or ST elevations in leads V1 and aVR, very proximal occlusion of the LAD before the first septal perforators (or even left main occlusion) is likely to be present.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case459/1350x900.gif", "_type": "mcq", "_caseId": 459}, {"question": "This challenging ECG is from a middle-aged man with palpitations and a complex medical history. The rhythm is best described as showing which ONE of the following?", "options": ["Paroxysmal atrial fibrillation", "Atrial flutter with variable block", "Bursts of torsades de pointes with underlying sinus beats", "Bursts of (multi-)focal atrial tachycardia with underlying sinus beats", "Bursts of AV nodal reentrant tachycardia (AVNRT)"], "correct": 3, "explanation": "The complex ECG shows an intermittent, non-sustained supraventricular tachycardia. Capturing this type of finding on a standard ECG is very unusual. The rhythm strip shows bursts of a predominantly narrow complex tachycardia, somewhat irregular in cadence, with preceding P waves (some positive in II, thereby precluding AVNRT), which appear variable in morphology. Some of the QRS complexes conduct with right bundle branch block aberrancy, usually with right axis deviation. Thus, the tachycardia bursts are consistent with an atrial tachycardia, probably multifocal. The bursts are followed by pauses interrupted with a single sinus (or ectopic atrial) beat, and then re-initiation of the tachycardia bursts. The P waves of the sinus beats are wide, suggesting an underlying intra-atrial conduction delay. Artifact in lead V1 may be mistaken for atrial fibrillation or flutter, but the baseline is clearly flat in other leads. The remainder of the ECG is notable for relatively low voltage with slow R wave progression in leads V1-V3. The combination of findings is highly suggestive of chronic obstructive pulmonary disease (COPD). However, the patient had only mild COPD, but also a history of radiation therapy for Hodgkin&apos;s disease and coronary artery disease (normal left ventricular function), with mild-moderate mitral regurgitation, possibly accounting for his atrial arrhythmogenesis. He eventually underwent successful radiofrequency (RF) ablation therapy for the subsequent development of atrial flutter. The repetition of nearly identical bursts of ventricular ectopy has been metaphorically referred to as ~cardiac ballet~ in the older literature (see: Br Heart J 1969:31:426) and associated with higher grade, sustained arrhythmias. The example here may represent a rare instance of supraventricular \"cardiac ballet.\" The explanation for the repetition of complex, patterned bursts of tachycardia appear to challenge traditionally-invoked electrophysiological mechanisms based on classical reentry or enhanced automaticity. In this case, the bursts appeared to be related to respiratory phase and were reportedly not evident with transient breath-holding, raising consideration of neuroautonomic or mechanical factors.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case460/1350x900.gif", "_type": "mcq", "_caseId": 460}, {"question": "Which ONE of the following clinical scenarios fully accounts for the findings on this ECG from an elderly man?", "options": ["Brugada pattern", "Arrhythmogenic right ventricular cardiomyopathy (dysplasia)", "Severe acute and chronic coronary artery disease (CAD)", "Digitalis excess", "Primary pulmonary hypertension with severe right ventricular hypertrophy (RVH)"], "correct": 2, "explanation": "This complex ECG is diagnostic of severe CAD, with both acute ischemia and possible acute MI and prior infarction, indicating a medical emergency. It shows sinus rhythm at about 90/min. While not strictly sinus tachycardia, this rate is relatively fast at rest in an elderly adult (especially if the patient is on a beta-blocker, which this patient was). The PR is about 200 msec, at the upper normal limits, especially given the relatively fast resting heart rate. Limb lead voltage is relatively low, a non-specific finding. Complete RBBB is present, with very slow lateral R wave progression, which could be due to lead placement or to lateral wall MI, among other factors. The mean QRS axis is unusual, oriented, superiorly and rightward (so-called �northwest axis�). Q waves in the inferior lead leads are consistent with prior inferior MI. The markedly superior axis here may be the consequence of inferior and possibly lateral MI, with or without left anterior fascicular block. A predominant R wave in aVR with CAD has been reported with extensive MI, sometimes with a frank ventricular aneurysm. (Note: left posterior fascicular block causes right axis, but not superior axis per se.) ST elevations in the inferior leads could be due to acute ischemia or, if chronic, to an inferior wall aneurysm. The marked ST depressions in the lateral leads are too prominent for digitalis effect alone (the patient was not on this medication; also there is no evidence of actual digitalis toxicity here) and speak to severe global ischemia, in concert with the ST depressions in most other leads. Of additional note is the ST elevation in lead aVR, which is consistent with severe ischemia. ST elevation in lead aVR has been associated with severe three vessel disease, left main ischemia and proximal left anterior descending ischemia (e.g., prior to the take-off of the septal perforators). This repolarization finding may be due to a number of mechanisms including diffuse subendocardial ischemia (global ST depressions with reciprocal ST elevation in aVR) or a primary current of injury emanating from the basal wall. This patient had severe multi-vessel CAD, with prior coronary bypass surgery, occluded grafts and underlying left main coronary disease. Echocardiogram showed an infero-basal aneurysm. Cardiac enzymes were consistent with an acute MI.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case461/1350x900.gif", "_type": "mcq", "_caseId": 461}, {"question": "What is the rhythm in a 42 year old woman with palpitations?", "options": ["Sinus tachycardia", "Paroxysmal supraventricular tachycardia (PSVT) due to probable AV nodal reentrant tachycardia (AVNRT)", "Atrial flutter with 2:1 conduction", "Atrial fibrillation with regularized ventricular response", "PSVT with atrio-ventricular reentrant tachycardia  (AVRT) and antidromic conduction (i.e., down the bypass tract)"], "correct": 1, "explanation": "The ECG shows a very regular, narrow complex tachycardia (NCT) with a ventricular rate of about 150/min. The NCT rules out antidromic conduction with a concealed bypass tract, which should produce a wide-complex tachycardia. If you look carefully, especially at a magnified high resolution presentation of this ECG, you will see subtle positive/negative deflections near the terminal part of the QRS in leads aVR/II, consistent with retrograde P waves from AV nodal reentry. These waves are sometimes called pseudo-R and pseudo-S waves, respectively. The low voltage QRS complexes were likely due to obesity. The substrate for AVNRT relates to so-called �dual-pathways� in the AV node that allow for the initiation and maintenance of a reentrant type rhythm. Typically AVNRT is initiated by an atrial premature complex. The retrograde P waves during the tachycardia may be seen just after the QRS, as in this case, or may be �hidden� in the QRS if the atria and ventricles are stimulated simultaneously. Rarely, the retrograde P waves with AVNRT will precede the QRS. See other examples of NCTs on this site for further discussion (e.g., 106, 278, 323, 390). Also, see the very nice review by Drs. Katritsis and Camm in Circulation: http://circ.ahajournals.org/content/122/8/831.full", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case462/1350x900.gif", "_type": "mcq", "_caseId": 462}, {"question": "This ECG at rest is from a 30 year old man with cellulitis. The rhythm is most consistent with which ONE of the following?", "options": ["Sinus tachycardia", "Atrial tachycardia", "AV nodal reentrant tachycardia (1:1 AV conduction)", "Atrial flutter with 2:1 block", "Bypass-tract mediated tachycardia"], "correct": 0, "explanation": "The ECG shows all the classic findings of marked sinus tachycardia, appropriate for this context, namely that of a young adult with a clinically severe bacterial infection. A narrow complex, regular tachycardia is present with a ventricular (pulse) rate of about 150/min. Upright P waves in lead II are consistent with a sinus origin, with 1:1 AV conduction and a normal PR interval. The rate does vary very slightly (check this out with your calipers) due to changes in autonomic tone. In addition note the subtle variation over multiple beats in QRS amplitude, which is likely due to respiratory-related changes in QRS axis. Indeed, this type of finding has been used as the basis of a method for automated ways of estimating the breathing rate from the ECG, called ECG-derived respiration. But note also that this QRS alternation is not the pathologic type of beat-to-beat (so-called 2:1) QRS alternans, which with sinus tachycardia and low QRS voltage, is a very specific triad for pericardial effusion, often with cardiac tamponade. Atrial tachycardia (especially, right atrial) is a possibility from a single ECG of this type. However, the slight respiratory variation in QRS axis, the typical sinus P waves, normal PR interval, and, importantly, the appropriateness of the rate for the pathology and the patient~s young age, all argue strongly for sinus tachycardia. Useful would be an R-R (or heart rate) tachogram (usually available from the monitor records) showing how the heart rate accelerated: increases and decreases of rate with sinus tachycardia are usually relatively gradual. In contrast, a non-sinus tachycardia usually starts with a very abrupt increase in rate. The precordial QRS voltage is relatively low (about 10 mm or less), a non-specific finding, which can be due to a normal variant, obesity, pleural-pulmonary disease, anasarca (especially common in hospitalized patients), pericardial disease (not present here), etc.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case463/1350x900.gif", "_type": "mcq", "_caseId": 463}, {"question": "A young adult presents to the emergency department with chest discomfort. What is the most likely diagnosis based on this ECG?", "options": ["Acute/evolving pericarditis", "Acute anterior ST elevation myocardial infarction", "Acute pulmonary embolism", "Normal variant early repolarization", "Brugada pattern"], "correct": 0, "explanation": "Sinus tachycardia is present at rate of about 105/min. Precordial voltage is prominent (non-specific in a young adult). The ECG shows classical findings for acute/evolving pericarditis with diffuse (i.e., leads I, II, aVL, V2-V6) concave upward ST segment elevations and concomitant discordant PR segment deviations, which are oriented upward in V1 and aVR (leads with ST depressions) and downward in leads that show ST elevations. The ST elevations in pericarditis are due to a superficial ventricular current injury associated with the pericardial inflammation and the PR segment displacement has been attributed to a superficial epicardial or sub-epicardial atrial current of injury. Sinus tachycardia is a common finding due to pain and, less often, pericardial effusion/tamponade. Associated myocarditis may contribute to the ST changes. The ST segment elevations due to an acute myocardial infarction are usually in a regional lead distribution and reciprocal changes are often (but not always) present. The non-specific inferior T wave inversions are consistent with changes due to pericarditis, which may evolve in an asynchronous fashion in different leads. Also note that the negative, but not biphasic or wide P wave in lead V1 is not a reliable sign of left atrial abnormality here. Finally, the rSr� complex in lead V1, with a normal QRS duration and axis, may be seen as a physiologic variant. No concomitant ST elevation is present to indicate a Brugada pattern. The history revealed that the chest pain was pleuritic. Cardiac examination was remarkable for a pericardial friction rub. The transthoracic echocardiogram showed normal atrial and ventricular function and size, and normal estimated pulmonary artery systolic pressure. No wall motion abnormalities or pericardial effusion were present. Aortic root diameter was normal. Chest X-ray was unremarkable. Cardiac biomarkers were negative and SpO2 was normal. See other examples of acute/evolving pericarditis on this site for further discussion of the ECG changes (e.g., cases 3, 60, 205, 207, 363). Also see: N Engl J Med 2004; 351:2195-2202, and N Engl J Med 2013; 369:1522-1528.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case464/1350x900.gif", "_type": "mcq", "_caseId": 464}, {"question": "ECG from a young adult man. What is the most likely diagnosis?", "options": ["Primary pulmonary hypertension", "Chronic dilated cardiomyopathy (left ventricular)", "Acute anterior wall myocardial infarction", "Mitral stenosis", "Arrhythmogenic right ventricular cardiomyopathy"], "correct": 1, "explanation": "The ECG shows borderline sinus tachycardia at rest with a prolonged PR interval (first degree AV block) at 220 ms. Evidence for prominent left atrial abnormality (LAA) with probable actual enlargement/dilation is present. A left ventricular (LV) intraventricular conduction delay (IVCD) is present (wide QRS at 140 ms), with a leftward QRS axis (about -30 degrees). Notching and slurring of the widened QRS suggest underlying ventricular scarring/fibrosis. The combination of the LAA, prominent precordial voltage and LV-IVCD suggests underlying left ventricular hypertrophy. R wave progression (V1-V3) is very slow, a non-diagnostic finding in the presence of the LV-IVCD, as is the slight J/ST elevation in leads V1-V3. Recent transthoracic echocardiograms showed marked LV cavity dilation with global, severe hypokinesis. The clinical diagnosis was idiopathic dilated cardiomyopathy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case465/1350x900.gif", "_type": "mcq", "_caseId": 465}, {"question": "ECG from a middle-aged woman. What is the rhythm?", "options": ["Atrial fibrillation", "Atrial flutter with variable block", "Multifocal atrial tachycardia", "Sinus tachycardia with atrial ectopy", "AV nodal reentrant tachycardia (AVNRT)"], "correct": 0, "explanation": "The ECG shows atrial fibrillation with a relatively rapid ventricular response at rest (mean rate: about 115; beat-to-beat range of about 75-150/min). A single probable ventricular premature complex (PVC) is present (third beat). Slow R wave progression in leads V1-V3 is non-diagnostic; a prior anterior infarct cannot be excluded. Borderline voltage criteria (Cornell) for left ventricular (LV) hypertrophy (confirmed with echocardiogram) are present, consistent with a prior history of systemic hypertension. Borderline leftward QRS axis deviation is present. Non-specific ST-T changes are present. The patient had a history of multivessel coronary artery disease, with well-preserved LV function.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case466/1350x900.gif", "_type": "mcq", "_caseId": 466}, {"question": "This ECG from a 77-year old woman is most consistent with which ONE of the following diagnoses?", "options": ["Acute pericarditis", "Acute inferior wall ST elevation infarction (STEMI)", "Acute pulmonary embolism", "Benign early repolarization variant", "Brugada-pattern variant"], "correct": 1, "explanation": "The ECG shows sinus rhythm with normal intervals and a normal QRS axis. Very prominent convex ST elevations are present in leads II, III and aVF with ST depressions in leads I and aVL. The latter are consistent with reciprocal changes. ST depression in lead V2 may reflect posterior wall involvement. At cardiac catheterization, a dominant right coronary was noted, occluded at the mid-section. Non-diagnostic Q waves are present in the inferior leads. Non-specific ST-T changes are present in the lateral precordial leads. The P waves are slightly peaked without diagnostic evidence of right atrial overload. Orientation of the current of injury (ST) vector toward lead III > II, in concert prominent ST depressions in leads I and aVL, is strongly suggestive of right coronary occlusion. However, ECG criteria for precisely localizing the site of blockage with a specific �culprit� coronary artery vary from study to study in sensitivity and specificity, likely depending on the vascular anatomy, presence or absence of collaterals, availability of additional leads (e.g., right precordial and posterior), and timing of the acute occlusion.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case467/1350x900.gif", "_type": "mcq", "_caseId": 467}, {"question": "This ECG, from a young adult male with dyspnea, is most consistent with which ONE of the following diagnoses?", "options": ["Mitral valve stenosis", "Dilated cardiomyopathy", "Primary pulmonary hypertension", "Anterior wall myocardial infarction", "Atrial septal (secundum) defect"], "correct": 1, "explanation": "The ECG shows sinus rhythm at about 92/min, a somewhat high resting rate for a healthy, unstressed adult. The PR and QT/QTc intervals are normal. The QRS duration is at the upper limits of normal as measured by computer (110 ms) with a borderline intraventricular conduction delay (note also the terminal r~ wave in V1). The mean QRS axis is normal at about +60 degrees. Very prominent QRS voltage is present, consistent with left ventricular hypertrophy (LVH), along with extremely large P waves. These are biphasic in V1 and V2 with a broad, wide negative component and are of high amplitude in lead II (>2.5 mm), consistent with biatrial enlargement. R wave progression in V1-V3 is slow, a non-specific finding. Lateral ST-T abnormalities are also non-specific, but are consistent with LVH. The presence of left atrial abnormality and ST-T changes indicate that the prominent precordial voltage cannot be attributed simply to the patient young male or due athletic heart syndrome. Additional comment: the evidence of biatrial abnormality in concert with signs of LVH and slow R wave progression are suggestive of biventricular hypertrophy/overload. More speculatively, the ~normal~ QRS in this context may represent a ~compromise\" between a more leftward axis from LVH and a more rightward axis from RVH.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case468/1350x900.gif", "_type": "mcq", "_caseId": 468}, {"question": "This ECG with a wide QRS, recorded from a middle-age man, is most consistent with which ONE of the following diagnostic categories?", "options": ["Accelerated idioventricular rhythm (AIVR)/�slow� ventricular tachycardia (VT)", "Digitalis toxicity, with an accelerated junctional tachycardia", "Biventricular (BiV) pacing", "Hyperkalemia", "Wolff-Parkinson-White (WPW) pre-excitation variant"], "correct": 3, "explanation": "This challenging ECG shows sinus tachycardia at rest (about 100/min) with a uniformly long PR interval of at least 240 msec (�first degree AV block�). The low amplitude P waves are best seen in the magnified views. The wide QRS complexes show a right bundle branch block morphology (rSR� in V1) with marked left axis deviation, consistent with left anterior fascicular block. Minuscule or absent inferior lead r waves raise the question of a previous inferior infarction (MI); the decreased lateral R waves also raise question of prior lateral MI. Relatively low amplitude QRS complexes are present. Of particular note are the T waves, which have a subtle symmetric, peaked appearance (either negative or positive, even though they are not of absolute high amplitude). This finding of relative T wave peaking raises the strong consideration of hyperkalemia. The intraventricular conduction delays can also be induced or worsened by hyperkalemia, as can AV block. This patient had an arterial K+ of about 6.9 mEq/L at this time, with a history of severe decompensated chronic renal failure and advanced coronary disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case469/1350x900.gif", "_type": "mcq", "_caseId": 469}, {"question": "This ECG, from a middle-aged man, is most consistent with which ONE of the following diagnoses?", "options": ["Acute pericarditis", "Hyperkalemia", "Acute lateral ST elevation myocardial infarction (STEMI)", "Anterior ST depression MI", "Acute pulmonary embolism"], "correct": 2, "explanation": "This ECG shows sinus rhythm (slight sinus arrhythmia) with a normal PR interval and normal QRS axis. Most important are the prominent ST elevations in V5 and V6 with J/ST segment depressions in V1-V4, consistent in this context with reciprocal change from a lateral (-posterior) type ST elevation MI. Additional leads V7-V9 might be revealing here of J/ST elevation. Of note, ST depressions in V1 to V3-V4 should always be considered in the context of ST changes in other leads. In isolation these depressions could be misinterpreted as due to anterior subendocardial ischemia, with ST depression MI. Note that ST elevations are not seen as a reciprocal finding when there are primary ischemic ST depressions. Emergency diagnostic cardiac catheterization with coronary angiography revealed occlusion of the left circumflex artery, with successful angioplasty.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case470/1350x900.gif", "_type": "mcq", "_caseId": 470}, {"question": "ECG from an elderly man with a very rapid ventricular rate and palpitations. Which ONE is the likely diagnosis?", "options": ["Sinus tachycardia with atrial premature beats", "Atrial fibrillation", "Atrial flutter with variable block", "Multifocal atrial tachycardia", "Atrial tachycardia with AV Wenckebach"], "correct": 1, "explanation": "The ECG shows atrial fibrillation with a very rapid ventricular response (average ventricular rate about 125/min; range about 80-180/min). An intraventricular conduction delay is present, along with marked left axis deviation (close to -50 degrees), the latter finding consistent with left anterior fascicular block. There is a delayed R wave transition zone, with non-specific ST-T changes. Note that the intermittently large amplitude fibrillatory (f) waves (e.g., in lead V1) may simulate flutter or even P waves. In other leads, very low amplitude, fast f waves may be overlooked leading to misdiagnosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case471/1350x900.gif", "_type": "mcq", "_caseId": 471}, {"question": "This ECG from an elderly woman shows a short pause. What is its mechanism?", "options": ["Sinus arrhythmia", "(Sinus rhythm) SR with blocked atrial premature complex (APC)", "Sinus exit block", "SR with premature ventricular complex", "SR with AV Wenckebach"], "correct": 1, "explanation": "The ECG shows predominant sinus rhythm with a single blocked atrial premature complex (APC). If you look carefully, you will see the T wave of the second beat is slightly deformed by a superimposed P� wave. The total QRS-QRS pause is about 1.4 sec. (The sinus P waves, themselves, are at the upper limits of normal in size/duration, raising question of left atrial abnormality. By echocardiogram, the left atrium was also at the upper normal limits in size.) The precordial leads show borderline low QRS voltage, a non-specific finding.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case472/1350x900.gif", "_type": "mcq", "_caseId": 472}, {"question": "An elderly woman is noted to have a relatively fast heart rate. What is the rhythm?", "options": ["Sinus tachycardia with atrial premature complexes (APCs)", "Multifocal atrial tachycardia (MAT)", "Atrial flutter with variable block", "Atrial fibrillation with a rapid ventricular response", "Sinus tachycardia with artifact from Parkinson�s disease"], "correct": 3, "explanation": "The ECG shows atrial fibrillation with a rapid ventricular response. The mean (resting) ventricular rate over 10 seconds is about 114/minute and is irregular (range about 80-160/min), without any discernable pattern. Note the continuous atrial activity (lead V1). The coarser fibrillatory waves may simulate P waves or atrial flutter waves, leading to mis-diagnosis. Non-specific ST-T changes are present as well here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case473/1350x900.gif", "_type": "mcq", "_caseId": 473}, {"question": "This ECG from an elderly man with multiple cardiopulmonary problems shows complete right bundle branch block (RBBB) and left axis deviation, the latter consistent with left anterior fascicular block (LAFB). What is the underlying rhythm?", "options": ["Respiratory sinus arrhythmia", "Sinus rhythm with 3:2 AV Wenckebach", "Sinus rhythm with ventricular bigeminy", "Sinus rhythm with 3:2 SA Wenckebach", "Sinus rhythm with atrial bigeminy"], "correct": 4, "explanation": "The ECG shows a subtle pattern�namely, group beating with couplets, giving a �short-long� (alternatively �long-short�) sequencing. This type of group beating pattern may be due to a number of mechanisms, notably prematurity (supraventricular or ventricular) with a post-ectopic pauses, and conduction block (SA or AV). The QRS complexes here are identical, ruling out Choice C. Non-conducted P waves are not seen (ruling out B). Respiratory sinus arrhythmia is seen in young healthy subjects and has a more gradual pattern of increases and decreases in rate. The answer to the rhythm conundrum is found upon close inspection (magnification) of the waveform data: the second P wave in each couplet is slightly different from the first (see, e.g., leads II and aVF). This finding is consistent with sinus rhythm with subtle atrial bigeminy. (Note: the P waves should be identical with SA Wenckebach.) The other abnormalities are as mentioned above, including RBBB and LAFB. In addition, the P wave morphology is consistent with left atrial abnormality (LAA). R wave progression in the chest leads is slow, a non-specific finding. The R wave (about 11 mm) is at the upper limits of normal in lead aVL. Given the associated findings of LAA and left axis deviation, the diagnosis of left ventricular hypertrophy (LVH) is probable. The patient had coronary disease with normal LV systolic function by echocardiogram and severe chronic obstructive lung disease/asthma. Cardiac echo also showed mild symmetric LVH and bi-atrial dilation. Clinically, the patient had a history of paroxysmal atrial fibrillation and of ventricular tachyarrhythmias.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case474/1350x900.gif", "_type": "mcq", "_caseId": 474}, {"question": "ECG from a middle-aged man shows which ONE of the following?", "options": ["Atrial paced rhythm", "Sinus bradycardia with baseline artifact", "Sinus rhythm with pre-excitation variant", "AV sequential pacing with ventricular pseudo-fusion beats", "Ectopic atrial bradycardia"], "correct": 0, "explanation": "The ECG shows an atrial paced rhythm at about 54/min. Small but clearly evident atrial pacemaker spikes are visible in most of the leads. The patient had a dual chamber (DDD) pacemaker implanted for sinus node dysfunction. During this recording, the pacemaker is properly functioning in an atrial pacing/ventricular sensing mode. The native QRS complexes (not preceded by any pacemaker spikes) are normal, with non-specific ST-T changes. The mean frontal plane QRS axis here is horizontal, but not frankly leftward (about 0 degrees). One goal in atrial pacing with DDD pacemakers and intact AV conduction is to adjust the pacemaker parameters so as to minimize the need for and duration of ventricular pacing. The A-QRS interval (about 160 ms) here allows for physiologic AV conduction to proceed with normal QRS activation after the atrial pacing stimulus.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case475/1350x900.gif", "_type": "mcq", "_caseId": 475}, {"question": "ECG from a middle-aged woman with severe heart failure. This ECG is most consistent with which ONE of the following diagnoses?", "options": ["Hypertrophic cardiomyopathy variant", "Aortic stenosis (bicuspid valve)", "Rheumatic mitral and aortic valve disease", "Coronary artery disease with multiple prior infarcts", "Atrial septal defect (ostium primum) and mitral regurgitation"], "correct": 2, "explanation": "The rhythm is atrial fibrillation. The QRS mean frontal plane axis is vertical to rightward (+85 degrees). This finding, in concert with the right ventricular conduction delay pattern (V1 and V2) and the S1Q3 pattern, raise strong consideration of a right heart overload syndrome. (The findings are not specific for a given etiology. For example, pulmonary hypertension due to a variety of factors may cause a similar pattern, including that due to recurrent pulmonary emboli. The prominent R waves in the left chest leads, in combination with the evidence of RV overload, strongly suggest biventricular overload/hypertrophy. Biventricular hypertrophy, by itself and certainly with AF, should suggest the possibility of chronic rheumatic heart disease with major components due to mitral stenosis and aortic valve disease. The ST-T changes are not specific. The T wave inversions in the right-middle precordial leads in this context could due to RV overload (formerly called a \"strain\" pattern). Ostium primum atrial septal defects (endocardial cushion defects or atrioventricular septal defects), most common in Down syndrome, are typically associated with right ventricular conduction delays and marked left (superior) axis deviation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case476/1350x900.gif", "_type": "mcq", "_caseId": 476}, {"question": "ECG from an elderly man with a rapid heartbeat. What is the diagnosis?", "options": ["Coarse atrial fibrillation with a regularized response", "Atrial flutter with 2:1 AV conduction (block)", "AV nodal reentrant tachycardia (AVNRT)", "Sinus tachycardia", "Focal left atrial tachycardia"], "correct": 1, "explanation": "The ECG shows a narrow complex tachycardia with a very regular ventricular response at 140/min. The atrial depolarization rate is twice that--280/min--with classical �sawtooth� flutter waves apparent in lead II. The polarity of the atrial waves (negative inferiorly and positive in V1) is consistent with typical (isthmus-dependent) flutter originating in the right atrium, associated with a large (macro-) counterclockwise, reentrant loop. The phase relationship (�flutter-R� interval) is constant, consistent with pure 2:1 AV conduction. The ECG also shows a QRS axis within the physiologic range (about 0 degrees) and a normal QRS interval (about 90 ms), with non-specific ST-T changes. R wave progression is slow, a non-diagnostic finding. The QTc is not prolonged. The patient had a history of atherosclerotic vascular disease and systemic hypertension.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case477/1350x900.gif", "_type": "mcq", "_caseId": 477}, {"question": "ECG from a middle-aged man. What does the ECG show?~~~~~~", "options": ["AV sequential electronic pacing", "Acute anterior ST elevation myocardial infarction (STEMI)", "Right bundle branch block (RBBB)", "Left bundle branch block (LBBB)", "Wolff-Parkinson-White (WPW) pre-excitation"], "correct": 3, "explanation": "The ECG shows sinus rhythm with physiologic PR and QT intervals. The mean QRS frontal plane axis is within normal range. The QRS duration (interval) is prolonged (140ms; normal <110 ms by computer-assisted ECG measurement) with a classic LBBB morphology. The ST-T abnormalities (discordance of QRS and ST-vectors) are consistent with secondary changes due to the abnormal sequence of ventricular depolarization. LBBB block, indicating degenerative change or damage to the left side of the His-Purkinje system, is often a marker of left ventricular hypertrophy (LVH; which was not found by echocardiogram in this case). The concomitant ECG evidence of left atrial abnormality makes LVH even more likely. No perfusion abnormalities were noted on nuclear imaging or pharmacologic studies in this case, either. No evidence of acute MI was noted with similar ECGs. LBBB may mimic ischemia/MI because of its association with J point/ST elevation in leads with a negative QRS area and of ST depression and T wave inversion in leads with a positive QRS area. A LBBB pattern may also mask the diagnosis of acute ischemia. Therefore, considerable interest attends the uses and limitations of the ECG in the diagnosis of ischemia superimposed on a LBBB, making this aspect of ECG diagnosis an active area of investigation. LBBB is clinically important as 1) a marker of underlying structural heart disease, especially from systemic hypertension, left sided valve disease, cardiomyopathy, or from advanced coronary disease typically with LV dysfunction; 2) a cause of worsening LV function in established cardiomyopathy of various causes; 3) a potential cause, by itself, of decreased LV function, and 4) a marker of infranodal conduction impairment. However, chronic LBBB, per se, is not an indication for permanent pacing. The prognosis for LBBB depends on the clinical context: best for those without underlying heart disease and worst for those with advanced heart failure.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case478/1350x900.gif", "_type": "mcq", "_caseId": 478}, {"question": "ECG from a middle-aged man. The findings are best accounted for by which ONE of the following diagnoses?", "options": ["Digoxin toxicity", "Systemic hypothermia", "Hyponatremia", "Acute pericarditis", "Hypokalemia"], "correct": 1, "explanation": "The ECG shows a distinctive triad: marked sinus bradycardia (rate about 48/min), J waves, and QT prolongation (QT=0.60 sec). The patient was undergoing hypothermia therapy as part of treatment for cardiopulmonary arrest, presumed due to upper airway obstruction. Body temperature (rectal) at the time of this ECG was 32.4 degrees C. J waves (subtle as in this instance or very prominent in others) due to hypothermia are often referred to as Osborn waves (Osborn JJ. Am J Physiol 1953; 175: 389). Perhaps they should be designated as Tomaszewski-Osborn waves (Tomaszewski W. Arch Mal Coeur 1938; 31: 525). These waves have been attributed to a transmural voltage gradient during the earliest phase of ventricular repolarization (Yan GX, Antzelevitch C. Circulation 1996; 93: 372). With hypothermia the J wave vector is usually directed toward the anterior-lateral precordial and inferior limb leads. The long QT is consistent with overall slowing of repolarization due to reduced temperature. As anticipated, the patient�s ECG returned to normal with restoration of euthermia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case479/1350x900.jpg.jpg", "_type": "mcq", "_caseId": 479}, {"question": "Young adult male with increasing dyspnea and fatigue with no history of obstructive lung disease. This ECG is most consistent with which ONE of the following scenarios?", "options": ["Cardiac amyloidosis", "Ebstein~s anomaly of the tricuspid valve", "Tetralogy of Fallot", "Dilated cardiomyopathy with pulmonary emboli", "Acute myocardial infarction"], "correct": 3, "explanation": "Electronically measured intervals: (msec; except HR in bpm): ~~Rate PR QRS QT QTc (Hodges) Axes (degrees): P QRS T ~~104 153 87 359 436 66 -17 112~~The ECG shows resting sinus tachycardia with borderline leftward QRS axis deviation, especially given the patient~s age. There is slow initial R wave progression (V1-V3), with non-specific ST-T changes in the lateral leads. The P waves are notable for their increased amplitude consistent with right atrial overload (sometimes referred to as ~P pulmonale~); the biphasic P waves in lead V1 and V2 are consistent with biatrial overload. Borderline low QRS limb lead voltage is present, in concert with borderline prominent precordial voltage. The only answer that accounts for this constellation of findings is dilated cardiomyopathy, with right atrial overload, possibly due to increased pulmonary hypertension from bilateral pulmonary emboli, in this case. The findings were confirmed by echocardiography and by computed tomography angiography (CTA). The patient had a history of idiopathic heart failure with a severely reduced left ventricular ejection fraction. ~~Ebstein~s anomaly is associated with giant (~Himalayan~) P waves, but with a right ventricular conduction delay (often with wide, atypical qR complexes in V1-V3. Tetralogy of Fallot is associated with signs of right ventricular hypertrophy due to pulmonary outflow obstruction before repair, and with right bundle branch block afterward. No specific markers of myocardial infarction are present. Diffusely low voltage may be a clue to cardiac amyloid, especially in the setting of clinical evidence of restrictive cardiomyopathy.~~~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case480/1350x900.gif", "_type": "mcq", "_caseId": 480}, {"question": "ECG from a middle-aged woman with palpitations shows which ONE of the following diagnoses?", "options": ["Sinus arrhythmia", "Sinus rhythm with paroxysmal atrial flutter", "Sinus rhythm with paroxysmal atrial fibrillation (PAF)", "Sinus rhythm with AV nodal reentrant tachycardia (AVNRT)", "Multifocal atrial tachycardia (MAT)"], "correct": 2, "explanation": "The rhythm is intermittent sinus (with possible wandering atrial pacemaker since the P wave morphology varies subtly) with premature atrial complexes and, most important, short runs (bursts) of paroxysmal atrial fibrillation (PAF). The patient underwent percutaneous pulmonary vein isolation/ablation therapy. Clear fibrillatory activity can be seen during the PAF episodes with atrial cycle rates >350/min. The maximum ventricular (QRS) response (at rest) is about 125/min during this short recording. Capturing short bursts of PAF in a 12-lead ECG is rare and predicts longer runs of this major arrhythmia during more sustained recordings (e.g., those obtained with event recorders).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case481/1350x900.gif", "_type": "mcq", "_caseId": 481}, {"question": "This ECG from an elderly woman with multiple risk factors for coronary artery disease, status post anterior MI, shows which ONE of the following rhythms?", "options": ["Wandering atrial pacemaker (WAP)", "Sinus rhythm with isorhythmic AV dissociation", "Sinus rhythm with complete AV heart block", "Respiratory sinus arrhythmia (RSA)", "Multifocal atrial tachycardia (MAT)"], "correct": 0, "explanation": "The rhythm is wandering atrial pacemaker (WAP). Note the variable P waves (3 or more morphologies/axes) and PR intervals, with a slightly slow to average rate over 10 seconds of about 67/min (range 58-75bpm). Left axis deviation is present with a QRS axis of about -40 degrees, borderline for left anterior fascicular block. Some of the P waves are broad and notched, with a prominent negative component in lead V1, consistent with left atrial abnormality. The QRS voltage is borderline (lead aVL) for LVH. R wave progression in V3-V6 is very slow, with anterior-lateral T wave inversions consistent with ischemia/MI. Clinical correlation confirmed extensive coronary artery disease, status post anterior MI, with a left ventricular ejection fraction by echocardiography of 40%, associated with marked regional anterior wall motion abnormalities. WAP can be seen in a variety of settings. Especially at slower rates due to augmented vagal tone (e.g., during deep sleep), it may be a physiologic variant. More gradual variations in P wave appearance are usually seen in the physiologic context. Here WAP is likely a subtle marker of sinus node and atrial electrical dysfunction, but it does not require any specific therapeutic response. An alternative answer in this case would be �sinus rhythm with multifocal atrial ectopy.� But this type of multifocal rhythm is not MAT, which requires a rapid rate by definition. Physiologic respiratory sinus arrhythmia (RSA), not seen here (see Case #300), is associated with increases and decreases in heart rate synchronized with inspiration and expiration, respectively, and is a marker of intact vagal cardiac modulation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case482/1350x900.gif", "_type": "mcq", "_caseId": 482}, {"question": "ECG from an elderly man shows findings most consistent with which ONE of the following diagnoses?", "options": ["Systemic hypothermia", "Dofetilide and atenolol drug Rx", "Hypocalcemia", "Hereditary Long QT syndrome (LQTS) --Type 3", "Hyperkalemia"], "correct": 1, "explanation": "The ECG shows marked sinus bradycardia (46/min). The QT/QTc intervals are extremely prolonged, even given the very slow heart rate (556ms/531ms), using Hodges rate correction formula. The QRS duration and PR intervals are normal. There is borderline voltage for left ventricular hypertrophy (V1/V5; aVL) and probable left atrial abnormality (wide, notched P waves in some leads). ~~~~The very long QT here, with bradycardia, is most consistent with dofetilide and beta-blocker Rx among the choices given above. (The patient was transiently on both agents, which were promptly discontinued under monitoring to prevent torsades de pointes). The absence of J waves is against hypothermia. With hypocalcemia and LQTS-3, the ST phase of the QT is prolonged, especially in the latter syndrome. Here the T wave is broad, subtending the entire JT interval. Dofetilide blocks the one of the major currents responsible for the intracellular-to-extracellular movement of K ions during myocardial repolarization. Sotalol or amiodarone can produce similar looking ECGs to the ones seen, here.~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case483/1350x900.gif", "_type": "mcq", "_caseId": 483}, {"question": "ECG from an elderly man. What is the rapid rhythm disturbance?", "options": ["Atrial fibrillation", "Atrial flutter with variable block", "Multifocal atrial tachycardia (MAT)", "AV nodal reentrant tachycardia (AVNRT)", "Polymorphic ventricular tachycardia (VT)"], "correct": 0, "explanation": "The ECG shows atrial fibrillation (AF) with a very rapid ventricular response. The average resting heart rate (over 10 sec of data) is 120/min, with instantaneous heart rates ranging from about 80-170/min. There is an intraventricular conduction delay (QRS duration about 130 ms). Left axis deviation is present, consistent with left anterior fascicular block. Slow R wave progression and non-specific ST-T changes are present. Lead aVL shows a prominent but non-diagnostic Q wave. The patient had severe ischemic cardiomyopathy, with prior extensive anterior wall infarction. The constellation of ECG abnormalities is consistent with that diagnosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case484/1350x900.gif", "_type": "mcq", "_caseId": 484}, {"question": "ECG from an older man with witnessed syncopal episodes. The QRS waveform shows a right bundle branch block (RBBB) with marked left axis deviation (LAD). What is the most likely rhythm disturbance?", "options": ["Sinus rhythm with complete (3rd degree) AV block", "Sinus rhythm with 2nd degree AV block (2:1 and 3:2) due to probable Mobitz I (Wenckebach) block in the AV node", "Sinus rhythm with pauses following blocked premature atrial complexes (PACs)", "Sinus rhythm with 2nd degree AV block (2:1 and 3:2) with probable Mobitz II (infranodal) block", "Sino-atrial (SA) exit block"], "correct": 3, "explanation": "The ECG shows sinus rhythm at a rate of about 80/min (P wave rate) and an effective ventricular (QRS) rate of about 44/min. There are more P waves than QRS complexes, associated with �group beating.� The appearance of clustered QRS complexes in this case is due to pauses from intermittent 2:1 and 3:2 AV conduction patterns. The conducted PR intervals are at the upper normal limits (about 200 ms). Of note, the PR intervals before and after the non-conducted (�dropped� or blocked) P waves are about the same duration. With AV Wenckebach (3:2, 4:3, etc.), the PR intervals after the non-conducted P waves are shorter than those of the PR intervals before them. The abrupt non-conducted P waves with 3:2 (or other than 2:1 block) are typical of Mobitz II block, strongly implicating infranodal disease. Supporting an infranodal (His-Purkinje) locus of block here are the underlying RBBB and marked left axis deviation, the latter consistent with left anterior fascicular block (LAFB). The ECG also shows probable left atrial abnormality (LAA; biphasic P in V1 with a broad negative component) with probable left ventricular hypertrophy (R in aVL=11mm plus LAA). Echocardiogram confirmed increased left atrial size and also showed mild concentric LVH. Infranodal disease in older individuals is most likely to be due to sclerodegeneration or calcification of the conduction system (Lev-Len�gre syndrome). The patient underwent dual chamber pacemaker implantation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case485/1350x900.gif", "_type": "mcq", "_caseId": 485}, {"question": "ECG from a middle-aged woman is most consistent with which ONE of the following conditions?", "options": ["Renal failure", "Primary hyperaldosteronism", "Acute myocardial infarction", "Pulmonary embolism", "Mitral stenosis"], "correct": 0, "explanation": "The ECG shows sinus rhythm at a rate of about 70/min with normal PR, QRS and QTc intervals. The mean QRS axis is leftward, at -31 degrees measured electronically. However, strict criteria (including an axis of -45 degrees or more leftward) for left anterior fascicular block are not present. Left atrial abnormality (biphasic P in V1 with prominent negative component) and left ventricular hypertrophy are present (Cornell criteria). Of note are the classic �peaked� or �tented� T waves, especially in leads V3-V6, strongly suggestive of hyperkalemia. There are non-specific ST-T changes in lead aVL and the Q waves in I and aVL are not diagnostic. The patient had renal failure with hyperkalemia. (A serum potassium level of 5.4 mEq/L was obtained about an hour prior to this ECG. The ECG is consistent with at least moderate hyperkalemia.) Echocardiogram showed concentric left ventricular hypertrophy and left atrial enlargement due to hypertension, a common finding in cases of chronic renal failure.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case486/1350x900.gif", "_type": "mcq", "_caseId": 486}, {"question": "This ECG from an elderly woman is most consistent with which ONE of the following diagnoses?", "options": ["Brugada pattern", "Acute pericarditis with pericardial effusion", "Acute/evolving ST elevation anterolateral MI (STEMI)", "Chronic obstructive pulmonary disease (COPD)", "Cardiac amyloid"], "correct": 2, "explanation": "The ECG shows sinus rhythm at a rate of about 80/min (P wave with a normal QRS axis and normal PR and QTc intervals. Relatively low voltage is present throughout, a nonspecific finding. The key abnormalities are the ST elevations of 1 to 2mm in leads I and aVL (with slight terminal T wave inversions) and ST depressions in III and aVF. The latter are consistent with reciprocal changes. Slow R wave progression is present in leads V1-V2, raising consideration of an anterior MI of indeterminate age. There is possible left atrial abnormality. The patient had an acute/evolving MI due to occlusion of a diagonal branch of the left anterior descending coronary artery. She underwent successful reperfusion with a percutaneous coronary intervention procedure.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case487/1350x900.gif", "_type": "mcq", "_caseId": 487}, {"question": "ECG from a young adult man is most consistent with which ONE of the following conditions?", "options": ["Acute ST elevation myocardial infarction (STEMI)", "Renal failure with severe hyperkalemia", "Acute pulmonary embolism (PE)", "Critical aortic stenosis", "Pericardial tamponade"], "correct": 1, "explanation": "The ECG shows sinus rhythm at a rate of about 80/min with a prolonged PR interval (240 ms), a prolonged QRS duration (130 ms) and a normal QTc interval. The QRS axis is normal. Left atrial abnormality is present along with voltage criteria (Cornell) for left ventricular hypertrophy. Of particular note are the tall and peaked (narrow based or �tented�) T wave waves seen diffusely. In conjunction with the wide QRS, and prolonged PR interval, the T tented waves point to severe hyperkalemia. The clinical laboratory reported a serum potassium ion concentration of >10mEq/L, occurring in the context of chronic renal disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case488/1350x900.gif", "_type": "mcq", "_caseId": 488}, {"question": "A middle-aged man was found at home in a confused mental state. The ECG strongly suggests what abnormality?", "options": ["Hypothyroidism", "Hyperkalemia", "Hypothermia", "Hypocalcemia", "Tricyclic antidepressant overdose"], "correct": 2, "explanation": "The patient had systemic hypothermia with a rectal temperature of 30.6˚C, associated with pneumonia and sepsis. The ECG shows marked sinus bradycardia (35/min) with classic Osborn (J) waves. The PR is prolonged (280msc). The QT/QTc is also prolonged (about 510 msec/506 msec, respectively, using Hodges formula for rate correction). The QRS duration (not including the J wave) appears normal. QRS voltage is also within normal limits. Note the baseline artifact, which may be due to shivering, a common finding in this context. ~~ ~~Blood chemistries showed glucose:74 mg/dL, calcium: 9.1 mg/dL and potassium: 3.9 mEq/L. TSH was within normal limits at 4.2 microIU/mL. ~~ ~~Please see Case 479 for further discussion of the basis of pathologic J waves and concomitant findings with systemic hypothermia.~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case489/1350x900.gif", "_type": "mcq", "_caseId": 489}, {"question": "This ECG from an elderly woman shows which ONE of the following diagnoses?", "options": ["Atrial flutter with variable block", "Atrial fibrillation", "Multifocal atrial tachycardia", "Sinus rhythm with artifact due to tremor", "Atrial tachycardia with variable block"], "correct": 1, "explanation": "The rhythm is atrial fibrillation (with some baseline artifact) yielding an average ventricular rate of about 77 bpm. The atrial (f) rate is highly variable and nonstationary. When the atrial rate slows to about 300 cycles/min, the amplitude of the f waves gets larger transiently resembling flutter. However, flutter waveforms are monotonously repetitive (unchanging) in appearance and rate in any given case. However, the ventricular rate may vary and the flutter (F) waves may be superimposed on other waveforms giving the appearance of variability. Non-specific ST-T changes are present with borderline low voltages, a non-diagnostic finding. Of interest, about two months previously the patient had sustained a very large ST elevation/anterior Q wave MI, with percutaneous coronary intervention. This finding (or lack thereof) illustrates that the sensitivity of the ECG may decrease with time following even large infarctions in some patients.~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case490/1350x900.gif", "_type": "mcq", "_caseId": 490}, {"question": "A middle-aged man has a history of coronary artery disease, hypertension and evidence of what other major disease process?", "options": ["Chronic obstructive pulmonary disease", "Mitral stenosis", "Ebstein�s anomaly of the tricuspid valve", "Mitral regurgitation", "Atrial pacemaker artifact"], "correct": 0, "explanation": "The ECG shows sinus tachycardia at about 105/min and specific ST-T changes. R wave progression is very slow. The P waves are very tall and peaked (>.2.5 mm) in the inferior leads, but not broad, consistent with primarily right atrial overload (classical �P pulmonale� pattern). The narrow negative P wave in lead V1 in this context may be due to right (not bi-) atrial overload, with the exploring electrode positioned over the enlarged chamber. (In this instance the left atrium was only mildly enlarged.) The patient had very severe COPD in addition to coronary disease and hypertension. The slow R wave progression may have related to a combination of all three factors (prior anterior MI, COPD and LVH). Note that the gradual changes in QRS amplitude most evident in the chest leads are probably related to airflow fluctuations and are not characteristic of beat-to-beat electrical alternans with pericardial tamponade. In general, pure COPD is associated with low QRS voltages diffusely.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case491/1350x900.gif", "_type": "mcq", "_caseId": 491}, {"question": "ECG from an elderly adult man. What does the rhythm strip show? (Note: baseline artifact is present possibly due to movement.)", "options": ["Physiologic (respiratory) sinus arrhythmia", "Sinus rhythm with intermittent AV Wenckebach", "Sinus rhythm with intermittent SA Wenckebach", "Wandering atrial pacemaker (WAP)", "Sinus rhythm with premature atrial complexes (PACs)"], "correct": 4, "explanation": "The ECG shows underlying sinus rhythm with PACs. There is a normal QRS axis and normal intervals. Of note, evidence of left atrial abnormality is present. (Biphasic P wave in lead V1 with broad, terminal negative component and broad notched P waves in other leads.) There is also nonspecific slow precordial r wave progression (V1-V4) and non-diagnostic inferior Q waves. The patient had a history of atrial flutter/fibrillation in the context of advanced age, systemic hypertension, and type 2 diabetes mellitus. Echocardiographic imaging had shown left atrial dilation with preserved left ventricular systolic function. The P wave features are best seen in magnified views.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case492/1350x900.gif", "_type": "mcq", "_caseId": 492}, {"question": "ECG from young adult woman with no relevant personal or family history is most consistent with which ONE of following?", "options": ["Subtle pre-excitation", "Normal variant", "Lead reversal", "Right ventricular hypertrophy", "Anterior ischemia"], "correct": 1, "explanation": "The ECG leads rhythm at about 65/min. The intervals and axis are normal. T wave inversions in V1 to V2, with normal R wave transition. These T wave are common physiologic variants findings, most prevalent in in young adults and women (\"juvenile T waves\"), and more rarely may extend to V3. The normal QRS waveforms and axis, absent epsilon waves, and normal (not peaked) P wave are reassuring. This benign T wave finding is present in about 10 percent of young adult American women. The differential diagnosis of RV arrhythmogenic cardiomyopathy or other RV overload syndromes vs normal variant right precordial T waves has the subject of much well attention in the literature. In some case, imaging with echo or MR studies may be indicated. Chest lead misplacement (e.g., an interspace too high) can also confound interpretation of R and T wave progression.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case493/1350x900.gif", "_type": "mcq", "_caseId": 493}, {"question": "Middle-aged man has a relatively with benign looking ECG at first glance. More focused examination is consistent with which ONE of following major syndromes?", "options": ["Acute pericarditis", "Acute myocardial infarction", "Apical hypertrophic cardiomyopathy", "Chronic renal failure", "Hypercalcemia"], "correct": 3, "explanation": "The ECG shows sinus rhythm at about 70/min. The QT is prolonged at this rate (QTc by Bazett&39;s formula = 0.47 sec) with relatively peaked T waves (especially V2-V4). There is also prominent precordial voltage raising question of left ventricular hypertrophy (LVH). This constellation of findings, while subtle, strongly merits consideration of chronic renal disease. Moderate concentric LVH was confirmed by echocardiogram. The serum K+ was mildly elevated 5.2 mEq/L, with a low serum calcium ion concentration of 6.3 mg/dL (albumin was 2.9 g/dL) to account for the long QTc. The patient had end-stage kidney disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case494/1350x900.gif", "_type": "mcq", "_caseId": 494}, {"question": "Elderly man with a previously functional electronic pacemaker. What is the rhythm at present?", "options": ["Atrial fibrillation (AF) with complete AV heart block (CHB) and junctional escape mechanism", "Atrial flutter with CHB and junctional escape", "Sinus with baseline artifact and CHB", "Atrial tachycardia with CHB", "Atrial flutter with AV Wenckebach"], "correct": 0, "explanation": "The ECG shows a narrow (QRS) complex, very regular bradycardia at about 40/min, indicating pacemaker malfunction. The atria are fibrillating, not in flutter; the latter produces an unchanging atrial pattern from one section to next. The diffuse T wave inversions (but not in leads I and aVL) are consistent with \"T wave memory\" from intermittent RV pacing. (See, e.g., Shvilkin A et al. Circulation. 2005;111:969-74.) His paced ECGs showed positive QRS morphologies in aVL and I and negative QRS complexes in V1-V6, consistent with the polarity of the post-pacing (memory) T waves, which tends to be concordant with vector of the QRS during prior pacing. The limb leads show non-specifically low voltage.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case495/1350x900.gif", "_type": "mcq", "_caseId": 495}, {"question": "Very elderly woman with ECG showing which ONE of following?", "options": ["Sinus rhythm with left bundle branch block", "Complete heart block with wide QRS escape and underlying sinus", "Accelerated idioventricular rhythm (AIVR) with AV dissociation", "Sinus rhythm with VVI pacing (from right ventricle) with underlying complete heart block", "Sinus rhythm with Mobitz II AV block and ventricular pacemaker"], "correct": 3, "explanation": "ECG shows sinus rhythm (you can march out sinus P waves at rate of about 85/min) with complete AV heart block and a ventricular paced rhythm (VVI) at about 70/min. None of P waves is conducted. Whenever you see an LBBB pattern, always look for hidden pacemaker spikes, which may be of low amplitude. P wave prominent and morphology speak to left atrial abnormality. ST-T changes, discordant with QRS, are secondary to asynchronous pacemaker activation of the ventricles, causing the wide QRS. This patient would be candidate for developing \"memory T waves\" if the pacing were intermittent.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case496/1350x900.gif", "_type": "mcq", "_caseId": 496}, {"question": "Middle aged woman with striking ECG findings noted on a chronic basis. No hx of congenital heart disease. What would you expect on careful physical exam?", "options": ["Diastolic rumble of mitral stenosis", "Holosystolic murmur of mitral regurgitation", "Murmur of hypertrophic cardiomyopathy", "Loud S2 (P2) with RV lift", "Mid-systolic clicks and murmur of mitral valve prolapse"], "correct": 3, "explanation": "ECG shows sinus tachycardia (consistent with autonomic activation) in a patient with classic findings for severe right heart overload. Note the right axis deviation (about +120) in concert with relatively tall R waves in V1 (as part of a qR pattern). ST-T abnormalities in V1-V3 are consistent with RV overload (RV \"strain\" pattern), in this context. The P waves are slightly peaked consistent with right atrial overload. The patient had severe acquired pulmonary hypertensive (PAH) syndrome and restrictive lung disease, with RV dilation/ dysfunction. A holosystolic murmur might also be heard in this context due to tricuspid valve insufficiency, with large \"CV\" waves and possibly an inspiratory increase in murmur intensity during spontaneous inspiration (Carvallo&39;s sign). Note that the ECG constellation here (absent a pulmonic stenosis murmur) speaks strongly to RV overload and PAH, but does not by itself indicate which of the multiple causes of PAH are responsible. For that assessment, clinical further information is needed.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case497/1350x900.gif", "_type": "mcq", "_caseId": 497}, {"question": "Middle-aged woman admitted to intensive care with mental status changes. ECG findings are most consistent with which ONE of the following syndromes?", "options": ["Hypercalcemia", "Hypothermia", "Hemorrhagic stroke", "Myxedema", "Hypoglycemia"], "correct": 2, "explanation": "The ECG, with baseline artifact, shows borderline resting sinus tachycardia at about 100/min. Notable features include very prominent, diffuse T wave inversions, most apparent in the precordial leads, with marked ventricular repolarization prolongation (QT/QTc Hodges method = 440 ms/520 ms). In addition there is a relatively tall R wave in lead V1, but without right axis deviation, peaked P waves or T wave inversion in this lead (hence, against RV overload states). Posterior MI is not excluded but does not account for other findings. Diffuse ischemia due to imbalance in supply/demand mechanisms is also possible, as is takotsubo cardiomyopathy. Borderline low limb lead voltage is present, a non-diagnostic finding. The constellation of major ECG findings here is fully consistent with the clinical scenario of a right pontine/midbrain/thalamic bleed. The mechanism of pronounced repolarization changes seen with so-called neurogenic T waves (\"CVA T-wave pattern\") is not definitively established, but likely relates to autonomic activation and to direct myocardial injury from catecholamine/stress response. This syndrome is most widely reported in hemorrhagic vs. thrombotic or embolic type cerebrovascular events. The relationship between takostubo cardiomyopathy and neurogenic stress cardiomyopathy is an ongoing area of interest. See, e.g., Ancona F et al. Takotsubo cardiomyopathy and neurogenic stunned myocardium: similar albeit different. Eur Heart J 2016; 37:2830-2.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case498/1350x900.gif", "_type": "mcq", "_caseId": 498}, {"question": "Adult man has lightheadedness with sinus rhythm at 80/min and 2:1 AV block, yielding an effective ventricular rate of 40/min at rest. The QRS complexes show a right bundle branch block morphology with a borderline rightward axis. Most likely, from the limited information at hand, WHICH ONE of the following etiologies is most likely?", "options": ["Acute myocardial infarction", "Sarcoid heart disease", "Digitalis toxicity", "Lyme carditis", "Congenital complete heart block"], "correct": 1, "explanation": "A sinus mechanism (somewhat leftward P wave axis) is present (about 80/min), but with 2:1 AV block (probably infranodal given the normal PR interval and the wide QRS at 140 ms due to right bundle branch block.) Borderline right axis deviation is present that could be due to right ventricular overload or left posterior fascicular block.)The patient had history of pulmonary/mediastinal sarcoid and these ECG findings are consistent with conduction system (and possibly myocardial involvement) as well. He underwent uneventful dual chamber ICD/pacemaker placement, as part of his therapy. Lyme disease more often produces transient involvement of the AV node. Serologies for Lyme were repeatedly negative. Complete heart block is not present (and the congenital form of CHB is usually associated with a narrow QRS complex). Digitalis toxicity with sinus or atrial tachycardia with 2:1 AV block is more likely to present with nodal block and a normal QRS, as well as a short QTc. The rightward axis here (about +100 degrees) could be physiologic in a young adult, or due to RV overload (from pulmonary sarcoid), to left posterior fascicular block, to or some combination of these factors. There was no supportive evidence of acute myocardial infarction.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case499/1350x900.gif", "_type": "mcq", "_caseId": 499}, {"question": "ECG from an elderly man with severe aortic stenosis shows which ONE of the following mechanisms?", "options": ["Multifocal atrial tachycardia/rhythm (MAT)", "Atrial fibrillation", "Atrial flutter with variable block", "SA exit block with sinus tachycardia", "Atrioventricular reentrant tachycardia (AVNRT)"], "correct": 0, "explanation": "The ECG shows an irregular, narrow (QRS) complex tachycardia at about 100/min on average. The instantaneous rate range is roughly between 80 and 140/min. There are bursts of multiple discrete P waves of varying morphology (at least 3 or more, as in leads II, III and aVF), consistent with intermittent multifocal atrial tachycardia/rhythm (MAT/MAR). High frequency baseline noise adds to potential confusion with atrial fibrillation. The QRS axis is leftward (-35 degrees) and there is at least borderline voltage criterion for left ventricular hypertrophy (R in aVL of about 12 mm.) Non-specific ST-T changes are present. The broad negative P wave in lead V1 is consistent with left atrial abnormality. ~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case500/1350x900.gif", "_type": "mcq", "_caseId": 500}, {"question": "68 year old man with ECG consistent with which ONE of following diagnoses?", "options": ["Right ventricular hypertrophy from pulmonary artery hypertension", "Right ventricular hypertrophy from pulmonic stenosis", "Acute/evolving infero-postero-lateral STEMI", "Wolff-Parkinson-White pre-excitation", "Dextrocardia with situs inversus"], "correct": 2, "explanation": "The ECG, from a patient with an acute coronary syndrome, shows sinus rhythm at a rate of about 60/min, with normal PR, QRS and QT intervals. Q waves and ST elevations are seen in II, III, aVF and, subtly, in V6. The tall R waves (V1-V2) in this context are consistent with loss of postero-lateral forces; the ST depressions in the right-mid precordial leads are consistent with reciprocal changes (to the postero-lateral ST elevations). Some degree of primary anterior ischemia is not excluded. The R waves are also tall in V3 and V4 (history of hypertension) but do not meet left ventricular hypertrophy criteria. Severe right ventricular hypertrophy (RVH) due to pressure overloads is often associated with right axis deviation, T wave inversions in V1-V3, and peaked P waves (right atrial abnormality). No delta waves are seen here and the findings are not consistent with dextrocardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case501/1350x900.gif", "_type": "mcq", "_caseId": 501}, {"question": "ECG from a 74 year old woman shows which ONE of the following rhythm disturbances?", "options": ["Atrial tachycardia with right bundle branch block (RBBB) aberrancy", "Sinus tachycardia with RBBB aberrancy", "Ventricular tachycardia (VT), monomorphic", "AV nodal reentrant tachycardia (AVNRT) with RBBB aberrancy", "Atrioventricular reentrant tachycardia (AVRT) with antidromic conduction via a posterior bypass tract"], "correct": 2, "explanation": "The ECG shows a regular, wide-complex tachycardia (WCT) at 130/min with an RBBB morphology (V1). Definite P waves are not seen. With an RBBB morphology, the diagnosis of VT is very strongly favored by the presence of multiple findings seen here including: a monophasic wide R wave in V1 (or an Rsr~ or qR-type morphology), a very wide QRS (>140-160 ms here, especially without hyperkalemia or sodium channel blocking drug effect), and an rS or QS in V6. Marked right axis deviation is also present here. ~~~~The patient had severe coronary disease with an underlying posterior-inferior wall aneurysm, the likely general origination site of the tachyarrhythmia. This type of monomorphic VT is usually originates in the vicinity of an underlying ventricular scar. The absence of evident AV dissociation (including independent sinus P waves, and/or capture or fusion beats) is non-diagnostic, as is the absence of positive or negative QRS concordance. The ST depressions (V1-V4) are not diagnostic in
