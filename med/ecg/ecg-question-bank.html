block), left atrial abnormality (LAA), left ventricular hypertroph..."], "correct": 0, "explanation": "ECG findings include sinus rhythm at 70/min with PR prolongation (\"first degree\" AV block), left atrial abnormality (LAA), left ventricular hypertrophy (LVH) and right branch bundle block (RBBB). Most important are pathologic Q waves V1-V5, I, aVL with persistent ST elevations in these leads. This is the classical ventricular aneurysm pattern, confirmed by echo here. Note: that there are many (!) different sets of proposed LVH criteria by ECG features. In this case, the diagnosis is made using a version of the Romhilt-Estes criteria, including an R wave of 30 mm or more in V6 and marked left atrial abnormality. Note that RBBB decreases the sensitivity of criteria which rely on using an S wave in V1-V2. In addition, there are lateral ST-T changes that could be due to LVH, ischemia, etc. He did not have evidence of recurrent infarction, but of increased heart failure.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case49/1350x900.gif", "_type": "identify", "_caseId": 49}, {"question": "85-year-old patient with valvular heart disease and congestive heart failure. Houseofficer called this normal sinus rhythm. What do you think?", "options": ["It's only NSR if that stands for \"Not Sinus Rhythm.\" Note that there are two P's for every QRS (see V1) and that the atrial activity at 176/min is neg..."], "correct": 0, "explanation": "It's only NSR if that stands for \"Not Sinus Rhythm.\" Note that there are two P's for every QRS (see V1) and that the atrial activity at 176/min is negative in lead 2. This is atrial (NOT sinus) tachycardia with 2:1 block (conduction). Block is almost certainly at the AV node level (\"type 1\" mechanism). Always exclude digitalis excess with this arrhythmia (not present here). The ECG also shows low limb lead voltage, left ventricular hypertrophy (LVH) by precordial voltage and slow R wave progression (r smaller than S in leads V1-4). This triad of findings has been reported as a marker of a variety of congestive heart failure (CHF) syndromes (\"ECG-CHF triad\"), but it does not tell you the cause of failure.Note that very slow R wave progression here could be due to anterior myocardial infarction (MI) or to severe LVH alone. ST-T changes are c/w LVH, digitalis, ischemia, etc. Finally, note that some patients with this arrhythmia may be candidates for catheter ablation treatment.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case50/1350x900.gif", "_type": "identify", "_caseId": 50}, {"question": "55-year-old woman: why is she dyspneic?", "options": ["ECG findings are left atrial abnormality(LAA) (biphasic P in V1 with broad negative component) and broad P waves elsewhere plus a tall R in V1 with a ..."], "correct": 0, "explanation": "ECG findings are left atrial abnormality(LAA) (biphasic P in V1 with broad negative component) and broad P waves elsewhere plus a tall R in V1 with a vertical QRS axis (about +80 degrees). A tall R in V1 with a vertical or particularly rightward axis generally indicates right ventricular hypertrophy (RVH). The combination of LAA with evidence of RVH in a dyspneic patient is most c/w with rheumatic mitral valve disease with severe mitral stenosis (MS). That's what this patient had with mild mitral regurgitation (MR) as well.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case51/1350x900.gif", "_type": "identify", "_caseId": 51}, {"question": "A very elderly man is admitted with congestive heart failure findings and history of right bundle branch block. What arrhythmia is likely contributing to his heart failure?", "options": ["There is a wide-complex tachycardia with right bundle branch and left axis deviation (RBBB/LAD) pattern (old per hx). The left axis may be due to left..."], "correct": 0, "explanation": "There is a wide-complex tachycardia with right bundle branch and left axis deviation (RBBB/LAD) pattern (old per hx). The left axis may be due to left anterior fascicular block and/or prior inferior inferior MI. NOTE: The rhythm is NOT sinus but atrial flutter with subtle flutter waves (aVR, II, and V1). Note the negative polarity of atrial waves in lead II and positive in V1, characteristic of typical atrial, counterclockwise flutter. Atrial flutter with 2:1 conduction is among most commonly missed major rhythms (often called sinus tachycardia by housestaff--at other institutions, of course). Sustained atrial flutter is likely a major contributor, if not the precipitant of congestive heart failure syndrome here in this elderly man. Note that patients with atrial flutter are often excellent candidates for ablation treatment to interrupt the large reentrant wave mechanism that underlies this rhythm. Check with your local Electrophysiology (EP) Service.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case52/1350x900.gif", "_type": "identify", "_caseId": 52}, {"question": "71-year-old woman whom you see on a consult service. To which unit are you likely heading", "options": ["Renal", "Coronary care", "Pulmonary", "Endocrinology (?hypothyroidism)", "Infectious disease (?Lyme disease)"], "correct": 2, "explanation": "Pulmonary. The ECG shows sinus tachycardia (about 100/min) at rest with peaked P waves (at least 2.5 mm in amplitude) in lead 2 (\"P pulmonale\" pattern) and an inferior-rightward P wave axis (about +80 degrees; note the negative P waves in lead aVL). However, the QRS limb lead voltage is only relatively, but not absolutely low, and slow R wave progression is not seen. The QRS axis is about +45-50 degrees, whiich is within normal limits.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case53/1350x900.gif", "_type": "mcq", "_caseId": 53}, {"question": "What is the rhythm/AV relationship?", "options": ["Sinus rhythm with complete (third degree) heart block", "Sinus rhythm with AV Wenckebach and intermittent 2:1 AV block", "Sinus rhythm with 3:1 AV block", "Sinus rhythm with Isorhythmic AV dissociation", "SInus rhythm with advanced second degree AV block"], "correct": 1, "explanation": "Sinus rhythm (P wave rate is 75/min)with AV Wenckebach (Type 1 AV block) is present with 3:2 conduction, along with 2:1 block. the effective ventricular rate is about 48/min. Notice the progressive PR prolongation in 3:2 cycles with non-conducted sinus P wave followed by a normal PR interval. Etiologies include drugs (beta-blockers, digitalis, calcium channel blockers), inferior ischemia, intrinsic AV node disease, Lyme disease, etc. In healthy young adults with high vagal tone (e.g. athletes), AV Wenckebach during sleeping hours is not uncommon. This patient's ECG also shows left ventricular hypertrophy (LVH), left atrial abnormality (LAA; prominent biphasic P wave with a broad negative component in V1) and infero-lateral T wave inversions raising question of ischemia superimposed on LVH pattern. Also note that the abrupt prolongation in \"conductable\" PR intervals raises consideration of underlying dual pathway physiology in the AV node.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case54/1350x900.gif", "_type": "mcq", "_caseId": 54}, {"question": "Patient with chest discomfort. What&apos;s going on?", "options": ["ECG shows evidence of acute transmural inferior/posterior ischemia. There is ST straightening and subtle hyperacute T waves inferiorly and reciprocal ..."], "correct": 0, "explanation": "ECG shows evidence of acute transmural inferior/posterior ischemia. There is ST straightening and subtle hyperacute T waves inferiorly and reciprocal ST depressions in I, aVL, and in the right precordial leads. Patient had acute MI and underwent urgent percutaneous transluminal angioplasty (PTCA) procedure of the right coronary. Comment: Sometimes the reciprocal changes (ST depressions) catch your eye before the primary ones, particularly with subtle ST elevations and hyperacute T waves inferiorly. Remember: a hyperacute T wave is one that is relatively more positive than it was at baseline due to transmural ischemia. Therefore, not all tall T waves are hyperacute and not all hyperacute T waves are absolutely tall.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case55/1350x900.gif", "_type": "identify", "_caseId": 55}, {"question": "A middle-aged patient with a history of \"heart disease.\" What is the cause of the tall R waves in V1-V2 here?", "options": ["The ECG shows sinus rhythm at about 75 bpm, with borderline left axis deviation (-30 degrees) and a non-specific intraventricular conduction delay (IV..."], "correct": 0, "explanation": "The ECG shows sinus rhythm at about 75 bpm, with borderline left axis deviation (-30 degrees) and a non-specific intraventricular conduction delay (IVCD--QRS duration at its widest is about 120 ms with fractionation of the waveform in some leads). Borderline low limb lead QRS voltage is present. The P waves are consistent with left atrial abnormality. Most striking are the prominent R waves in V1 and V2, with upright T waves. These R waves are most consistent prior MI, particularly in the context of the low amplitude but borderline wide Q waves in lateral leads in V6, and aVL. There may also be underlying posterior MI as well. Overall, the ECG speaks to advanced coronary disease with prior lateral or postero-lateral MI. The major differential diagnosis of a tall R in V1 includes: 1) Postero-lateral MI, includes 2) normal or positional variants (esp. in children, who should have a relatively narrow QRS normally; in adults, it is rare for R>S in V1 with properly placed leads and in those cases the rest of the ECG should be normal); 3) Right ventricular hypertrophy (RVH): a vertical-frankly rightward QRS axis is almost always seen and the T waves are usually inverted in lead V1-V3; 4) Hypertrophic cardiomyopathy (HCM) with or without obstruction, may simulate postero-lateral MI; 5) Duchenne muscular dystrophy (why is this so?); 6) Right ventricular (RV) conduction delays. However, the IVCD (not a right ventricular delay per se) here does not account for the lateral Q waves; 7) Wolff-White-Parkinson (WPW) patterns with posterior or lateral bypass tracts.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case56/1350x900.gif", "_type": "identify", "_caseId": 56}, {"question": "Rapid palpitations. Why?", "options": ["Atrial flutter with 2:1 conduction. Don&apos;t overlook the subtle \"extra\" atrial wave (it&apos;s NOT a true P wave, but a flutter wave) in the early ..."], "correct": 0, "explanation": "Atrial flutter with 2:1 conduction. Don&apos;t overlook the subtle \"extra\" atrial wave (it&apos;s NOT a true P wave, but a flutter wave) in the early ST segment. Atrial flutter with 2:1 conduction (block) is often mistaken for sinus tachycardia or paroxysmal supraventricular tachycardia (PSVT), as discussed elsewhere in this problem set.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case57/1350x900.gif", "_type": "identify", "_caseId": 57}, {"question": "Minimalist/optimal medicine quiz. If you could do only one serum lab test, what would it be in this case?", "options": ["Calcium", "Potassium", "Sodium", "DIgoxin level", "Troponin"], "correct": 0, "explanation": "Check the calcium (and yes, of course, albumin and phosphate, etc). It was low here at 8.2 mg/dl with minimally low albumin in a patient post-thyroidectomy. ECG shows subtle QT/QTc prolongation. Using Hodges formula for QTc (the values are 440msec/464.5. from lead V6). Most important is that QT is long in this case because the ST segment is somewhat \"stretched out.\" This relates to prolongation of the plateau phase of action potential which is prolonged with hypocalcemia. Ventricular repolarization can also be prolonged because of 1) wide QRS; 2) flat, wide T waves (e.g. quinidine, sotalol, hypokalemia, etc); and/or 3) prominent U waves melding with T wave. The latter two syndromes, representing dispersion of ventricular refractoriness, are most likely to be associated with torsade de pointes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case58/1350x900.gif", "_type": "mcq", "_caseId": 58}, {"question": "What's up here?", "options": ["Serum K+. It was 7.7 mEq/L. Note the relatively tall peaked (tented) T waves that are a classic sign of mild-moderate hyperkalemia. With more severe e..."], "correct": 0, "explanation": "Serum K+. It was 7.7 mEq/L. Note the relatively tall peaked (tented) T waves that are a classic sign of mild-moderate hyperkalemia. With more severe elevations, the QRS will widen, as will the PR, and the P wave amplitude will diminish, resulting in a junctional or idioventricular-type rhythm eventually.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case59/1350x900.gif", "_type": "identify", "_caseId": 59}, {"question": "50-year-old man with pleuritic chest pain. What are two major considerations raised by the ECG?", "options": ["Acute pericarditis. Rule out acute pulmonary embolism (PE). ECG shows classic signs of acute pericarditis with diffuse ST elevation (ventricular curre..."], "correct": 0, "explanation": "Acute pericarditis. Rule out acute pulmonary embolism (PE). ECG shows classic signs of acute pericarditis with diffuse ST elevation (ventricular current of injury from associated epicarditis) and PR changes (up in aVR/down infero-laterally) from an atrial current of injury. Voltage is not low but heart rate is up. Echo here did not show more than trivial pericardial effusion and chest x-ray showed concomitant right lower lobe pneumonitis (uncertain etiology). The S1Q3 pattern here also raises consideration of acute cor pulmonale and PE. A V/Q scan did not suggest pulmonary emboli.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case60/1350x900.gif", "_type": "identify", "_caseId": 60}, {"question": "84-year-old woman with congestive heart failure, not on digitalis. What&apos;s the major finding?", "options": ["The main abnormality is the rhythm: it&apos;s NOT sinus -- note the hidden P waves so that atrial rate is actually 150/min and the ventricular rate is..."], "correct": 0, "explanation": "The main abnormality is the rhythm: it&apos;s NOT sinus -- note the hidden P waves so that atrial rate is actually 150/min and the ventricular rate is 75/min. Therefore, this is a focal (ectopic) atrial tachycardia with 2:1 block (conduction). The \"extra\" P waves just after QRS are best seen in lead V1. In addition, there is an underlying incomplete right bundle branch block and borderline QT prolongation. Recall that the maximum resting heart rate is age dependent, with a very rough estimate often given of 220/min minus the patient&apos;s age in years. So for an 84-year old, a sustained resting sinus rate of 150 is rarely if ever seen. Furthermore, as a more subtle point, the negative/positive appearance of the P waves in lead II is not consistent with a sinus mechanism, which almost always produces initially and predominantly upright P waves in lead II. Take home: always look for hidden atrial activity!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case61/1350x900.gif", "_type": "identify", "_caseId": 61}, {"question": "What is this patient's chief complaint and what is the cause?", "options": ["Probably pleuritic-type chest pain with ECG pattern of acute pericarditis (diffuse ST elevations and subtle PR segment shifts--PR up in aVR and down i..."], "correct": 0, "explanation": "Probably pleuritic-type chest pain with ECG pattern of acute pericarditis (diffuse ST elevations and subtle PR segment shifts--PR up in aVR and down inferior-laterally, opposite of ST segment). Sinus tachycardia with pericarditis pattern may be due to a number of factors including a) pain; b) pericardial effusion/tamponade; c) associated myocarditis; d) fever.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case62/1350x900.gif", "_type": "identify", "_caseId": 62}, {"question": "78-yr-old woman. What would the coronary angiogram show? What was likely notable about the second heart sound?", "options": ["ECG shows sinus rhythm with premature atrial complexes (PACs). Notable findings are right bundle branch block (RBBB) (causing widely, but physiologica..."], "correct": 0, "explanation": "ECG shows sinus rhythm with premature atrial complexes (PACs). Notable findings are right bundle branch block (RBBB) (causing widely, but physiologically split S2) and pathologic Q wave V1-V3, due to underlying anterior/septal myocardial infarction (MI) caused by left anterior descending occlusion, which could be proximal. The T wave inversions may be due to a combination of primary (ischemia) and secondary factors (RBBB-altered depolarization/repolarization). As a rule, \"secondary\" T wave inversions ascribable to RBBB alone, are only seen in leads with an RsR' morphology. In this case, the T wave inversions in leads V4 and aVL cannot be explained as \"secondary.\" So in this case, given the findings of pathologic Q waves, the T wave inversions in the antero-lateral leads are consistent with ischemia. Thus, primary and secondary T wave abnormalities may co-exist in the same ECG (or even in the same lead).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case63/1350x900.gif", "_type": "identify", "_caseId": 63}, {"question": "81-yr-old woman with dyspnea. What are the major findings?", "options": ["There is a wide-complex tachycardia. The QRS shows a classic left bundle branch block (LBBB) pattern. If you look carefully, you will see atrial activ..."], "correct": 0, "explanation": "There is a wide-complex tachycardia. The QRS shows a classic left bundle branch block (LBBB) pattern. If you look carefully, you will see atrial activity in the limb leads, with negative polarity in lead II, at rate of 320/min. Hence, atrial flutter with 2:1 conduction and LBBB.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case64/1350x900.gif", "_type": "identify", "_caseId": 64}, {"question": "ECG from an elderly man with congestive heart failure and sustained ventricular tachycardia. What type of structural heart disease does the ECG indicate?", "options": ["The problem here is that the ECG at first glance looks like \"just another\" case of sinus rhythm with left bundle branch block (LBBB). However, if you ..."], "correct": 0, "explanation": "The problem here is that the ECG at first glance looks like \"just another\" case of sinus rhythm with left bundle branch block (LBBB). However, if you look closely, you will note the prominent (wide) Q waves in leads I, aVL, and V6 as part of qR complexes (or equivalent). Such qR complexes (with 30-40 ms or wider Q waves) in the lateral and/or inferior leads with LBBB are strongly suggestive of underlying prior myocardial infarction (MI). The notching of the ascending limb of the S wave in V4 is also consistent with the underlying scarring/MI with a LBBB-type pattern (Cabrera&apos;s sign). There is a prolonged PR interval (about 240 ms) with left atrial abnormality. In concert with the LBBB, the finding of LAA is strong evidence for underlying LVH. This patient had congestive heart failure (CHF) secondary to prior MIs with very severe left ventricular systolic and diastolic dysfunction (\"ischemic cardiomyopathy\"). He also had sustained, monomorphic ventricular tachycardia due to ventricular scarring and was referred to the cardiac electrophysiology service.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case65/1350x900.gif", "_type": "identify", "_caseId": 65}, {"question": "Why is this patient tachycardic?", "options": ["It may look like sinus tachycardia, but look again in V1: There are two atrial waves for each QRS, so the atrial rate is 260. This is another case of ..."], "correct": 0, "explanation": "It may look like sinus tachycardia, but look again in V1: There are two atrial waves for each QRS, so the atrial rate is 260. This is another case of atrial flutter with 2:1 conduction, one of the most commonly mistaken arrhythmias! This case is particularly tough because of low voltage in limb leads.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case66/1350x900.gif", "_type": "identify", "_caseId": 66}, {"question": "35-yr-old: If you could only obtain one lab test what would it be?", "options": ["Classic (!) ECG for hypercalcemia (13.9 mg/dl here). Note the very abbreviated ST segment such that the T wave looks like it takes off directly from Q..."], "correct": 0, "explanation": "Classic (!) ECG for hypercalcemia (13.9 mg/dl here). Note the very abbreviated ST segment such that the T wave looks like it takes off directly from QRS in some leads. High take-off of ST segment in V2/V3 is also sometimes seen in this context. Hypocalcemia is just the opposite: prolonged QT due to long ST segment (corresponding to changes in action potential plateau phase duration).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case67/1350x900.gif", "_type": "identify", "_caseId": 67}, {"question": "74-yr-old woman. Why is she weak and lightheaded?", "options": ["ECG shows sinus rhythm at 75/min but with 2:1 AV block. There is also left atrial abnormality (LAA). Conducted QRS complexes show right bundle branch ..."], "correct": 0, "explanation": "ECG shows sinus rhythm at 75/min but with 2:1 AV block. There is also left atrial abnormality (LAA). Conducted QRS complexes show right bundle branch block (RBBB) with left axis deviation, most c/w left anterior fascicular block. Minuscule R waves in II, III, aVF also raise question of prior inferior myocardial infarction (MI). The normal PR interval in conducted beats and the RBBB favor an infranodal location of block. Aficionados may also note the ventriculophasic sinus arrhythmia (P-P interval with QRS in-between is shorter than P-P without intervening QRS due to vagal tone fluctuations). Treatment: pacemaker. Compare this case with #89, which shows sinus rhythm with atrial bigeminy and blocked atrial premature beats which might be mistaken for either sinus bradycardia or sinus rhythm with 2:1 AV block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case68/1350x900.gif", "_type": "identify", "_caseId": 68}, {"question": "A 69-yr-old woman presented with dyspnea. Chest X-ray was unrevealing. Which ONE of the following diagnoses does this ECG suggest?", "options": ["Acute myocardial infarction", "Acute pulmonary embolism", "Left pneumothorax", "Mitral valve stenosis with decompensation", "Severe chronic obstructive pulmonary disease"], "correct": 1, "explanation": "The ECG shows sinus tachycardia at rest with an S1Q3 pattern and a \"minor\" right ventricular (RV) conduction delay (polyphasic complex in V1, with terminal S waves in V5 and V6). These findings, while non-diagnostic, in concert with the clinical history of dyspnea, strongly raise consideration of acute cor pulmonale, a major cause of which is pulmonary embolism (PE). Other findings that may be present include T wave inversions V1-V3 (due to RV \"strain\"), right axis shift, right bundle branch block and peaked P waves. With massive PE, the ECG may also show ST depressions due to subendocardial ischemia. Arrhythmias such as atrial fibrillation may occur, but are not that common, and often indicate underlying heart disease. Sinus tachycardia is the most common finding. In many, even with large PE, this non-specific sign may be the only ECG finding. However, clinicians need to be mindful that overall the ECG is fairly insensitive and non-specific in PE. Also, the ECG may change over relatively short periods of time in PE and comparison with previous tracings may be very helpful. The S1Q3T3 pattern by itself is neither sensitive nor specific for acute cor pulmonale. Quantitative criteria for the amplitude (relative or absolute) of the S and Q wave components of this waveform have been suggested, but are not agreed upon. The new appearance of this phenotype, especially in concert with sinus tachycardia and other findings noted above, likely adds to the specificity of the classic S1Q3T3 morphology first described nearly a century ago by McGinn and White (doi:10.1001/jama.1935.02760170011004).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case69/1350x900.gif", "_type": "mcq", "_caseId": 69}, {"question": "69-yr-old man with chief complaint: palpitations. What is differential diagnosis and most likely diagnosis?", "options": ["Narrow complex tachyardia at 180/min with probable subtle retrograde P waves just after the QRS (may need to print this out to see in lead aVR and II)..."], "correct": 0, "explanation": "Narrow complex tachyardia at 180/min with probable subtle retrograde P waves just after the QRS (may need to print this out to see in lead aVR and II). Therefore, likely diagnosis is AV nodal reentrant tachycardia (AVNRT); although, concealed bypass tract tachycardia or atrial tachycardia not excluded. This is, of course, NOT sinus and is also NOT atrial flutter (no flutter waves and ventricular rate is too fast for flutter with 2:1 conduction).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case70/1350x900.gif", "_type": "identify", "_caseId": 70}, {"question": "29-yr-old man with chest pain/dyspnea. Diagnosis is still possible despite the artifact.", "options": ["Pericarditis with effusion and possible tamponade. There is diffuse ST elevation with slight PR deviation (see V3). In addition, note resting sinus ta..."], "correct": 0, "explanation": "Pericarditis with effusion and possible tamponade. There is diffuse ST elevation with slight PR deviation (see V3). In addition, note resting sinus tachycardia and borderline low voltage, c/w hemodynamic compromise. Patient went to OR for pericardial drainage procedure!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case71/1350x900.gif", "_type": "identify", "_caseId": 71}, {"question": "53-yr-old woman. What service is she on?", "options": ["Coronary Care Unit. The ST elevations in leads I and aVL with probable reciprocal ST depressions inferiorly are consistent with acute lateral ST eleva..."], "correct": 0, "explanation": "Coronary Care Unit. The ST elevations in leads I and aVL with probable reciprocal ST depressions inferiorly are consistent with acute lateral ST elevation ischemia/MI. Remember that ST elevations like this are never reciprocal but indicate the primary region of ischemia, c/w a diagonal or circumflex \"culprit\" blockage, confirmed at cardiac catheterization/angiography in this case. The prominent negative P wave in lead V1 along with broad notched P waves in other leads (e.g., V3) are consistent with left atrial abnormality.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case72/1350x900.gif", "_type": "identify", "_caseId": 72}, {"question": "86-yr-old man with slow pulse and fatigue. What is the atrial mechanism? What is the likely AV relationship? What is pacing the ventricles?", "options": ["The underlying rhythm is atrial fibrillation (AF) with a very slow, regularized ventricular response (45/min). This finding is consistent with complet..."], "correct": 0, "explanation": "The underlying rhythm is atrial fibrillation (AF) with a very slow, regularized ventricular response (45/min). This finding is consistent with complete heart block (CHB) with a junctional escape mechanism. However, slight variabilitiy is noted in the ventricular response and intermittent antegrade conduction cannot be excluded. The QRS complexes (120 msec) show an intraventricular conduction delay (IVCD) with left axis deviation (consistent with left anterior fascicular block) and probable left ventricular hypertrophy (LVH). In addition, there is Q-T(U) prolongation, with nonspecific ST-T changes. Etiologic differential diagnosis includes intrinsic conduction disease, with the need to rule out drug toxicity or metabolic factors. The long QT here is against digitalis as sole factor (digitalis shortens the QT). Hypokalemia (not a cause of bradycardia usually) or relevant drug effects, such as sotalol or amiodarone, should be excluded. Treatment: If no reversible cause(s) is found, the patient will likely require an implanted ventricular pacemaker, as well as anticoagulation for AF (even with a pacemaker). Additional note: a commonly posed question is whether LVH can be diagnosed by voltage criteria alone in lead aVL in the presence of left axis deviation consistent with LAFB (-45 degrees or more negative). This issue is compounded by the fact that some of the widely used voltage criteria for LVH were derived in many cases before LAFB was defined and that the two may co-exist, which is likely what is occurring here. In favor in this case of LVH, not just LAFB, is the very tall R wave in aVL, the widened QRS at 120 msec, the ST-T changes and the atrial fibrillation (which may count as a kind of left atrial abnormality equivalent). Echocardiogram would provide more definite information about LVH wall thickness and mass.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case73/1350x900.gif", "_type": "identify", "_caseId": 73}, {"question": "83-yr-old women with congestive heart failure and heart murmurs noted since early adulthood. What is a unifying etiology that would account for rhythm, precordial voltage, and axis here? (Note: leads were correctly placed.)", "options": ["The ECG shows atrial fibrillation (AF) with left ventricular hypertrophy (LVH), but with RIGHT axis deviation. This combination should make you think ..."], "correct": 0, "explanation": "The ECG shows atrial fibrillation (AF) with left ventricular hypertrophy (LVH), but with RIGHT axis deviation. This combination should make you think of biventricular hypertrophy; and with AF, rheumatic heart disease is an important etiology (mitral stenosis and aortic valve disease in this case). The patient&39;s advanced age does not exclude clinically significant rheumatic heart disease, which is supported by long history of heart murmurs. Right axis deviation can also be due to left posterior fascicular block (LPFB). However, this type of \"hemiblock\" is not common as isolated finding (usually it is seen with right bundle branch block) and the diagnosis of LPFB requires exclusion of other causes of right axis (e.g., right ventricular hypertrophy).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case74/1350x900.gif", "_type": "identify", "_caseId": 74}, {"question": "51-yr-old male; what is the key (subtle) repolarization finding and its differential diagnosis?", "options": ["The ECG shows sinus rhythm at about 75/min with normal PR and QRS intervals. A notable finding here is the interval subtending the low amplitude but d..."], "correct": 0, "explanation": "The ECG shows sinus rhythm at about 75/min with normal PR and QRS intervals. A notable finding here is the interval subtending the low amplitude but definitely prolonged QT(U), perhaps best seen in the lateral precordial leads. The repolarization interval is up to 460-480 ms measured by eye (therefore, rate corrected up to 530 ms by Bazett's formula). The differential diagnosis of this important finding centers on: 1) electrolyte disorders, especially hypokalemia and hypomagnesemia (the K+ here was at most 3.6 mEq/L, and probably lower, with a borderline low Mg++ of 1.6 mEq/L; the serum calcium was normal); and 2) drug effects (e.g., quinidine, sotalol, amiodarone, tricyclic antidepressants, etc). Hereditary long QT syndromes are much rarer. Hypocalcemia by itself stretches out the ST segment but does not produce prominent U waves. The long QT(U) with hypokalemia/hypomagnesemia is associated with an increased risk of torsade de pointes in this setting. Readers will note that the QRS axis is vertical to borderline rightward (about +90 degrees). This is a non-diagnostic finding. An S1Q3 pattern is present, which is also non-specific and can be seen as a stable physiologic variant, with right ventricular overload syndromes, etc. Without other clinical information (all ECGs should be fully interpreted in a clinical context), the absence of even borderline resting sinus tachycardia would weigh against acute large pulmonary embolism or other acute right heart overload syndromes. Also noted: the P wave in lead V1 is biphasic without definite criteria for left atrial abnormality.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case75/1350x900.gif", "_type": "identify", "_caseId": 75}, {"question": "48-yr-old male: what service is patient on?", "options": ["Neurology/Neurosurgery. The patient has Parkinson's disease, with normal sinus rhythm. The clue is the tremor artifact, best seen in the limb leads. T..."], "correct": 0, "explanation": "Neurology/Neurosurgery. The patient has Parkinson's disease, with normal sinus rhythm. The clue is the tremor artifact, best seen in the limb leads. This artifact may sometimes be confused for atrial fibrillation/flutter, and when of very high magnitude may even look like torsades de pointes!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case76/1350x900.gif", "_type": "identify", "_caseId": 76}, {"question": "64-year-old male: what do you think his chief complaint is?", "options": ["Dyspnea. The ECG shows evidence of right ventricular (RV) overload with 1) sinus tachycardia; 2) right axis deviation, with the classic S1Q3T3 pattern..."], "correct": 0, "explanation": "Dyspnea. The ECG shows evidence of right ventricular (RV) overload with 1) sinus tachycardia; 2) right axis deviation, with the classic S1Q3T3 pattern; 3) incomplete right bundle branch block (RBBB) with RSR' (or qR) in V1 and S waves in lateral chest leads. There are also non-specific ST-T changes. If you were thinking that it was due to pulmonary embolus (PE) that is a good thought and was ruled out in this case. The cause of the acute/subacute cor pulmonale/pulmonary hypertension here responsible for these ECG changes was extensive pulmonary metastasis. Similar findings may occur with extensive pneumonitis, and other conditions where acute RV dilation occurs.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case77/1350x900.gif", "_type": "identify", "_caseId": 77}, {"question": "This ECG is most consistent with:", "options": ["Acute anterior myocardial infarction (MI)", "Pericarditis/tamponade", "Chronic renal failure", "Tricyclic antidepressant overdose", "Myxedema coma"], "correct": 2, "explanation": "c) There is classic evidence of hyperkalemia with tall, narrow T waves, most evident in leads V3-V4, along with QRS prolongation (about 120 ms in V3). These \"tented T waves\" are different from the broader hyperacute T waves of acute MI (usually seen with at least slight ST elevation). The borderline low limb voltage is non-specific; although a pericardial syndrome is not excluded, diffuse ST elevations (due to pericarditis) or electrical alternans (a specific but not sensitive sign of tamponade when present with sinus tachycardia) are not seen. Myxedema is classically associated with sinus bradycardia and low voltage complexes (\"low and slow\"). The QTc interval here--0.45 sec--is borderline prolonged. This may be due to the wide QRS, but also raises question of concomitant hypocalcemia in conjunction with hyperkalemia due to chronic renal failure. The precordial voltages (S in V3 plus R in aVL) meet the criterion for left ventricular hypertrophy (LVH) for women, and is borderline for men, by Cornell criteria (http://content.onlinejacc.org/article.aspx?articleid=1139534). LVH is commonly seen in chronic renal failure syndromes, due to associated hypertension. Note also the slight ST elevations and subtle \"saddle back\" ST-T morphology in V2 which mimic a primary Brugada pattern. This finding, possibly related to altered sodium channel conductance, has been reported with hyperkalemia and the finding should be reversible with lowering of serum potassium.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case78/1350x900.gif", "_type": "mcq", "_caseId": 78}, {"question": "What intermittent arrhythmia do you think this 76-year-old woman was recently treated for with a drug? There are two major ECG clues.", "options": ["Atrial Fibrillation. The rhythm is now sinus, with borderline sinus bradyardia, at about 60/min Note: 1) The wide notched P wave in lead II and biphas..."], "correct": 0, "explanation": "Atrial Fibrillation. The rhythm is now sinus, with borderline sinus bradyardia, at about 60/min Note: 1) The wide notched P wave in lead II and biphasic P wave in lead V1 are consistent with left atrial abnormality (LAA). The initial component of the P wave is slightly peaked in lead V1, also raising consideration of biatrial abnormality. However, this finding is not present in the limb leads. 2) The long QT/QTc (about 0.47 second), consistent with amiodarone effect, a commony used antiarrhythmic drug for paroxymal atrial fibrillation in this age-group. This drug may also cause sinus bradycardia related to beta-blocking effects. What are other effects and potential toxicities of this drug?", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case79/1350x900.gif", "_type": "identify", "_caseId": 79}, {"question": "55-yr-old male with chest discomfort 5 days post \"coronary artery bypass graft (CABG) surgery\".", "options": ["ECG shows classic findings of acute pericarditis. Note diffuse ST elevations (leads I, II, aVL, aVF, V3-V6) with concomitant PR segment deviations (PR..."], "correct": 0, "explanation": "ECG shows classic findings of acute pericarditis. Note diffuse ST elevations (leads I, II, aVL, aVF, V3-V6) with concomitant PR segment deviations (PR up in lead aVR, down in II, V4-V6). Thus, ST and PR injury current vectors are discordant. Cardiac enzymes were not elevated. There was a subtle pericardial friction rub, best heard after reading the ECG, and no evidence of pericardial compression syndrome.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case80/1350x900.gif", "_type": "identify", "_caseId": 80}, {"question": "66-yr-old male: what evidence (subtle) is there that he has chronic renal failure?", "options": ["The tracing shows sinus rhythm with a prolonged PR interval, intraventricular conduction defect (IVCD), left atrial abnormality (LAA), probably underl..."], "correct": 0, "explanation": "The tracing shows sinus rhythm with a prolonged PR interval, intraventricular conduction defect (IVCD), left atrial abnormality (LAA), probably underlying left ventricular hypertrophy (LVH) and probably underlying anteroseptal myocardial infarction (MI). Of note is the subtle T wave peaking in V5, with a slightly long QT (450 ms). The former is consistent with hyperkalemia (5.9 mEq/L); the latter with possible hypocalcemia (level not available). Sometimes hyperkalemia produces only subtle T wave peaking, without absolutely tall T waves, as is the case here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case81/1350x900.gif", "_type": "identify", "_caseId": 81}, {"question": "52-yr-old male with weakness.", "options": ["Acute infero-postero-lateral myocardial infarction (MI). Note reciprocal ST depressions in V1-V3, with primary, (hyper) acute ST elevations/relatively..."], "correct": 0, "explanation": "Acute infero-postero-lateral myocardial infarction (MI). Note reciprocal ST depressions in V1-V3, with primary, (hyper) acute ST elevations/relatively prominent T waves inferiorly and laterally. If you called anterior subendocardial ischemia, look again at the subtle changes in II, III, aVF and V6 which show the primary \"current of injury\" pattern. Sometimes the reciprocal ST depressions catch your eye first and cause these primary, localizing changes to be overlooked. The supraventricular rhythm is variable and the differential diagnosis focuses on sinus rhythm with subtle atrial ectopy vs sinus rhythm with type 1 SA exit block vs a marked respiratory sinus arrhythmia. A longer rhythm strip, not available here, would be helpful in making these distinctions. Left atrial abnormality is also present.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case82/1350x900.gif", "_type": "identify", "_caseId": 82}, {"question": "ECG from an elderly woman is most consistent with which ONE of following choices?", "options": ["Sinus tachycardia (ST)", "Atrial tachycardia (AT) with 1:1 AV conduction", "Multifocal atrial tachycardia (MAT)", "AV nodal reentrant tachycardia (AVNRT)", "Atrial tachyarrhythmia (atrial flutter or atrial tachycardia variant) with 2:1 AV conduction"], "correct": 4, "explanation": "This ECG is challenging. Most important is to recognize that there are two atrial waves per QRS with a regular atrial rate of about 200 (along with PVCs). The atrial waves are positive in lead V1 and negative in lead II (see magnification view), with a slightly asymmetric (\"sawtooth\") appearance in the latter consistent with typical counterclockwise atrial flutter. But the atrial rate is slow for that diagnosis (usually 240-350/min). On the other hand, atrial disease (e.g., with advanced age) or certain drugs may slow atrial conduction rate during atrial flutter. Intra-atrial mapping with assessment of whether a macro-reentrant circuit was present involving the tricuspid isthmus would be most useful in this regard. This information was not available for this archival case. Of additional note, there is an IVCD with slow R wave progression and criteria for LVH. One cannot rule out prior anterior myocardial infarction but the slow R wave progression could be due to LVH/IVCD alone. Non-specific ST-T changes are present.The patient was not digitalis toxic. Readers interested in differentiating atrial tachycardias from atrial flutter variants from the surface ECG and from intracardiac recordings, along with therapeutic implications for ablation, should consult the specialty literature.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case83/1350x900.gif", "_type": "mcq", "_caseId": 83}, {"question": "55-yr-old male. The \"call-in diagnosis is \"new onset atrial flutter.\"", "options": ["Atrial flutter with 4:1 AV block", "Coarse atrial fibrillation with a regularized ventricular response", "Atrial tachycardia (unifocal) with block", "Sinus rhythm with artifact", "Multifocal atrial tachycardia"], "correct": 3, "explanation": "This does indeed look like atrial flutter or coarse atrial fibrillation with a regularized response. However, if you look closely, (V4; also lead 2 rhythm strip at end) you can see true P waves buried in baseline artifact. (The patient did not have Parkinson&39;s disease, however.) So this is sinus rhythm masked by \"artifacty-cardia.\" Also of key note in ruling out atrial flutter, is that with \"true\" flutter, the atrial waves are identical in morphology and rate (accounting for the effects of intermittent superposition of flutter waves on ST-T waves). In this case the pseudo-atrial rate is not constant (use your calipers). This ECG is also not consistent with coarse atrial fibrillation because of the regularized ventricular rate at about 68/min. Usually, with AF and a regularized response, the QRS rate is much slower due to the presence of complete AV block. False positive and false negative diagnoses are important sources of errors in ECG analysis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case84/1350x900.gif", "_type": "mcq", "_caseId": 84}, {"question": "52-year-old female with a history of a heart murmur and increasing dyspnea. This ECG is most consistent with which ONE of the following diagnoses ?", "options": ["Severe aortic insufficiency", "Coronary artery disease with prior inferior-posterior myocardial infarction", "Rheumatic heart disease with severe mitral stenosis", "Acute pulmonary embolism (first episode)", "Apical hypertrophic cardiomyopathy"], "correct": 2, "explanation": "c) Note coarse atrial fibrillation (AF); tall right precordial R waves, right precordial T wave inversions, in concert with a vertical QRS axis. Signs of right ventricular hypertrophy (RVH) with AF (or prominent left atrial abnormality (LAA) should suggest rheumatic heart disease with mitral stenosis. The tall R in V4 here may be due to biventricular hypertrophy. The ST-T changes could be due to right ventricular (RV) overload, drug effect, etc. in this context. Echocardiogram/cardiac catheterization showed severe mitral stenosis/moderate mitral regurgitation; no significant coronary artery disease or aortic valve disease. The S1Q3T3 pattern is non-specific and may be associated with acute or chronic RV overload (or neither). Acute pulmonary embolism (one of choices) does not cause RVH per se, with tall right precordial T waves, although chronic pulmonary thromboembolic disease may. The right precordial T wave inversions may be seen with acute or chronic RV overload, as well as with anterior ischemia, etc. As noted the constellation of findings is most consistent with chronic rheumatic heart disease. Physical examination here should be very helpful. What would you predict from this ECG?", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case85/1350x900.gif", "_type": "mcq", "_caseId": 85}, {"question": "34-year-old male. What's going on here?", "options": ["ECG shows classic findings of acute/hyperacute anterior wall Q wave myocardial infarction (MI), with reciprocal inferior ST depressions. The distribut..."], "correct": 0, "explanation": "ECG shows classic findings of acute/hyperacute anterior wall Q wave myocardial infarction (MI), with reciprocal inferior ST depressions. The distribution of changes is consistent with a proximal left anterior descending (LAD) occlusion which was confirmed at cardiac catheterization and treated with angioplasty/stent. Premature atherosclerosis here was associated with multiple risk factors for coronary artery disease:hypertension, hyperlipidemia, family history and tobacco.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case86/1350x900.gif", "_type": "identify", "_caseId": 86}, {"question": "78-yr-old female. What is the rhythm?", "options": ["Atrial flutter with 2:1 block. Note that there are 2 atrial waves for each QRS in lead V1. The atrial rate is about 240; therefore, this could easily ..."], "correct": 0, "explanation": "Atrial flutter with 2:1 block. Note that there are 2 atrial waves for each QRS in lead V1. The atrial rate is about 240; therefore, this could easily be misread as sinus tachycardia or paroxysmal supraventricular tachycardia (PSVT) variant--not by you of course. ECG also shows left ventricular hypertrophy (LVH) and possible prior antero-septal myocardial infarction (MI), along with non-specific ST-T changes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case87/1350x900.gif", "_type": "identify", "_caseId": 87}, {"question": "39-yr old-male in Medical Intensive Care Unit (MICU). What is the rhythm?", "options": ["Sinus tachycardia with non-sustained ventricular tachycardia", "Atrial fibrillation with transient right bundle branch aberrancy", "Paroxysmal supraventricular tachycardia with Wolff-Parkinson-White pre-excitation", "Multifocal atrial tachycardia with right bundle branch aberrancy", "Polymorphic ventricular tachycardia"], "correct": 1, "explanation": "Atrial fibrillation with an extremely rapid ventricular response (overall average about 204 beats per minute). There is intermittent right bundle branch block (RBBB) aberrancy (note QRS morphology in V1/V6, especially), associated with the very fast rates. In all, there are 10 consecutive beats with RBBB aberrancy, during which the ventricular response rate is up to 240 beats per minute. Transient right bundle branch (RBBB) aberrancy in the setting of atrial fibrillation is an example of the Ashman phenomenon. This type of aberrancy may occur as a single beat, mimicking an isolated premature ventricular complex (PVC) or as a run of wide-complex beats, as here, mimicking ventricular tachycardia (Gouaux JL, Ashman R. Auricular fibrillation with aberration simulating ventricular paroxysmal tachycardia. Am Heart J 1947:366�73). The initiation of the RBBB aberrancy in this context typically occurs with a long cycle-short cycle RR cadence, with the refractoriness of the right bundle related to the duration of the preceding RR interval. Thus, the first RBBB aberrancy beat is most likely to occur in the QRS that comes just after the relatively long RR interval.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case88/1350x900.gif", "_type": "mcq", "_caseId": 88}, {"question": "A cardiologist missing bifocals could miss this arrhythmia.", "options": ["This looks like sinus bradycardia at a rate of 43 bpm, BUT... if you look more closely, there are P waves partly hidden in T waves. So this is actuall..."], "correct": 0, "explanation": "This looks like sinus bradycardia at a rate of 43 bpm, BUT... if you look more closely, there are P waves partly hidden in T waves. So this is actually pure sinus with blocked atrial premature complexes (APBs) in a bigeminal pattern. As a result the effective sinus rate is very slow. There are also non-specific T wave inversions noted in V1-V3.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case89/1350x900.gif", "_type": "identify", "_caseId": 89}, {"question": "61-yr-old female. Can you predict what type of heart disease she has from ECG? Clues: axis; rhythm", "options": ["Rheumatic valve disease with severe mitral stenosis (MS) and mitral regurgitation (MR) as well. The ECG shows very coarse atrial fibrillation (or fibr..."], "correct": 0, "explanation": "Rheumatic valve disease with severe mitral stenosis (MS) and mitral regurgitation (MR) as well. The ECG shows very coarse atrial fibrillation (or fibrillation/flutter) with a moderate ventricular response. There is right axis deviation, along with T wave inversions in V1-V4 and a delayed precordial transition zone, all consistent with right ventricular overload. The prominent S waves in V3 in this context suggest possible biventricular hypertrophy. Whenever you see marked left atrial abnormality or atrial fibrillation in the presence of right ventricular hypertrophy signs, always think about rheumatic mitral valve disease. Mitral stenosis is the only single lesion that can readily account for the combination of left atrial enlargement and right ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case90/1350x900.gif", "_type": "identify", "_caseId": 90}, {"question": "47-yr-old male. What is the diagnosis? What should you do?", "options": ["Acute anterior wall ST elevation myocardial infarction (STEMI), consistent with proximal left anterior descending (LAD) occlusion, with Q waves (V1-V3..."], "correct": 0, "explanation": "Acute anterior wall ST elevation myocardial infarction (STEMI), consistent with proximal left anterior descending (LAD) occlusion, with Q waves (V1-V3) and ST elevations (V1-V5). Stat interventional cardiology page. See most recent guidelines and updates of AHA/ACC.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case91/1350x900.gif", "_type": "identify", "_caseId": 91}, {"question": "62-year-old female. Can you relate the arrhythmia to the other findings? Note: right-sided chest leads!", "options": ["The rhythm is sinus with long, atypical AV Wenckebach cycles (e.g., probable 6:5 block). The reason for the type 1 second degree AV block is apparent ..."], "correct": 0, "explanation": "The rhythm is sinus with long, atypical AV Wenckebach cycles (e.g., probable 6:5 block). The reason for the type 1 second degree AV block is apparent from the rest of the tracing which shows classic findings of an acute inferior/right ventricular myocardial infarction, consistent with proximal to mid-occlusion of the right coronary artery (RCA). The finding of ST elevation in lead III>II, as present here, is also consistent with this finding (see Zimetbaum et al. Am J Cardiol 1998;81:918).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case92/1350x900.gif", "_type": "identify", "_caseId": 92}, {"question": "What is the mechanism of the apparent beat-to-beat (2:1) QRS alternation here?", "options": ["Sinus rhythm with intermittent Wolff-Parkinson-White pattern", "SInus rhythm with 2:1 block in the right bundle branch/left anterior fascicle", "SInus rhythm with pericardial effusion/tamponade and alternation due to \"swinging heart sydnrome\"", "Sinus rhythm with ventricular bigeminy", "SInus rhythm with junctional bigeminy and intermittent RBBB aberrancy (retrograde P waves following  QRS)"], "correct": 3, "explanation": "The rhythm is sinus with ventricular bigeminy and late diastolic premature ventricular complexes (PVCs) that come just after the \"second\" sinus P waves. The PVCs have a right bundle branch block (RBBB)/right axis morphology, but this is not intermittent RBBB per se or Wolff-Parkinson-White (WPW) pattern, which the present pattern simulates. Nor is this alternation-type pattern due to pericardial effusion/tamponade, where there is usually sinus tachycardia with 2:1 alternation of narrow (normal) or wide QRS complexes, and often low or relatively low voltage QRS complexes. The normally conducted beats here show borderline left axis deviation with a normal QRS duration (possible left anterior fascicular block) and non-specific ST-T changes. This example shows how late diastolic PVCs in a bigeminal sequence can simulate a number of alternations-type patterns and delineates the differential diagnosis of some of the alternations patterns. Can you think of others? (e.g., QRS alternation with PSVT rhythms). Note also that the apparent \"retrograde\" P waves in some leads (e.g., V3) are actually within the QRS complex and are due to the RBBB. The actual sinus P waves come on time, with every other one followed immediately by a PVC.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case93/1350x900.gif", "_type": "mcq", "_caseId": 93}, {"question": "What subtle conduction abnormality is present here?", "options": ["Incomplete right bundle branch block (RBBB). QRS duration is about .11 second with rSr' in V1. This finding is non-specific, and may be seen as benign..."], "correct": 0, "explanation": "Incomplete right bundle branch block (RBBB). QRS duration is about .11 second with rSr' in V1. This finding is non-specific, and may be seen as benign variant or with organic cardiopulmonary disease. For example, a chronic incomplete RBBB, especially with a rightward QRS axis, is a common finding with ostium secundum type atrial septal defects. A new incomplete RBBB, with sinus tachycardia, should raise consideration of acute cor pulmonale, and may be seen with acute pulmonary embolism.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case94/1350x900.gif", "_type": "identify", "_caseId": 94}, {"question": "60-yr-old male. Why is this not just a \"regular\" left bundle branch block?", "options": ["This is an important ECG because it shows evidence of prior and possibly evolving myocardial infarction (MI) superimposed on a left bundle branch bloc..."], "correct": 0, "explanation": "This is an important ECG because it shows evidence of prior and possibly evolving myocardial infarction (MI) superimposed on a left bundle branch block (LBBB) or related left ventricular conduction delay pattern. Prior MI is indicated by Q waves as part of a qR in I and V6. In addition, notching of the ascending limb of the S wave in the mid-left chest leads is also consistent with prior MI (Cabrera&apos;s sign). The biphasic T waves in the mid-left chest leads raise consideration of evolving ischemia/MI. Left axis deviation is also present. Thus: the statement that \"LBBB precludes diagnosing MI\" is not correct. On the other hand, LBBB often does mask changes of prior or acute MI, thereby reducing the sensitivity of the ECG in this setting. The presence of LAA with a LBBB-type pattern is consistent with underlying left ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case95/1350x900.gif", "_type": "identify", "_caseId": 95}, {"question": "79-yr-old man with baseline artifact partly hiding two major and related abnormalities. What are they?", "options": ["This is a challenging ECG. The main findings are: 1) The rhythm is sinus (or less likely atrial) tachycardia with a P wave rate of about 115/min with ..."], "correct": 0, "explanation": "This is a challenging ECG. The main findings are: 1) The rhythm is sinus (or less likely atrial) tachycardia with a P wave rate of about 115/min with AV Wenckebach (Mobitz I second degree block). 2) There is evidence of an evolving Q wave inferior (and perhaps posterior) myocardial infarction (MI) pattern, with Q waves and T wave inversions in leads 2, 3 and aVF, and a tall R wave in lead V2. The AV conduction disturbance is likely related to the MI. There is also low voltage and non-specific lateral ST-T changes. The AV Wenckebach here is somewhat atypical in that some of PR intervals are very long and some of the non-conducted P waves come just before a QRS (e.g., 4 and 9th QRSs). Furthermore, the jumps to very long PR intervals that are still conducted could indicate dual AV nodal pathways. Note: complete heart block is excluded by the relatively high and irregular ventricular rate. Complete heart block is usually associated with a relatively to very slow and regular QRS rate (50 or much less beats/min).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case96/1350x900.gif", "_type": "identify", "_caseId": 96}, {"question": "23-year-old female with palpitations.", "options": ["Classic Wolff-Parkinson-White (WPW) pre-excitation pattern, with triad of short PR, wide QRS and Delta waves. Note the polarity of the delta waves (mo..."], "correct": 0, "explanation": "Classic Wolff-Parkinson-White (WPW) pre-excitation pattern, with triad of short PR, wide QRS and Delta waves. Note the polarity of the delta waves (most positive in lead 2 and lateral chest leads) consistent with a right-sided bypass tract. Patients with WPW may not only have atrio-ventricular reentrant tachycardia involving the bypass tract, but also AV nodal reentrant tachycardia, as well as atrial fibrillation (AF), etc.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case97/1350x900.gif", "_type": "identify", "_caseId": 97}, {"question": "52-year-old male with subtle evidence of life-threatening problem.", "options": ["Patient has evolving inferior non-Q wave myocardial infarction (MI). Note slight inferior ST elevation with T wave inversion. There is also minimal re..."], "correct": 0, "explanation": "Patient has evolving inferior non-Q wave myocardial infarction (MI). Note slight inferior ST elevation with T wave inversion. There is also minimal reciprocal ST depression in aVL. Relatively low limb lead voltage makes these findings more subtle.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case98/1350x900.gif", "_type": "identify", "_caseId": 98}, {"question": "40-year-old female with life-threatening problem.", "options": ["Hyperkalemia (associated with chronic renal failure). The K+ one hour before this ECG was 7.4 mEq/L, and likely lower at time of this tracing. Note th..."], "correct": 0, "explanation": "Hyperkalemia (associated with chronic renal failure). The K+ one hour before this ECG was 7.4 mEq/L, and likely lower at time of this tracing. Note the subtle T wave peaking (\"tenting\") here best seen in the lateral chest leads. Although the T waves aren't very tall, they are very narrow-based. Also present is borderline low limb lead voltage and probable left atrial abnormality.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case99/1350x900.gif", "_type": "identify", "_caseId": 99}, {"question": "20-year-old woman is found unresponsive. What is the most likely cause?", "options": ["In addition to prominent sinus tachycardia, there is an intraventricular conduction delay (IVCD) with a rightward or indeterminate QRS axis. The QT is..."], "correct": 0, "explanation": "In addition to prominent sinus tachycardia, there is an intraventricular conduction delay (IVCD) with a rightward or indeterminate QRS axis. The QT is somewhat prolonged for the rate. The triad of sinus tachycardia, a wide QRS and a long Q-T in an obtunded patient should immediately suggest tricyclic antidepressant (TCA) overdose. Of note, the IVCD in these cases is often associated with a terminal S wave (rS) in lead I, and a terminal R wave (qR) in aVR, as present here (see: Crit.Care Med.1997;25:1721). The P waves are difficult to see (V1, for example) and in some leads (II, aVF) appear to merge with the end of the T wave.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case100/1350x900.gif", "_type": "identify", "_caseId": 100}, {"question": "Subtle syncopation. 54-year-old morbidly obese male with an acute inferior MI. What is the rhythm?", "options": ["Sinus with 5:4 AV Wenckebach. Low voltage (consistent with obesity, Chronic Obstructive Pulmonary Disease (COPD), and/or myocardial infarction (MI) wi..."], "correct": 0, "explanation": "Sinus with 5:4 AV Wenckebach. Low voltage (consistent with obesity, Chronic Obstructive Pulmonary Disease (COPD), and/or myocardial infarction (MI) with extensive cardiac muscle necrosis) makes identification of the very broad, low amplitude P waves difficult! Note subtle changes in T-wave morphology due to superimposed atrial activity. (Right axis deviation here could be due to COPD, lateral extension of infarct, or left posterior fascicular block.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case101/1350x900.gif", "_type": "identify", "_caseId": 101}, {"question": "Premature ventricular complexes unmask rhythm. What is it?", "options": ["Borderline sinus tachycardia is present with a markedly prolonged PR at about 300 ms (\"1st degree AV block\"). The P waves, partly obscured by the T wa..."], "correct": 0, "explanation": "Borderline sinus tachycardia is present with a markedly prolonged PR at about 300 ms (\"1st degree AV block\"). The P waves, partly obscured by the T waves of the preceding sinus beats, are more clearly evident after the premature ventricular complexes (PVCs) -- beats 3 and 9, and the last beat. In addition, there is a left ventricular intraventricular conduction delay (IVCD; QRS duration about 160 ms), borderline left axis deviation, probable left atrial abnormality and non-specific lateral ST-T wave changes. The QT appears long in part because of the superimposed P wave deflection at the terminal portion of the T wave. Note the notching on the upstroke of the S waves in V2-V4, consistent with myocardial scarring with the IVCD (\"Cabrera&39;s sign\"), in a patient with a history of multiple previous myocardial infarctions. The findings are consistent with severely impaired left ventricular function.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case102/1350x900.gif", "_type": "identify", "_caseId": 102}, {"question": "64-year-old male with chest pain. What vessel was acutely occluded at the time of emergency cardiac catheterization/coronary angiography?", "options": ["Proximal left anterior descending", "Proximal branch of right coronary", "Left main coronary", "Postero-lateral branch of right coronary", "Marginal branch of circumflex coronary"], "correct": 0, "explanation": "The left anterior descending (LAD). The patient had multivessel disease. The ECG shows an extensive acute/evolving antero-lateral myocardial infarction (MI) pattern, with ST-T changes most apparent in V2-V6, I and aVL. Slow R wave progression is also present in V1-V3. The rhythm is borderline sinus tachycardia with a single premature atrial complex (PAC) (4th beat). Note also the low limb lead voltage and probable left atrial abnormality (LAA). Left ventriculography showed diffuse hypokinesis, as well as akinesis of the antero-lateral and apical walls, with an ejection fraction estimated at 33~.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case103/1350x900.gif", "_type": "mcq", "_caseId": 103}, {"question": "33-year-old male with a systolic murmur. What's the diagnosis?", "options": ["The patient has hypertrophic obstructive cardiomyopathy (HOCM; formerly IHSS). The ECG is very suggestive with unusually prominent septal forces with ..."], "correct": 0, "explanation": "The patient has hypertrophic obstructive cardiomyopathy (HOCM; formerly IHSS). The ECG is very suggestive with unusually prominent septal forces with tall R wave in V1 and deep Q waves in the antero-lateral leads (I, aVL, V3-6). The classic systolic murmur of HOCM gets louder during the strain phase of the Valsalva maneuver and with standing, and softer with squatting.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case104/1350x900.gif", "_type": "identify", "_caseId": 104}, {"question": "\"Couples therapy.\" What's causing the group beating?", "options": ["Sinus rhythm with atrial bigeminy (this pattern starts after the 4th sinus beat). In addition, there are voltage criteria for left ventricular hypertr..."], "correct": 0, "explanation": "Sinus rhythm with atrial bigeminy (this pattern starts after the 4th sinus beat). In addition, there are voltage criteria for left ventricular hypertrophy (LVH), possible left atrial abnormality, and poor R-wave progression in V1-V3. The latter finding could be due to LVH, underlying anterior myocardial infarction (MI), lead placement; or could be a physiologic variant. The seventh QRS complex exhibits aberrancy, with a left anterior hemiblock morphology.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case105/1350x900.gif", "_type": "identify", "_caseId": 105}, {"question": "51-year-old female with post-operative palpitations (first and only episode). Reversion to sinus rhythm occurred after IV adenosine. What is major differential diagnosis?", "options": ["The findings are that of a reentrant type PSVT. Note the inverted P waves in leads II, III, and F; with upright P waves in aVR, consistent with retrog..."], "correct": 0, "explanation": "The findings are that of a reentrant type PSVT. Note the inverted P waves in leads II, III, and F; with upright P waves in aVR, consistent with retrograde activation of the atria from region in or near the AV node. Somewhat atypically for AVNRT, the P waves are located in the ST segment proper, not hidden in the QRS or just after the QRS. However, most likely this is still an AV nodal reentrant tachycardia variant with somewhat slow conduction in the retrograde (\"fast pathway\") limb. AV reentrant tachycardia (AVRT) involving a concealed bypass tract in the septal area is possible. The clinical setting (single event in middle-aged woman) favors AVNRT. The ECG, by itself, could represent either mechanism. Adenosine response (which blocks the reentrant circuit in the AV node) does not distinguish between response to AVNRT or AVRT. Definitive answer would likely call for EP study, not indicated by the present clinical scenario, but would be consideration for recurrent, symptomatic episodes. Compare with other examples of PSVT on the site. (Revised: 4/20/2020.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case106/1350x900.gif", "_type": "identify", "_caseId": 106}, {"question": "What is the first question to ask?", "options": ["What is the patient's age? This is a normal ECG in an 11-year-old male. The T-wave inversions in V1-V3 are a normal finding in children, and may persi..."], "correct": 0, "explanation": "What is the patient's age? This is a normal ECG in an 11-year-old male. The T-wave inversions in V1-V3 are a normal finding in children, and may persist into adulthood. The vertical QRS axis (about +90 degrees) and early precordial transition are also physiologic findings.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case107/1350x900.gif", "_type": "identify", "_caseId": 107}, {"question": "Why is this patient with a dual chamber pacemaker presyncopal?", "options": ["He is having an inferior myocardial infarction (MI). Note the markedly elevated J point and convex ST segment elevations inferiorly, with reciprocal c..."], "correct": 0, "explanation": "He is having an inferior myocardial infarction (MI). Note the markedly elevated J point and convex ST segment elevations inferiorly, with reciprocal changes in I, aVL, and V2. The pacemaker is a dual chamber pacemaker, with intermittent A-V sequential pacing alternating with an A-sensed V-paced rhythm. (The ninth complex may represent a sensed, low amplitude, partly concealed premature atrial premature beat, masquerading as atrial pacing failure.) Ventricular paced ECGs are usually not interpretable for ischemia. However, just as with an intrinsic left bundle branch block, >5 mm ST segment elevation in right precordial or inferior leads, and especially ST depressions/T wave inversions in leads with QS or rS complexes, are highly suggestive of ischemia. (see: Sgarbossa et al. Am J Cardiol 1995; 77:423-424.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case108/1350x900.gif", "_type": "identify", "_caseId": 108}, {"question": "Resting ECG in an 85-year-old woman. Is this sinus tachycardia?", "options": ["Yes", "No", "", "", ""], "correct": 1, "explanation": "At first glance, this narrow complex tachycardia (NCT) might appear to be \"sinus tachycardia.\" However, a second look reveals two interesting findings. Note the unusual P wave axis (negative in I and aVL) and the short PR interval (or very long RP interval). One possible explanation for these findings is that this is an (ectopic) atrial tachycardia with either 1) a rapidly conducting (\"slick\") AV 2) an \"atrio-His\" bypass tract with fast conducting properties. This would account for the short PR interval in the presence of an atrial tachycardia. Another possibility for this non-sinus tachycardia is that it represents a \"long RP tachycardia\" involving a left lateral bypass tract which is slowly conducting (to account for the long RP interval). In this latter case, the reentrant circuit would involve antegrade (orthodromic conduction) down a rapidly conducting AV node and through the ventricular myocardium, with retrograde conduction up the slowly conducting bypass tract, and then across the atria back to the AV node. Atypical AV nodal reentry (AVNRT) is less likely given apparently biphasic P wave morphology in the inferior leads. Of key note is that resting heart rates above 140 beats/min are rarely due to sinus tachycardia in the very elderly.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case109/1350x900.gif", "_type": "mcq", "_caseId": 109}, {"question": "\"Alternate hypothesis.\" What&apos;s going on here?", "options": ["The rhythm is sinus with underlying left anterior fascicular block (LAFB), and 2:1 conduction in the left posterior fascicle (LPF). When both the LPF ..."], "correct": 0, "explanation": "The rhythm is sinus with underlying left anterior fascicular block (LAFB), and 2:1 conduction in the left posterior fascicle (LPF). When both the LPF and LAF are blocked, a complete left bundle branch block (LBBB) morphology results. Beat #12 is likely a His extrasystole or junctional premature beat, consistent with underlying infra-nodal conduction disease. There is underlying left ventricular hypertrophy with non-specific ST-T wave changes most prominent in the lateral leads, and left atrial abnormality.~~This challenging ECG is most likely to be mistaken for sinus rhythm with frequent premature ventricular complexes (PVCs) in a bigeminal pattern (ventricular bigeminy). A key finding here is that the PR interval is not shorter with these wide complex beats. Usually, with ventricular bigeminy and late diastolic PVCs (the more common cause of this type of bigeminal pattern with intermittent wide complexes), the PVCs come slightly early and hence the PR is noticeably shorter. The differential diagnosis also includes intermittent Wolff-Parkinson-White (WPW) pre-excitation in a bigeminal pattern. However, the absence of a short PR interval and delta waves excludes this diagnosis. Supraventricular bigeminy with aberrant ventricular conduction, another consideration, is excluded by the fact that the P waves are all sinus in origin. Further notes: The very broad, negative P waves in lead V1 are consistent with left atrial abnormality and the concomitant biphasic P waves in II, III and aVF with an advanced interatrial conduction delay (see: Ariyarajah V, Spodick DH: Cardiology 2005;104:33-34.) The prominent R wave in lead aVL in the narrow beats (even with the left axis deviation) is consistent with underlying left ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case110/1350x900.gif", "_type": "identify", "_caseId": 110}, {"question": "Is this ventricular tachycardia?", "options": ["No. The rhythm is atrial fibrillation with a rapid ventricular response (irregular rate at about 120 beats/min). There is an extremely wide QRS of lef..."], "correct": 0, "explanation": "No. The rhythm is atrial fibrillation with a rapid ventricular response (irregular rate at about 120 beats/min). There is an extremely wide QRS of left bundle branch block morphology; the QRS duration of over 200ms is suggestive of drug effect or hyperkalemia. Flecainide is a class Ic (Na+ channel blocking) drug, which exhibits \"use dependency\": at faster rates with less time for dissociation of the drug from the channel, Na+ channels are increasingly saturated with the drug. This increases the degree of QRS prolongation, and may be mistaken for ventricular tachycardia. (see Crijns HJ, et al. Am J Cardiol 1988; 62: 1303-1306.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case111/1350x900.gif", "_type": "identify", "_caseId": 111}, {"question": "What's the rhythm?", "options": ["Ventricular tachycardia (VT) at rate of 170. The right bundle branch block morphology is atypical (monomorphic R, rather than rSR', in V1), and the R:..."], "correct": 0, "explanation": "Ventricular tachycardia (VT) at rate of 170. The right bundle branch block morphology is atypical (monomorphic R, rather than rSR', in V1), and the R:S ratio is less than 1 in V6, both suggestive of ventricular tachycardia. Although the most common underlying diagnosis in adult North American patients with sustained monomorphic VT is coronary heart disease status post myocardial infarction (MI)s, this patient had a non-ischemic cardiomyopathy. The morphology of the VT is suggestive of origin from the left side of the heart, near the base (right bundle branch block with inferior/rightward axis). As with any wide complex tachycardia that is hemodynamically tolerated, the most important data to obtain is the 12-lead ECG, as this can direct possible radiofrequency ablation at the time of electrophysiology study.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case112/1350x900.gif", "_type": "identify", "_caseId": 112}, {"question": "63-year-old female immediately status post cardiac arrest with cardioversion. What is the likely underlying primary structural abnormality?", "options": ["Mixed mitral stenosis and regurgitation", "Aortic stenosis", "Hypertensive heart disease", "Primary pulmonary hypertension", "Chronic obstructive pulmonary disease"], "correct": 0, "explanation": "a) Mixed mitral stenosis and regurgitation is most likely. The ECG shows normal sinus rhythm, left atrial abnormality, and voltage criteria for left ventricular hypertrophy (LVH) with borderline right axis deviation. The most likely clinical scenario is mixed mitral stenosis and regurgitation, causing left atrial and biventricular hypertrophy. Hypertensive heart disease alone, or aortic stenosis, would be associated with voltage criteria for LVH on the ECG, but not right axis deviation. Primary pulmonary hypertension would produce right ventricular hypertrophy. Chronic obstructive pulmonary disease (COPD) would not produce LVH, either. The marked QT prolongation and diffuse T-wave inversions are consistent with metabolic/ischemic/central nervous system changes occurring post-arrest and after cardioversion.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case113/1350x900.gif", "_type": "mcq", "_caseId": 113}, {"question": "What is the rhythm and what is the AV conduction mechanism?", "options": ["Multifocal atrial tachycardia (MAT) with variable AV block", "Sinus tachycardia with Mobitz I (Wenckebach) AV block", "Atrial tachyarrhythmia (atrial flutter or possibly atrial tachycardia) with AV Wenckebach variant", "Atrial tachycardia with complete heart block", "Atrioventricular reentrant (bypass-mediated) tachycardia"], "correct": 2, "explanation": "From the surface ECG, the rhythm is likely either slow, reentrant atrial flutter in context of cardiomyopathy with an enlarged tricuspid annulus (negative atrial waves in II, positive in V1) with an atrial rate of approximately 230 BPM vs. focal atrial tachycardia with subtle group beating. On closer inspection, there are groups of two ventricular beats followed by pauses, with more atrial waves than there should be for simple 3:2 AV Wenckebach conduction pattern. This subtle group beating pattern is attributable to dual levels of block (multilevel block) in the AV node: in this case 2:1 AV conduction \"above\" 3:2 AV Wenckebach conduction. The atrial rate is somewhat slower than typical atrial flutter but may be due to very enlarged atria with relatively slower conduction. The apparent isoelectric segment between atrial waves suggests atrial tachycardia but is not definitive given the low voltage. For entry-level trainees, a key is not to call this sinus tachycardia, which is precluded by the negative atrial waves in II.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case114/1350x900.gif", "_type": "mcq", "_caseId": 114}, {"question": "This 33-year-old male has a markedly abnormal ECG. and a history of congenital heart disease. Which ONE of the following diagnoses is most likely?", "options": ["Atrial septal defect, secundum type (ASD)", "Dextrocardia (mirror-image with situs inversus)", "Transposition of the great arteries (TGA)", "Mitral valve prolapse (MVP)", "Aortic stenosis secondary to a bicuspid valve"], "correct": 2, "explanation": "c) Transposition of the great arteries (TGA). This patient had complete anatomic transposition and is status post Mustard procedure. This procedure creates a baffle that shunts systemic venous blood to the left ventricle, and oxygenated pulmonary venous blood to the right ventricle (which is the systemic pumping ventricle in TGA). The rhythm is likely accelerated junctional; sinus node dysfunction is very common after this atrial-damaging operation. A secundum Atrial septal defect (ASD) is typically associated with an incomplete right bundle branch block and a rightward QRS axis; and mirror-image dextrocardia should cause reverse R wave progression. Mitral valve prolapse may be associated with non-specific ST-T changes and, in severe cases, with left ventricular hypertrophy. Severe aortic valvular disease should cause left ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case115/1350x900.gif", "_type": "mcq", "_caseId": 115}, {"question": "31-year-old woman with ECG simulating ischemia. What metabolic abnormality should you suspect?", "options": ["Hypokalemia. K+ here was 2.2mEq/L. Very severe hypokalemia can cause ST depressions and T-wave inversions as seen here, mimicking ischemia. But also n..."],
