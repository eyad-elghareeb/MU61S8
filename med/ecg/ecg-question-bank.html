 antidepressant overdose, see Case # 100. Myxedema coma is classically associated with sinus bradycardia and low voltage. (J waves have been reported with hypercalcemia but giant deflections of the type seen in this case are not a feature of hypercalcemia which may be associated with right precordial lead ST elevation (e.g., V1-V2). J waves have also been reported in subarachnoid hemorrhage, which may also be accompanied by hypothermia. In marked cases, the distinctive, convex J wave (�hypothermic hump�) appears to be an added deflection at the end of the QRS and beginning of the ST segment. The waveform is related pathophysiologically to altered transmural action potential features with hypothermia as described by the elegant work of Antzelevitch and colleagues (Circulation 1996; 93:372). Patients with this pattern are at increased risk of ventricular fibrillation which may occur during rewarming. In contrast with Brugada-type patterns (see Case 253) which are associated with �coved� (downsloping) or �saddle-back� right precordial J point/ST elevations, the hypothermic pattern is more diffuse. See also New Engl J Med (2005; 352:184) for another example of giant Osborn waves with systemic hypothermia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case285/1350x900.gif", "_type": "mcq", "_caseId": 285}, {"question": "60 year-old female with complaints of chest pain and shortness of breath. The ECG shows which of the following?", "options": ["Sinus rhythm with definite findings of acute anterior ST elevation myocardial infarction", "Sinus rhythm with severe hyperkalemia", "Sinus rhythm with complete right bundle branch block", "Atrial tachycardia with 2:1 block and left bundle branch block", "Sinus rhythm with complete left bundle branch block"], "correct": 4, "explanation": "This ECG shows sinus rhythm at 72 bpm with left bundle branch block (LBBB) with QRS duration 0.16 second, normal AV conduction (PR.0.17 second) and a QT interval at the upper limits of normal (0.42 second.) This patient had a history of hypertension and idiopathic cardiomyopathy with a left ventricular ejection fraction by echocardiography of 35%. She ruled out for a myocardial infarction. Serum potassium was normal. While acute MI cannot be ruled out by ECG alone in this context, the findings of tall right precordial T waves and J point elevations of this magnitude are consistent entirely with left bundle branch block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case286/1350x900.gif", "_type": "mcq", "_caseId": 286}, {"question": "All of the following are present in this ECG from a 13 year old boy EXCEPT?", "options": ["Sinus bradycardia (borderline)", "Intraventricular conduction delay (ICVD)", "ST elevations consistent with early repolarization variant", "T wave inversions V1-V2 consistent with (~juvenile~) physiologic variant", "Physiologic precordial transition zone"], "correct": 1, "explanation": "This ECG shows sinus bradycardia at a rate of 55 bpm. Note that sinus bradycardia at rest is variously defined as 60 bpm or 50 bpm. Stating sinus bradycardia or borderline sinus bradycardia is simply a designation and does not imply causation (normal variant; beta-blocker use; etc). The latter depends on context, degree, response to activity, etc). The waveform morphologies are physiologic for a 13 year old male, with slight ST elevations V1 and V2 due to early repolarization variant (and minimal T wave inversions, consistent with the juvenile T wave pattern). QRS duration is normal at about .07 second and AV conduction is normal at .16 second. The precordial transition zone in lead V3 is physiologic.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case287/1350x900.gif", "_type": "mcq", "_caseId": 287}, {"question": "51 year old woman with a dilated cardiomyopathy and atrial arrhythmias after chemotherapy for breast cancer. What is the rhythm?", "options": ["Atrial fibrillation (AF)", "Atrial tachycardia with block", "Atrial flutter with variable block", "Sinus rhythm with atrial bigeminy", "AV nodal reentrant tachycardia (AVNRT)"], "correct": 2, "explanation": "This ECG shows classic flutter waves. The grouped beating (�bigeminal�) pattern here represents a repetitive variable block mechanism (2:1 and 4:1 conduction). For comparison see also Case #188. The ECG also shows nonspecific findings consistent with her cardiomyopathy (biventricular dilation and a markedly reduced ejection fraction): slow R wave progression V1-V3, borderline low limb lead voltage and diffuse precordial T wave inversions.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case288/1350x900.gif", "_type": "mcq", "_caseId": 288}, {"question": "88 year old woman in the emergency department with complaints of diffuse abdominal pain, intermittent ventricular tachycardia and hypotension. What life threatening problems are present?", "options": ["Sinus tachycardia and findings consistent with pulmonary emboli", "Sinus tachycardia and findings consistent with hyperkalemia", "Sinus tachycardia and findings of  tricyclic overdose", "Sinus tachycardia and findings of Brugada syndrome", "Sinus tachycardia with complete heart block and ST elevations consistent with acute anterior myocardial infarction."], "correct": 4, "explanation": "The ECG shows sinus tachycardia (P wave rate about 100 bpm) with complete heart block (junctional escape rate about 50 bpm) and a massive current injury due to anterior ST elevation myocardial infarction (MI). This monophasic current of injury is sometimes referred to as �tombstone pattern,� less formally, (for comparison, see also Cases #37,273). Q waves are present in both inferior and anterior leads from the current (and/or prior) MI. The patient underwent cardiac catheterization that revealed diffuse LAD disease with distal occlusion treated with a stent and also had intraortic balloon pump and pacemaker placement. She died of intractable cardiogenic shock the same day.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case289/1350x900.gif", "_type": "mcq", "_caseId": 289}, {"question": "What is this wide complex tachycardia in an 88 year old woman?", "options": ["Polymorphic ventricular tachycardia", "Monomorphic ventricular tachycardia with acute STEMI", "Sinus tachycardia with right bundle branch block (RBBB)", "Ventricular pacing", "Sinus tachycardia with left bundle branch block (LBBB)"], "correct": 1, "explanation": "This ECG shows monomorphic ventricular tachycardia at a rate of about 140 bpm with a very wide (QRS duration at least 180 msec) with a right bundle branch block and superior axis deviation morphology; (for comparison, see also Case # 274). Note the broad RS in lead III. The QRS also has a wide notched R wave in V1 and V2. The previous ECG done on this patient the same day showed an extensive anterolateral ST elevation acute myocardial infarction (see Case # 289). There is definite suggestion of superimposed marked ST elevation in V5 and V6, approaching a monophasic current of injury (\"tombstone pattern\") which makes the QRS appear even wider than it is. The presence of monomorphic VT in acute coronary disease strongly suggests an underlying scar.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case290/1350x900.gif", "_type": "mcq", "_caseId": 290}, {"question": "This ECG from a 23 year-old female is most consistent with which ONE of the following diagnoses?", "options": ["Critical mitral stenosis", "Anterior myocardia ischemia", "Normal variant T wave inversions V1-V2", "Hypokalemia", "Left ventricular hypertrophy"], "correct": 2, "explanation": "This ECG shows sinus rhythm at a rate of about 77 bpm. The basic intervals are normal: PR 0.15 second, QRS 0.08 second and QT 0.35 second. T wave inversions limited to leads V1-V2 are a common physiologic variant in this age group, sometimes referred to as a �persistent juvenile T wave pattern.� More extensive anterior T wave inversions in young adults may be see in a variety of settings, including arrhythmogenic right ventricular cardiomyopathy (ARVC); see Lancet 2009; 373:1289. Left atrial abnormality (LAA) is ruled out as the P wave is normal in amplitude and morphology. Severe mitral stenosis is typically associated with LAA (or atrial fibrillation) and signs of right ventricular overload.There is no evidence of prominent U waves or QT/U prolongation with flat T waves to indicate hypokalemia. There is also no evidence of left ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case291/1350x900.gif", "_type": "mcq", "_caseId": 291}, {"question": "Elderly man with �extra beats.\" What is the rhythm?", "options": ["Sinus bradycardia with ventricular bigeminy", "Atrial bigeminy with aberration", "Sinus bradycardia with intermittent Wolff-Parkinson-White (WPW) pre-excitation", "Sinus bradycardia with intermittent ventricular pacing", "Sinus bradycardia with electrical alternans"], "correct": 0, "explanation": "This ECG shows underlying sinus bradycardia at about 57 bpm with ventricular bigeminy. On the rhythm strip the first 3 ventricular premature beats (VPBs) have a full compensatory pause but the 4th VPB is interpolated; this VPB is sandwiched between two normal beats without a compensatory pause. The second sinus beat is conducted by the sinus P waves occurring just after the extrasystole. Nonspecific ST-T changes are noted leads in II, III, aVF and V4-V6.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case292/1350x900.gif", "_type": "mcq", "_caseId": 292}, {"question": "53 year old female seen in emergency department with symptoms of shortness of breath and lightheadedness. Why is the rate so fast?", "options": ["Sinus tachycardia", "Atrial tachycardia", "AV nodal reentry tachycardia (AVNRT)", "Atrial fibrillation (AF)", "Atrial flutter with 2:1 block"], "correct": 4, "explanation": "This ECG shows typical atrial flutter with 2:1 AV block. The atrial rate is ~300 with a ventricular response of ~150 bpm; see also Cases 129, 202 and 275. Sinus tachycardia is ruled out as there are no sinus P waves. Atrial fibrillation is ruled out as the R-R interval is constant and the atrial waves are consistent from one instant to the next. The atrial (flutter) rate at ~ 300 bpm excludes AVNRT. The apparently positive polarity of the flutter waves in lead II raise consideration of the Type I flutter variant associated with a large reentrant wave traveling in a clockwise, rather than the more common, counterclockwise direction in the right atrium. However, the surface ECG may be misleading with respect to the directionality of the flutter waves observed during intracardiac studies.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case293/1350x900.gif", "_type": "mcq", "_caseId": 293}, {"question": "78 year old male. All of the following are present EXCEPT?", "options": ["Underlying sinus rhythm", "Atrial sensing and ventricular  pseudo-fusion or fusion beats", "AV sequential pacing", "Q waves in Leads V1-V3", "Non-specific ST-T wave changes"], "correct": 2, "explanation": "This ECG shows intrinsic sinus P waves at a rate of 65 bpm. The patient has a dual chamber pacemaker with atrial sensing and ventricular pseudo- fusion beats--all the beats except the 3rd (last) beat in the V4-V6 display are pseudo-fusion--note that the morphology of this beat is slightly different and wider. Q waves in V1-V3 are most likely due to underlying anterior myocardial infarction. The patient had a history of sick sinus syndrome and coronary artery disease with prior angioplasty/stenting of the left anterior descending coronary. AV sequential pacing is ruled out as there is a clear sinus �P� wave and no evidence of an atrial spike preceding this.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case294/1350x900.gif", "_type": "mcq", "_caseId": 294}, {"question": "What is the etiology of the wide QRS?", "options": ["Sinus rhythm with complete left bundle branch block", "Accelerated idioventricular rhythm", "A-V sequential pacing", "Atrial sensed and ventricular paced pattern", "Sinus rhythm with Wolff-Parkinson-White pre-excitation"], "correct": 2, "explanation": "This ECG shows both atrial and ventricular pacing. The atrial and ventricular spikes are clearly seen, i.e., in lead II before each P wave there is an atrial spike and before each QRS there is a ventricular spike at a rate of 60 bpm. All of the ventricular beats are of the left bundle branch block pattern (QRS duration of 0.18 second), with a prolonged QT interval of 0.50 second, possibly secondary to amiodarone therapy. (See Case # 158 for comparison.) This patient had a history of atrial fibrillation and ventricular tachycardia for which he was started on amiodarone therapy and subsequentially developed a profound bradycardia for which a dual chamber pacemaker was implanted.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case295/1350x900.gif", "_type": "mcq", "_caseId": 295}, {"question": "63 year-old woman admitted to the Emergency Department with a complaint of chest pain. All of the findings are present EXCEPT?", "options": ["AV Wenckebach", "Borderline low limb and chest lead QRS voltage", "Acute ST elevation, inferior-posterolateral myocardial infarction (MI)", "Sinus rhythm with atrial premature beats", "Sinus tachycardia"], "correct": 3, "explanation": "The rhythm is sinus tachycardia with 3:2 AV Wenckebach (sinus rate about 110 bpm, ventricular rate about 70 bpm) with 3:2 conduction. (See also Cases # 148 and 244 for comparison.) Acute ST elevations and Q waves are present in leads, II, III, and aVF with reciprocal ST depressions in leads I, aVL and VI-V3, consistent with an acute inferior-posterolateral infarction. Cardiac catheterization revealed two vessel disease with a 100% occlusion of the mid-right coronary artery with a left ventricular ejection fraction of 30%. Percutaneous transluminal coronary angioplasty (PCTA) was attempted without success.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case296/1350x900.gif", "_type": "mcq", "_caseId": 296}, {"question": "63 year-old gentleman in Emergency Department with complaint of chest pain. What is the most likely diagnosis?", "options": ["Sinus rhythm with anterior/subendocardial ischemia with prior inferior Q wave MI", "Acute pericarditis", "Aortic dissection", "Tension pneumothorax", "Acute pulmonary embolism"], "correct": 0, "explanation": "This ECG shows sinus rhythm, rate 90 bpm with profound subendocardial ischemia (marked ST segment depressions in leads V2-4 with T wave inversions in leads V3-6) consistent with acute anterior ischemia. Q waves in leads II, III and aVF are consistent with prior inferior myocardial infarction (MI). This patient had a long history of severe vessel coronary artery disease including several angioplasties and previous MIs. Cardiac catheterization revealed a left ventricular ejection fraction of 35% and 3 vessel coronary artery disease. He then underwent successful coronary artery bypass graft surgery.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case297/1350x900.gif", "_type": "mcq", "_caseId": 297}, {"question": "This 54 year old man�s ECG shows all of the following EXCEPT?", "options": ["Prolonged AV conduction (first degree AV block)", "Left atrial abnormality", "Borderline low voltage diffusely", "Slow R wave progression", "Left anterior fascicular block"], "correct": 4, "explanation": "This ECG shows sinus rhythm at about 70 bpm with a markedly prolonged PR interval of 0.40 second (marked 1st degree AV conduction abnormality). Left atrial abnormality and low voltage diffusely are present. Slow R wave progression could be due to lead placement versus chronic obstructive pulmonary disease, anterior myocardial infarction, etc. QRS axis is normal. This patient had a significant history for coronary artery disease with a recent cardiac catheterization showing 80% left anterior descending coronary artery re-stenosis at the site of a prior angioplasty/stent and was also status post aortic valve replacement. His medications included lopressor. The markedly prolonged PR interval here could be related to a number of factors including intrinsic AV node disease (possibly with dual AV nodal pathways and block in the fast pathway), beta blocker therapy and prior aortic valve replacement.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case298/1350x900.gif", "_type": "mcq", "_caseId": 298}, {"question": "24 year old woman with a history of asthma, palpitations and dizziness. The ECG shows which of one of the following findings?", "options": ["Left bundle branch block", "Anteroseptal myocardial infarction", "Wolff-Parkinson-White (WPW) pre-excitation", "Right bundle branch block", "Left posterior fascicular block"], "correct": 2, "explanation": "The ECG shows sinus rhythm with the classic WPW triad of a short PR interval (60 msec), delta waves, and a wide QRS duration (130 msec). The delta waves (slurring or notching) of the initial QRS are positive in leads I, II, III, aVL, aVF, and V3-6. They are negative in aVR and markedly negative in V1-V2. These findings suggest an anteroseptal (versus right sided) bypass tract. The QRS axis more vertical than +30 degrees (+35 degrees in this case) favors an anteroseptal location. Cardiac electrophysiologic (EP) study confirmed a right anteroseptal bypass tract with inducible narrow complex atrio-ventricular reentrant tachycardia (AVRT) using the bypass tract to conduct in a retrograde direction. The bypass tract was successfully ablated using a catheter ablation technique. Anteroseptal bypass tracts of this type are relatively uncommon, occurring in only about 5% of cases of WPW.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case299/1350x900.gif", "_type": "mcq", "_caseId": 299}, {"question": "24 year-old male seen for complaints of palpitations. What is the rhythm?", "options": ["Sinus rhythm with sinus pauses", "Sinus rhythm with atrial premature beats", "Respiratory sinus arrhythmia", "Ectopic atrial rhythm", "Sinus rhythm with AV Wenckebach"], "correct": 2, "explanation": "This ECG shows a physiologic respiratory sinus arrhythmia (RSA). The progressive fluctuations in sinus rates are apparent in the rhythm strip (lead II), going from fast at the beginning to slow and then return back to fast (rates vary from 84 to 60 and back to 84.) The variability is dependent on cyclic changes in vagal tone associated with the phases of respiration. For a more detailed explanation of this important normal variant (see Cases # 217, 245.) Ectopic atrial rhythm is excluded as the P waves are consistent in morphology. There are no prolonged sinus pauses and no evidence of premature atrial beats and AV conduction is normal.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case300/1350x900.gif", "_type": "mcq", "_caseId": 300}, {"question": "This ECG is consistent with which of the following markedly abnormal laboratory findings?", "options": ["Cl- =115 mEq/L", "Digoxin level >3.5 ng/mL", "TSH (thyroid stimulating hormone)  <0.01 uIU/mL (normal range: 0.30-.3.0); free thyroxine level =5.4 ng/dL (normal range: (0.93-1.7)", "Na+ = 125 mEq/L", "K+ = 2.4 mEq/L"], "correct": 4, "explanation": "This ECG shows sinus bradycardia (52 bpm) with T wave flattening and very prominent U waves, best seen in leads V2-V3, most consistent with severe hypokalemia and/or certain types of drug effect/toxicity. The patient had marked hypokalemia. A low TSH with an elevated T4 level would be consistent with severe hyperthyroidism, which is associated with resting sinus tachycardia (or atrial fibrillation). Digoxin toxicity may be associated with sinus bradycardia but the QT interval would be relatively short. Hyponatremia and hyperchloremia are not associated with specific ECG findings. A long QT-U syndrome, hereditary or acquired, as present here, is the key ECG marker of risk for syncope or sudden cardiac death due to torsade(s) de pointes type ventricular tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case301/1350x900.gif", "_type": "mcq", "_caseId": 301}, {"question": "68 year-old non-cyanotic woman awaiting surgery for congenital heart disease. The ECG is most consistent with which one of the following diagnoses?", "options": ["Atrial septal defect (ostium secundum)", "Atrial septal defect (ostium primum)", "Tetralogy of Fallot", "Pulmonic stenosis", "Aortic stenosis (bicuspid valve)"], "correct": 0, "explanation": "The ECG shows sinus rhythm at about 70 bpm with an incomplete right bundle branch block type pattern (rSR&apos;s&apos; morphology in lead V1 and QRS duration =0.11 second). The QRS axis is normal. There is also notching of the R wave in leads III and aVF. ST-T abnormalities are present in leads V1-V4. Atrial septal defects may present in young or middle-age adults (and sometimes even later in life) with symptoms of progressive exercise intolerance, fatigue or dyspnea, and sometimes atrial fibrillation or atrial flutter. Physical examination may be notable for a right ventricular heave with fixed, wide splitting of the second heart sound and a systolic ejection murmur in the pulmonic area (i.e., left parasternal area, around the second intercostal space). A diastolic rumble due to flow across the tricuspid valve may be present in severe cases. The ECG with the secundum (common) type ASDs typically shows a right ventricular conduction delay (as seen here) with a vertical to rightward QRS axis (not present). Notching of the R wave peak in one or more of the inferior leads (~crochetage sign~) is also often present. ST-T abnormalities in the right to mid precordial leads may be related to the RV conduction delay as well as to right ventricular overload. Tall P waves due to right atrial abnormality may be seen (not present here). In older individuals, especially those with systemic hypertension or coronary disease, signs of left or bi-atrial abnormality may be present. This patient had a large secundum type ASD confirmed by echocardiogram and at cardiac catheterization. There was predominant left to right shunting with a pulmonary to systemic flow ratio of about 2. She underwent surgical repair of the large ASD since closure with a percutaneously inserted device was not technically feasible. Ostium primum ASDs are associated with endocardial cushion defects with cleft mitral valves and sometimes ventricular septal defects. The ECG classically shows right ventricular conduction delays with left axis deviation, and sometimes AV conduction abnormalities. Tetralogy of Fallot and pulmonic stenosis are associated with pressure load types of right ventricular hypertrophy; the ECG typically shows a tall R wave in V1 with marked right axis deviation. For an excellent discussion of ASDs in older adults, see the European Association of Clinical Echocardiography Clinical Case Portal-- Case181: http://www.escardio.org/bodies/associations/EAE/CasePortal/cases/Case+181/case181.htm", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case302/1350x900.gif", "_type": "mcq", "_caseId": 302}, {"question": "This ECG from a 64 year old woman is most consistent with which of the following clinical scenarios?", "options": ["Severe mitral stenosis with pulmonary edema", "Pericardial effusion with tamponade", "Atrial septal defect (ostium secundum)", "Congestive heart failure (CHF) due to systemic hypertension and coronary artery disease", "Primary pulmonary hypertension with right heart failure."], "correct": 3, "explanation": "The ECG shows borderline sinus tachycardia at rest with complete left bundle branch block (LBBB). The very prominent voltage and LBBB suggest left ventricular hypertrophy. The notching on the ascending limb of the S wave in lead V4 is an example of Cabrera�s sign, a marker of ventricular scarring usually due to prior infarction in the presence of LBBB. The variations in QRS amplitude are consistent with respiratory-related changes and are not the beat-to-beat pattern seen with pericardial effusion/tamponade. Atrial septal defects (secundum type) are associated with right bundle branch block patterns. Severe mitral stenosis is associated with marked left atrial abnormality (or atrial fibrillation) and right ventricular hypertrophy. Primary pulmonary hypertension typically causes right ventricular hypertrophy with right atrial abnormality.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case303/1350x900.gif", "_type": "mcq", "_caseId": 303}, {"question": "ECG from a 34 year old woman with human immunodeficiency virus (HIV) infection. No cardiac murmur was noted. What is the most likely cause of the right axis deviation?", "options": ["WPW preexcitation", "Left posterior fascicular block", "Posterior myocardial infarction", "Lead reversal (left-right arm)", "Pulmonary hypertension"], "correct": 4, "explanation": "The ECG shows sinus tachycardia with evidence of severe right ventricular hypertrophy (RVH) due to a pressure load. The diagnostic findings include: right axis deviation with a tall R wave in lead V1 (in this case as part of a qR complex), T wave inversions in the right-mid precordial leads, and peaked P waves due to associated right atrial abnormality. Note that with prominent right atrial overload, the P waves in V1 may be peaked and negative, simulating left atrial abnormality. This pattern is probably due to the fact that lead V1 may be relatively superior to the enlarged right atrium. The tall, but not wide P wave in lead II supports this interpretation. The S1Q3T3 pattern morphology here, while nonspecific, may also be seen with RV overload syndromes, acute or chronic. There are two major general classes of abnormalities causing pressure-load related RVH: pulmonary hypertension (with multiple possible etiologies) and pulmonic valve stenosis or other abnormalities of pulmonary outflow obstruction. The patient had severe pulmonary hypertension, which has been reported in association with HIV infection. (For general review of pulmonary hypertension, see, for example, Ann Internal Med 2005; 143:282.) Left/right arm lead reversal causes right axis deviation but with a negative P wave in lead I and does not affect the precordial leads. The normal PR interval and absence of a delta wave preclude a WPW pattern. �True� posterior MI does not cause an initial Q in lead V1 and is almost invariably associated with evidence of lateral and or inferior Q wave MI. (The inferior Q waves here are relatively narrow.) Left posterior fascicular block is a diagnosis of exclusion that can only be made when other causes of marked right axis deviation have been ruled out, including right ventricular overload syndromes, lateral MI, right ventricular conduction abnormalities, hypertrophic cardiomyopathy, etc.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case304/1350x900.gif", "_type": "mcq", "_caseId": 304}, {"question": "This ECG from a 57 year old woman with palpitations and lightheadedness is most consistent with which one of the following diagnoses?", "options": ["Brugada pattern", "Posterior myocardial infarction (MI)", "Wolff-Parkinson-White (WPW) pattern with a postero-septal bypass tract", "Arrhythmogenic right ventricular dysplasia/cardiomyopathy (ARVD/C)", "Mitral valve prolapse with ruptured chordae"], "correct": 3, "explanation": "The ECG shows sinus rhythm with a right ventricular conduction delay and right axis deviation, consistent with a right ventricular overload syndrome. In addition, there are T wave inversions across the precordium and subtle, but consistent low amplitude notching just after the end of the QRS in the right precordial leads. The latter finding is characteristic of an epsilon wave, a highly specific but not sensitive finding with ARVD. For a comprehensive review of the ECG in findings in this important substrate for syncope and sudden cardiac death in young to middle-aged adults, see Circulation 2004; 110:1527. Also see www.ARVD.com for useful information and the beautiful review by Dr. J. Willis Hurst of how ECG waves (including epsilon waves) came to be named (Circulation 1998:98:1937). The Brugada pattern is associated with a pseudo-right bundle branch block pattern with ST elevations in the right precordial leads (not seen here). The relatively tall right precordial R waves here are due to right ventricular conduction delay, and not to posterior infarction (which is usually associated with ECG signs of inferior or lateral Q wave MI). The classic triad of WPW (short PR, wide QRS and delta waves) is not seen here, either. Mitral valve prolapse is associated with non-specific ST-T changes in the infero-lateral leads, and when severe, chronic mitral regurgitation is present, signs of left ventricular hypertrophy may be seen.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case305/1350x900.gif", "_type": "mcq", "_caseId": 305}, {"question": "76 year old man with idiopathic cardiomyopathy and a wide QRS complex. There was no clinical/echocardiographic evidence of right ventricular hypertrophy. There was no clinically significant coronary artery disease by cardiac catheterization. The ECG shows borderline sinus bradycardia with a prolonged PR interval (first degree AV conduction delay) and what other findings?", "options": ["Right bundle branch block (RBBB) with right axis deviation probably due to left posterior fascicular block", "RBBB with left axis deviation probably due to left anterior fascicular block", "Wolff-Parkinson-White (WPW) preexcitation pattern", "Left bundle branch block (LBBB)", "RBBB with lead reversal (left/right arm)"], "correct": 0, "explanation": "The ECG shows borderline sinus bradycardia (59 bpm), a prolonged PR interval (250 msec) and right bundle branch block (RBBB) with marked right axis deviation (RAD). The upright P wave in lead I precludes left arm/right arm lead reversal. There are three major causes of RBBB with RAD in adults: 1) right ventricular overload/hypertrophy syndromes, acute or chronic; 2) lateral MI with RBBB, and 3) RBBB with left posterior fascicular block (a type of �bifascicular block�). The latter is a diagnosis of exclusion, requiring ruling out RV overload or lateral MI, in particular as causes of the RAD. This ECG shows non-diagnostic Q waves in the infero-lateral leads here without clinical evidence of prior MI. This patient was referred for cardiac electrophysiologic study (EPS) because of findings of RBBB with alternating right and left axis deviation on other ECGs, consistent with severe His-Purkinje (infranodal) conduction disease. This finding was confirmed at EPS which revealed a markedly prolonged HV interval (91 msec, increasing to 110 msec after procainamide infusion) with only a minimally prolonged AH interval (123 msec) at a baseline sinus cycle length of 993 msec (about 60 bpm). He underwent dual chamber pacemaker implantation because of the high risk of progression to complete heart block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case306/1350x900.gif", "_type": "mcq", "_caseId": 306}, {"question": "86 year-old man with history of hypertension and coronary artery disease, (status post coronary bypass surgery and angioplasty procedures) with recent exertional fatigue and dyspnea. The serum K+ was normal (note: there is some baseline artifact and a probable premature ventricular complex at the beginning of the recording). What is the rhythm?", "options": ["Sinus bradycardia with prominent U waves", "Sinus rhythm (75/min) with predominant 2:1 AV block and left bundle branch block (LBBB) pattern", "Sinus rhythm (75/min) with complete heart block (CHB)", "Sinus rhythm (75/min) with AV Wenckebach", "Sinus rhythm with blocked atrial premature beats"], "correct": 1, "explanation": "This ECG shows sinus rhythm (about 75/min) with predominant 2:1 AV block (one 3:2 conduction episode is seen on the rhythm strip) and a complete LBBB pattern. (The first beat, as noted, is probably at PVC.) The PR interval of the conducted beats is slightly prolonged (240 msec). Left atrial abnormality is also present (confirmed by echocardiogram), consistent with underlying left ventricular hypertrophy. The finding of 2:1 block with a wide QRS is consistent with, but not diagnostic of infranodal block.(The long PR interval may also relate in part to AV node disease.) The patient was symptomatic (dyspnea, fatigue) and underwent dual chamber pacemaker implantation. Wenckebach periodicity (marked by progressive PR prolongation followed by a nonconducted P wave and then a conducted PR interval shorter than the one immediately before the nonconducted P wave) is not seen. Evidence of left atrial abnormality (LAA) here (broad biphasic P wave in lead V1), along with LBBB, is strongly suggestive of underlying left ventricular hypertrophy (LVH) and consistent with the clinical history of hypertension.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case307/1350x900.gif", "_type": "mcq", "_caseId": 307}, {"question": "47 year old woman with a history of breast cancer and a life-threatening problem. Echocardiogram showed normal ventricular function and no pericardial effusion. This ECG is most consistent with which ONE of the following diagnoses?", "options": ["Hypercalcemia", "Hyperkalemia", "Digitalis toxicity", "Tricyclic antidepressant overdose", "Systemic hypothermia"], "correct": 0, "explanation": "The clinical diagnosis was hypercalcemia (Ca++ 15.8 mg/dL) due to metastatic breast cancer. The ECG shows resting sinus tachycardia with borderline left axis deviation. There is also borderline low limb lead voltage. The key finding is the very short <300-320 msec) QT interval (QT=280 msec) such that the T wave appears to take off dirrectly from the J point with marked abbreviation of the ST segment. This finding correlates with shortening of ventricular action potential [hase 2 duration. Elevation of the J point in leads V1-V2/V3 is sometimes also seen with hypercalcemia, simulating ischemia. The lower limits of the absolute QT and rate-corrected QT (QTc) intervals are not well defined, and relative shortening occurs physiologically at higher sinus rates. The two major pathologic causes of an acquired relatively short QT are hypercalcemia and digitalis glycoside effect. The latter is excluded here by the absence of characteristic \"scooped\" ST depressions. A hereditary form of short QT syndrome has been described recently in families with a history of sudden cardiac death (e.g., Eur Heart J 2006; 27:2382).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case308/1350x900.gif", "_type": "mcq", "_caseId": 308}, {"question": "Elderly woman presents with a slow pulse. The ECG is highly suggestive of which of the following diagnoses?", "options": ["Hyperkalemia", "Hypocalcemia", "Digitalis toxicity", "Tricyclic antidepressant overdose", "Amiodarone toxicity"], "correct": 2, "explanation": "The underlying rhythm is atrial fibrillation with a slow (average rate around 38 bpm) and, at times, regularized ventricular response. The ST-T complexes (�scooping� of the ventricular repolarization waveform) are consistent digitalis effect (not necessarily toxicity). In concert with the rhythm findings, digitalis excess is strongly suggested. The patient�s digoxin level was in fact in the toxic range at 2.2 nanograms/ml. The ECG also shows left ventricular hypertrophy (LVH) due underlying aortic stenosis. The ST-T abnormalities may in part be due to the LVH or to ischemia. Digitalis toxicity in the presence of atrial fibrillation may cause excessive slowing and/or regularization (due to AV junctional mechanisms). Digitalis glycoside toxicity causes a variety of bradyarrhythmias by augmenting cardiac vagal tone at the AV node (as in the case here) or SA node. Cardiac glycoside poisoning can also occur from ingestion of various plants (e.g., foxglove) and animal toxins (e.g., venomous bites from the cane toad (Bufo marinus). Severe digitalis intoxication can also lead to marked hyperkalemia via Na+/K+ pump inhibition. Serum potassium in this case was normal.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case309/1350x900.gif", "_type": "mcq", "_caseId": 309}, {"question": "74 year old man with a history of coronary artery disease and palpitations. What is the cardiac rhythm?", "options": ["Multifocal atrial tachycardia", "Atrial fibrillation", "Atrial flutter", "Sinus rhythm with frequent atrial premature beats", "Parkinsonian tremor artifact with sinus rhythm"], "correct": 1, "explanation": "The rhythm is atrial fibrillation with a moderate to rapid ventricular response (average ventricular rate around 110 bpm). The ECG also shows nonspecific ST-T changes. For an overview of the contemporary management of atrial fibrillation, the most common major cardiac arrhythmia in adults, see 2006 guidelines (and any subsequent updates) from the American College of Cardiology/American Heart Association/European Cardiology Society http://www.acc.org/qualityandscience/clinical/guidelines/atrial_fib/pdfs/AF_Full_Text.pdf", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case310/1350x900.gif", "_type": "mcq", "_caseId": 310}, {"question": "59 year old woman with a history of palpitations. What does the ECG show?", "options": ["Inferior-posterior wall myocardial infarction (MI)", "Left bundle branch block (LBBB)", "Right bundle branch block (RBBB)", "Wolff-Parkinson-White (WPW) preexcitation", "Left-right arm lead reversal"], "correct": 3, "explanation": "The ECG shows the classic triad of WPW preexcitation with a short PR interval, widened QRS and delta waves (slurring of the initial onset of the QRS). The polarity of the delta waves (negative in the inferior leads and positive in leads V1-V3) is consistent with a posterior-septal bypass tract. This WPW pattern simulates an inferior-posterior MI. The patient had a history of palpitations associated with both atrioventricular reentrant tachycardia (AVRT) and atrial fibrillation. At cardiac electrophysiology study (EPS), she was found to have both a posterior septal bypass tract conducting only in an antegrade direction that caused this ECG pattern as well as a concealed left lateral bypass tract (associated with inducible AVRT). Multiple bypass tracts have been reported in 10-30~ of patients with WPW undergoing EPS.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case311/1350x900.gif", "_type": "mcq", "_caseId": 311}, {"question": "62 year old man, taking metoprolol, who complains of intermittent palpitations. The ECG is most consistent with which ONE of the following diagnoses?", "options": ["Atrial flutter with 6:1 AV block", "Atrial flutter with complete heart block and an AV junctional escape rhythm", "Atrial fibrillation with complete heart block", "Atrial tachycardia with complete heart block", "Sinus bradycardia with artifact due to Parkinsonian tremor"], "correct": 4, "explanation": "The ECG shows classic Parkinsonian tremor artifact (about 5 cycles/sec) simulating atrial flutter or coarse atrial fibrillation. True sinus P waves (obscured in the limb leads) are most evident in leads V2-V4 upon careful inspection. Note also: the variable pseudo-flutter (F) to QRS intervals are not consistent with pure 6:1 conduction. Also, the biphasic (negative/positive) �atrial� waves in V1 are not compatible with typical, clockwise atrial flutter which is associated with upright F waves in that lead. The prominence of the baseline artifact in lead II (left leg-right arm) and in lead aVR was consistent with the patient�s overt right hand tremor. The patient�s palpitations were characterized by an intermittent \"skipped beat\" sensation and were attributed to isolated atrial and ventricular beats, which are not present here but were observed at other times. Compare this record with that in Case #84.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case312/1350x900.gif", "_type": "mcq", "_caseId": 312}, {"question": "40 year-old man seen in the emergency ward with complaint of chest pain. The ECG is most consistent with which one of the following diagnoses?", "options": ["Acute ST elevation myocardial infarction (STEMI)", "Acute pericarditis", "Normal variant early repolarization", "Pulmonary embolus (acute right ventricular overload)", "Critical aortic stenosis (severe left ventricular hypertrophy)"], "correct": 2, "explanation": "The ECG shows sinus rhythm with slight J point and ST segment elevations most apparent in the mid-precordial leads consistent with the �early repolarization� variant. There is also very slight notching of the terminal QRS (V4) which is often seen in conjunction with this physiologic pattern. (For a detailed explanation and comparison see Case #130.) Note: A normal ECG does not exclude myocardial ischemia. A detailed history and physical examination suggested non-cardiac pain. Relevant laboratory tests, including cardiac enzymes, were within the normal limits. Diagnoses of gastroesophageal reflux disease (GERD) and musculo-skeletal pain were made.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case313/1350x900.gif", "_type": "mcq", "_caseId": 313}, {"question": "46 year-old man is found unconscious. What is the rhythm?", "options": ["Polymorphic (torsade-type) ventricular tachycardia", "Atrial fibrillation with aberration", "Sinus tachycardia with intermittent runs of monomorphic ventricular tachycardia", "Multifocal atrial tachycardia with aberration", "Sinus tachycardia with intermittent right bundle branch block"], "correct": 0, "explanation": "This ECG shows a relatively regular, wide complex polymorphic ventricular tachycardia, rate 150 bpm, that is most likely a type of torsade(s) de pointes. See leads V4-V6 for classic �turning of the points� morphology. Intermittent ventricular fusion beats may be present. Causes of this life-threatening arrhythmia include a variety of drugs and specific electrolyte abnormalities (especially hypokalemia and hypomagnesemia) associated with long QT (U) intervals, as well as hereditary long QT syndromes due to �channelopathies.� Admission laboratory testing revealed a serum potassium of 2.2 (normal range 3.5-5.3 mEq/L), sodium of 143 (range 135-148 mEq/L), bicarbonate of 16 (normal 21-30mEq/L), phosphate 1.0 (range 2.7-4.5 mg/dL) and magnesium 2.5 (range 1.6-2.6 mg/dL.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case314/1350x900.gif", "_type": "mcq", "_caseId": 314}, {"question": "What is the rhythm?", "options": ["AV sequential pacing", "Sinus rhythm with left atrial abnormality (LAA)", "Atrial pacing (with ventricular sensing and intrinsic QRS complexes)", "Ectopic atrial rhythm", "Sinus rhythm with right atrial abnormality"], "correct": 2, "explanation": "This ECG shows that all the beats are atrial paced at a rate of 90 bpm. There is apparent ventricular sensing (dual-chamber pacemaker) as there are no ventricular pacemaker spikes ruling out AV sequential pacing. The limb lead QRS voltage is relatively low, a non-diagnostic finding.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case315/1350x900.gif", "_type": "mcq", "_caseId": 315}, {"question": "84 year-old female status post cardioversion for atrial fibrillation. The ECG is most consistent with which of the following rhythms?", "options": ["Atrial paced rhythm", "Ectopic atrial rhythm", "Atrial flutter with 4:1 block", "Wandering atrial pacemaker", "Sinus rhythm with 2:1 AV block"], "correct": 1, "explanation": "This ECG shows probable ectopic atrial rhythm at rate about 70 bpm, although sinus rhythm with unusually leftward P wave axis is not excluded. The PR interval is slightly prolonged (0.22 seconds) indicating first degree AV conduction abnormality. Left atrial abnormality (biphasic P in V1 with prominent negative component) is present. The predominantly negative P waves in lead II and biphasic P waves in aVR strongly suggest an ectopic atrial focus following cardioversion in this case.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case316/1350x900.gif", "_type": "mcq", "_caseId": 316}, {"question": "This ECG from an 85 year woman shows all of the following abnormalities EXCEPT which one?", "options": ["Atrial flutter with 4:1 conduction", "Right bundle branch block", "Left axis deviation consistent with left anterior fascicular block", "Left ventricular hypertrophy", "Mobitz II AV block"], "correct": 4, "explanation": "The ECG shows atrial flutter with a 4:1 conduction pattern (the flutter rate is about 240 cycles/min and the ventricular response about 60/min) with right bundle branch block, and left axis deviation consistent with left anterior fascicular block. The R wave of about 15 mm (1.5 mV) in aVL is consistent with underlying left ventricular hypertrophy, as is the sum of the R wave in aVL plus the S wave in V3 (> 20mm in women by Cornell criteria). There are also nonspecific ST-T changes in lead aVL and non-diagnostically slow R wave progression in V1-V4. Mobitz II AV block is not present. The patient had a history of sick sinus syndrome with the brady-tachy variant (atrial fibrillation and flutter) and had previously undergone dual chamber pacemaker implantation (no pacing activity evident here at these atrial/ventricular rates).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case317/1350x900.gif", "_type": "mcq", "_caseId": 317}, {"question": "78 year-old female admitted for shortness of breath. This ECG shows all of the following abnormalities EXCEPT which one?", "options": ["Sinus rhythm", "Left axis deviation", "Premature ventricular complexes (PVCs)", "Right bundle branch block (RBBB)", "Right atrial abnormality"], "correct": 1, "explanation": "This ECG shows sinus rhythm rate about 80 bpm with a right bundle branch block (QRS duration=0.12 second) and tall (2.5mm or more), relatively narrow P waves consistent with right atrial abnormality. There are 2 isolated PVCs seen best on lead II rhythm strip--5th and 11th beats. The QRS axis is vertical, but not frankly rightward. (To estimate the QRS axis with RBBB, you can use the initial 80 msec.) The height of the terminal R wave in V1 is generally not a reliable indicator of right ventricular hypertrophy in adults. The patient�s shortness of breath was secondary to exacerbation of chronic obstructive pulmonary disease associated with pneumonia. The combination of ECG findings here (right atrial abnormality and RBBB with a vertical QRS axis) is consistent with but not non-diagnostic of COPD.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case318/1350x900.gif", "_type": "mcq", "_caseId": 318}, {"question": "30 year-old man admitted with coma. This ECG is most consistent with which of the following abnormalities?", "options": ["Tricyclic antidepressant overdose", "Myxedema", "Systemic hypothermia", "Brugada pattern", "Hypokalemia"], "correct": 2, "explanation": "This ECG shows classic signs of systemic hypothermia with sinus bradycardia (at about 52 beats/min), prominent J (Osborn) waves and QT prolongation (540 msec). The patient had a body temperature of 26.4 degrees C (79.5 degrees F). He also had hyperkalemia (serum K+ 6.9 mEq/L that may account for the prominent T waves superimposed on the hypothermia pattern and probably on an underlying physiologic early repolarization variant in this young adult man. For comparison and further discussion, see Case #285.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case319/1350x900.gif", "_type": "mcq", "_caseId": 319}, {"question": "45 year-old male with complaint of palpitations. What is the ECG diagnosis?", "options": ["Sinus rhythm with acute anterior wall myocardial infarction (MI)", "Sinus rhythm with intermittent accelerated idioventricular rhythm AIVR)", "Sinus rhythm with intermittent right bundle branch block", "Sinus rhythm with intermittent Wolff-Parkinson-White (WPW) pattern", "Sinus rhythm alternating with  ectopic atrial rhythm"], "correct": 3, "explanation": "This ECG is fascinating as the first section shows sinus rhythm with normal QRS complexes and the second part shows the Wolff-Parkinson-White (WPW) preexcitation pattern of conduction. The classic findings of WPW are: short PR interval, a wide QRS and a delta wave. On the rhythm strip (lead II), note how the abrupt onset of the WPW pattern in the 8th beat is associated with slowing of the sinus rate (below about 75 bpm). This effect is likely related to respiratory sinus arrhythmia with an increase in vagal tone during expiration and relative slowing of conduction in the AV node, thus allowing conduction down the bypass tract to occur ahead of physiologic AV conduction intermittently. The polarity of the delta waves is consistent with a posterior bypass tract (other ECGs showed negative delta waves in III and aVF). See Cases # 218 and 284 for a detailed explanation of WPW. Also notable are the T wave inversions in leads II, III and aVF in the normally conducted beats. These repolarization abnormalities in normally conducted beats are attributable to a so-called ~T wave memory~ effect, associated with the intermittent WPW (e.g., J Electrocardiol 1997; 30:323-9). The patient was being evaluated for WPW-related arrhythmias as a cause of his palpitations.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case320/1350x900.gif", "_type": "mcq", "_caseId": 320}, {"question": "70 year-old female with hypertension, atypical chest pain and a history of mitral valve replacement for rheumatic heart disease. This ECG shows all of the following EXCEPT?", "options": ["Sinus rhythm with an atrial and ventricular premature beat", "Left ventricular hypertrophy (LVH)", "Left atrial abnormality", "T wave inversions consistent with LVH and/or ischemia", "Intraventricular conduction delay (IVCD)"], "correct": 4, "explanation": "This ECG shows rhythm at rate of 67 bpm with a subtle atrial premature complex (8th beat on rhythm strip) and 1 isolated ventricular premature complex (11th beat on rhythm strip). T wave inversions in leads I, aVL and V4-V6 may be due to left ventricular hypertrophy (LVH), ischemia, etc. Left atrial abnormality is present. The precordial voltage is prominent and there is a borderline left axis. All these findings are consistent with underlying LVH. QT prolongation is also present without evidence of hypokalemia or apparent drug effect. The QRS duration, however, is normal here (less than 100-110 msec). Widening of the QRS may occur with LVH, leading to an intraventricular conduction delay and sometimes is associated with an actual left bundle branch block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case321/1350x900.gif", "_type": "mcq", "_caseId": 321}, {"question": "This ECG from a 53 year old woman is most consistent with which of the following diagnoses?", "options": ["Right ventricular hypertrophy", "Posterior myocardial infarction and left posterior fascicular block", "Wolff-Parkinson-White (WPW) preexcitation pattern", "Simultaneous limb (left/right arm) and precordial lead reversal: normal ECG", "Dextrocardia with situs inversus"], "correct": 3, "explanation": "This ECG shows an unusual combination of spurious findings since there is both limb lead (left/right arm) and chest lead reversal. The negative P wave in lead I with a negative QRS strongly suggests right/left arm lead reversal. This most common type of limb lead reversal can be visually corrected by reversing the polarity of lead I, relabeling leads II and III, and leads aVR and aVL. The chest leads are also mislabeled here so that V1 is actually V6, V2 is V5 etc. The ECG after �correction� is entirely normal. Note that dextrocardia with situs inversus in the absence of underlying organic heart disease will not usually be associated with a tall R wave in V1 (see Case 19). Also, see Cases 2 and 175 for other examples of lead reversals.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case322/1350x900.gif", "_type": "mcq", "_caseId": 322}, {"question": "60 year old woman with palpitations and rapid pulse at rest. The ECG shows which one of the following arrhythmias?", "options": ["Sinus tachycardia", "Atrial flutter with 2:1 conduction", "Paroxysmal supraventricular tachycardia (PSVT), probably AV nodal reentrant tachycardia (AVNRT)", "Atrial fibrillation", "Multifocal atrial tachycardia (MAT)."], "correct": 2, "explanation": "The ECG shows a very regular narrow complex tachycardia, ventricular rate of 200 bpm. The rate is too fast for resting sinus tachycardia in a patient of this age group. The rhythm is too regular for atrial fibrillation or MAT. The rate is not compatible with atrial flutter with 2:1 conduction since the atrial rate would have to be 400 cycles/min, beyond the atrial depolarization of that rhythm. By exclusion the rhythm is paroxysmal supraventricular tachycardia. No definite P waves are evident and the mechanism is likely AV nodal reentry (with P waves �hidden� in the QRS or perhaps partly visible at the very end of QRS with a superior axis). The ST depressions are non-diagnostic in this context. For a superb tutorial and simulation of AVNRT and other supraventricular tachycardias, see: http://www.blaufuss.org/SVT/index2.html", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case323/1350x900.gif", "_type": "mcq", "_caseId": 323}, {"question": "71 year-old female admitted with shortness of breath. What is the rhythm?", "options": ["Sinus rhythm with left bundle branch block and premature ventricular complexes (PVCs)", "Atrial flutter with demand ventricular pacing and PVCs", "Sinus rhythm with baseline artifact and PVCs", "Atrial fibrillation with demand ventricular pacing and PVCs", "Dual chamber (atrioventricular sequential) pacing with PVCs"], "correct": 3, "explanation": "This ECG shows underlying coarse atrial fibrillation (AF) with (right) ventricular demand pacing at a rate about 78 bpm with a relatively wide QRS complex (left bundle branch block morphology) at about 180 milliseconds. Two PVCs are seen (2nd and 6th beat). There are no sinus P waves or flutter waves and no atrial spikes to indicate dual chamber pacing. In cases of ventricular pacemaking, it is very important to identify the atrial mechanism if possible since atrial fibrillation in this context carries the same adverse prognostic indications with respect to thromboembolic disease and other complication as in other settings.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case324/1350x900.gif", "_type": "mcq", "_caseId": 324}, {"question": "This ECG most consistent with which single drug effect?", "options": ["Digoxin", "Quinidine", "Carvedilol", "Flecainide", "Mexiletine"], "correct": 1, "explanation": "This ECG shows sinus rhythm at about 67 bpm with an intraventricular conduction delay (QRS 0.12 second) and a mildly prolonged QT-(U) interval of (0.46 second) consistent with quinidine effect. A single isolated atrial premature beat and left atrial abnormality are present. The R wave is at the upper limits of normal in amplitude in lead aVL with borderline voltage for left ventricular hypertrophy. Hypokalemia was ruled out. This patient, a 63 year old man, with a history of systemic hypertension, obstructive sleep apnea and paroxysmal atrial fibrillation, had been treated with quinidine gluconate for many years without adverse effect. Echocardiogram showed normal systolic left ventricular function. The patient was also taking diltiazem. Quinidine toxicity associated with prominent QT (U) prolongation can result in torsade de pointes ventricular tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case325/1350x900.gif", "_type": "mcq", "_caseId": 325}, {"question": "Very elderly woman brought to the emergency department by her family for evaluation of a recent fall with complaints of fatigue and weakness. She was noted to have a very slow pulse. What is the rhythm?", "options": ["Sinus rhythm with Mobitz II  AV block", "Sinus rhythm with isorhythmic AV dissociation", "Sinus rhythm with third degree (complete) AV block", "Sinus bradycardia with right bundle branch block (RBBB) and blocked  atrial premature beats in a bigeminal pattern", "Atrial tachycardia with complete heart block"], "correct": 2, "explanation": "This ECG shows sinus rhythm at rate about 90/min (P wave rate) with complete heart block and a wide (QRS 160 milliseconds) complex escape mechanism at rate of about 36 bpm with a right bundle branch block/left axis deviation morphology. There is no relationship between the sinus P waves and the much slower QRS complexes. Prominent biphasic P waves in lead V1 are consistent with left atrial abnormality. Left ventricular hypertrophy (very prominent R in aVL) and slow initial R wave progression are also present, with non-diagnostic T wave inversions. Marked QT interval prolongation (QTc 600 milliseconds) is present. The patient was admitted and a permanent dual-chamber pacemaker was implanted. Patients with complete heart block may have syncope (Stokes-Adams syndrome) from marked bradycardia alone or from transient episodes of torsade de pointes ventricular tachycardia in the setting of long QT syndrome that is sometimes associated with the bradycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case326/1350x900.gif", "_type": "mcq", "_caseId": 326}, {"question": "What abnormality is suggested by the ECG in this 71 year old man?", "options": ["Hyperkalemia", "Digitalis toxicity", "Systemic hypothermia", "Hypercalcemia", "Tricyclic antidepressant overdose"], "correct": 3, "explanation": "This ECG shows sinus rhythm at a rate of about 70 bpm (there is sinus arrhythmia with a short sinus pause at the beginning). Of particular note is the shortened Q-T interval (about 280 msec) and markedly abbreviated ST segment consistent with hypercalcemia. Subtle �doming� of the ST-T complex in leads V1-V3 with slight J point/ST elevations in the right chest leads is also sometimes seen in this setting. The patient�s serum calcium at the time of this ECG was very elevated at 14.8 mg/dL (normal range 8.4-10.2). After extensive evaluation, a diagnosis of primary hyperparathyroidism was made. For a more detailed explanation of this finding see Case # 9.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case327/1350x900.gif", "_type": "mcq", "_caseId": 327}, {"question": "This ECG from a 29 year old cyanotic woman without prior cardiac surgery is most consistent with which one of the following diagnoses?", "options": ["Ostium primum atrial septal defect", "Ventricular septal defect with Eisenmenger syndrome", "Ebstein�s anomaly of the tricuspid valve", "Tetralogy of Fallot", "Pulmonic stenosis"], "correct": 2, "explanation": "This ECG shows borderline sinus tachycardia at a rate of about 100 bpm. Of particular note are the very prominent, tall P waves which are actually of greater amplitude than the QRS complexes in leads V1-V3. The QRS complexes show a right ventricular conduction delay (rSr' in lead V1) with marked right axis deviation. Slow initial R wave progression is present in leads V1-V3. In addition, there are nonspecific ST-T abnormalities. Ebstein�s anomaly is a rare form of congenital heart disease that usually presents in infancy/childhood and more rarely adulthood with cyanosis, heart failure symptoms and supraventricular tachyarrhythmias. Developmental abnormalities result in malformation and malpositioning of the tricuspid valve with apical displacement of the posterior and septal leaflets. This pathoanatomy results in �atrialization� of part of the right ventricle, which is small and sometime hypoplastic. Tricuspid regurgitation contributes to marked right atrial overload. Multiple other congenital cardiac defects are often found in Ebstein�s anomaly including atrial septal defects or patent foramen ovale, pulmonic stenosis, ventricular septal defects, patent ductus arteriosus, tetralogy of Fallot, and congenitally corrected transposition of the great arteries. Two ECG hallmarks of classic Ebstein�s anomaly include giant (�Himalayan�) P waves and a right ventricular conduction delay (the latter often suggesting a �second� QRS following the initial depolarization). A Wolff-Parkinson-White pattern associated with preexcitation of the right ventricle may be present (see http://www.cmaj.ca/cgi/content/full/172/12/1553 for a nice example and see:J Cardiovasc Electrophysiol 2006; 17: 1332�1336 for a comprehensive series). Ostium primum atrial septal defects are typically associated with left axis deviation (often with right ventricular conduction delays). Ventricular septal defect with Eisenmenger syndrome or preoperative tetralogy of Fallot are most likely to be associated with classic signs of right ventricular pressure overload (tall right precordial R waves and marked right axis deviation). Pulmonic stenosis by itself does not produce cyanosis and would also be associated with ECG findings of typical pressure-load right ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case328/1350x900.gif", "_type": "mcq", "_caseId": 328}, {"question": "Elderly man with a long cardiac history including coronary artery disease status post myocardial infarction, hypertension, and implantable cardioverter defibrillator implantation for ventricular tachyarrhythmias. He is admitted for routine generator change with complaint of increased difficulty climbing stairs. What is the underlying rhythm?", "options": ["Sinus rhythm with baseline artifact", "Atrial flutter with 4:1 block", "Atrial fibrillation (AF) with regularized ventricular response", "Multifocal atrial tachycardia (MAT)", "Atrial fibrillation with ventricular pacing"], "correct": 0, "explanation": "This ECG shows sinus rhythm (see lead III for clear sinus P waves) at rate of about 70 bpm. Leads I, II and aVR show classic tremor artifact (about 4 cycles/sec) simulating atrial flutter or coarse atrial fibrillation. There is left axis deviation and possible left anterior fascicular block, as well as underlying anterior Q waves (V1-V3) raising strong consideration of a prior anterior myocardial infarction. The patient has a diagnosis of Parkinson~s disease. Compare this record with Cases # 84 and 312.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case329/1350x900.gif", "_type": "mcq", "_caseId": 329}, {"question": "69 year old woman with admitted to an intensive care unit. This ECG is most consistent with which ONE of the following life-threatening scenarios?", "options": ["Pulmonary edema secondary to rheumatic mitral stenosis", "Acute cor pulmonale due to  pulmonary thrombolembolism", "Acute inferior wall myocardial infarction", "Renal failure and hypertensive crisis", "Chronic cor pulmonale due to emphysema exacerbation"], "correct": 1, "explanation": "This ECG shows resting sinus tachycardia at a rate of about 120 bpm, a non-specific but very important finding. The combination of: prominent sinus tachycardia at rest with an S1Q3 pattern, peaked P waves and a subtle right ventricular conduction delay (rSr's' in V1 with an S wave in V6, along with normal QRS duration, raises strong consideration of a right heart overload syndrome due to acute cor pulmonale. Here the specific cause was pulmonary emboli. Note that even with life-threatening pulmonary emboli, the ECG may be relatively non-specific. For further discussion, see Cases 69 and 146. Severe mitral stenosis is consistently associated with either marked left atrial abnormality or atrial fibrillation/flutter. The isolated Q wave in lead 3, without prominent ST deviations, does not support acute inferior infarction. Renal failure with systemic hypertension is generally associated with ECG evidence of left ventricular hypertrophy (and sometimes hyperkalemia). Severe emphysema is classically associated with low voltage QRS complexes and slow precordial R wave progression.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case330/1350x900.gif", "_type": "mcq", "_caseId": 330}, {"question": "60 year-old man presented to the emergency department with complaint of epigastric pain associated with nausea and then developed severe left arm aching. What is the diagnosis?", "options": ["Acute pericarditis", "Acute anteroseptal wall  ST elevation myocardial infarction (STEMI)", "Wolff-Parkinson-White (WPW) preexcitation pattern", "Acute inferior and apical/lateral wall STEMI", "Acute right ventricular STEMI"], "correct": 3, "explanation": "This ECG shows sinus bradycardia, rate about 55 bpm with acute-appearing ST elevations in the inferior (II, III, aVF) and apical/lateral (V5-V6) leads. ST depressions consistent with reciprocal changes are seen in leads I, aVL and V1-V2. The patient has a history of coronary artery disease (CAD), and was status post angioplasty years ago. He was taken to the catheterization laboratory and underwent successful emergency percutaneous transluminal angioplasty (PTCA) of two high-grade ~culprit~ lesions in the proximal and middle portions of the right coronary artery (RCA), respectively, followed by placement of two stents at these sites. ST elevation is not apparent in V1-V2 in this ECG. A second ECG done at the about the same time with right-sided chest leads did not show evidence of right ventricular MI. No evidence of pre-excitation is present. Acute inferior STEMI is usually due to occlusion of the RCA, and less commonly to occlusion of the left circumflex (LCx) artery. The finding of ST elevations in lead III exceeding those in lead II strongly supports an RCA lesion, as does the absence of ST elevations in lead I. (For further information on localizing the site of occlusion with inferior MIs, see: Chest 2002; 122:134 and N Engl J Med 2003; 348:933 along with subsequent literature.) Also note that in more subtle cases, additional chest leads around back of chest in V7-V9 positions may be useful (J Am Coll Cardiol 1998; 31:506).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case331/1350x900.gif", "_type": "mcq", "_caseId": 331}, {"question": "79 year-old female seen in the emergency department for acute shortness of breath. What is the rhythm?", "options": ["Sinus rhythm with frequent atrial premature beats (APBs)", "Multifocal atrial tachycardia (MAT)", "Atrial fibrillation", "Sinus rhythm with runs of non-sustained atrial tachycardia", "Atrial flutter with variable block"], "correct": 2, "explanation": "This ECG shows atrial fibrillation with a moderate to rapid ventricular response rate, averaging about 110 bpm. Non-specific ST-T changes are present. The highly erratic (�irregularly irregular�) rate with an oscillatory baseline is typical of atrial fibrillation. The absence of discrete P waves rules out two other major causes of irregular supraventricular rhythms: sinus rhythm with frequent APBs and MAT. Further, atrial flutter waves are not seen. See also Cases #215, 266 and 310. Serial cardiac enzymes were not elevated and the patient, who had a history of coronary disease and hypertension, ruled out for non-Q-wave myocardial infarction. The V/Q scan showed multiple perfusion defects consistent with pulmonary emboli. Atrial fibrillation is sometimes seen in association with pulmonary emboli, usually in patients with underlying heart disease, as in the present case. In some of these cases, pulmonary emboli may play a role in initiating atrial fibrillation via neuroautonomic factors, right atrial hypertension and dilation, ischemia/hypoxemia, or other mechanisms. Conversely, atrial fibrillation, as a risk factor for right atrial thrombus formation (see e.g., Eur Heart J 2005; 26:1108), may be an overlooked risk factor for pulmonary embolism. Note: the most common ECG finding with pulmonary embolism is resting sinus tachycardia. Signs of right heart overload (peaked P waves, right QRS axis shifts with or without an S1Q3T3 pattern, T wave inversions V1-V4, right ventricular conduction delays, and delayed precordial transition zone with left precordial S waves) are not sensitive or specific findings with pulmonary emboli. See also Cases #32 and 146.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case332/1350x900.gif", "_type": "mcq", "_caseId": 332}, {"question": "53 year-old female seen in the emergency for chest pain and shortness of breath. What is the most likely diagnosis?", "options": ["Severe mitral stenosis", "Acute anterior wall myocardial infarction", "Acute pulmonary embolus", "Myxedema", "Chronic obstructive pulmonary disease (COPD)"], "correct": 4, "explanation": "This ECG shows resting sinus tachycardia at about 113 bpm with low voltage diffusely, and slightly peaked P waves (lead II) raising consideration of right atrial overload. R wave progression is delayed and non-specific ST-T wave changes are present. This constellation of findings is consistent with chronic obstructive pulmonary disease (COPD) confirmed by clinical assessment and pulmonary function studies in this case. She ruled out for acute myocardial infarction. Low voltage may also occur with severe hypothyroidism (myxedema), but is typically associated with sinus bradycardia. For comparison, see Cases 32, 125 and 283.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case333/1350x900.gif", "_type": "mcq", "_caseId": 333}, {"question": "54 year-old man admitted with a complaint of palpitations. What is the rhythm?", "options": ["Atrial flutter with variable AV block and aberrated supraventricular beats", "Sinus tachycardia with AV Wenckebach wwith isolated ventricular premature beats (VBPs)", "Atrial tachycardia with variable AV block and VPBs", "Sinus tachycardia with Mobitz II AV heart block and VPBs", "Multifocal atrial tachycardia (MAT) and VPBs"], "correct": 2, "explanation": "This ECG shows a (unifocal) atrial tachycardia (atrial rate about 160 bpm) with variable AV block (ventricular rates about 40-80). On the rhythm strip (lead II) there are 2 isolated ventricular premature beats (VPBs). Criteria for left (or bi-) atrial abnormality are suggested by the ectopic P waves and left ventricular hypertrophy is present. There is borderline left axis deviation The patient had a history of supraventricular tachyarrhythmias and was status post mitral valve replacement for rheumatic mitral valve disease. Prior drug therapy was not successful in controlling the tachyarrhythmia. He underwent successful radiofrequency ablation of this atrial focus. The atrial rate here (about 160 bpm) is generally much too rapid for persistent sinus tachycardia in a resting adult, excluding B and D. (Furthermore, neuroautonomic factors that promote sinus tachycardia�high sympathetic and low vagal tone�make Type I AV block less likely when sinus tachycardia is present., further excluding B.) Atrial flutter waves are not present and the ectopic P waves are all uniform, so that MAT is not present. Atrial tachycardia with AV block can be due to a variety of causes, singly or in combination, including intrinsic atrial disease, digoxin excess (not present here), drugs (excessive adrenergic stimulation), cardiac surgery, valvular disease, among other factors. The locus of AV block in cases of atrial tachycardia is usually the AV node (\"Type I\"). See also Case # 23 for comparison.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case334/1350x900.gif", "_type": "mcq", "_caseId": 334}, {"question": "47 year old woman with a history of breast cancer and a life-threatening problem. Echocardiogram showed normal ventricular function and no pericardial effusion. This ECG is most consistent with which one of the following diagnoses?", "options": ["Acute subarachnoid bleed", "Acute pulmonary embolism", "Acute anterior myocardial infarction (MI)", "Acute pancreatitis", "Hypercalcemia"], "correct": 3, "explanation": "The ECG shows a number of salient findings including: sinus tachycardia, long QT/QTc (.34 sec/.46), low limb lead and lateral QRS voltages, along with non-diagnostic slow R wave progression V1-V3 and non-specific ST-T changes. The only diagnosis listed above that accounts for the major findings is acute pancreatitis. The long QT (ST segment component is stretched out) is due to hypocalcemia (Ca++ 7.2 mg/dL with serum albumin of 2.7 g/dL). Sinus tachycardia is due to neuroautonomic activation in this context and the low voltage is consistent with ascites/anasarca There is no evidence of acute MI by ECG and the echocardiogram was unremarkable. The literature and clinical lore suggest that both acute pancreatitis and acute cholecystitis can directly produce ECG changes exactly simulating acute MI. However, I remain skeptical of this �association� which is rare at best with two very common conditions. Finding of ST elevation in pancreatitis or cholecystitis should not be routinely attributed to the underlying abdominal pathologies and acute ischemia and related syndromes should be carefully excluded (especially: acute MI, Prinzmetal�s angina, takotsubo cardiomyopathy, ischemia due to hypotension & hypovolemic shock, etc). At the same time, systemic anticoagulation of patients with acute abdominal emergencies that occasionally are associated with ECG changes mistaken for acute STEMI can be catastrophic.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case335/1350x900.gif", "_type": "mcq", "_caseId": 335}, {"question": "86 year-old woman with increased dyspnea on exertion. What is the most likely rhythm? (Clue: look for atrial activity in lead V1.)", "options": ["Multifocal atrial tachycardia with right bundle branch block (RBBB)", "Sinus tachycardia with RBBB", "Atrial flutter with 2:1 conduction and RBBB", "Monomorphic ventricular tachycardia", "Atrial flutter with Wolff-Parkinson-White pattern of conduction"], "correct": 2, "explanation": "This ECG shows subtle atrial flutter with 2:1 block, right bundle branch block and right axis deviation. The atrial rate is about 260 bpm (see upright flutter waves in lead V1) with a ventricular response rate of about 130 bpm. The right axis deviation here, in the absence of clinical evidence of right ventricular hypertrophy or lateral infarction, likely represents left posterior fascicular block. The patient had persistent atrial flutter with variable block or atrial fibrillation at other times.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case336/1350x900.gif", "_type": "mcq", "_caseId": 336}, {"question": "A 43 year-old man is found unresponsive. What is the most likely diagnosis?", "options": ["Hyponatremia", "Brugada pattern", "Tricyclic antidepressant overdose", "Systemic hypothermia", "Myxedema"], "correct": 3, "explanation": "The rhythm is sinus bradycardia at a rate of about 46 bpm with prominent �J� (Osborn) waves in leads V4-V6 and marked QT prolongation (620 msec). The baseline noise in this context is consistent with shiver-related artifact. This combination of findings is virtually pathognomonic of systemic hypothermia. (The precordial voltage is borderline prominent without definite evidence of left ventricular hypertrophy.) This patient was a homeless man with no known medical history who was found unresponsive with a body temperature of 74.6 degrees F during an extremely cold spell. Laboratory findings revealed a low serum potassium level of 3.2 (normal range 3.5-5.0 mEq/L) that may have contributed to the repolarization prolongation, low serum calcium of 7.3 (normal range 8.4-10.2 mg/dL) proportional to the low serum albumin of 2.7 g/dL, and low normal serum magnesium 1.7 (range 1.6-2.6 mg/dL). A transthoracic echocardiogram showed a normal left ventricular ejection fraction of 60 % and symmetric, diastolic left ventricular wall thickness (septum and posterior wall) at the upper limits of normal (11 mm). See also Cases 285 and 319 for comparison and further discussion. The term Osborn waves was adopted in honor of Dr. John .J. Osborn who systematically studied these hypothermia-related waves in a canine model in a classic 1953 article. For a nice write-up on this pioneering physician-scientist (Am J Physiol 1953; 175:389). The earliest published recognition of the J wave in systemic hypothermia is credited to W. Tomaszewski (Arch Mal Coeur 1938:31:525).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case337/1350x900.gif", "_type": "mcq", "_caseId": 337}, {"question": "78 year-old woman one day following successful emergency cardiac surgery to repair a proximal (Type A) dissecting thoracic aortic aneurysm. What is the rhythm?", "options": ["Sinus with complete (third degree) AV heart block", "Sinus with atrial ectopy", "Sinus with AV dissociation (and accelerated junctional rhythm)", "Sinus with SA exit block", "Sinus with intermittent pre-excitation"], "correct": 2, "explanation": "This ECG shows sinus rhythm (about 80 bpm) with AV dissociation and an independent accelerated junctional rhythm at rate of about 90 bpm. On the rhythm strip (lead II) note the sinus P waves ~marching right through~ in and out of the QRS, supporting the presence of two independent pacemakers, along with intermittent sinus ~capture~ beats (e.g., 10th beat). Generalized low voltage and non-specific ST-T wave changes are also present. This type of AV dissociation, characterized by desynchonization of the sinus and AV junctional pacemakers, is a minor arrhythmia that needs to be distinguished from complete AV heart block, major conduction disturbance that usually requires electronic pacemaker therapy. Unfortunately, the terminology used by cardiologists is confusing since the term ~AV dissociation~ is used in two ways: First, the term is used generically to describe any rhythm where there is independence or relative independence of intrinsic pacemakers controlling the atria and ventricles. This definition includes complete heart block, isorhythmic AV dissociation and other related forms such as that noted here, and also cases of ventricular tachycardia where the atria are paced by the sinus node and there may be capture and fusion beats. Second, the term AV dissociation, is used specifically to refer to the type of mechanism present here, where the intrinsic sinus node and AV junction pacemakers transiently get ~out of synch~ due to either sinus slowing and/or to acceleration of the AV junctional escape mechanism, and not to actual AV conduction block. Complete (third-degree AV block) is essentially excluded by the finding of a QRS rate that is over 50-60 bpm and more definitively by intermittent ventricular capture when the sinus P wave is timed during a period during which the AV node/junction area is not refractory. Also, usually with complete heart block, the QRS rate is not only very slow, but slower than the atrial rate. With the AV dissociation mechanism seen here, the ventricular (QRS) rate is actually as fast as or faster than the atrial (sinus P wave) rate.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case338/1350x900.gif", "_type": "mcq", "_caseId": 338}, {"question": "19 year-old man seen in the emergency department with complaint of palpitations. What is the rhythm?", "options": ["Sinus arrhythmia", "Atrial fibrillation", "Atrial tachycardia with block", "Wandering atrial pacemaker", "Multifocal atrial tachycardia"], "correct": 0, "explanation": "This ECG shows baseline artifact with borderline sinus tachycardia and physiologic sinus arrhythmia at rates ranging from about 80 to 100 bpm without ectopy. A consistent single sinus P wave can be seen which is upright in lead II. A combinati
