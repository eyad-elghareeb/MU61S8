 "correct": 0, "explanation": "Hypokalemia. K+ here was 2.2mEq/L. Very severe hypokalemia can cause ST depressions and T-wave inversions as seen here, mimicking ischemia. But also note large U wave (positive deflection after ST-T and before P).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case116/1350x900.gif", "_type": "identify", "_caseId": 116}, {"question": "67-year-old man with previous ECG showing acute myocardial infarction (MI) with normal QRS duration. What is the most likely diagnosis for the rhythm? Serum potassium was normal.", "options": ["Sinus rhythm with bifascicular block", "Complete heart block (CHB) with underlying sinus rhythm", "Accelerated idioventricular rhythm (AIVR)", "Ventricular tachycardia (VT)", "Junctional rhythm with typical right bundle branch block (RBBB)"], "correct": 2, "explanation": "c) This tracing is most consistent with AIVR originating from the left ventricle and, therefore, accounts for the atypical RBBB morphology. ST elevations in the precordial leads are likely due to the injury current from an underlying acute myocardial infarction (MI). AIVR may be marker of reperfusion following acute MI. The rate of about 83 per minute is too slow for ventricular tachycardia and too fast for complete heart block (with rare exceptions).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case117/1350x900.gif", "_type": "mcq", "_caseId": 117}, {"question": "26-year-old man prior to enrolling in anti-convulsive medication trial. What is your summary interpretation (choose ONE)?", "options": ["Left ventricular hypertrophy", "Brugada pattern", "Right axis deviation", "Sinus rhythm; within normal limits", "Incomplete left bundle branch block"], "correct": 3, "explanation": "The ECG is within normal limits. Sinus rhythm is present at a rate of about 66/min with normal QRS axis (about +75 degrees) and intervals. Precordial (chest lead) voltage may appear somewhat prominent but is well within normal range, especially in young adults, without left atrial abnormality or ST-T changes of left ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case118/1350x900.gif", "_type": "mcq", "_caseId": 118}, {"question": "What is the rhythm?", "options": ["Normal sinus rhythm with artifact in V4-V6, simulating premature ventricular complexes (PVCs). Note that simultaneous lead II (bottom) does not show t..."], "correct": 0, "explanation": "Normal sinus rhythm with artifact in V4-V6, simulating premature ventricular complexes (PVCs). Note that simultaneous lead II (bottom) does not show this, and normal rhythm is not affected by the spurious \"beats.\"", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case119/1350x900.gif", "_type": "identify", "_caseId": 119}, {"question": "47-year-old man with chest pain, history of hypertension, and high cholesterol. Right-sided chest leads (V1R-V6R) are shown. What did coronary angiography show?", "options": ["This is a classic inferior/posterior/right ventricular myocardial infarction (MI) pattern. Note the Q waves and ST elevations/hyperacute T waves in th..."], "correct": 0, "explanation": "This is a classic inferior/posterior/right ventricular myocardial infarction (MI) pattern. Note the Q waves and ST elevations/hyperacute T waves in the inferior leads. A tall R wave is also noted in V1R (equivalent to V2), consistent with posterior involvement. Reciprocal ST depressions are present in I, aVL, V1R, and V2R. Right ventricular ischemia/MI is indicated here by ST elevations in V4R-V6R. A totally occluded right coronary artery was found at catheterization. Right ventricular end-diastolic pressure (RVEDP) was elevated at 22 mg Hg. He underwent successful rheolytic thrombectomy and stenting of the right coronary artery (RCA). Echocardiogram the next day showed right ventricle (RV) dilation and dysfunction with inferior/septal hypokinesis. Note: \"right-sided\" chest V3R-V6R leads, as the name implies, mirror the usual (\"left-sided\") montage. In addition, lead V1R is equivalent to V2; V2R to V1, as mentioned above. Right-sided chest leads are most commonly used in adults, as seen here, to increase the sensitivity of diagnosing right ventricular ischemia/MI in the context of acute inferior ST elevation MI. They are also used in neonatal ECGs, with certain types of congenital or acquired cardiopulmonary diseases and cardiac malpositions (e.g., dextrocardia with situs inversus totalis).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case120/1350x900.gif", "_type": "identify", "_caseId": 120}, {"question": "Why is this young individual with cocaine-use disorder in the emergency department ?", "options": ["He is having an evolving anteroseptal myocardial infarction attributable to cocaine use. There are Q waves in V2-V3 with ST segment elevation in V2-V5..."], "correct": 0, "explanation": "He is having an evolving anteroseptal myocardial infarction attributable to cocaine use. There are Q waves in V2-V3 with ST segment elevation in V2-V5 associated with T-wave inversion. Also noted are biphasic T-waves in the inferior leads. These multiple abnormalities suggest occlusion of a large left anterior descending (LAD) artery that wraps around the apex of the heart (or of multivessel coronary artery disease).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case121/1350x900.gif", "_type": "identify", "_caseId": 121}, {"question": "What is the non-cardiac diagnosis in this 20-year-old with dyspnea?", "options": ["Left pneumothorax causing low lateral precordial lead voltage. Acute dyspnea with decreased lateral QRS voltage and vertical or rightward axis shift i..."], "correct": 0, "explanation": "Left pneumothorax causing low lateral precordial lead voltage. Acute dyspnea with decreased lateral QRS voltage and vertical or rightward axis shift is highly suggestive of this diagnosis. Anterior and inferior ST segment elevation is likely secondary to normal variant early repolarization pattern.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case122/1350x900.gif", "_type": "identify", "_caseId": 122}, {"question": "Can you find your sense of direction with this wide complex tachycardia?", "options": ["This is relatively slow bi-directional ventricular tachycardia (VT). Note the sinus P waves (sinus tachycardia) at a rate of about 110 beats/min (most..."], "correct": 0, "explanation": "This is relatively slow bi-directional ventricular tachycardia (VT). Note the sinus P waves (sinus tachycardia) at a rate of about 110 beats/min (most visible in the lead II rhythm strip toward end of recording) with apparent atrioventricular (AV) dissociation and a wide complex tachycardia at about 100 beats/min. The QRS complex alternates between two morphologies. This arrhythmia should always raise suspicion of digitalis toxicity (not present in this patient with a recent myocardial infarct).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case123/1350x900.gif", "_type": "identify", "_caseId": 123}, {"question": "74-year-old woman is admitted to you with \"left bundle branch block.\" What more can you say?", "options": ["The rhythm is sinus with borderline PR prolongation. There is evidence of acute/evolving anterior ischemia/myocardial infarction (MI) superimposed on ..."], "correct": 0, "explanation": "The rhythm is sinus with borderline PR prolongation. There is evidence of acute/evolving anterior ischemia/myocardial infarction (MI) superimposed on the left bundle branch block-like (LBBB) pattern. Note the primary T wave inversions in V2-V4, rather than the expected discordant (upright) T waves in leads with negative QRS. Although this finding is not particularly sensitive for ischemia/MI with LBBB, such primary T wave changes are relatively specific. The prominent voltage with left atrial abnormality and leftward axis in concert with the left ventricular intraventricular conduction delay (IVCD) are consistent with underlying left ventricular hypertrophy. This ECG is an example of \"bundle branch block plus.\"", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case124/1350x900.gif", "_type": "identify", "_caseId": 124}, {"question": "73-year-old woman presenting with dyspnea. What is the most likely diagnosis?", "options": ["Pericardial tamponade", "Myxedema", "Chronic obstructive pulmonary disease", "Digitalis toxicity", "Acute anterior myocardial infarction  with right bundle branch block"], "correct": 2, "explanation": "c) Findings here are highly suggestive of moderately severe Chronic obstructive pulmonary disease (COPD), including 1) relatively low voltage; 2) incomplete right bundle branch block (rsr' in V1 - V3); 3) borderline peaked P waves (possible right atrial overload); 4) poor initial R wave progression; and 5) atrial premature beats.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case125/1350x900.gif", "_type": "mcq", "_caseId": 125}, {"question": "89-year-old woman with tachycardia. What is the rhythm? (CLUE:Be careful!)", "options": ["Atrial fibrillation", "Multifocal atrial tachycardia", "PSVT due to AV nodal reentrant tachycardia (AVNRT)", "PSVT due to atrioventricular reentrant tachycardia (AVRT)", "Sinus tachycardia with atrial ectopy"], "correct": 0, "explanation": "Atrial fibrillation with a very rapid ventricular response (average 160-170/min). Other Findings: Low limb voltage, minor RV conduction delay with rSr in V1; (or possibly Qr morphology) in lead V1 and non-specific ST-T changes (on digoxin) are also present. If so you said PSVT, go back and take another look. The rate here is subtly irregularly irregular (best seen when magnified at 200x or higher)--since rate is fast, small differences in RR intervals translate into prominent beat-beat variations (e.g., a change between R waves from 8 to 9 of the small (40 ms width) boxes would be 187 to 166/min change. Transient atrial flutter could also cause regularization of a rapid rate with atrial fibrillation. But the maximum atrial rate with atrial flutter is usually about 350/min. PSVT (esp with AVNRT) is usually metronomically regular.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case126/1350x900.gif", "_type": "mcq", "_caseId": 126}, {"question": "89-year-old man with a history of severe congestive heart failure. What is the rhythm? What is the possible significance of rsR' in V6?", "options": ["Coarse atrial fibrillation (not flutter) is present with a slow ventricular response. There is an atypical left bundle branch block (LBBB) pattern. Th..."], "correct": 0, "explanation": "Coarse atrial fibrillation (not flutter) is present with a slow ventricular response. There is an atypical left bundle branch block (LBBB) pattern. The rsR' in lateral leads (e.g., V6 here) is highly suggestive of severe left ventricular (LV )dysfunction, often associated with a ventricular aneurysm (El-Sherif sign). A QR or rsR' complex is also present in I and aVL. Left axis deviation and a long QT are noted, as well. The patient had heart failure due to prior silent infarction.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case127/1350x900.gif", "_type": "identify", "_caseId": 127}, {"question": "What is the ECG diagnosis in this 48-year-old man?", "options": ["Early repolarization variant (normal variant)", "Acute pericarditis", "Acute anterior wall ST elevation (STEMI)", "Hyperkalemia", "Systemic hypothermia with Osborn waves"], "correct": 2, "explanation": "c) Acute anterior wall ST elevation MI (STEMI). Note the marked ST elevations and hyperacute T waves in the anterior/lateral leads, including V2-V5, I and aVL. Slight reciprocal ST sagging/depression is present in lead III. There is decreased R wave progression in lead V2, consistent with an acute myocardial infarction (MI) as well. The patient had sustained an occlusion of the proximal left anterior descending coronary artery. For guidelines on the management of STEMI: see: AHA website.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case128/1350x900.gif", "_type": "mcq", "_caseId": 128}, {"question": "What is the rhythm in this very elderly man? What are the other major abnormalities? (Note: leads were properly placed.)", "options": ["Atrial flutter (NOT sinus tachycardia!) with 2:1 AV conduction is present. Note the very subtle flutter waves at an atrial rate of about 260/min in le..."], "correct": 0, "explanation": "Atrial flutter (NOT sinus tachycardia!) with 2:1 AV conduction is present. Note the very subtle flutter waves at an atrial rate of about 260/min in lead aVL, lead II, etc. There is also right bundle branch block (RBBB) with borderline left axis deviation (LAD), consistent with possible bifascicular block. Probable left ventricular hypertrophy (LVH) is present (R = 11 mm in aVL, despite relatively low voltage in other leads). The patient had severe calcific aortic stenosis accounting for these findings. The very low amplitude QRS voltage in lead II indicates that the mean QRS vector in the frontal plane is orthogonal to lead II, directed toward lead I. Furthermore, this finding implies that the overall projection of the vector loop in the frontal lane is very narrow and symmetric around the positive pole of the -30 degree axis line.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case129/1350x900.gif", "_type": "identify", "_caseId": 129}, {"question": "This ECG from a 21-year-old male is most consistent with which ONE of the following diagnoses?", "options": ["Apical hypertrophic cardiomyopathy", "Normal variant early repolarization", "Acute pericarditis", "Acute myocardial infarction", "Bicuspid aortic valve with severe aortic stenosis"], "correct": 1, "explanation": "b) Normal variant early repolarization is correct! The ECG shows normal variant ST segment elevations, commonly referred to as the benign early repolarization pattern. The ST elevations retain their normal upward concavity and are most apparent in leads V3 and V4. Minimal ST elevations are apparent in the limb leads without reciprocal ST depressions (except for lead aVR). Slight notching of the terminal QRS (V4) is often seen in conjunction with this pattern. Precordial QRS voltages are somewhat prominent, but within normal limits for a young adult man. There is also no evidence of left atrial abnormality (LAA) or ST depressions/T wave inversions to go along with left ventricular hypertrophy (LVH). Note the subtle heart rate variability here consistent with physiologic respiratory sinus arrhythmia (RSA). The heart rate is faster at the beginning of the record (consistent with the inspiratory phase of breathing) and then slows during presumed expiration. This particular type of sinus arrhythmia is modulated by changes in vagal tone and is a marker of intact components of neuroautonomic function. Apical hypertrophic cardiomyopathy is typically associated with ECG evidence of LVH with prominent T wave inversions in the precordial leads. (For an example, see ECG Wave-Maven Case #14.) Acute pericarditis and early repolarization variant may be difficult to distinguish since both can cause ST elevations. However, with pericarditis, the ST elevations are typically apparent both in limb leads (especially leads I and II) and in multiple precordial leads (e.g. V2-V6). ST elevations in the precordial with pericarditis leads are also typically more apparent in V5-V6 than they are in early repolarization where ST elevations usually are maximum in V3-V4. Also, pericarditis is often associated with characteristic deviation of the PR segment (upward in aVR, downward in other leads). Pericarditis with effusion may cause low voltage. (For comparison with an example of acute pericarditis, see ECG Wave-Maven Case #3.) The distribution and morphology of the ST elevation here and the absence of reciprocal changes is strongly against ischemia or infarction. (For comparison with a case of acute MI, see ECG Wave-Maven Case #66.) The absence of evidence of severe LVH (no ST depression/T wave inversions in leads with prominent R waves) and the absence of LAA essentially exclude critical aortic stenosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case130/1350x900.gif", "_type": "mcq", "_caseId": 130}, {"question": "62-year-old woman with cardiogenic shock. What are the major ECG findings to account for this syndrome?", "options": ["Atrial fibrillation (AF) with a slow-moderate ventricular response. Suggestion of \"group beating\" also raises the question of underlying junctional rh..."], "correct": 0, "explanation": "Atrial fibrillation (AF) with a slow-moderate ventricular response. Suggestion of \"group beating\" also raises the question of underlying junctional rhythm with AV exit block (Wenckebach mechanism). Acute inferior myocardial infarction (MI) pattern is present. The ST depressions in I and aVL are consistent with reciprocal change. However, marked ST depressions in V1 - V5 are more prominent and extensive than with anticipated reciprocal changes from an inferior/posterior MI, and suggest additional anterior/lateral subendocardial ischemia. The patient, in fact, had severe multivessel coronary artery disease (CAD), s/p coronary artery bypass graft (CABG) surgery, with an occluded left main coronary. There was acute occlusion by thrombus of saphenous vein graft (SVG) to the posterior descending coronary artery. Other SVGs were occluded. A left internal mammary graft to the left anterior descending (LAD) was patent.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case131/1350x900.gif", "_type": "identify", "_caseId": 131}, {"question": "63-year-old man with history of syncope. What is the rhythm?", "options": ["Marked junctional bradycardia (about 25 beats/min). The rate is regular, without P waves and a flat baseline between narrow QRS complexes. The patient..."], "correct": 0, "explanation": "Marked junctional bradycardia (about 25 beats/min). The rate is regular, without P waves and a flat baseline between narrow QRS complexes. The patient has a history of coronary artery disease with non-diagnostic inferior Q waves noted here. The potassium was slightly elevated at 5.5 mEq/L, and the patient was on atenolol, with possible underlying sick sinus syndrome to account for this rhythm disturbance. (The combination of low voltage and bradyarrhythmia should also raise the possibility of hypothyroidism.) Symptomatic bradycardia of this type persisting after medication adjustments and normalization of serum potassium is an indication for a permanent pacemaker.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case132/1350x900.gif", "_type": "identify", "_caseId": 132}, {"question": "The following ECG is most consistent with which clinical scenario? 50-year-old woman with....", "options": ["Aortic and mitral regurgitation", "Severe mitral stenosis", "Severe chronic bronchitis", "Small ventricular septal defect", "Bifascicular block (left anterior fascicular block and right bundle branch block)"], "correct": 2, "explanation": "c) ECG shows classic signs of right atrial/right ventricular overload: 1) peaked P waves; 2) QR in V1 with a narrow QRS (not a true right bundle branch block); 3) delayed precordial transition zone, with terminal S waves in V5/V6; 4) superior axis deviation with an S1S2S3 pattern. (Note that the P wave, while predominantly negative in V1, is not broad, so this finding is not evidence of left or biatrial abnormality in this context.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case133/1350x900.gif", "_type": "mcq", "_caseId": 133}, {"question": "77-year old woman with rheumatoid arthritis, chest pain, and dyspnea. What is the most likely diagnosis?", "options": ["Acute antero-lateral myocardial infarction", "Early repolarization variant", "Acute pericarditis with effusion", "Systemic hypothermia with Osborn waves", "Hyperkalemia"], "correct": 2, "explanation": "c) There are diffuse ST elevations (I, II, aVL, aVF, V2-V6) with associated PR segment deviations (elevated PR in aVR; depressed in V4-V6). Borderline low voltage and sinus tachycardia raise question of pericardial effusion, rule out cardiac tamponade. On echocardiogram, a small to moderate effusion was present without hemodynamic compromise. (Note: Left atrial abnormality is also present -- the patient had underlying aortic stenosis and mitral regurgitation.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case134/1350x900.gif", "_type": "mcq", "_caseId": 134}, {"question": "What is the ECG diagnosis?", "options": ["Wolff-Parkinson-White pattern, postero-septal bypass tract", "Pure posterior  myocardial infarction", "Biventricular hypertrophy", "Duchenne muscular dystrophy pattern", "Wolff-Parkinson-White pattern, left lateral bypass tract"], "correct": 0, "explanation": "a) ECG shows sinus rhythm with the classic Wolff-Parkinson-White (WPW) triad of a short PR; wide QRS; and delta waves. The bypass tract was postero-septal, consistent with the positive delta waves V2-V5, I and aVL; and negative delta wave in III. Left posterior free wall bypass tracts have a similar pattern, but usually with prominent positive delta waves in all the precordial leads, including V1, as well as negative delta waves in the inferior leads. Left lateral bypass tracts usually produce positive delta waves inferiorly and in all the precordial leads, with negative delta waves in I and aVL.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case135/1350x900.gif", "_type": "mcq", "_caseId": 135}, {"question": "What is the mechanism of the bradycardia in this 61-year-old man.", "options": ["Sinus  bradycardia with left bundle branch block (LBBB)", "Sinus rhythm with 2:1 AV block and LBBB", "Sinus rhythm with complete (third degree) AV heart block", "Atrial tachycardia with block", "Idioventricular escape rhythm"], "correct": 1, "explanation": "Sinus rhythm is present at about 72/min with 2:1 AV block and complete left bundle branch block (LBBB). Prominent left atrial abnormality (LAA) is also noted. The patient had a history of prior silent inferior myocardial infarction (MI), hypertension, and mitral regurgitation (the latter two factors accounting for the prominent LAA). He underwent dual chamber pacemaker implantation for his new 2:1 second-degree AV block, with marked bradycardia. The location of the AV block was likely infranodal, given the presence of the left bundle branch block (LBBB). The PR of the conducted beats is only slightly prolonged (220ms), and therefore not, by itelf, indicative of the location of the AV block (nodal vs. infranodal); see Case #5.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case136/1350x900.gif", "_type": "mcq", "_caseId": 136}, {"question": "What combination of conduction disturbances is present?", "options": ["Right bundle branch block and left posterior fascicular block", "RIght bundle branch block and left anterior fascicular block", "SInus rhythm with 2:1  AV block", "Left bundle branch block with bifascicular involvement", "Alternating left and right bundle branch block"], "correct": 1, "explanation": "The ECG shows sinus rhythm with complete right bundle branch block (RBBB) with left anterior fascicular block (LAFB). The former causes the classic RSR-prime; morphology in V1; the latter causes the left axis deviation. Note: the subtle variation in P wave morphology here is due to baseline artifact and not to wandering atrial pacemaker. (Possible left atrial abnormality is present--see V1 on magnified view.) Also note that the calculation of the frontal plane QRS axis with RBBB is most rigorously based on the first 80-100 ms of the widest QRS. The minuscule r waves in III and aVF are not diagnostic, but raise consideration of a prior inferior MI, in concert with the bifascicular block. An echocardiogram to assess ventricular size and function might be useful if indicated.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case137/1350x900.gif", "_type": "mcq", "_caseId": 137}, {"question": "64-year-old-man with a dual chamber pacemaker (right atrial and right ventricular). Can you diagnose the likely underlying cause of his severe chronic heart failure? This ECG was not significantly changed from recent previous ones over a few months.", "options": ["Ischemic heart disease, s/p prior myocardial infarctions MI(s), with very severe left ventricular (LV) dysfunction with an LV ejection fraction (LVEF)..."], "correct": 0, "explanation": "Ischemic heart disease, s/p prior myocardial infarctions MI(s), with very severe left ventricular (LV) dysfunction with an LV ejection fraction (LVEF) about 20%. There is intermittent AV sequential pacing with subtle pacing spikes. The first 4 beats are atrial paced, ventricular sensed (i.e., native QRS complexes). Importantly, these QRS complexes do not show a typical left bundle branch (LBBB) pattern. Instead, the native QRS complexes in the lateral leads (I, aVL) show prominent Q waves with QR-type complexes. In addition, there are QR waves with persistent ST elevations in V5 and V6 in the paced/fused beats. These findings also raise the possibility of underlying anterior MI with a ventricular aneurysm-type pattern, although their specificity in right ventricular paced beats may be limited. Note the gradual change in QRS appearance in the lead II rhythm strip. The QRS appears to get wider, most consistent with the onset of ventricular pacing with progressive ventricular fusion type beats. the 10th beat and beyond appear to be fully AV paced. A longer rhythm strip and a respiratory signal would be needed to see if this variation in pacing correlated with respiratory-related changes in autonomic modulation (either physiologic or due to Cheyne-Stokes cycling).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case138/1350x900.gif", "_type": "identify", "_caseId": 138}, {"question": "52-year-old man with one acute and one \"chronic\" finding. Leads V1-V6 are actually leads V1R through V6R (right chest leads). What&apos;s going on?", "options": ["Acute inferior/posterior/lateral myocardial infarction (MI) in a man with situs inversus-type dextrocardia. The limb leads look like they have been re..."], "correct": 0, "explanation": "Acute inferior/posterior/lateral myocardial infarction (MI) in a man with situs inversus-type dextrocardia. The limb leads look like they have been reversed, but they actually have not. The right-sided chest leads show normal R wave progression because of the dextrocardia. Note ST elevations II, III, aVF (lead III is actually lead II, and vice versa), and right-sided leads V5 and V6. ST depressions in right-sided V1-V3 are likely reciprocal to postero-lateral ST elevations. Finally, to obtain a \"corrected\" ECG, leads aVL and aVR should be reversed, and lead I polarity also reversed (so it then reveals a positive P, R wave, and ST depressions), and II and II reversed as noted. The PR is slightly prolonged at about 210 ms.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case139/1350x900.gif", "_type": "identify", "_caseId": 139}, {"question": "This 10-second rhythm shows at least three, and probably four, different rhythms! Can you find them?", "options": ["1) Paroxysmal atrial flutter with variable block (beginning and end). 2) Sinus rhythm (one beat after the initial spontaneous conversion of atrial flu..."], "correct": 0, "explanation": "1) Paroxysmal atrial flutter with variable block (beginning and end). 2) Sinus rhythm (one beat after the initial spontaneous conversion of atrial flutter). 3) Paroxysmal atrial fibrillation (between third and fourth beats after V1-V3 lead change marker). 4) Probably one or two premature atrial complexes -- between events 2) and 3).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case140/1350x900.gif", "_type": "identify", "_caseId": 140}, {"question": "Tall R waves in V1-V2 in a 48-year-old man. These were due to....", "options": ["Normal", "Hypertrophic cardiomyopathy", "Right ventricular hypertrophy", "Posterior  myocardial infarction", "Duchenne muscular dystrophy"], "correct": 3, "explanation": "d) Patient had documented prior inferior-posterior myocardial infarction (MI). Note wide (.04 sec) Q waves in the inferior leads, seen in conjunction with the broad R wave in V1, which is a Q wave equivalent. Absence of right axis deviation and the presence of upright T waves in V1-V2 are also against right ventricular hypertrophy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case141/1350x900.gif", "_type": "mcq", "_caseId": 141}, {"question": "What is the rhythm? Why are the QRS complexes wide?", "options": ["Dual chamber pacemaker with AV sequential pacing. There are also occasional atrial premature complexes with atrial sensing and ventricular pacing."], "correct": 0, "explanation": "Dual chamber pacemaker with AV sequential pacing. There are also occasional atrial premature complexes with atrial sensing and ventricular pacing.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case142/1350x900.gif", "_type": "identify", "_caseId": 142}, {"question": "Wide complex tachycardia in a 77-year-old man with coronary artery disease. What is the rhythm?", "options": ["Wolff-Parkinson-White  pre-excitation with antidromic conduction during atrio-ventricular reentrant tachycardia (AVRT)", "Sinus tachycardia with right bundle branch block aberrancy", "Ventricular tachycardia with underlying sinus tachycardia and AV dissociation", "AV nodal reentrant tachycardia with right bundle branch  block aberrancy", "Atrial flutter with 2:1 AV conduction and right bundle branch block aberrancy"], "correct": 2, "explanation": "c) There is a wide complex tachycardia at about 165/min with an right bundle branch block (RBBB) morphology. Underlying sinus tachycardia at about 136/min and AV dissociation are noted, confirming the diagnosis of ventricular tachycardia (VT). (Note the clear sinus P waves, e.g., just after 5th QRS.) The QRS morphology and axis are consistent with origin of the VT from the posterior septum. The patient had had a prior large inferior-posterior myocardial infarction (MI). (Of additional note here is the relatively low limb lead voltage and sinus tachycardia). There was a small-moderate pericardial effusion remaining after recent pericardiocentesis for tamponade.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case143/1350x900.gif", "_type": "mcq", "_caseId": 143}, {"question": "What is the underlying rhythm here and what else is going on? Clue: Take the fifth, beat, that is.", "options": ["Atrial fibrillation with a moderate ventricular response plus a single ventricular pacemaker escape spike (fifth beat, which occurs after about a 1 se..."], "correct": 0, "explanation": "Atrial fibrillation with a moderate ventricular response plus a single ventricular pacemaker escape spike (fifth beat, which occurs after about a 1 sec pause). The fifth beat is a so-called pseudo-fusion beat. With pseudo-fusion beats, the pacemaker spike falls within the native QRS, so the QRS morphology is not a true hybrid, as it is with actual pacemaker fusion beats.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case144/1350x900.gif", "_type": "identify", "_caseId": 144}, {"question": "What is the rhythm in this 66-year-old woman?", "options": ["Atrial fibrillation with a rapid ventricular response (about 150/min). Non-specific ST-T changes are also noted."], "correct": 0, "explanation": "Atrial fibrillation with a rapid ventricular response (about 150/min). Non-specific ST-T changes are also noted.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case145/1350x900.gif", "_type": "identify", "_caseId": 145}, {"question": "42-year-old woman with recent \"charlie horse\" in left leg, dyspnea, and syncope. What is the leading diagnosis?", "options": ["Acute cor pulmonale secondary to pulmonary embolism (PE). This diagnosis is strongly suggested by the combination of sinus tachycardia, S1 Q3 T3 patte..."], "correct": 0, "explanation": "Acute cor pulmonale secondary to pulmonary embolism (PE). This diagnosis is strongly suggested by the combination of sinus tachycardia, S1 Q3 T3 pattern (S wave in lead I with QR waves in III and aVF, along with T wave inversions), incomplete right bundle branch block, and right precordial T wave inversions. The patient had bilateral pulmonary emboli secondary to deep venous thrombosis (DVT).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case146/1350x900.gif", "_type": "identify", "_caseId": 146}, {"question": "45-year-old man s/p aortic valve replacement. What post-operative conduction abnormalities (atrioventricular and intraventricular) are present?", "options": ["1) Sinus rhythm with a markedly prolonged AV conduction (\"first degree AV conduction delay [\"block\"])and AV Wenckebach (Type I second degree AV block)..."], "correct": 0, "explanation": "1) Sinus rhythm with a markedly prolonged AV conduction (\"first degree AV conduction delay [\"block\"])and AV Wenckebach (Type I second degree AV block). A 5:4 Wenckebach sequence is present in the middle of the recording. The AV Wenckebach sequences are \"atypical\" in that the RR intervals do not progressively shorten. (That is because the PR intervals do not always prolong by a smaller increment.) However, such atypical sequences are actually quite common. ~~~~2) Complete right bundle branch block. (Left atrial abnormality also noted, along with non-specific repolarization abnormalities.)~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case147/1350x900.gif", "_type": "identify", "_caseId": 147}, {"question": "What AV conduction disturbance is present? What acute event is occurring that might account for this conduction disturbance?", "options": ["Sinus rhythm is present (P wave rate 94/min) with AV Wenckebach (3:2 and 4:3 AV ) conduction. This conduction problem is present in the context of an ..."], "correct": 0, "explanation": "Sinus rhythm is present (P wave rate 94/min) with AV Wenckebach (3:2 and 4:3 AV ) conduction. This conduction problem is present in the context of an acute/evolving postero-lateral myocardial infarction (MI). Note very subtle ST elevations in I, relative to the TP baseline, in concert with \"coved\" T waves in I and aVL and V5, V6. ST depressions in V1-V2 are consistent with reciprocal changes (to the postero-lateral ST elevations). The somewhat prominent right precordial R waves are likely related to loss of QRS forces in the postero-lateral part of the heart. Low limb lead QRS voltage makes these diagnoses more difficult. The patient had coronary disease, as well as a metastatic lung tumor mass, compressing his obtuse marginal coronary arteries to account for the acute postero-lateral MI. Note that sometimes reciprocal ST depressions are more prominent that primary ST elevations (Goldberger AL, Erickson R. Pacing Clin. Subtle ECG sign of acute infarction: prominent reciprocal ST depression with minimal primary ST elevation. Pacing Clin Electrophysiol 1981; 4: 709-12.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case148/1350x900.gif", "_type": "identify", "_caseId": 148}, {"question": "What is this rhythm?", "options": ["Atrial flutter with variable block", "Atrial fibrillation", "Wandering atrial pacemaker (WAP)", "Atrio-ventricular reentrant tachycardia (AVRT)", "Multifocal atrial tachycardia (MAT)"], "correct": 4, "explanation": "e) Three or more consecutive ectopic (non-sinus) P waves are present at a rapid rate. The patient had an exacerbation of severe chronic obstructive pulmonary disease (COPD), a common substrate in patients with multifocal atrial tachycardia (MAT). In contrast, wandering atrial pacemaker (WAP) is a slower rhythm, usually with more gradual change in P waves. (Note that some of the ectopic P waves are non-conducted.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case149/1350x900.gif", "_type": "mcq", "_caseId": 149}, {"question": "What is your diagnosis for this \"irregular\" rhythm with an underlying periodicity? What other abnormalities are noted?", "options": ["Sinus rhythm with frequent premature atrial complexes (atrial trigeminy)", "Sinus rhythm with 4:3 AV Wenckebach (Mobitz I) block", "Sinus rhythm with Mobitz II AV block", "Sinus rhythm with junctional extrasystoles", "Sinus rhythm with sino-atrial exit block"], "correct": 0, "explanation": "Sinus rhythm is present with very frequent premature atrial complexes (PACs), creating a trigeminal pattern. Left atrial abnormality (LAA) and a prolonged PR interval at about 240 ms (first degree AV \"block\") are also noted, as well as slow R wave progression in V1-V3, a non-diagnostic finding. The precordial QRS voltage is prominent although strict criteria for left ventricular hypertrophy (LVH) are not met. Keep in mind, however, that the sensitivities of most of the ECG criteria for LVH are relatively low. The premature P waves appear as subtle \"bumps\" on the T waves, with non-compensatory pauses. This PAC induced \"group beating\" pattern may simulate second degree AV blocks, but with the latter the sinus P waves come \"on time.\" Frequent PACs, especially with left atrial abnormality, may be a forerunner of atrial fibrillation (AF) or clue to paroxysmal AF.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case150/1350x900.gif", "_type": "mcq", "_caseId": 150}, {"question": "What would the patient's cardiac exam most likely show?", "options": ["Wide physiologic splitting of S2", "Wide fixed splitting of S2", "Paradoxical splitting of S2", "A loud opening snap", "Wide splitting of S1"], "correct": 2, "explanation": "c) The ECG shows left bundle branch block (LBBB), a common cause of paradoxical splitting of S2 (i.e., splitting during expiration, becoming single during inspiration, the opposite of normal). Right ventricular pacing is another common cause of this subtle finding, since it is associated with delayed left ventricular (LV) activation. Other less common causes include aortic overflow obstruction (when A2 is preserved), Wolff-Parkinson-White (WPW) syndrome with right ventricular pre-excitation, and patent ductus arteriosus.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case151/1350x900.gif", "_type": "mcq", "_caseId": 151}, {"question": "Extra Credit: 74-year-old woman with syncope with multiple major findings, one immediately life-threatening.", "options": ["Complex ECG showing: 1) Underlying atrial fibrillation; 2) Long Q-T(U); 3) Ventricular pacing with intermittent sensing failure; and 4) Run of torsade..."], "correct": 0, "explanation": "Complex ECG showing: 1) Underlying atrial fibrillation; 2) Long Q-T(U); 3) Ventricular pacing with intermittent sensing failure; and 4) Run of torsade de pointes-type of polymorphic ventricular tachycardia (second half of record).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case152/1350x900.gif", "_type": "identify", "_caseId": 152}, {"question": "This ECG was obtained in a 71-year-old woman, who had just undergone which of the following emergency operations?", "options": ["Coronary bypass grafting  following recent posterior myocardial infarction", "Mitral valve replacement for mitral stenosis", "Pericardial window for tamponade", "Pulmonary artery thrombectomy for massive pulmonary embolism with right ventricular failure", "Aortic valve replacement for critical aortic stenosis"], "correct": 3, "explanation": "d) ECG shows a constellation of findings consistent with acute cor pulmonale from massive pulmonary embolus (PE) including: sinus tachycardia; qR in V1; rightward to indeterminate axis; S1, S2, S3 pattern; incomplete right bundle branch block (RBBB); ST depressions consistent with diffuse subendocardial ischemia; and right atrial overload (P pulmonale). Low voltage is a non-specific post-operative finding here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case153/1350x900.gif", "_type": "mcq", "_caseId": 153}, {"question": "This ECG from a 74-year-old woman shows which of the following?", "options": ["Sinus rhythm with right bundle branch block", "Wolff-Parkinson-White  pattern", "Atrial flutter with 4:1 block and right bundle branch block", "AV nodal reentrant tachycardia and right bundle branch block", "Atrial fibrillation and right bundle branch block"], "correct": 2, "explanation": "c) Flutter waves are well-seen in V1 and lead III (at a rate of about 280/min, with a ventricular response at about 70/min). A classic right bundle branch block (RBBB ) pattern is also present. The patient has rheumatic mitral valve disease, moderate pulmonary hypertension, and tricuspid regurgitation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case154/1350x900.gif", "_type": "mcq", "_caseId": 154}, {"question": "This ECG from a 68-year-old woman is diagnostic of which ONE of the following?:", "options": ["Chronic obstructive pulmonary disease", "Anterior wall myocardial infarction, probably recent", "Normal variant early repolarization", "Acute pericarditis", "Uncomplicated left anterior fascicular block"], "correct": 1, "explanation": "b) Note loss of R waves V1 - V4, with ST elevations in V2 - V5/V6 (as well as slightly in I and aVL) with underlying sinus rhythm. Marked left axis deviation is present with a normal QRS duration consistent with left anterior fascicular block (LAFB). (However, by itself, LAFB does NOT account for the loss of R wave progression.) The patient had had a very recent ST elevation/Q wave anterior myocardial infarction (MI). Cardiac catheterization revealed 3-vessel disease with a 90~ mid-LAD \"culprit\" lesion that was treated successfully with angioplasty/stenting.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case155/1350x900.gif", "_type": "mcq", "_caseId": 155}, {"question": "Middle-aged man with lightheadedness several weeks after aortic valve replacement. Name the rhythm/conduction disturbance(s).", "options": ["Sinus rhythm with 2:1 block and right bundle branch block", "Sinus rhythm with complete heart block and idioventricular escape rhythm with right bundle branch morphology", "Sinus rhythm with 3:2 AV Wenckebach and right bundle branch block", "Sinus bradycardia with blocked atrial premature complexes and right bundle branch block", "Atrial tachycardia with block and right bundle branch block"], "correct": 0, "explanation": "a) Electrophysiology study revealed both slow AV nodal conduction (note long PR of conducted beats) and infra-nodal block with His-Purkinje disease (note right bundle branch block (RBBB). A dual-chamber pacemaker was implanted. Bacterial endocarditis was ruled out. In addition to the sinus rhythm with 2:1 AV block and RBBB, this ECG is notable for left ventricular hypertrophy (LVH) (lead aVL), left atrial abnormality (LAA), and borderline left axis deviation. There are also marked T-wave inversions in the anterolateral leads with QT prolongation, which was not due to myocardial infarction (MI)/coronary disease here. Prominent T-wave inversions like these have been reported after episodes of profound bradycardia and syncope, and may have a neural basis, in part.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case156/1350x900.gif", "_type": "mcq", "_caseId": 156}, {"question": "69-year-old male with coronary artery disease and a history of prior myocardial infarction. What is the rhythm accounting for his irregular pulse noted after \"coronary artery bypass graft\" surgery?", "options": ["Sinus rhythm with 3:2 AV Wenckebach", "Sinus rhythm with AV junctional bigeminy", "Wandering atrial pacemaker", "Sinus rhythm with frequent premature atrial complexes, including transient atrial bigeminy", "Atrial tachycardia with  AV Wenckebach block"], "correct": 3, "explanation": "d) Note the longer PR in the atrial premature complexes. There is also evidence of underlying anterior and inferior Q-wave myocardial infarctions (MIs). Left atrial abnormality (LAA) is noted in the sinus beats. Frequent atrial ectopy, especially in the post \"coronary artery bypass graft (CABG) surgery\" setting, may be a forerunner of atrial fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case157/1350x900.gif", "_type": "mcq", "_caseId": 157}, {"question": "What is going on in this wide-QRS-complex ECG?", "options": ["Dual-chamber pacemaker with AV sequential pacing", "Sinus rhythm with left bundle branch block", "Accelerated idioventricular rhythm", "Sinus rhythm with anterior wall  myocardial infarction and left bundle branch block", "Dual-chamber pacemaker with sinus rhythm (atrial sensing) and ventricular pacing"], "correct": 0, "explanation": "a) Both atrial and ventricular pacemaker spikes are seen, for example, in lead II, before each P wave and QRS, respectively. The patient has a dual chamber rate responsive (DDDR) pacemaker.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case158/1350x900.gif", "_type": "mcq", "_caseId": 158}, {"question": "This ECG is most likely to be associated with what arrhythmia?", "options": ["Monomorphic ventricular tachycardia  associated with myocardial infarction", "Ventricular fibrillation associated with transmural ischemia", "Torsade de pointes-type polymorphic ventricular tachcyardia  associated with long QT(U)", "Paroxysmal atrial fibrillation", "Ventricular fibrillation due to digitalis toxicity"], "correct": 2, "explanation": "c) The patient had been resuscitated from a cardiac arrest, and this post-arrest ECG revealed marked QT(U) prolongation. The long QT was multifactorial here, associated with tricyclic use, anorexia nervosa, and probable hypokalemia. There are T-U waves best seen in V3 and V4. Echocardiogram showed normal ventricular function and size, despite prominent voltage in this thin adult female.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case159/1350x900.gif", "_type": "mcq", "_caseId": 159}, {"question": "(Note: The chest leads in this tracing are right precordial--V1R to V6R!) The following ECG shows all of the following EXCEPT:", "options": ["Sinus bradycardia with first degree AV block", "Sinus rhythm with 2:1 AV block causing bradycardia", "Acute inferior myocardial infarction", "Acute ST elevation right ventricular ischemia/myocardial infarction", "Reciprocal ST depressions in leads I and aVL"], "correct": 0, "explanation": "a) The rhythm here is actually sinus at a rate of 94/min with 2:1 AV block and very (!) subtle non-conducted P waves hiding on the T waves. The ventricular (effectve pulse rate, thus, is 1/2 the sinus rate or 47 bpm. Look carefully in V1R and V2R, for instance. Of note, is also the acute inferior/RV infarct pattern which accounts for the 2:1 block, which almost certainly located in the AV node (Type 1 mechanism). AV conduction disturbances are not unusual in the setting of acute inferior right ventricular infarction. The ST depression in lead V1R (V2) suggests posterior involvement with reciprocal change in this anterior chest lead. In addition there are reciprocal ST depressions in I and aVL with primary ST elevations in II, III and aVF. The ST elevations in leads V4R to V6R indicate concomitant right ventricular ischemia/infarction. Note that the ST-segment elevation in lead III is greater than in lead II, which in concert with the signs of acute right ventricular ischemia, suggests that the occlusion is in the right coronary artery rather than a left dominant circumflex vessel.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case160/1350x900.gif", "_type": "mcq", "_caseId": 160}, {"question": "ECG from a young adult with a major bradycardia. The findings are most consistent with which scenario?", "options": ["Severe chest pain", "Sick sinus syndrome", "Cape Cod camper", "Tricyclic overdose", "\"Athlete&apos;s heart\" and physiologic increase in vagal tone"], "correct": 2, "explanation": "c) The patient had documented Lyme carditis. Sinus rhythm is present with advanced AV block and probable paroxysmal complete heart block with transient ventricular asystole. Several non-conducted P waves are seen at the beginning of the recording, after an initial partially (and artifactually) truncated P wave that is likely dissociated from the initial QRS, too. The sinus P waves after the asystolic pause (rate about 90/min; some nearly completely \"hidden\" in the QRS, toward end of recording) are dissociated from the slower, junctional (narrow complex) escape beats, rate about 50/min. Prior and subsequent recordings would be needed to better ascertain the initiation and duration of this case of advanced AV heart block due to Lyme carditis. Strongly against a vagal mechanism is that the sinus rate is relatively fast. (see: Yeung C, Baranchuk A. Diagnosis and treatment of Lyme carditis: JACC Review Topic of the Week. JACC. 2019;73: 717-726. https://doi.org/10.1016/j.jacc.2018.11.035.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case161/1350x900.gif", "_type": "mcq", "_caseId": 161}, {"question": "This ECG shows evidence consistent with all of the following, except:", "options": ["Left ventricular hypertrophy", "Left anterior fascicular block", "Hyperkalemia", "Right bundle branch block", "Possible prior anteroseptal myocardial infarction"], "correct": 3, "explanation": "Peaked (\"tented\") T waves are seen in concert with left ventricular hypertrophy (LVH), left anterior fascicular block, and very slow R-wave progression V1-V3, the latter finding raising the possibility of prior anteroseptal myocardial infarction (MI). The combination of ECG signs of hyperkalemia and LVH is strongly suggestive of underlying renal insufficiency (with hypertension to account for the LVH). The K+ here was 6.8 meq/L.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case162/1350x900.gif", "_type": "mcq", "_caseId": 162}, {"question": "The following ECG shows which rhythm?", "options": ["Sinus rhythm with intermittent Wolff-Parkinson-White  pre-excitation", "Sinus rhythm with ventricular bigeminy", "Sinus rhythm with junctional bigeminy", "Sinus rhythm with classiical ventricular parasystole", "Sinus rhythm with aberrant atrial premature complexes"], "correct": 1, "explanation": "The underlying rhythm is sinus at a rate of about 60/min with fixed coupled premature ventricular complexes (PVCs) in a bigeminal pattern (i.e., every other beat is a PVC). Note that the onset of each PVC comes just after a (non-conducted) sinus P wave, giving the appearance of a very short PR in some of the leads. The negative deflection at the end of the PVCs in lead II are actually part of the QRS and not retrograde P waves. To verify this contention, measure the longest QRS duration of the PVC complexes (e.g., in lead V1) and superimpose that duration on the PVC in lead II. This widest duration subtends the last deflection of the PVC that simulates a P wave, but is actually part of the QRS. The sinus beats show probable left atrial abnormality; in addition, the sinus conducted QRS complexes show borderline left axis deviation and a minor right ventricular (RV) conduction delay. As additional notes, RBBB deflections, as shown here, (supraventricular or ventricular) may generate S waves that simulate narrow P waves. Another point of distinction is based on the fact that retrograde P waves are usually septal in origin and, therefore, equally negative in leads II and III and near-isoelectric in I. Here, the\"P\" waves are positive in III and negative in I, which gives them extreme left-to-right direction typical for terminal part of the RBBB vector loop. Finally, based on their very sharp initial deflections and rightward axis, the PVCs themselves likely originate from or close to the left anterior fascicle.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case163/1350x900.gif", "_type": "mcq", "_caseId": 163}, {"question": "This ECG is most consistent with which diagnosis?", "options": ["Acute anterior myocardial infarction", "Accelerated idioventricular rhythm", "Marked hyperkalemia", "Marked hypercalcemia", "Systemic hypothermia"], "correct": 2, "explanation": "c) The K+ was 10.5 mEq/L in a patient with renal failure. Note the wide QRS complexes with no evident P waves. CK was normal and ST elevations were likely due to hyperkalemia. (Note: The apparent spike after the second QRS complex is an artifact.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case164/1350x900.gif", "_type": "mcq", "_caseId": 164}, {"question": "84-year-old woman with a history of high-grade heart block has a [single-lead] ventricular pacemaker, and complains of lightheadedness. This representative ECG shows which of the following?", "options": ["Normal ventricular pacemaker function with ventricular-paced  beats and a ventricular pseudo-fusion beat", "Intermittent ventricular sensing failure", "Intermittent ventricular pacing failure", "Underlying atrial flutter", "Ventricular safety pacing"], "correct": 0, "explanation": "a) There is underlying sinus rhythm with left atrial abnormality. The first four beats are ventricular (V) paced with a preceding non-conducted sinus P wave. The fifth beat, with an incomplete right bundle branch morphology, is probably conducted with a long PR. This beat is actually a pseudo-fusion beat with a pacemaker spike superimposed. The next beats are again fully V paced with non-conducted P waves superimposed. The symptom of lightheadedness here was due to a so-called \"pacemaker syndrome,\" associated with ventricular pacing without AV synchrony causing reduced cardiac output.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case165/1350x900.gif", "_type": "mcq", "_caseId": 165}, {"question": "What is the ECG diagnosis in this recording with baseline movement?", "options": ["Hyperacute anterior  myocardial infarction  pattern", "Hyperkalemia (K+ of 7.6 mEq/L)", "Evolving posterior myocardial infarction", "Brugada pattern", "Early repolarization variant"], "correct": 0, "explanation": "a) There are hyperacute T waves and ST elevations localized in the anterior leads. In this case the acute MI is due an occlusion of the left anterior descending coronary artery.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case166/1350x900.gif", "_type": "mcq", "_caseId": 166}, {"question": "This ECG shows evidence of which of the following?", "options": ["Wolff-Parkinson-White pre-excitation", "Acute inferior myocardial infraction with intraventricular conduction delay", "Complete left bundle branch block", "Left bundle branch block and acute anterolateral myocardial infarction", "Right bundle branch block with left anterior fascicular block"], "correct": 2, "explanation": "The patient had hypertrophic obstructive cardiomyopathy with chronic left bundle branch block (LBBB). Note evidence of left atrial abnormality (LAA). Most patients with LBBB have left ventricular hypertrophy (LVH). The presence of LAA with LBBB is also strongly suggestive of underlying LVH. (Note: there is some baseline artifact here that at times simulates a pacemaker stimulus--however the patient did not have an electronic pacemaker and the P waves and wide QRS are due to native conduction entirely.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case167/1350x900.gif", "_type": "mcq", "_caseId": 167}, {"question": "This ECG from a young adult woman shows which of the following?", "options": ["Wolff-Parkinson-White pattern with posterior septal pre-excitation", "Dextrocardia with an otherwise normal heart", "Normal variant persistent juvenile T-wave inversions", "Posterior  myocardial infarction with left posterior hemiblock", "Severe right ventricular hypertrophy"], "correct": 4, "explanation": "e) The ECG shows classic signs of very marked right ventricular hypertrophy (RVH), usually associated with a severe pressure load, including: 1) a tall R wave in V1; 2) marked right axis deviation; 3) T-wave inversions consistent with right ventricular overload (\"strain\" pattern); and 4) a delayed precordial transition zone with narrow S waves in V5 and V6. The patient had a complex combination of problems, including congenital heart disease with partial anomalous pulmonary venous return and a sinus venosus atrial septal defect. In addition, there was severe pulmonary artery thromboembolic disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case168/1350x900.gif", "_type": "mcq", "_caseId": 168}, {"question": "What two arrhythmias are present in this ECG from a middle-aged male?", "options": ["Atrial fibrillation (with a moderate ventricular response) and frequent premature ventricular complexes (PVCs). The PVCs are multifocal, with two dist..."], "correct": 0, "explanation": "Atrial fibrillation (with a moderate ventricular response) and frequent premature ventricular complexes (PVCs). The PVCs are multifocal, with two distinct morphologies. The ECG also shows borderline low limb lead voltage and a Q-wave in lead III, both non-diagnostic findings. (Prior inferior MI cannot be ruled out.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case169/1350x900.gif", "_type": "identify", "_caseId": 169}, {"question": "What arrhythmia is present in this wide-QRS-complex tachycardia?", "options": ["Monomorphic ventricular tachycardia", "Polymorphic ventricular tachycardia", "Atrial fibrillation with left bundle branch block", "Atrial flutter with left bundle branch block", "Atrial fibrillation with Wolff-Parkinson-White pre-excitation"], "correct": 2, "explanation": "c) Atrial fibrillation with left bundle branch block.~~Note: The coarse atrial fibrillatory waves (lead V1) may be mistaken for atrial flutter waves. However, with fibrillation (versus flutter) the atrial activity varies continuously and usually the ventricular response is completely variable. The QRS complex here shows a typical left bundle branch block morphology with secondary ST-T abnormalities.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case170/1350x900.gif", "_type": "mcq", "_caseId": 170}, {"question": "What is the arrhythmia in this 73-year-old with very severe coronary disease, status-post inferior and anterior-lateral Q-wave myocardial infarction?", "options": ["Atrial fibrillation", "Atrial flutter with variable block", "Multifocal atrial tachycardia", "Sinus tachycardia with atrial premature beats", "Atrial tachycardia with type I (AV Wenckebach) block"], "correct": 0, "explanation": "a) Atrial fibrillation The highly irregular ventricular response and the variable, oscillatory atrial activity (see V1, e.g.) are classic for atrial fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case171/1350x900.gif", "_type": "mcq", "_caseId": 171}, {"question": "This ECG from a 49-year-old man shows which of the following?", "options": ["Incomplete left bundle branch block", "Left anterior fascicular block (hemiblock)", "Complete left bundle branch block", "Right bundle branch block", "Indeterminate QRS axis"], "correct": 1, "explanation": "b) Pure left anterior fascicular block (or hemiblock) causes marked left axis deviation (-45 degrees to -90 degrees), typically with rS complexes in II, III, and aVF, and qR complexes in I and aVL, with a QRS duration of <120 ms. (RS or Rs complexes may be seen in the left chest leads with left anterior fascicular block.) Rosenbaum MB et al., The Hemiblocks. Oldsmar, FL: Tampa Tracings, 1970.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case172/1350x900.gif", "_type": "mcq", "_caseId": 172}, {"question": "This ECG shows sinus rhythm with frequent atrial premature beats, and R>S in V1-V2. What is the diagnosis in this elderly male?", "options": ["Right ventricular hypertrophy", "Wolff-Parkinson-White variant", "Right bundle branch block", "Inferior/posterior infarction and lateral ischemia", "Duchenne muscular dystrophy"], "correct": 3, "explanation": "d) The relatively tall R waves in the right precordial leads are associated with low amplitude but wide Q waves inferiorly, consistent with prior inferior-posterior myocardial infarction (MI). There is slight ST elevation and T-wave inversion in V6, consistent with evolving lateral ischemia/myocardial infarction. (ST depressions in the right-to-mid chest leads may be reciprocal and/or due to concomitant anterior subendocardial ischemia.) This patient had severe multivessel coronary disease, and was status-post \"coronary artery bypass graft\" (CABG) surgery. He had had a prior inferior-posterior MI, and was admitted with an acute non-Q-wave lateral MI. Cardiac catheterization showed an occluded saphenous vein graft to the obtuse marginal branch of the left circumflex coronary. Angioplasty and stent placement were successfully performed. Note the subtle, frequent atrial premature beats (e.g., beat #3), which have an altered P wave axis and morphology (negative or retrograde inferiorly) consistent with a low atrial ectopic focus.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case173/1350x900.gif", "_type": "mcq", "_caseId": 173}, {"question": "What arrhythmia is present in this elderly woman with a history of mitral valve replacement for rheumatic mitral valve disease?", "options": ["Atrial flutter", "Atrial fibrillation", "Junctional rhythm", "Sinus rhythm with frequent  premature atrial complexes", "Multifocal atrial tachycardia"], "correct": 1, "explanation": "b) The patient had long standing atrial fibrillation. There are no discrete P waves which excludes sinus rhythm or multifocal atrial tachycardia see (Case # 149). The erratic irregular oscillatory baseline with an erratic ventricular response is typical of atrial fibrillation. No flutter waves are seen (see Case # 52). The scooping of the ST-T waves in the inferolateral leads is consistent with \"digitalis effect.\"", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case174/1350x900.gif", "_type": "mcq", "_caseId": 174}, {"question": "What was the cause of the tall right precordial R waves in this 32-year-old woman?", "options": ["Wolff-Parkinson-White pre-excitation", "Reversed chest lead placement (V6=V1, etc.) with normal ECG", "Dextrocardia with situs inversus", "Right ventricular hypertrophy", "Posterolateral  myocardial infarction"], "correct": 1, "explanation": "b) The limb leads are normal, so dextrocardia is not present. But the chest leads were inadvertently reversed: Lead V6=V1, V5=V2, etc. This artifact may simulate posterior or posterolateral myocardial infarction (MI ) (see Case #56) or RVH (see Case # 51). The degree of Wolff-Parkinson-White pre-excitation is excluded by the absence of the triad of short PR interval, wide QRS and delta wave (see Case # 184).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case175/1350x900.gif", "_type": "mcq", "_caseId": 175}, {"question": "What AV conduction abnormality is present in this ECG showing sinus rhythm with right bundle branch block and left atrial abnormality?", "options": ["Complete heart block", "Isorhythmic AV dissociation", "Mobitz Type I AV block (AV Wenckebach)", "Mobitz Type II AV block", "Sinus rhythm with blocked premature atrial beats"], "correct": 2, "explanation": "c) The record begins with a long AV Wenckebach (type I block) sequence with 6:5 block, followed by 2:1 block, and then the onset of a longer sequence of progressively prolonging PR intervals. This pattern is characteristic of AV Wenckebach and not Mobitz II AV block or complete heart block. Note that some of the P waves are partly \"hidden\" in the T waves. The PR after the non-conducted P wave is considerably shorter than the one before, a hallmark of AV Wenckebach. The fact that the sinus P waves come \"on time\" excludes blocked premature atrial depolarizations. For an example of isorhythmic AV dissociation, please see Case # 243.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case176/1350x900.gif", "_type": "mcq", "_caseId": 176}, {"question": "This wide-QRS-complex tachycardia in a 70-year-old woman is most consistent with which ONE of the following?", "options": ["(Paroxysmal) supraventricular tachycardia (PSVT) with right bundle branch block", "Atrial fibrillation", "Ventricular tachycardia", "Sinus tachycardia with right bundle branch block", "Atrial flutter with 2:1 block and right bundle branch block"], "correct": 0, "explanation": "a) There is a classic right bundle branch block (RBBB) morphology (rsR' in V1) making VT unlikely. No definite atrial activity is seen (P waves or flutter waves). The very regular rate at 150/min excludes AF. Therefore, the rhythm is most consistent with (paroxysmal) supraventricular tachycardia (PSVT), most likely AV nodal re-entrant tachycardia (AVNRT), although AV re-entrant tachycardia or atrial tachycardia (AT; with hidden P waves) are not excluded. Note: as one of our users correctly pointed out, the word \"paroxysmal\" in PSVT may be a clinical misnomer: unless one sees abrupt an start or termination, the episode could be a sustained, not paroxysmal. However, if you say \"SVT\" alone, be aware that some clinicians will take that to include not just the PSVT group (AT, AVNRT, AVRT), but also sinus tachycardia and atrial fibrillation or flutter. Therefore, it is best to be as explicit as you can be in using clinical terminology and to recognize widespread semantic ambiguities, including those on this website!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case177/1350x900.gif", "_type": "mcq", "_caseId": 177}, {"question": "The following ECG, from an elderly woman, is least consistent with which of the following?", "options": ["Severe mitral stenosis", "Severe aortic stenosis", "Embolic stroke", "Hypertensive heart disease", "Severe aortic regurgitation"], "correct": 0, "explanation": "a). This ECG is least consistent with answer (a). The findings include: atrial fibrillation with an average ventricular rate of about 90/min; an intraventricular conduction delay (IVCD) with left axis deviation (LAD); left ventricular hypertrophy (LVH); and non-specific ST changes. These findings are all consistent with choices b) through e). Severe mitral stenosis, by itself, would NOT be associated with LVH. Abnormalities in severe mitral stenosis typically include atrial fibrillation, or sinus rhythm with left atrial abnormality, in conjunction with evidence of right ventricular hypertrophy. Note added for purists: The QRS axis here is borderline for left anterior fascicular block (LAFB) (-45 degrees to -90 degrees), and the QRS duration here is also slightly wider than seen with isolated LAFB (QRS <120 ms).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case178/1350x900.gif", "_type": "mcq", "_caseId": 178}, {"question": "Which abnormality is NOT present in the following ECG?", "options": ["Sinus tachycardia", "Right bundle branch block", "Wolff-Parkinson-White variant with posterior wall pre-excitation", "Borderline PR prolongation (especially given heart rate)", "QRS axis within normal range"], "correct": 2, "explanation": "Note that the PR (196 ms) is technically in the normal range for adults (120-200 ms). However, with sinus tachycardia, the PR is normally closer to the lower range, due to increased sympathetic tone/decreased vagal tone. Thus, a PR of about 200 ms with sinus tachycardia indicates relatively slow AV conduction. The very tall R waves in V5 (30 mm or so) are likely due to LVH with a truncated S in V1 due to the RBBB variant, thus reducing the sensitivity further for LVH in this context. So calling \"probable or possible LVH\" is reasonable clinically. The QRS axis (measured on the first 100 ms) is about +15 degrees, within normal limits. The wide R waves in V1/V2 are due to a RBBB variant and not to posterior wall ventricular pre-excitation. (Ref: Vandenberg BF, Romhilt DW. Electrocardiographic diagnosis of left ventricular hypertrophy in the presence of bundle branch block. Am Heart J Volume 122 , Issue 3 , 818 - 822.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case179/1350x900.gif", "_type": "mcq", "_caseId": 179}, {"question": "Which abnormality is not present in the following ECG?", "options": ["Left ventricular hypertrophy", "Evolving anterior wall myocardial infarction  pattern", "Left axis deviation", "Left posterior fascicular block", "QT prolongation"], "correct": 3, "explanation": "d) This ECG shows a classic evolving anterior infarct pattern with loss of precordial R wave progression (V1-V4) and ischemic ST-T changes. There is also left axis deviation (consistent with left anterior fascicular block), QT prolongation (QTc is about 0.49sec) and voltage criteria for left ventricular hypertrophy:sum of the R in aVL plus S in V3 are greater than 28mm (2.8mV) in men or greater than 20mm (2.0mV) in women. The QT prolongation in this context is likely due to the evolving myocardial infarction pattern with prominent T wave inversions reflecting prolonged ventricular repolarization. (Other factors such as drug effects or hypokalemia are not excluded.) Left posterior fascicular block (LPFB) causes marked right axis deviation (i.e., 120 degrees or more positive), just the opposite of what is seen here, and is a diagnosis of exclusion. This diagnosis requires ruling out other and usually more common causes of rightward QRS axis, including physiologic variant (especially in infants and children), right ventricular overload states, including right ventricular hypertrophy, severe chronic obstructive lung disease, etc and lateral myocardial infarction (with Q waves in I and aVL and a rightward axis shift by \"default\"). LPFB is uncommon as an isolated abnormality and is typically seen in conjunction with right bundle branch block as a form of bifascicular block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case180/1350x900.gif", "_type": "mcq", "_caseId": 180}, {"question": "Which ONE of the following abnormalities is not present in the following ECG?", "options": ["Premature atrial complexes (PACs)", "Inferior Q-wave myocardial infarction", "Left atrial abnormality", "Infero-lateral ST-T abnormalities", "AV Wenckebach"], "correct": 4, "explanation": "e) AV Wenckebach. The rhythm is sinus with premature atrial complexes (PAC's), accounting for the slight pauses. The biphasic P waves in lead V1 with broad negative component are indicative of left atrial abnormality. The Q waves in lead II, III and AVF are due to prior myocardial infarction with associated nonspecific ST-T abnormalities in the inferolateral leads. AV Wenckebach with progressive PR prolongation and non-conducted sinus P waves is not seen.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case181/1350x900.gif", "_type": "mcq", "_caseId": 181}, {"question": "Which clinical syndrome best fits the ECG in this 60-year-old male in the Intensive Care Unit?", "options": ["Acute anterior myocardial infarction", "Primary hyperparathyroidism", "Acute pulmonary embolism", "Acute renal failure", "Syndrome of inappropriate ADH (SIADH)"], "correct": 3, "explanation": "d) The serum potassium was 8.9 mEq/L. Note the wide QRS with tall (\"peaked\" or \"tented\") T waves in V2-V4. The PR interval is prolonged. Left atrial abnormality is also present. (Borderline right axis deviation is present which is non-diagnostic and could be due to incipient left posterior fascicular block associated with hyperkalemia or to other factors such as chronic obstructive pulmonary disease).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case182/1350x900.gif", "_type": "mcq", "_caseId": 182}, {"question": "Young adult male with hyperthyroidism and weakness. The ECG is most consistent with which ONE of the following abnormalities?", "options": ["Hypokalemia", "Hyperkalemia", "Hypocalcemia", "Hypercalcemia", "Subendocardial ischemia"], "correct": 0, "explanation": "The patient&apos;s serum potassium was 1.9 mEq/L at about the time this ECG was recorded. Resting sinus tachycardia with PR prolongation is present. The P waves in lead II are superimposed on the TU waves. Marked prolongation of repolarization is present with very large U waves (V3-V4, especially). The patient was diagnosed with thyrotoxic periodic paralysis (TPP) with hypokalemia, an important syndrome that has occasioned increasing interest due to the its emerging endocrine, molecular and genomic bases.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case183/1350x900.gif", "_type": "mcq", "_caseId": 183}, {"question": "Young adult male with palpitations. The ECG shows which of the following?", "options": ["Left ventricular hypertrophy", "Right ventricular hypertrophy", "Posterior myocardial infarction", "Brugada pattern", "Intermittent Wolff-Parkinson-White pattern"], "correct": 4, "explanation": "e) The 8th and 9th beats show a classic Wolff-Parkinson-White pattern (WPW) with a short PR, wide QRS and delta waves. The tall R in V1 here is due to pre-excitation via a left lateral wall bypass tract. The WPW pattern may be intermittent due, for example, to a transient increase in vagal tone which slows conduction in the AV node, allowing bypass tract conduction to become more evident. (The Brugada pattern, in contrast, is associated with a right bundle branch-like morphology and ST elevations V1-V2; see www.crtia.be/)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case184/1350x900.gif", "_type": "mcq", "_caseId": 184}, {"question": "The following ECG shows which diagnosis?", "options": ["Left bundle branch block", "Left anterior fascicular block (hemiblock)", "Anterior ST elevation/Q wave myocardial infarction, possibly recent or evolving", "Right ventricular conduction delay", "Wolff-Parkinson-White pre-excitation"], "correct": 2, "explanation": "c) The ECG shows prominent Q waves with ST elevations and/or T wave inversions in leads V1-V4 and aVL. There is also sinus bradycardia, slight PR prolongation and probable left atrial abnormality. Pathologic Q waves in V1-V3 are classically attributed to \"anteroseptal\" myocardial infarction (MI). However, angiographic and echocardiographic evidence indicates that Q waves in V1-V3/V4 more often correlate with infarction involving the apical and sometimes even the lateral wall of the left ventricle. (Bogaty P, et al. Is anteroseptal myocardial infarction an appropriate term? Am J Med 2002;113:37-41.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case185/1350x900.gif", "_type": "mcq", "_caseId": 185}, {"question": "Young adult male with fatigue and a possible recent tick bite. True statements about this ECG and the syndrome include all of the following EXCEPT?", "options": ["Sinus rhythm with blocked premature atrial complexes is present", "Second degree AV block is present with 3:2, 2:1, and 4:3 conduction patterns", "AV heart block is a common manifestation of Lyme carditis", "Non-specific ST-T changes are present in the infero-lateral leads", "Chronic congestive heart failure is a rare complication of Lyme disease"], "correct": 0, "explanation": "a) The non-conducted beats are due to Type I second degree AV block, not blocked premature atrial complexes (PACs.) This patient, with positive Lyme serology, developed high degree AV block and ultimately required placement of a permanent pacemaker. The clinical course in Lyme carditis, most often manifesting as conduction system disease, is usually benign with patients recovering completely. When it occurs, heart block is often localized at the level of the atrioventricular node, but it is frequently unresponsive to atropine sulfate. Lyme carditis generally is treated with antibiotics, but no treatment has been shown to clearly attenuate or prevent its development. The responsible microorganism, Borrellia burgdorferi, might also play a role in the relatively rare development and progression of chronic congestive heart failure. See also Case # 161. (Pinto DS. Cardiac manifestations of Lyme disease. Med Clin North Am 2002;86:285-296.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case186/1350x900.gif", "_type": "mcq", "_caseId": 186}, {"question": "ECG (with noisy baseline) from a critically-ill elderly man shows all of the following except:", "options": ["Prolonged AV conduction", "Intermittent left bundle branch block", "Acute inferior wall myocardial infarction pattern", "Poor R wave progression with possible prior anterior myocardial infarction", "Accelerated idioventricular rhythm"], "correct": 4, "explanation": "e) The first four beats show a complete left bundle branch block (LBBB) pattern (not accelerated idioventricular rhythm) which abruptly disappears at a nearly identical heart rate. An acute inferior myocardial infarction (MI) pattern is apparent in both sets of beats, with reciprocal ST depressions in I, aVL and V2-V3. LBBB can mask the diagnosis of acute or prior MI. In this somewhat unusual case, the acute MI is readily confirmable in the normally conducted beats.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case187/1350x900.gif", "_type": "mcq", "_caseId": 187}, {"question": "The ECG shows which ONE of the following diagnoses?", "options": ["Atrial flutter with 2:1 block", "Atrial flutter with 3:1 block", "Atrial flutter with variable block", "Atrial fibrillation", "Parkinsonian tremor artifact"], "correct": 2, "explanation": "c) The ECG shows typical atrial flutter waves. The ventricular response is not highly irregular as in atrial fibrillation, but is also not strictly regular. The rate here has a definite pattern; the conduction pattern is not consistently 3:1 or 4:1, but rather more variable. Parkinsonian tremor may simulate atrial flutter or fibrillation. In such cases the underlying rhythm is usually recognizable upon close inspection.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case188/1350x900.gif", "_type": "mcq", "_caseId": 188}, {"question": "The following ECG with sinus rhythm from a severely-ill 67-year-old woman is most consistent with which diagnosis?", "options": ["Mitral stenosis", "Renal failure", "Myxedema", "Subarachnoid hemorrhage", "Acute anterior myocardial infarction"], "correct": 1, "explanation": "b) The findings of left ventricular hypertrophy (LVH) and relatively tall, narrow (tented) T waves (V5, V6) are most consistent with chronic renal failure causing hypertension and hyperkalemia, respectively.) There are small U waves in some leads (V2), which are not diagnostic as they of low relative and absolute amplitude.) The T waves are not as peaked as often seen with moderate hyperkalemia; but typical LVH tends to be associated with T wave inversions (\"strain\" pattern). Whether these T waves represent paradoxical normalization due to hyperkalemia cannot be assessed without the previous ECG. Lab studies obtained 30 min after this ECG showed a BUN 42 mg/dl, creatinine 8.0mg/dl, serum potassium 6.4 mEq/L. Severe mitral stenosis classically produces signs of right ventricular hypertrophy and marked left atrial abnormality (or atrial fibrillation). Myxedema (severe hypothyroidism) is associated with low voltage QRS complexes and sinus bradycardia. Subarachnoid hemorrhage may be associated with deep T wave inversions or tall positive T waves, which are usually very broad with a long Q-T, not narrow-based (\"CVA T wave pattern\"). Finally, the hyperacute T waves of anterior myocardial infarction (MI) are usually also broader, often with a high take-off of the ST segment or J point.", "_imageUrl": "https://ecg.bidmc.harvard.
