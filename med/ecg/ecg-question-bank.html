edu/mavendata/images/case189/1350x900.gif", "_type": "mcq", "_caseId": 189}, {"question": "Middle-aged man admitted with recent chest pain. How many abnormalities can you find?", "options": ["Findings include: 1. Borderline sinus tachycardia 2. Intraventricular conduction delay (IVCD) 3. Second degree AV block (AV Wenckebach). Note cycles o..."], "correct": 0, "explanation": "Findings include: 1. Borderline sinus tachycardia 2. Intraventricular conduction delay (IVCD) 3. Second degree AV block (AV Wenckebach). Note cycles of progressive PR prolongation and then non-conducted P waves in 5:4 and 4:3 patterns. 4. Single premature ventricular complex (PVC) 5. Acute/evolving infero-lateral myocardial infarction (MI )pattern In addition, there is borderline low QRS voltage and left atrial abnormality. Additional comments: Mobitz type I (AV Wenckebach) block is not uncommon with acute inferior MI. Usually this condition disturbance is transient with inferior MI and does not require temporary or permanent pacing. Cardiac catheterization in this patient revealed severe three vessel coronary disease with evidence of thrombus in the right posterolateral branch. Left ventriculography showed a reduced left ventricle ejection fraction of 32% with inferior/posterior and apical/lateral wall motion abnormalities.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case190/1350x900.gif", "_type": "identify", "_caseId": 190}, {"question": "The following statements regarding this ECG from an elderly man are true except:", "options": ["AV conduction is prolonged", "Right bundle branch block is present", "Echocardiogram showed a major infero-posterior wall motion abnormality", "The second heart sound would likely be widely split on inspiration", "The second heart sound would likely be paradoxically split"], "correct": 4, "explanation": "e) The ECG shows a prolonged PR with right bundle branch block (RBBB) and prominent inferior Q waves consistent with myocardial infarction (MI). The wide notched R waves (RSR' equivalent) in V1-V3 are due to the RBBB. The rather prominent initial R wave in V2-V3 may be due to posterior MI superimposed on the RBBB. Echocardiogram confirmed an infero-posterior wall motion abnormality. RBBB is associated with wide but physiologic splitting of S2. Paradoxical splitting of S2 (splitting during expiration) is associated with left bundle branch block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case191/1350x900.gif", "_type": "mcq", "_caseId": 191}, {"question": "The following ECG from an elderly woman shows all of the following except:", "options": ["Sinus rate at about 90 beats per minute", "Right bundle branch block with leftward axis", "Blocked premature atrial complexes", "Alternating 3:2 and 2:1 second degree AV block", "Group beating pattern"], "correct": 2, "explanation": "c) Sinus rhythm (about 90/min) is present with alternating 3:2 AV Wenkebach and 2:1 block, not blocked premature atrial complexes (PACs). Both heart block and blocked PACs can cause \"group beating\" due to the non-conducted P waves. With AV block (Mobitz I or II), the sinus P waves should come \"on time\"; with blocked PACs, the premature P waves will come earlier than expected. The ECG is suggestive of both proximal AV disease (3:2 AV Wenckebach pattern) and infranodal disease (right bundle branch block with borderline left axis deviation). During subsequent electrophysiologic study at a time when pure 2:1 AV block was present, a Mobitz II mechanism was noted (HV interval 75 ms in conducted beats) and a dual-chamber pacemaker was implanted.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case192/1350x900.gif", "_type": "mcq", "_caseId": 192}, {"question": "Young adult male with palpitations and syncope. The diagnosis is:", "options": ["Left ventricular hypertrophy", "Biventricular hypertrophy", "Duchenne's muscular dystrophy", "Inferior-posterior myocardial infarction", "Wolff-Parkinson-White  syndrome"], "correct": 4, "explanation": "e) The classic triad of Wolff-Parkinson-White (WPW) is present: short PR, wide QRS and delta waves. The delta waves are negative in III and aVF, and positive in V1-V3 which is consistent with a left posterior bypass tract. This pattern simulates inferior-posterior myocardial infarction (MI). WPW may also simulate left ventricular hypertrophy (LVH) or right ventricular hypertrophy (RVH,) as well as bundle branch blocks. Duchenne's muscular dystrophy may be associated with a pattern resembling posterior MI. This patient had a cardiac electrophysiology (EP) study. He was found to have a left posterior bypass tract (as well as a concealed left lateral bypass tract). He had inducible atrioventricular reentrant tachycardia (AVRT) and atrial fibrillation. Both bypass tracts were successfully ablated.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case193/1350x900.gif", "_type": "mcq", "_caseId": 193}, {"question": "A middle-aged woman with recent onset palpitations. This arrhythmia is most consistent with which endocrine disorder?", "options": ["Hyperthyroidism", "Hypothyroidism", "Hyperparathyroidism", "Addison's disease", "Cushing's disease"], "correct": 0, "explanation": "a) The rhythm is atrial fibrillation with a rapid ventricular response. Left ventricular hypertrophy (LVH) by voltage is noted. The patient was markedly hyperthyroid. An estimated 5-15% of patients with hyperthyroidism (especially older ones) will develop atrial fibrillation. Conversely, a low TSH level was reported in about 5% of patients with recent onset atrial fibrillation (or flutter) (Krahn AD, et al. Arch Intern Med 1996:156:2221-2224). Hypothyroidism as well as Addison's disease may be associated with low QRS voltage, non-specific ST-T changes, and sinus bradycardia. Hyperparathyroidism may produce signs of hypercalcemia (short QT interval; see Case 67). Cushing's disease may be associated with LVH (hypertension) and a long Q-T(U) (hypokalemia).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case194/1350x900.gif", "_type": "mcq", "_caseId": 194}, {"question": "The following ECG from a middle-aged man with congestive heart failure is most consistent with which diagnosis?", "options": ["Recurrent pulmonary emboli", "Malignant hypertension", "Mitral stenosis", "Chronic obstructive pulmonary disease", "Inferolateral myocardial infarction"], "correct": 1, "explanation": "b) The ECG shows evidence of severe left ventricular hypertrophy (LVH) with prominent precordial voltage, left atrial abnormality, lateral ST-T abnormalities and a somewhat leftward QRS axis (-15 degrees). The patient had malignant hypertension with congestive heart failure (CHF), accounting also for the sinus tachycardia (blood pressure initially 280/180 mmHg). Recurrent pulmonary emboli may lead to pulmonary hypertension and right ventricular hypertrophy (RVH). Mitral stenosis leads to left atrial abnormality (or atrial fibrillation) with signs of RVH. Severe chronic obstructive pulmonary disease (COPD) is often associated with low voltage QRS complexes, slow R wave progression and a vertical or rightward QRS axis, as well as right atrial overload. The ST-T changes here are nonspecific and could be due to LVH alone, coronary disease, etc. However, the ECG is not consistent with extensive inferolateral myocardial infarction (MI) per se.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case195/1350x900.gif", "_type": "mcq", "_caseId": 195}, {"question": "54-year-old man with rest chest pain. Which statement about this ECG is correct?", "options": ["Nonspecific T wave abnormalities (slight inversions) in I aVL, V4-V6 may be due to ischemia", "The findings are not consistent with an acute coronary syndrome", "The findings indicate Prinzmetal's angina", "The changes are diagnostic of digitalis effect", "Left posterior fascicular block is present"], "correct": 0, "explanation": "a) Nonspecific ST-T changes with slight lateral T wave inversions are present. The patient ruled in for myocardial infarction (MI). Cardiac catheterization revealed single vessel coronary disease with a 95% occlusion of the dominant right coronary artery. (The ECG also shows nondiagnostic Q waves in III and aVF and a relatively tall R wave in V2, but not V1, raising the possibility of prior inferior-posterior MI. However, these findings are not diagnostic). A wide array of factors may cause nonspecific ST-T changes. Digitalis, however, does not cause the type of slight T wave inversions seen here. Rather, it usually produces shortening of ventricular repolarization with \"scooping\" of the ST-T complex. Prinzmetal's angina is defined by the appearance of ST elevations with non-infarctional ischemia. Left posterior fascicular block leads to marked right axis deviation (>= 120 degrees) in the absence of other causes. The QRS axis here is normal. Care must be taken not to over-interpret nonspecific ST-T changes, particularly in patients with a low prior probability of heart disease. However, as illustrated by this case, subtle repolarization changes (especially slight ST depressions or T wave inversions) can be the important markers of acute or chronic coronary syndromes. (Daviglus ML, et al. JAMA 1991:281:530-536.) Of course, even a normal ECG does not exclude acute ischemia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case196/1350x900.gif", "_type": "mcq", "_caseId": 196}, {"question": "This ECG from a middle-aged man with heart failure shows which set of findings?", "options": ["Sinus rhythm with first degree AV block and typical right bundle branch block", "Sinus rhythm with first degree AV block and an atypical intraventricular conduction delay  pattern consistent with extensive underlying myocardial infarction", "Atrial tachycardia with 2:1 block with typical right bundle branch block", "Atrial tachycardia with 2:1 block and an atypical intraventricular conduction defect pattern consistent with extensive underlying myocardial infarction", "Sinus rhythm with AV dissociation and accelerated idioventricular rhythm"], "correct": 3, "explanation": "d) The rhythm is atrial tachycardia (rate 154/min) with 2:1 AV block. Note the partially hidden non-conducted P waves on the ST segments (e.g., leads I and aVL). The QRS is very wide with an atypical intraventricular conduction defect (IVCD) pattern. The rSR' type complex in lateral leads (I, aVL) is not due to a right bundle branch block, but to an atypical left ventricular conduction defect. These unexpected rSR' complexes in lateral leads (El-Sherif sign) correlate with underlying extensive myocardial infarction (MI) and sometimes ventricular aneurysm. (El-Sherif. Br Heart J 1970;32:440-448.) The notching on the upstroke of the S waves in V4 with a left bundle branch block-type pattern also suggests underlying MI (Cabrera's sign). This patient had severe cardiomyopathy secondary to coronary artery disease with extensive left ventricular wall motion abnormalities.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case197/1350x900.gif", "_type": "mcq", "_caseId": 197}, {"question": "64-year-old man with chest pain at rest. The ECG shows all of the following except:", "options": ["Left atrial abnormality", "Atrial fibrillation with a regularized ventricular response", "Premature ventricular complex  with compensatory pause", "Anterior Q wave myocardial infarction (M) pattern", "Borderline low precordial voltage"], "correct": 1, "explanation": "b) Sinus rhythm with baseline artifact is present, simulating atrial fibrillation. Such artifact may be caused by a variety of factors including poor electrode contact, muscle tremor and electrical interference. A single premature ventricular complex (PVC) is present with a compensatory pause such that the RR interval surrounding the PVC is twice as long as the preceding sinus RR interval. Evidence of a prior anterior MI is present with pathologic Q waves in V1-V3. Borderline low precordial voltage is a nonspecific finding. Cardiac catheterization showed a 90~ stenosis in the proximal portion the left anterior descending coronary, which was treated with angioplasty and stenting. The broad P wave in lead V1, with a prominent negative component (terminal negative force), is consistent with left atrial abnormality.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case198/1350x900.gif", "_type": "mcq", "_caseId": 198}, {"question": "What diagnostic study is most appropriate in this 60-year-old man with rest chest pain?", "options": ["Exercise stress test", "Transthoracic echocardiogram", "Cardiac catheterization/coronary angiography", "Resting nuclear imaging test (e.g., sestamibi scan during pain)", "Electron beam cardiac CT"], "correct": 2, "explanation": "c) A cardiac catheterization is warranted. The ECG shows sinus rhythm with ventricular ectopy, left axis deviation, consistent with left anterior fascicular block (hemiblock), and T wave inversions in V2-V5 with subtle upward bowing of the ST segments. There are also ST-T abnormalities in I and aVL. The presence of symmetric T wave inversions, especially with upward bowing of the ST segments is highly suggestive of ischemia in the left anterior descending distribution (LAD) in this context. (Hayden GE, et al. Am J Emerg Med 2002;20:252-262). This finding is sometimes referred to as the \"LAD T wave pattern.\" In this patient with a history suggesting unstable angina and these ECG changes, the most expeditious test to order is a cardiac catheterization, which showed significant LAD (and obtuse marginal) disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case199/1350x900.gif", "_type": "mcq", "_caseId": 199}, {"question": "This ECG (with some baseline artifact) from an elderly man shows which of the following?", "options": ["Sinus tachycardia with Mobitz type I second degree AV block", "Sinus tachycardia with Mobitz type II second degree AV block", "Sinus tachycardia with blocked premature atrial complexes", "Sinus rhythm with sinus exit block", "Ectopic atrial rhythm with AV Wenckebach"], "correct": 1, "explanation": "b) Sinus tachycardia is present with intermittent non-conducted P waves. The three P waves that fail to conduct on this tracing all come \"on time,\" so they are not blocked premature atrial complexes (PACs). Furthermore, they are not preceded by PR prolongation, nor is the PR interval following these nonconducted P waves shorter than the preceding ones. Hence, Mobitz I (AV Wenckebach) is excluded. Rather, the pattern here is that of Mobitz II AV block, strongly suggesting block below the AV node (infranodal block). That the QRS complex is not wide suggests that the block is within the His bundle itself (intra-Hisian). The occurrence of AV block here at a somewhat fast sinus rate is also consistent with infranodal block since factors that increase heart rate (decreased vagal tone; increased sympathetic tone) facilitate AV nodal conduction. The pattern of Mobitz II AV block can be simulated by concealed junctional or His extrasystoles. (Reference: S Barold, DL Hayes. Mayo Clin Proc 2002;76:44-57.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case200/1350x900.gif", "_type": "mcq", "_caseId": 200}, {"question": "Markedly low voltages here are due to pleural effusions. What is the arrhythmia?", "options": ["Sinus tachycardia with premature atrial complexes", "AV nodal reentrant tachycardia", "Atrial flutter", "Atrial fibrillation", "Multifocal atrial tachycardia"], "correct": 3, "explanation": "d) The ventricular response here is fast and irregular. Fibrillatory waves are seen on close inspection (V1, for example). Generalized low voltage and atrial fibrillation should also make you think about pericardial disease (effusive or constrictive), chronic obstructive pulmonary disease (COPD), and cardiomyopathy. This patient did not have a significant pericardial effusion but did have bilateral pleural effusions (and left hydropneumothorax).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case201/1350x900.gif", "_type": "mcq", "_caseId": 201}, {"question": "55-year-old woman with rheumatic mitral valve disease and a narrow complex tachycardia. The rhythm is:", "options": ["Sinus tachycardia", "Atrial fibrillation", "Atrial flutter with 2:1 AV conduction", "AV nodal reentrant tachycardia", "Ectopic atrial tachycardia"], "correct": 2, "explanation": "c) Typical atrial flutter waves are present (negative in lead II; biphasic in V1) at a rate of about 270/min with 2:1 conduction. Note the non-conducted atrial flutter waves subtly present in the ST segment in V1. Atrial flutter may mimic all of the arrhythmias given in the other choices. Relatively low voltage QRS complexes are also present in this patient who had pleural effusions.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case202/1350x900.gif", "_type": "mcq", "_caseId": 202}, {"question": "Middle-aged man with chest pain after a motor vehicle accident with blunt trauma to the chest. The ECG is diagnostic of which condition?", "options": ["Massive pulmonary embolism", "Hyperacute anterior myocardial infarction", "Hyperacute inferior myocardial infarction", "Hyperacute right ventricular myocardial infarction", "Acute pericarditis"], "correct": 1, "explanation": "b) The ECG shows sinus tachycardia with marked ST segment elevations in the precordial leads and I and aVL. Reciprocal ST depressions are present in II, III and aVF. Left axis deviation is also present. Marked ST elevations like these represent a current of injury pattern associated with the hyperacute phase of myocardial infarction (MI). These prominent ST elevations with a convex shape are sometimes referred to on the wards as \"tombstone\" waves, indicating their ominous prognosis. A more technical term is \"monophasic current of injury.\" This patient was found to have a totally occluded proximal left anterior descending artery and underwent percutaneous coronary angioplasty with stenting. There was no evidence of aortic dissection or pericardial effusion. Massive pulmonary embolism may produce a variety of nonspecific changes including sinus tachycardia, S1Q3T3 pattern with or without right axis shift, delayed precordial transition and right precordial T wave inversions (right ventricular \"strain\" pattern). Right ventricular MI may produce ST elevations in V1-V2, (rarely V3-V4). However, the changes are not this marked and usually are greater in V1 than V2 or V3. Also, in such cases, associated inferior MI leads to ST elevations not ST depressions in leads II, III and aVF. The inferior ST depressions here, as noted, are reciprocal to the prominent anterior elevations.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case203/1350x900.gif", "_type": "mcq", "_caseId": 203}, {"question": "The following ECG from an 84-year-old woman with \"indigestion\" shows all of the following findings EXCEPT which ONE?", "options": ["Left ventricular hypertrophy", "Left atrial abnormality", "ST segment deviations consistent with severe ischemia", "Left anterior fascicular block", "Slow R wave progression"], "correct": 3, "explanation": "d) This patient, with a history of hypertension, ruled in by serum biomarkers for a non/ST segment elevation/non-Q wave (ST segment depression) myocardial infarction (MI). The ECG shows left ventricular hypertrophy (LVH) by voltage (R wave 12-13 mm in aVL) plus left atrial abnormality (LAA). The QRS axis is horizontal (-7 degrees), but without frank left axis deviation (i.e., -30 degrees or more negative) or evidence for left anterior fascicular block (strictly -45 degrees or more negative). Although LVH alone may be associated with ST-T abnormalities (sometimes referred to as a \"strain pattern\"), like those in lead aVL, the prominent horizontal or downsloping ST depressions in other leads (I, II, aVF, V5, V6) here are strongly suggestive of ischemia superimposed on LVH. Importantly, the concomitant ST elevations in aVR.exceeding those in lead V1 strongly suggest three vessel disease and sometimes left main stenosis. The patient had positive cardiac enzymes and underwent cardiac catheterization, which did show left main and three vessel coronary disease, necessitating emergency coronary artery bypass graft surgery.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case204/1350x900.gif", "_type": "mcq", "_caseId": 204}, {"question": "This ECG from a 49-year-old man experiencing chest discomfort and mild dyspnea is most consistent with which ONE of clinical scenarios?", "options": ["Acute ST elevation MI", "Acute pericarditis", "Normal variant early repolarization", "Pulmonary emboli", "Brugada syndrome"], "correct": 1, "explanation": "b) The ECG shows classic, albeit subtle findings most consistent with acute pericarditis. These include diffuse, usually concave ST segment elevations (I, II, aVF, V2-V6). In addition, there are very subtle discordant PR segment deviations (elevated in aVR and depressed in the inferolateral leads). The ST elevations are due to a ventricular current of injury from the pericardial inflammation. The PR changes are due to an associated atrial current of injury. Note that the PR and ST segment vectors point in opposite directions, i.e., PR up and ST down in aVR and PR down and ST up in inferolateral leads. Resting sinus tachycardia is noted. The patient had a fever but no pericardial effusion on transthoracic echocardiogram. There are also non-diagnostic inferior Q waves. The S1Q3 pattern here is a non-specific finding. There was no evidence of pulmonary emboli. No other ECG signs of acute right ventricular overload are noted here (e.g., right precordial T wave inversions, slow R wave progression, right ventricular conduction delays, etc.). Serial cardiac enzymes were not elevated.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case205/1350x900.gif", "_type": "mcq", "_caseId": 205}, {"question": "What is the most likely clinical scenario in this patient?", "options": ["Primary hyperaldosteronism", "SIADH", "Metabolic alkalosis", "Renal failure", "Hypercalcemia"], "correct": 3, "explanation": "d) The ECG shows subtle but diagnostic signs of hyperkalemia (6.8mEq/L in this case of renal failure). Specifically, there are narrow-based (\"peaked\" or \"tented\") T waves best seen here in leads II and V4-V6. The T waves are not particularly tall, but have a distinctive appearance. Peaking of the T waves is usually the earliest sign of hyperkalemia on the ECG, followed by widening of the QRS and PR prolongation and eventually loss of P waves. Ultimately, a \"sine-wave\" pattern occurs, preceding ventricular asystole. In some cases, the T waves are quite tall and unmistakable. In other cases, like this one, one needs to pay attention to the narrowness and relative prominence of the T waves. Primary hyperaldosteronism leads to hypokalemia, associated with flat T waves and prominent U waves. Similar changes may occur with metabolic alkalosis which is often associated with hypokalemia. Syndrome of inappropriate ADH Secretion (SIADH), with hyponatremia, does not by itself produce characteristic changes on the ECG. Hypercalemia may lead to shortening of the QT interval, due to abbreviation of the ST segment. The present ECG also shows some non-specific J point sagging and left atrial abnormality (prominent biphasic P wave in V1). The latter finding is not uncommon in patients with chronic renal failure who often have hypertension. Caution: there is no consistent relationship between the ECG and the degree of hyperkalemia. For example, sometimes relatively marked hyperkalemia may be associated with a paucity of ECG findings.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case206/1350x900.gif", "_type": "mcq", "_caseId": 206}, {"question": "The following ECG, from a 62-year-old patient with increasing dyspnea, is most consistent with which diagnosis?", "options": ["Pericardial tamponade", "Chronic obstructive pulmonary disease", "Massive acute pulmonary embolism", "Acute anterior myocardial infarction", "Myxedema"], "correct": 0, "explanation": "A) This ECG shows the classic triad of findings for pericardial effusion with cardiac tamponade. These findings include: 1) sinus tachycardia; 2) low QRS voltages; and 3) electrical alternans (best seen in leads V3 and V4 in this case). This triad is highly specific for cardiac tamponade, but of limited sensitivity. Electrical alternans in cardiac tamponade is marked by beat-to-beat alternation of the QRS complex (and other waveform components) usually with sinus tachycardia. This so-called 2:1 alternans is due to mechanical effects of the heart swinging to-and-fro in the pericardial effusion. With tamponade, the heart systematically shifts in position on a beat-to-beat basis, accounting for the alternating QRS vector and amplitude in multiple leads. Chronic obstructive pulmonary disease may be associated with low voltage complexes and sinus tachycardia as seen here, but not with electrical alternans. Massive pulmonary embolism would also not account for the combination of low voltage and electrical alternans, nor would acute anterior myocardial infarction. (The poor R wave progression in leads V1-V2 here is non-specific.) Myxedema may cause low voltage due to pericardial effusion. However, this syndrome generally does not lead to tamponade physiology and is most likely to be associated with sinus bradycardia. This patient had known non-small cell metastatic lung cancer. Transthoracic echocardiogram confirmed a large pericardial effusion, with right ventricular diastolic collapse, consistent with tamponade physiology. The patient underwent pericardiocentesis with drainage of about 1L of serosanguinous fluid. A follow-up ECG (several weeks after the pericardiocentesis) was notable for increased QRS voltage and disappearance of the electrical alternans. However, the resting sinus tachycardia persisted in association with widespread metastatic disease and related problems.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case207/1350x900.gif", "_type": "mcq", "_caseId": 207}, {"question": "This 49-year-old man with known coronary disease, S/P coronary artery bypass surgery, and end stage renal failure presents for dialysis with this ECG. What is the most appropriate next step?", "options": ["Sodium bicarbonate and urgent hemodialysis for hyperkalemia", "Urgent diagnostic cardiac catheterization", "Lidocaine for \"slow\" ventricular tachycardia", "Toxicology screen to rule out drug overdose given a \"wide QRS\" rhythm", "Admit and observe with serial cardiac enzymes"], "correct": 1, "explanation": "b) Urgent cardiac catheterization is indicated, as the ECG is consistent with an acute infero-postero-lateral myocardial infarction (MI). Selected cardiac echo and cardiac catheterization findings on this patient are shown in the link below. The ECG shows sinus tachycardia with left atrial abnormality, marked ischemic ST segment elevation in the inferior limb leads and lateral precordial leads, and prominent ST segment depression with upright T waves in the early precordial leads consistent with posterior infarct (see Brady WJ. Am J Emerg Med 1998;16:409-413). Hyperkalemia and drug toxicity would cause true QRS widening which is not seen here. Rather, the injury current with marked ST segment deviation makes the QRS appear wide. There is 1:1 atrioventricular conduction with sinus tachycardia and a narrow QRS excluding ventricular tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case208/1350x900.gif", "_type": "mcq", "_caseId": 208}, {"question": "77-year-old woman with intermittent chest pain, worse one week ago, with a new, loud, harsh holosystolic murmur. What is the most likely clinical scenario?", "options": ["Hypertrophic obstructive cardiomyopathy", "Aortic sclerosis", "Inferior myocardial infarction with a ventricular septal defect", "Mitral valve prolapse with flail posterior leaflet", "Aortic stenosis"], "correct": 2, "explanation": "c) The ECG shows evidence of a recent inferior myocardial infarction (MI) with pathologic Q waves and ST elevations in lead II, III and aVF (along with reciprocal ST depressions in leads I and aVL). The T waves are slightly inverted as well inferiorly, consistent with the evolving MI. Criteria for probable left ventricular hypertrophy are also present (R wave = 26 mm [2.6mV] in V5 ;evidence of left atrial abnormality with a prominent negative P wave component in V1 on magnification display, and borderline IVCD), findings probably related to systemic hypertension. A new holosystolic murmur with this ECG suggests either an acute ventricular septal defect (VSD) or posterior papillary muscle dysfunction (with possible rupture) associated with an acute inferior MI. This patient underwent cardiac catheterization (see multimedia links) and was found to have an occluded right coronary artery and a VSD with left-to-right shunting. The other diagnoses all are associated with systolic murmurs, but not with the acute ECG findings noted here. Further, aortic sclerosis and aortic stenosis, as well as hypertrophic obstructive cardiomyopathy are associated with aortic outflow murmurs, not holosystolic murmurs. Mitral prolapse may be associated with a prominent holosystolic murmur, but is more commonly associated with a mid-late type systolic murmur.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case209/1350x900.gif", "_type": "mcq", "_caseId": 209}, {"question": "A 71-year-old woman in the Intensive Care Unit with end stage renal disease developed mental status changes and had this ECG. The findings are consistent with all of the following EXCEPT?", "options": ["Cerebrovascular accident, especially subarachnoid hemorrhage or other intracranial bleed", "Idiopathic global wave inversion syndrome", "Atypical myocardial ischemia pattern with left ventricular hypertrophy", "Stokes-Adams syncope with underlying left ventricular hypertrophy", "Class 1A antiarrhythmic drug toxicity"], "correct": 4, "explanation": "e) This ECG shows massive diffuse, very broad T wave inversions with marked QT or QT-U prolongation (see lead V1). The rhythm is sinus bradycardia with a prolonged PR interval, left atrial abnormality and left ventricular hypertrophy (LVH.) These dramatic repolarization abnormalities may be seen with the so-called \"CVA-T wave pattern,\" especially with intracranial bleeds. Much more rarely, the findings are present with thrombotic or embolic type Cerebrovascular accidents (CVAs), or with other central nervous system pathologies. These dramatic findings, however, are not specific for CVA. For example, the pattern may occur atypically with global ischemia, especially with underlying LVH. However, ischemia does not usually produce T wave inversions of this amplitude and width. In other cases, where no specific etiology is found, the term idiopathic global T wave inversions is applied (Spodick D. J Am Coll Cardiol 1991;17:1479). Patients with the syndrome may have multifactorial reasons for repolarization abnormalities (ischemic, metabolic, myocardial, etc.). This pattern has also been reported following episodes of Stokes-Adams syncope. No evidence of intermittent high degree heart block or other profound bradycardia was noted in the present case. However, these repolarization changes are not by themselves consistent with class 1A antiarrhythmic drugs (quinidine, procainamide, disopyramide, etc.). These agents may cause Q-T(U) prolongation, but not deep T wave inversions of this kind. This patient had serial brain imaging studies which did not show any evidence of bleeding or a mass lesion. A question of a small cerebellar infarct was raised. Cardiac enzymes were not elevated. Echocardiogram showed LVH with global LV systolic dysfunction.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case210/1350x900.gif", "_type": "mcq", "_caseId": 210}, {"question": "Middle-aged female smoker with chest pain refractory to medication and an elevated serum cardiac troponin level. These ECG findings are consistent with which of the following syndromes?", "options": ["Acute epicardial coronary artery occlusion with ischemia/infarction", "Cocaine-induced cardiomyopathy", "Idiopathic coronary spasm with myocardial ischemia/infarction (possible Tako-tsubo syndrome)", "Myocarditis", "All of the above are possible"], "correct": 4, "explanation": "e) All of the diagnoses listed are possible. The patient underwent urgent cardiac catheterization which revealed diffuse severe coronary spasm (most marked in the left circumflex system) without any fixed obstructive lesions. Severe left ventricular wall motion abnormalities were present involving the anterior and inferior segments. A question of so-called tako-tsubo cardiomyopathy (left ventricular apical ballooning syndrome is also raised (see Annals of Internal Medicine 2004: 141:858). The latter is most often reported in post-menopausal, middle-aged to elderly women in the context of acute emotional stress and may cause ST elevations acutely with subsequent T wave inversions. A cocaine-induced cardiomyopathy (possibly related to coronary vasospasm) is a consideration, but was excluded here. Myocarditis may also be associated with this type of ECG and the cardiomyopathic findings here. No fixed obstructive epicardial coronary lesions were detected by coronary arteriography. The ECG findings include: low amplitude QRS complexes in the limb leads (with an indeterminate QRS axis), loss of normal precordial R wave progression (V1-V3), and prominent anterior/lateral T wave inversions.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case211/1350x900.gif", "_type": "mcq", "_caseId": 211}, {"question": "This 38-year-old male alcoholic presented with a tonic clonic seizure and this ECG. What is his echocardiogram most likely to show? (Note: serum levels: calcium 7.3mg/dl; magnesium 1.2mg/dl; albumin 3.3g/d.)", "options": ["Marked left ventricular hypertrophy", "Focal wall motion abnormalities in the anterior septum, consistent with acute ischemia", "Apical variant cardiomyopathy (Yamaguchi's syndrome)", "Marked right ventricular hypertrophy/dilation", "Structurally normal heart"], "correct": 3, "explanation": "d) This very abnormal ECG is most consistent with marked right ventricular hypertrophy (RVH) and dilation. The ECG shows incomplete right bundle branch block (RBBB) with right axis deviation, and diffuse deep T wave inversions in V2-V5. This patient had severe pulmonary hypertension (pulmonary arterial systolic pressure of 97mm Hg) secondary to portopulmonary hypertension associated with alcoholic cirrhosis (see Menon KV, Kamath PS; Clin Liver Dis 2001;5:617-627). Left ventricular hypertrophy would be associated with a tall R wave in V5-6 or aVL, and often with a leftward axis. Apical variant of hypertrophic cardiomyopathy can cause deep T wave inversions, but usually not a right bundle branch block or a right axis. Acute ischemia can cause QT prolongation and T wave inversions; however, ischemia would not explain the combination of a right ventricular conduction delay and right axis deviation in this young adult male. The electrolyte abnormalities by themselves would not cause these deep T wave inversions but may contribute to the long QT. The T wave inversions, simulating anterior ischemia here, are probably due primarily to right ventricular overload (\"strain\"). The ECG also shows as nonspecific findings a long PR interval and relatively low limb lead voltage.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case212/1350x900.gif", "_type": "mcq", "_caseId": 212}, {"question": "A 55-yr-old woman complains of severe dyspnea. The ECG is most consistent with which diagnosis?", "options": ["Acute inferior wall  myocardial infarction", "Mitral stenosis", "Acute asthmatic exacerbation", "Left pneumothorax", "Severe aortic stenosis"], "correct": 2, "explanation": "c) The ECG shows prominent resting sinus tachycardia with an S1Q3T3 pattern. This combination, while not specific, raises the possibility of acute cor pulmonale due to a variety of causes, including acute asthma, acute pulmonary emboli, extensive pneumonitis, etc. The borderline low QRS voltage in the precordial leads (10mm or less in most of the chest leads) is also consistent with chronic obstructive lung disease here. An rSr′ morphology in lead aVR (but not in V1) along with qRS waves in the lateral leads with a normal QRS duration is present. These findings do not strictly qualify for a right ventricular conduction delay but are also consistent with the acute right ventricular overload. P pulmonale (right atrial overload) may also be seen in this context but is not observed here since the P waves are not especially tall. The inferior lead changes are relatively subtle without diagnostic Q waves or ST-T changes to support an ECG diagnosis of inferior myocardial infarction (MI.) The absence of marked left atrial abnormality and signs of right ventricular overload excludes severe mitral stenosis. Left pneumothorax may be associated with a rightward shift in the QRS axis and a marked reduction in lateral precordial QRS voltages with loss of normal R wave progression. The absence of evidence for left ventricular hypertrophy (LVH) essentially excludes critical aortic stenosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case213/1350x900.gif", "_type": "mcq", "_caseId": 213}, {"question": "Middle-aged woman with altered mental status and suspected drug overdose. What is the rhythm?", "options": ["Normal sinus rhythm", "Atrial flutter", "Atrial fibrillation with a regularized ventricular response", "Atrial fibrillation/flutter", "Atrial tachycardia with block"], "correct": 0, "explanation": "a) The rhythm is indeed normal sinus, with prominent baseline artifact simulating atrial fibrillation or flutter. The regular ventricular response makes fibrillation unlikely. If you look carefully, you can see distinct P waves in leads without excessive artifact (e.g., the beginning of the rhythm strip and lead aVF). The artifact in this case could have been related to tremor, and may be seen with Parkinson�s disease and other syndromes. This patient reported taking an excessive amount of clozapine, an antipsychotic agent which may cause tremor.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case214/1350x900.gif", "_type": "mcq", "_caseId": 214}, {"question": "Elderly woman with a recent syncopal episode. What is the rhythm?", "options": ["Multifocal atrial tachycardia", "Atrial fibrillation with a rapid ventricular response", "Atrial flutter with variable block", "Sinus tachycardia with premature atrial complexes", "Paroxysmal supraventricular tachycardia"], "correct": 1, "explanation": "b) Atrial fibrillation is present with a very rapid ventricular response. The rate is irregular with subtle fibrillatory waves apparent between QRS complexes. There is borderline low QRS voltage in the limb leads, a non-specific finding. Slight variations in the QRS complex may be due to subtle variations in QRS conduction associated with the very rapid rate. There are non-specific ST-T changes as well. The absence of multiple different discrete P waves excludes multifocal atrial tachycardia. No sinus P waves are seen, either. Note also that in the elderly (greater than 70 yrs), the probability of a sinus mechanism with heart rates greater than 140/min is quite low (less than 10%). See Pinto DS et al. BMC Cardiovascular Disorders 2003:3:7; available at:http://www.biomedcentral.com/content/pdf/1471-2261-3-7.pdf.No flutter waves are seen. The fibrillatory activity also excludes paroxysmal supraventricular tachycardia due AV nodal reentry (AVNRT), atrio-ventricular reentry (AVRT) or atrial tachycardia (AT). Clinically, this patient had hypertension and type 2 diabetes mellitus.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case215/1350x900.gif", "_type": "mcq", "_caseId": 215}, {"question": "21-yr-old woman with severe dyspnea is scheduled for which of the following cardiac procedures?", "options": ["Aortic valve replacement for critical aortic stenosis", "Mitral valvuloplasty for severe rheumatic mitral stenosis", "Atrial septal defect (ostium secundum) repair", "Mitral valve replacement for severe mitral regurgitation due to prolapse", "Pulmonic valvuloplasty for severe pulmonic valve stenosis"], "correct": 1, "explanation": "b) The ECG shows findings most consistent with severe mitral valve stenosis. Sinus rhythm is present with an S1Q3 pattern along with QR complexes in lead V1 and a normal QRS duration, strongly suggesting right ventricular hypertrophy (RVH). The R wave in V2 is also quite prominent, consistent with RVH in context of these other findings. Also of note, the P waves (broad in lead II; prominently negative in lead V1) are consistent with left atrial abnormality (overload). This combination of ECG signs of left atrial overload plus right ventricular hypertrophy is classic for mitral stenosis. Aortic stenosis, in contrast, should produce left ventricular hypertrophy. Atrial septal defects (ostium secundum) typically are associated with incomplete or complete right bundle branch block and a rightward QRS axis. Left atrial abnormality would not be expected with a pure atrial septal defect since it produces right atrial volume overload. Severe mitral regurgitation produces left ventricular volume loads and ECG signs of left ventricular hypertrophy. Severe pulmonic stenosis typically produces ECG findings of marked RVH (e.g., tall R waves in the right chest leads) with right axis deviation and usually right atrial overload, in contrast to the combination of left atrial abnormality and RVH seen here. The patient had severe mitral stenosis (calculated valve orifice area of 1.0cm2) and severe pulmonary artery hypertension (75/35mmHg). She underwent successful balloon mitral valvuloplasty with a transseptal catheter approach.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case216/1350x900.gif", "_type": "mcq", "_caseId": 216}, {"question": "What is the rhythm in this 35-yr-old woman? (Note: there is slight baseline artifact due to electrical interference or poor electrode contact.)", "options": ["Sinus rhythm with premature atrial complexes", "Wandering atrial pacemaker", "Sinus rhythm with Mobitz type 1 second degree AV block", "Sinus rhythm with sinus pauses", "Physiologic sinus arrhythmia associated with respiration"], "correct": 4, "explanation": "e) This ECG shows an important normal variant, namely respiratory sinus arrhythmia (RSA). The progressive fluctuations in sinus rate are quite apparent here, going from slow to faster and back to slower again at the end of the rhythm strip. This heart rate variation over about 10 sec is due to cyclic changes in vagal tone associated with the two major phases of respiration. With inspiration there is increased filling of the right heart and a concomitant decrease in left ventricular output. As a result of this and other factors related to breathing, vagal tone quickly decreases and the heart rate increases, thereby increasing cardiac output. With expiration, the opposite changes occur and vagal tone transiently increases, associated with a decrease in heart rate. RSA is an important marker of intact cardiac autonomic (parasympathetic) function and is most noticeable in young, healthy individuals. RSA declines with age and with conditions that impair neuroautonomic regulation, such as diabetes mellitus and congestive heart failure. Note that the PR intervals are constant and all the P waves are conducted, excluding AV Wenckebach. The P waves are also consistent in morphology and axis, excluding wandering atrial pacemaker. No prolonged sinus pauses are present. The heart rate here changes in a progressive way, in contrast to the abrupt shortening of the RR intervals (with a change in P wave appearance) seen with premature atrial complexes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case217/1350x900.gif", "_type": "mcq", "_caseId": 217}, {"question": "This ECG shows which ONE of the following?", "options": ["Complete left bundle branch block", "Accelerated idioventricular rhythm", "Left ventricular hypertrophy and an intraventricular conduction delay", "Wolff-Parkinson-White pre-excitation pattern", "Acute anterior wall myocardial infarction with intraventricular conduction delay"], "correct": 3, "explanation": "d) The classic triad of Wolff-Parkinson-White (WPW) pre-excitation is present with wide QRS complex, a short PR interval and delta waves. The latter are represented by the notching or slurring of the initial portion of the QRS complex. In this ECG, the delta waves are predominantly negative in lead V1 and lead III, and positive in other leads (I, aVL, and the lateral chest leads). This distinctive pattern is due to electrical activation of the ventricles during sinus rhythm via an atrio-ventricular bypass tract, an accessory conduction pathway, which allows an impulse to short-circuit the slowly conducting AV node. Pre-exciting the ventricles in this abnormal way during sinus rhythm causes the PR interval to be shortened. The QRS is widened, not because of a bundle branch block or related delay in activation, but because the pre-excitation actually starts the QRS off earlier than normal. Of note, the bypass tract activates the myocardium, rather than the faster specialized (His-Purkinje) conducting system in the ventricles. This early myocardial conduction imparts the distinctive notching or slurring (delta wave) to the initial part of the QRS. The polarity of the delta wave on the 12-lead ECG provides a major clue to the location of the bypass tract. For example, when the bypass tract pre-excites the lateral wall of the left ventricle, the initial QRS vector will point from left to right. Thus, the delta wave with a lateral bypass tract will be negative in lead I and positive in lead VI. In the present ECG, what does the vector of the delta wave indicate about the likely location of the bypass tract? Ans: the fact that the delta waves are predominantly negative in VI and positive in the lateral leads is consistent with a bypass tract inserting into the free wall of the right ventricle. WPW pre-excitation is clinically important because it is a substrate for the development of tachycardias, especially atrio-ventricular reentrant tachycardia (AVRT). Some patients may have multiple bypass tracts. The therapy of choice for patients with WPW syndrome with AVRT or atrial fibrillation is radiofrequency ablation of the bypass tract(s). For an excellent tutorial presentation and animation of these and related supraventricular arrhythmias, see: http://blaufuss.org. The patterns of WPW may be mistaken for bundle branch blocks, hypertrophy and infarction due to the anomalous pattern of ventricular activation which can lead to tall R waves and Q waves in selected leads, along with the wide QRS.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case218/1350x900.gif", "_type": "mcq", "_caseId": 218}, {"question": "The ECG from this 81-yr-old woman shows which of the following?", "options": ["Sinus rhythm with Mobitz I second degree (Wenckebach) AV block", "Sinus rhythm  with Mobitz II AV block", "Sinus rhythm with isorhythmic AV dissociation", "Sinus rhythm with third degree (complete) AV block and a junctional escape pacemaker", "Atrial tachycardia with complete heart block"], "correct": 3, "explanation": "d) Sinus rhythm with a rate of about 65/min is present. The ventricular QRS rate is much slower (about 40/min), with a normal (�narrow�) QRS duration. There is no relationship between the P waves and QRS complexes. Thus, the mechanism is sinus rhythm with third degree or complete AV block. The narrow QRS complexes indicate that the block is in the AV node area and that the ventricles are being paced by a subsidiary (�back-up� or escape) pacemaker in the AV junction area. Extra credit! An interesting and easily overlooked finding here is the subtle variability in the sinus (P-P) rate. If you look carefully at the last section of the rhythm strip, for example, you will note that the P-P interval with the QRS in-between (QRS complex #6) is shorter than the previous P-P interval which does not have an intervening QRS. This pattern, called ventriculo-phasic sinus arrhythmia, is often seen with high grade heart block. The mechanism is generally attributed to rapid, baroreceptor-mediated changes in vagal tone associated with the presence or absence of ventricular contraction. Note also the prominent P waves here consistent with left atrial abnormality. This patient, with a history of hypertension and coronary artery disease, was symptomatic with increased fatigue and underwent placement of a dual-chamber pacemaker.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case219/1350x900.gif", "_type": "mcq", "_caseId": 219}, {"question": "This ECG from an elderly woman shows which ONE of the following rhythms?", "options": ["Sinus tachycardia at a rate of about 100/min with 2:1 AV block", "Sinus bradycardia at a rate of about 50/min with prominent U waves", "Sinus rhythm with 3:2 AV Wenckebach", "Sinus rhythm with complete heart block", "Multifocal atrial tachycardia"], "correct": 0, "explanation": "The rhythm is sinus tachycardia (P wave rate is about 100/min) with 2:1 (second degree) AV block. In this case, the non-conducted (�extra�) sinus P waves on alternate beats simulate U waves located at the end of the T waves. The patient subsequently developed complete heart block and underwent permanent pacemaker implantation. The ECG also shows inferior and anterior Q waves suggesting prior myocardial infarctions. Of interest, multiple echocardiograms showed normal left ventricular (LV) function and no evidence of any wall motion abnormalities. Mild symmetric LV hypertrophy was present with a systolic LV outflow tract gradient raising the question of a hypertrophic cardiomyopathy variant which could account for Q waves in the absence of infarction. Note: Pure 2:1 AV block is considered a special category of second degree AV block and is not characterized as type 1 or type 2 since the block may be nodal or infra-nodal, even with a narrow (normal) QRS duration. In the latter instance, infra-nodal block, if present, is typically in the His area. The presence of typical AV Wenckebach in conjunction with episodes of 2:1 block argues for a nodal mechanism. Worsening block with increased sinus rate suggests an infranodal mechanism. Note that the mean QRS axis here is not sufficiently leftward to qualify for left anterior fascicular block (-45 degrees or more).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case220/1350x900.gif", "_type": "mcq", "_caseId": 220}, {"question": "This ECG from an elderly man (with a possible prior inferior myocardial infarction shows an interesting rhythm most consistent with which of the following diagnoses?", "options": ["Sinus rhythm with intermittent 2:1 AV block", "Physiologic (respiratory) sinus arrhythmia", "Atrial flutter with variable block", "Sinus rhythm with intermittent 2:1 SA block", "Sinus rhythm with AV Wenckebach"], "correct": 3, "explanation": "d) The initial rhythm for the first 10 beats is sinus at a rate of about 88/min followed by abrupt slowing of the sinus frequency to close to half that rate. All the P waves are conducted (with a minimally prolonged PR interval) excluding second degree AV block. This pattern of abrupt change is consistent with 2:1 block in the sino-atrial (SA) node area (exit block) so that only every other sinus impulse is effectively conducted to the atria. This pattern is analogous to 2:1 AV block, except in the latter case you see two P waves/QRS. With 2:1 SA block, the impulse is blocked from leaving the (SA) node itself, so an entire P-QRS cycle is �missing.� This pattern is relatively rare and may be due to intrinsic SA node disease (�sick sinus syndrome�) or specific factors (drugs, increased vagal tone, etc.) that depress SA conduction. The abrupt change excludes physiologic respiratory sinus arrhythmia (RSA), which produces more gradual increases and decreases in heart rate coupled to inspiration and expiration, respectively. Further, RSA is most evident in young healthy subjects and is not usually apparent in the elderly to any noticeable extent. Therapy of 2:1 SA block consists in addressing reversible causes of sinus node dysfunction. If prolonged, symptomatic sinus pauses still occur, a pacemaker is indicated.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case221/1350x900.gif", "_type": "mcq", "_caseId": 221}, {"question": "Elderly man with hypertension and asthma complains of palpitations and dizziness. This resting ECG is most consistent with which of the following?", "options": ["Sinus tachycardia", "Paroxysmal supraventricular tachycardia, most likely AV nodal reentrant tachycardia", "Atrial flutter with 2:1 block", "Multifocal atrial tachycardia", "Atrial fibrillation  with a regularized ventricular response"], "correct": 1, "explanation": "b) The ECG shows a very regular narrow complex tachycardia at a rate of close to180/min. The rate is too fast for sinus tachycardia in the elderly and no sinus P waves are seen. The regularity and absence of multiple different P wave excludes multifocal atrial tachycardia (MAT.) Regularization of the ventricular response with atrial fibrillation (AF) is rare and usually only seen at much slower rates (i.e., under 110-120/min). No flutter waves are seen and usually the ventricular response with atrial flutter and 2:1 conduction is 120-160/min. Atrial flutter at a rate of 360/min (to give a regular ventricular response at 180/min) would be highly unusual. The narrow complex tachycardia here is a type of paroxysmal supraventricular tachycardia (PSVT.) If you look carefully, you will see subtle negative P waves just after the QRS in lead II and positive P waves just after the QRS in lead aVR. This very short RP interval is most consistent with AV nodal reentry and retrograde atrial activation. Therapeutic options to prevent recurrences of AVNRT include drugs and catheter ablation. The ECG in this case also shows probable left ventricular hypertrophy by Sokolow-Lyon criteria (consistent with the hypertension history) and non-specific ST-T changes during the tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case222/1350x900.gif", "_type": "mcq", "_caseId": 222}, {"question": "The ECG findings here are most consistent with which life-threatening serum laboratory abnormality? (Note: there is 60 Hz electrical interference in some of the leads here, esp. V1-V2.)", "options": ["Na+ 110mEq/L", "K+ 8.5mEq/L", "K+ 2.0mEq/L", "Glucose 20mg/dl", "Elevated CK-MB (20%)"], "correct": 1, "explanation": "b) The ECG findings are diagnostic of severe hyperkalemia. The two key features are a very wide QRS complex (intraventricular conduction delay) and no evident P waves so that the underlying atrial mechanism cannot be determined. (The bizarre QRS morphology seen here with wide terminal R waves in V1 and V2 and very wide S waves in other leads is also not uncommon in this context; although a variety of other wide complex morphologies are also seen with severe hyperkalemia. See other Wave-Maven cases for multiple other examples.) Of further note, ST elevations localized in leads V1-V2, as seen here, are also sometimes observed with severe hyperkalemia in the absence of acute ischemia/myocardial infarction (MI), although the latter cannot be excluded by the ECG alone. CK-MB and troponin assays were negative in this case. The patient had severe hyperkalemia with combined renal and hepatic failure (hepato-renal syndrome).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case223/1350x900.gif", "_type": "mcq", "_caseId": 223}, {"question": "This ECG from a 76-yr-old man shows all of the following except which finding?", "options": ["Sinus bradycardia", "Wolff-Parkinson-White pre-excitation with a posterior wall bypass tract", "Inferior (and possibly posterior) wall myocardial infarction of indeterminate age", "Prolonged PR interval", "Right bundle branch block"], "correct": 1, "explanation": "b) The ECG findings include sinus bradycardia at 58/min with a prolonged PR interval at 260 ms (�first degree AV block�), right bundle branch block (RBBB), and most important, evidence of inferior and possibly posterior myocardial infarction (MI). The latter is indicated by the significant Q waves in leads II, III and aVF with T wave inversions. The prominent initial R waves in V2 and V3 in this case could be due to associated posterior MI and/or the RBBB alone. Of note, the T waves are upright in leads V2 and V3, whereas uncomplicated RBBB should produce secondary T wave inversions in leads with rSR′-type complexes. The upright T waves in leads V2 and V3 are reciprocal to primary ischemic T wave inversions in the inferior-posterior distribution. (There are also nonspecific ST-T changes in lateral leads V5 and V6 that may be due to ischemia as well.) The P waves are also broad consistent with left atrial abnormality (LAA). This finding in the presence of RBBB suggests underlying left ventricular hypertrophy (LVH) as well, although standard voltage criteria are not met. (See, for example A. Mehta et al. Am J Cardiol 2002;85:354-9). This patient had a history of severe coronary artery disease and aortic stenosis. Echocardiogram revealed a zone of severe inferior-posterior wall motion abnormality consistent with the prior MI. Left atrial enlargement was also noted, along with symmetric LVH. While Wolff-Parkinson-White (WPW ) with posterior wall pre-excitation can produce wide QRS superficially resembling a RBBB pattern, the initial part of the QRS will show a delta wave (vs. a terminal conduction delay in RBBB) and the PR interval will, of course, be short.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case224/1350x900.gif", "_type": "mcq", "_caseId": 224}, {"question": "The ECG from an elderly woman is most consistent with which of the following diagnoses?", "options": ["Hypertension", "Addison�s disease", "Chronic obstructive lung disease", "Mitral stenosis", "Left anterior fascicular block"], "correct": 0, "explanation": "a) The ECG, from a patient with longstanding systemic hypertension, shows diagnostic evidence of combined left atrial abnormality (LAA) and left ventricular hypertrophy (LVH). Note the broad, double-humped P waves in lead II and the biphasic P waves with a prominent negative component in lead V1. The QRS voltage is also prominent in both lead aVL (14mm) and the precordial leads (SV1 plus RV5=35mm). There is nonspecific ST segment sagging the lateral precordial leads. What about the other considerations? The QRS axis is horizontal, but not frankly leftward (that is not more than -30 degrees). Further, the cut-off for left anterior fascicular block (LAFB ) is actually -45 degrees. Addison�s disease is associated with nonspecific findings in general and sometimes low QRS voltage attributed to cardiac atrophy. ECG signs of severe COPD include low QRS voltage, vertical to rightward QRS and P wave axes, tall P waves from right atrial overload (�p pulmonale�) and slow R wave progression. Mitral stenosis classically produces a combination of left atrial abnormality (or atrial fibrillation) plus evidence of right ventricular hypertrophy due to pulmonary hypertension.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case225/1350x900.gif", "_type": "mcq", "_caseId": 225}, {"question": "60-yr-old woman complains of the sudden onset of palpitations. This resting ECG is most consistent with which of the following diagnoses? (Note that there is some artifactual distortion of the waveforms in the last beats in leads aVR, aVL and aVF.)", "options": ["Sinus tachycardia", "Paroxysmal supraventricular tachycardia, most likely AV nodal reentrant tachycardia", "Atrial flutter with 2:1 block", "Multifocal atrial tachycardia", "Atrial fibrillation with a regularized ventricular response"], "correct": 1, "explanation": "b) The ECG shows a very fast and very regular narrow complex tachycardia at a rate of 200/min. The rate is much too fast for resting (or exertional) sinus tachycardia in this older age group and no sinus P waves are seen. The regularity and absence of multiple different P wave excludes multifocal atrial tachycardia (MAT.) Regularization of the ventricular response with atrial fibrillation (AF) is rare and usually only seen at much slower rates (i.e., under 110-120/min). No flutter waves are seen and usually the ventricular response with atrial flutter and 2:1 conduction is 120-160/min. Atrial flutter at a flutter rate of 400/min (to give a regular ventricular response at 200/min) or at 200/min with 1:1 conduction would be highly unusual. The narrow complex tachycardia here is most likely a specific type of paroxysmal supraventricular tachycardia (PSVT.) The pathophysiology involves a small reentrant circuit in the AV node area, and therefore is termed AV nodal reentrant tachycardia (AVNRT). With typical AVNRT, the P waves are often not apparent due to simultaneous stimulation of atria and ventricles. Alternatively, retrograde (negative in lead II, positive in aVR) P waves may appear just before the QRS or, more commonly, just after the QRS (at the J point, just after the QRS). In the present ECG, no definite P waves are seen, although retrograde P waves just after the QRS are not excluded. Acute therapy of sustained AVNRT usually involves vagal maneuvers (Valsalva or carotid sinus massage, if not contraindicated), and then intravenous drugs, especially adenosine, calcium channel blockers (diltiazem or verapamil), or sometimes beta-blockers, depending on the clinical context. For patients with hemodynamic collapse (shock), pulmonary edema or severe ischemia who do not respond promptly to initial therapy, synchronized DC cardioversion may be required. Therapeutic options to prevent recurrences of AVNRT include catheter ablation and drugs. The ECG in this case also shows non-specific ST-T changes during the tachycardia. See: Page RL, et al. 2015 ACC/AHA/HRS guideline for the management of adult patients with supraventricular tachycardia: executive summary: a report of the American College of Cardiology/American Heart Association Task Force on Clinical Practice Guidelines and the Heart Rhythm Society. Circulation 2016:133:e471-e505.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case226/1350x900.gif", "_type": "mcq", "_caseId": 226}, {"question": "Which one of the following statements about this ECG from an elderly man with metastatic prostate cancer and dehydration is not correct?", "options": ["The rhythm is borderline sinus tachycardia with premature atrial complexes", "The �peaked,� narrow-based T waves raise consideration of mild hyperkalemia", "Borderline low limb lead QRS voltage is present", "Ventricular repolarization is prolonged", "Nonspecific ST-T sagging is present"], "correct": 3, "explanation": "d) Ventricular repolarization prolongation is not present. The QT interval (about 320 msec) is normal for the rate and prominent U waves are not seen. The borderline low limb lead QRS voltage is a non-specific finding here. Statements a, b, c and e are all correct. The serum potassium turned out to be normal despite the slight T wave peaking.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case227/1350x900.gif", "_type": "mcq", "_caseId": 227}, {"question": "What is this arrhythmia?", "options": ["Sinus tachycardia with premature atrial complexes", "Multifocal atrial tachycardia", "Atrial fibrillation", "Atrial flutter with variable block", "AV nodal reentrant tachycardia"], "correct": 2, "explanation": "c) This is a classic example of atrial fibrillation (AF) with a very rapid ventricular response (average about 170/min). The baseline shows the characteristic wriggly fibrillatory activity (not discrete P waves) and the ventricular response is highly irregular (�irregularly irregular�). The absence of clearly defined P waves excludes sinus rhythm with premature atrial complexes (PACs) or multifocal atrial tachycardia (MAT.) There are also no consistent flutter (�saw-tooth�) waves and this degree of beat-to-beat irregularity with atrial flutter is rare. AV nodal reentrant tachycardia (AVNRT), a specific type of paroxysmal supraventricular tachycardia (PSVT), is usually highly regular. The initial therapy in patients with AF with a rapid ventricular response is directed at slowing the heart rate. This effect is usually accomplished by using drugs that slow impulse conduction through the AV node, such as calcium channel blockers (diltiazem, verapamil), beta-blockers, or digoxin, as well as by addressing underlying factors that enhance adrenergic tone (e.g., hyperthyroidism, fever, heart failure, etc). For a detailed discussion of diagnostic and therapeutic considerations in AF, see: http://www.acc.org/clinical/guidelines/atrial_fib/af_index.htm", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case228/1350x900.gif", "_type": "mcq", "_caseId": 228}, {"question": "What is the rhythm in this ECG from a very elderly woman with lightheadedness following therapy for atrial fibrillation?", "options": ["Sinus bradycardia with marked first degree AV block", "AV junctional bradycardia", "Sinus rhythm with complete heart block", "Accelerated idioventricular rhythm", "Atrial fibrillation with a slow, regularized ventricular response"], "correct": 1, "explanation": "b) This ECG presents a classic example of an AV junctional bradycardia. Note that the normal width QRS complexes at a rate of 56/min are each followed by a single retrograde (negative in II, positive in aVR) P wave. The escape pacemaker, therefore, is located in the AV junction area, causing activation of the atria from bottom to top, opposite of the normal depolarization pattern. The retrograde P waves with AV junctional rhythms may be located just after the QRS (present case), just before the QRS, or may be �hidden� in the QRS if atrial and ventricular depolarization occur simultaneously. In the latter case, the baseline between QRS complexes will be flat. The AV junctional bradycardia in this case was probably related to the multiple medications the patient had recently received for atrial fibrillation, including metoprolol, verapamil and digoxin (low therapeutic level). Myocardial infarction was ruled out. In light of her recent atrial fibrillation history and medication-related bradycardia, she underwent dual chamber pacemaker placement with adjustment of her drugs. The ECG also shows evidence of left ventricular hypertrophy (LVH), non-specific ST-T changes (which could be due to digoxin, LVH, ischemia, etc), and marked left axis deviation consistent with left anterior fascicular block (prior inferior wall myocardial infarction (MI) cannot be excluded in light of the minuscule r waves in lead II, III and aVF).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case229/1350x900.gif", "_type": "mcq", "_caseId": 229}, {"question": "The following ECG from a critically-ill middle-aged woman with shock indicates which diagnosis?", "options": ["Acute pericarditis", "Acute pulmonary embolism", "Hyperkalemia", "Acute infero-postero-lateral myocardial infarction", "Hypothermia"], "correct": 3, "explanation": "d) The ECG shows sinus tachycardia, borderline low QRS voltage, and marked ST segment elevations in the inferior and lateral leads, along with ST segment depressions in anterior leads V1-V4. The ST elevations (�current of injury� pattern) indicate transmural ischemia of the infero-lateral wall. The ST depressions are most consistent in this context with reciprocal change from the ST elevations generated by the acute posterior and lateral ischemia. (Concomitant anterior subendocardial ischemia cannot be excluded as a cause of the ST depressions). In contrast, acute pericarditis causes diffuse ST segment elevation (e.g., leads I, II, III, aVL, aVF, and the precordial leads). Reciprocal ST depressions of the type seen here (V1-V4), however, are never a feature of pericarditis alone. Acute pulmonary embolism may produce changes simulating acute MI, including new Q waves in leads III and aVF with ST-T changes (S1Q3T3 pattern) or T wave inversions in the right to mid-chest leads. However, the findings seen here are not consistent with acute cor pulmonale/right ventricular overload due to pulmonary embolism. Hyperkalemia also does not produce ST elevations in this distribution. (ST elevations may occur in leads V1-V2 or V3 with marked hyperkalemia). Severe systemic hypothermia may be associated with a characteristic �bulging� of the early part of the ST segment (Osborn waves or J waves), but not with the classic localized current of injury pattern with reciprocal ST changes present in this ECG. Cardiac catheterization revealed acute occlusion of a dominant left circumflex coronary artery (along with occlusion of a smaller right coronary artery.) Echocardiography confirmed extensive wall motion abnormalities of the inferior, posterior and lateral segments of the left ventricle. The anterior wall was hyperkinetic.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case230/1350x900.gif", "_type": "mcq", "_caseId": 230}, {"question": "A 67-yr-old man complains of vague chest pain after recent \"coronary artery bypass graft (CABG) surgery\". The ECG is most consistent with which diagnosis?", "options": ["Graft occlusion with infero-lateral ischemia", "Normal variant early repolarization with musculoskeletal pain", "Post-operative acute pericarditis", "Brugada�s syndrome unmasked by cardiac surgery", "Left pneumothorax"], "correct": 2, "explanation": "c) The ECG shows subtle changes of acute pericarditis with diffuse ST segment elevations (lead I, II, aVL, V2-V6) and slight reciprocal ST depression in lead aVR. The ST changes are most subtle in the limb leads and most pronounced in V2-V4. In addition, there are classic PR segment deviations which are in the opposite direction to the ST deviations, namely up in lead aVR and down in the infero-lateral leads. This pattern of ST-PR discordance is characteristic of acute pericarditis. The changes are due to inflammation of the pericardium and underlying epicardium of the ventricles and atria, with resultant injury currents. The ventricular injury current vector is oriented toward the main mass of the left ventricle (infero-laterally), while the atrial injury current vector (inscribed during the PR segment) is oriented upward and to the right. Thus, the PR and ST segments point in opposite directions. Ischemia/myocardial infarction can be further excluded by normal cardiac enzymes and, if indicated, by an echocardiogram to confirm the absence of any new wall motional abnormalities and to look for pericardial effusion which may or may not be present with post-operative pericarditis. Associated left pleural effusion may be present (pleuro-pericarditis). Pericarditis can occur in the absence of these ECG changes. Chest pain, if noted, may be pleuritic or more variable in quality, and a multi-component friction rub may be heard in some cases, at least intermittently. Often, with ECG evidence of pericarditis in the post-operative setting, no rub is heard and classic symptoms may be masked by musculoskeletal pain or analgesic medications. The early repolarization pattern refers to normal variant ST elevations, most marked usually in the mid-chest leads and not accompanied by PR segment shifts, as seen in the present case. Brugada�s syndrome consists of ST elevations in the right precordial leads (V1-V2 or V3) with a right bundle branch block appearing pattern. This pattern, which may be a marker of risk for ventricular tachyarrhythmias, is not present here. Left pneumothorax is not associated with the ST-PR changes seen here, but with loss of lateral R wave progression and sometimes markedly decreased QRS voltage in the left chest leads due to rightward mediastinal shift. The frontal plane QRS axis may be shifted in a vertical or rightward direction.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case231/1350x900.gif", "_type": "mcq", "_caseId": 231}, {"question": "ECG from a 66-yr-old man with alcoholic cirrhosis and hemodynamic collapse. ECG two weeks prior to this admission showed normal intervals. The present ECG is most consistent with which critical serum laboratory abnormality? (Note: The wavy baseline here is probably due to movement artifact in this critically-ill patient and makes identification of the P waves difficult.)", "options": ["K+ 8.2  mEq/L", "Ca++ 15.2  mg/dL", "TSH  >100 microU/ml (markedly increased)", "Na+ 110  mEq/L", "CK 3500 IU/L with 15% (increased) MB fraction"], "correct": 0, "explanation": "a) The ECG is very suggestive of severe hyperkalemia with the combination of symmetrically peaked T waves (V2-V4) with a wide QRS (left bundle branch block pattern here) and a long PR interval (about 0.26 sec�see lead V2). The wide QRS with severe hyperkalemia can resemble a left or right bundle branch block pattern or often shows more non-specific type of intraventricular conduction disturbance. The effects depend to some extent on any underlying conduction disturbances. Hypercalcemia produces shortening of the QT interval, which is actually prolonged here in the context of the very wide QRS. (The patient�s calcium was low at 7.6 mg/dL with a very low albumin at 1.6 gm/dL.) Severe hypothyroidism (elevated TSH) may produce sinus bradycardia and low QRS voltage. Hyponatremia does not produce distinct ECG findings. The prominent T waves raise consideration of hyperacute repolarization changes due to acute ischemia. However, the ST segments are not elevated and the T waves have a relatively narrow-based and symmetric shape very suggestive of hyperkalemia. Total CK level here was normal. The patient had ascites and renal failure with GI bleeding and probable hepatorenal syndrome, accounting for the severe hyperkalemia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case232/1350x900.gif", "_type": "mcq", "_caseId": 232}, {"question": "Which of the following statements about this ECG from a 23-yr-old woman with chest pain is correct?", "options": ["The ECG is within normal limits", "The ECG shows right ventricular hypertrophy", "The ECG shows left ventricular hypertrophy", "The ECG is consistent with severe hypokalemia", "The ECG is consistent with severe hypocalcemia"], "correct": 0, "explanation": "a) The ECG shows sinus rhythm at a rate of about 60/min and is completely within normal limits. The electrical axis (about +50 degrees) and basic intervals (PR, QRS and QT) are all normal. The P waves are normal. The QRS complexes have a normal morphology. The precordial leads show normal R wave progression (transition zone between V3 and V4). The ventricular repolarization (ST-T complex) is physiologic (with a normal QT interval) making severe hypokalemia or hypocalcemia unlikely. Severe hypokalemia generally causes repolarization (QT-U) prolongation (usually with flat T waves and sometimes ST sagging). Severe hypocalcemia prolongs the plateau phase of the ventricular action potential, associated QT prolongation due to a �stretched out� ST segment.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case233/1350x900.gif", "_type": "mcq", "_caseId": 233}, {"question": "A 34-yr-old woman with a history of Hodgkin�s disease complains of severe dyspnea. What diagnosis is most consistent with the following ECG?", "options": ["Critical mitral stenosis", "Severe pulmonary fibrosis with cor pulmonale", "Critical aortic stenosis", "Left pneumothorax", "Pericardial tamponade"], "correct": 1, "explanation": "b) The ECG shows prominent resting sinus tachycardia (135/min) with two classic findings of right heart overload: 1) rightward QRS axis, and 2) right atrial overload (�p pulmonale�) pattern with tall, narrow (�peaked�) P waves (leads II, aVF). The patient had a history of severe pulmonary fibrosis following therapy for Hodgkin�s disease with radiation and chemotherapy. Note that the P wave, while biphasic in V1, has a relatively narrow negative component, not suggestive of left atrial abnormality, which would be expected with critical mitral stenosis. Furthermore, the P wave is not broad (120ms or more in duration) in any of the other leads, also strongly against left atrial abnormality and mitral stenosis. Critical aortic stenosis is almost always associated with signs of left ventricular hypertrophy, not present here. Left pneumothorax (with rightward mediastinal shift) may cause right axis deviation. However, in such cases, there is usually a marked loss of QRS amplitude in the lateral leads. No ECG signs of pericardial tamponade are present (low QRS voltage or electrical alternans).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case234/1350x900.gif", "_type": "mcq", "_caseId": 234}, {"question": "A 70-yr-old man presents with severe chest pain, nausea, vomiting and diaphoresis. Right-sided chest leads are shown (i.e., V1R to V6R). The baseline is uneven probably due to suboptimal electrode contact or patient movement. Correct statements about this ECG from a critically-ill patient include all of the following except which ONE?", "options": ["The rhythm is atrial fibrillation with a rapid ventricular response", "Evidence of acute inferior wall  myocardial infarction is present", "Evidence of acute right ventricular ischemia is present", "ST depression leads V1R and V2R may be reciprocal to acute posterior ST elevation", "The Q waves in the precordial leads indicate extensive underlying anterior myocardial infarction"], "correct": 4, "explanation": "e) The ECG shows atrial fibrillation with subtle signs of acute inferior myocardial infarction (MI) with ST elevations intermittently apparent in leads II, III and aVF. The right-sided chest leads show evidence of concomitant right ventricular (RV) ischemia/MI with slight ST elevations in leads V4R to V6R. (The ST changes here are somewhat difficult to assess because of the superimposed fibrillatory waves and the baseline movement.) The ST depression in leads V1R and V2R is likely reciprocal to acute posterior (and possibly lateral) ischemia with ST elevations in that distribution. The Q waves in the right chest leads are not of diagnostic significance, however, and do not indicate anterior MI. Note: With right chest leads, lead V1R is placed in the standard V2 position, while V2R is in the standard V1 position. The other leads V3R-V6R) are in their usual relative locations, just on the right side of the chest. At the time of emergency cardiac catheterization, the patient, as expected with this type of acute inferior wall/right ventricular MI/ischemic syndrome had complete proximal occlusion of a dominant right coronary artery.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case235/1350x900.gif", "_type": "mcq", "_caseId": 235}, {"question": "The following ECG is from a critically ill young adult woman in the intensive care unit requiring endotracheal intubation. She has Type 1 diabetes mellitus and respiratory failure due to pneumonitis and pleural effusions. The ECG shows all of the following, except:", "options": ["Sinus tachycardia", "Electrical alternans", "Borderline right axis deviati
