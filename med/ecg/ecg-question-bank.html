the context of the VT, but acute ischemia or even infarction, e.g., as a consequence of the tachycardia, is not excluded.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case502/1350x900.gif", "_type": "mcq", "_caseId": 502}, {"question": "ECG from a 35 year old man with no risk factors for coronary disease. Serum biomarkers for acute infarction were negative. The ECG, especially in this context, is virtually pathognomonic of which ONE of the following entities?", "options": ["Hypertrophic cardiomyopathy (HCM)", "Brugada pattern", "Wolff-Parkinson-White pre-excitation (postero-lateral bypass tract)", "Infero-postero-lateral MI (silent)", "Normal variant \"athletes heart\""], "correct": 0, "explanation": "The ECG shows sinus bradycardia. The PR interval is at lower normal limits and the rate corrected QT is borderline prolonged. What are striking are the relatively narrow, but deep and sharply inscribed (\"lancet-like\") Q waves in the inferior and antero-lateral (V4-V6) leads (and a qR in V3) with relatively tall R waves in V1 and V2. The T waves are also biphasic to inverted in V1 and V2, as well as in I and aVL, and upright in the leads with prominent Q waves. Slight ST segment elevation is present in the inferior leads. Traditional voltage criteria for LVH are not met. The transthoracic echocardiogram showed classic asymmetric septal hypertrophy (HSM), with a hyperdynamic left ventricle. HCM is an important cause of \"pseudo-infarct\" Q waves, attributable, at least in part, to increased septal forces. However, the ECG can vary widely from non-diagnostic or normal to showing classical signals of LVH. Management issues relate to treating and preventing sustained atrial and ventricular arrhythmias, including sudden cardiac arrest, possible ablation therapy of the hypertrophied septum, prevention and management of syncope with abrupt upright posture or with dehydration, genetic testing and counseling, changes with aging, among others. Absence of ECG abnormalities does not exclude the HCM syndrome, as family studies with affected ECG members have repeatedly demonstrated.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case503/1350x900.gif", "_type": "mcq", "_caseId": 503}, {"question": "ECG from an older man. This recording, showing right bundle branch block and marked left axis deviation consistent with \"bifascicular\" block, also shows which ONE of the following?", "options": ["Sinus rhythm with Mobitz II (infranodal) block, with 3:2 and 2:1 AV conduction", "Sinus rhythm with AV Wenckebach, with variable AV nodal block (Mobitz I)", "Sinus rhythm with complete (third degree AV) heart block", "Sinus rhythm with supraventricular ectopy", "Sinus rhythm with SA exit block"], "correct": 0, "explanation": "The ECG shows sinus rhythm (SA rate about 70/min) with variable (3:2 and 2:1) AV block, with a near constant PR interval in the conducted beats. These findings, in concert with the wide complex QRS complexes that are consistent with bifascicular block, point strongly to infranodal (type II) AV block. In addition, the ECG shows left atrial abnormality, along with voltage criterion (aVL) for left ventricular hypertrophy (history of systemic hypertension). Note the subtle sinus rate variability such that the P-P intervals with QRS complexes intervening tend to be minimally shorter than the ones without. This finding, consistent with ventriculophasic sinus arrhythmia, does not have any prognostic implications. The key findings here of infranodal (type II) block with a widened QRS (with or without symptoms), constitute a \"Class I\" indication for implantation of a dual chamber pacemaker. (Note: very (!) subtle infranodal AV Wenckebach cannot be excluded in the 3:2 beats in this surface ECG; but the constellation of findings in this elderly man all point to infranodal and not nodal disease, avoiding any confusion created by the Mobitz I/II eponymic classification.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case504/1350x900.gif", "_type": "mcq", "_caseId": 504}, {"question": "ECG from a middle-aged man with palpitations and a history of ablation therapy for atrial fibrillation and atrial flutter. This rhythm is most consistent with which of the following sets of diagnoses? (Note: there is artifact distorting the first QRS complexes in leads II and III.)", "options": ["Sinus tachycardia with Mobitz I AV block", "Sinus tachycardia with Mobitz II AV block", "Atrial fibrillation with a rapid ventricular response", "Atrial flutter vs. atrial tachycardia with variable AV block", "Multifocal atrial tachycardia (MAT) with variable AV conduction"], "correct": 3, "explanation": "The ECG shows a narrow complex tachyarrhythmia with regular occurring atrial waves, which are negative in aVL, upright in lead II, biphasic in V1-V2 and positive in V3-V6, with an atrial rate of about 215/min. The \"P\" wave axis is vertical at about +80 degrees. There is variable AV conduction (predominantly 2:1). The atrial rate is far too fast for resting sinus tachycardia and the atrial rate and morphology are too consistent for MAT. The surface ECG might suggest a focal atrial tachycardia; however the site of the atrial tachyarrhythmia on EP study was actually located to the mitral valve area in this patient with prior ablations for atrial fibrillation and atrial flutter. The mechanism of the present arrhythmia was left atrial flutter/tachycardia (reentrant) variant. This finding is not the usual pattern with spontaneous atrial flutter; but atypical variants of atrial flutter/tachycardia are not uncommon after prior ablation therapy, especially for atrial fibrillation (in which the procedure is performed in the left atrium). The atrial flutter circuit classically orbits the tricuspid annulus in a counterclockwise or clockwise direction. The common anatomic substrate for typical atrial flutter and the preferred site for ablation is a band of fibrous tissue termed the cavotricuspid isthmus. However, in this case, the negative atrial waves in leads I and aVL are most consistent with a left atrial focus of reentry suggesting atypical (or non-cavotricuspid isthmus dependent) atrial flutter or possibly atrial automaticity, rather than the typical (cavotricuspid isthmus dependent) right atrial flutter variant. Distinction of focal (including micro-reentrant) atrial tachycardias from atrial flutter variants based solely on inspection of the surface ECG is often not possible and more precise mechanisms are only revealed at intracardiac EP study with careful mapping. Furthermore, more than one type or site of atrial tachyarrhythmia may also occur in the same patient.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case505/1350x900.gif", "_type": "mcq", "_caseId": 505}, {"question": "An elderly patient presents with multiple complaints and is found to have an irregular pulse. The ECG shows which ONE of the following?", "options": ["Atrial fibrillation (AF)", "Multifocal (multiform) atrial tachycardia (MAT)", "AV nodal reentrant tachycardia", "Sinus tachycardia with AV dissociation", "Sinus with pre-excitation variant and supraventricular ectopy"], "correct": 1, "explanation": "This ECG shows a relatively rapid and irregular narrow complex tachycardia. One beat is conducted with RBBB aberrancy. The long cycle-short cycle dynamic is consistent with an Ashman-type mechanism. The ventricular rate at rest here is about 110/min. The ECG meets strict criteria for MAT with three or more different consecutive, ectopic P waves at a rapid rate. Some of the underlying beats may be sinus, but the majority appear ectopic atrial, based on their varying polarity, morphology and short coupling intervals. The ECG also shows evidence of left ventricular hypertrophy (R wave voltage in aVL by itself and also sum of R in lead aVL plus S in lead V3, per Cornell criteria). Delayed R wave progression and non-specific ST-T changes are present. The clinical diagnoses included chronic heart failure with preserved LV function and mitral regurgitation. The most common substrate for MAT is decompensated COPD. This diagnosis is also reported in severe chronic heart failure. MAT is one of a number of rhythms under the rubric of multiform (multifocal) atrial rhythms (MARs). When the rate is slow (e.g., 50-60/min) and the P waves vary in a more gradual fashion, the term wandering atrial pacemaker (WAP) can be applied. For rhythms that look like MAT, but where the atrial rate is less than 100 (e.g., 60-99/min), the term MAR can also be used. But, MAT, almost invariably a sign of underlying pathology, especially COPD (sometimes with sympathomimetic excess) or CHF, should not be considered \"fast\" WAP, since the latter finding is often a normal variant observed during sleep for example, with high vagal tone. Conversely, WAP is not simply a manifestation of slow MAT. Finally, in cases of MAT it is important to note that some of the ectopic P waves may be blocked, due to refractoriness leading to the term \"MAT with block.\"", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case506/1350x900.gif", "_type": "mcq", "_caseId": 506}, {"question": "This ECG was interpreted by the computer program as showing \"sinus tachycardia\" with premature atrial complexes and first degree AV block. Do you agree? What is your reading?", "options": ["Sinus tachycardia with frequent atrial premature complexes", "Multifocal atrial tachycardia", "Sinus tachycardia with electronic artifact", "Atrial fibrillation with a rapid ventricular response", "Atrial flutter with variable block"], "correct": 3, "explanation": "The rhythm is indeed atrial fibrillation (NOT sinus tach) with a rapid ventricular response. The grossly irregular QRS response and the variable atrial waves (rate well over 300 cycles/min with a changing morphology) argue strongly against atrial flutter. (Atrial flutter with variable block also is often associated with a more periodic type of \"group beating\" rather than a frankly random appearing response.) Computer readings always require careful over-read!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case507/1350x900.gif", "_type": "mcq", "_caseId": 507}, {"question": "This ECG, from an elderly woman, shows which ONE of following?", "options": ["Sinus rhythm with  blocked premature atrial complexes and left bundle branch block (LBBB)", "Sinus rhythm with Mobitz I (AV Wenckebach) block and LBBB", "Sinus rhythm with Mobitz II AV block and LBBB", "Sinus rhythm, LBBB and sinoatrial (SA) Wenckebach", "Ectopic atrial rhythm, LBBB and AV Wenckebach"], "correct": 2, "explanation": "The rhythm is sinus with second-degree AV block, Mobitz type II, with intermittent non-conducted (\"dropped\") P waves. This finding is important since it indicates infra-nodal disease with a high risk of advanced AV block and possibly of torsade de pointes. Of note, the PR before and after the non-conducted P waves are the same duration. In addition the wide QRS due to the LBBB is also consistent with infranodal disease. The conducted PR intervals are well within normal limits, also consistent with infranodal (His-Purkinje) vs. AV nodal block. The patient had long pauses on a monitor lead due to multiple non-conducted P waves (advanced second degree AV block) and underwent dual chamber pacemaker implantation. The fact that the P waves here come \"on time\" excludes atrial prematurity. With classic SA Wenckebach, the P-P interval shortens, followed by an entire P-QRS cycle that is non-conducted due to exit block in the SA node area. With AV Wenckebach (type I block) cycles (3:2 and higher ratios), the PR after the non-conducted beat should be demonstrably shorter than the one before it. In general, \"group beating\" (clustered QRS) patterns with sinus rhythm can be mechanistically due to blocks (SA or AV), prematurity (especially supraventricular with a post-ectopic pause), and, most rarely, to concealed junctional-His extrasystoles. (For aficionados, another very rare cause of group beating with sinus rhythm is dual pathway physiology with 1:2 AV conduction.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case508/1350x900.gif", "_type": "mcq", "_caseId": 508}, {"question": "This ECG, from a middle-aged man, is most consistent with which ONE of the following major diagnoses?", "options": ["Biventricular and probable biatrial abnormality (overload)", "Ebstein&apos;s anomaly of the tricuspid valve", "Ostium secundum atrial septal defect (ASD)", "Tetralogy of Fallot", "Apical hypertrophic cardiomyopathy (Yamaguchi&apos;s syndrome)"], "correct": 0, "explanation": "This remarkable ECG shows resting sinus tachycardia at about 100/min, with right axis deviation (+100 degrees) and normal intervals. Biphasic P waves in V1-V2 with broad negative components speak to left atrial abnormality, as does the biphasic P wave with a broad positive (leftward-oriented) component in lead aVL. The P waves are also relatively tall (at least 2mm; but not meeting the classic 2.5 mm threshold) in the limb leads raising consideration of right, and therefore, biatrial abnormality. (Echocardiogram showed biatrial enlargement.) Left ventricular hypertrophy/enlargement is likely given the very deep S waves in the right to mid-precordial leads (up to 24 mm). R wave progression is delayed. Non-specific ST-T changes are present; the J point/ST segment elevation in the right to mid-chest leads (with rS complexes) is consistent with early repolarization and with LVH. The basis of the global cardiac chamber overload (which cannot be determined from the ECG alone) was multifactorial, occurring in the context of severe obstructive sleep apnea, with chronic heart failure and recurrent atrial tachyarrhythmias.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case509/1350x900.gif", "_type": "mcq", "_caseId": 509}, {"question": "This ECG from a 74 year old man shows all of the following EXCEPT for which ONE of the following findings?", "options": ["Marked sinus bradycardia", "Left atrial abnormality", "Left ventricular hypertrophy", "Left bundle branch block (complete)", "Borderline left axis deviation"], "correct": 3, "explanation": "The ECG shows marked sinus bradycardia at a rate of about 36 /min. Waveform findings are also consistent with left atrial abnormality (broad notched P waves, e.g. in V4; biphasic in V1 with broad negative component on magnified view); left ventricular hypertrophy (R wave of 13 mm in aVL) and borderline left axis deviation (about -20 degrees).The QRS duration is borderline prolonged (computerized measurement is 116 ms), but complete left bundle branch block is not present. The patient required a dual-chamber pacemaker for symptomatic sinus syndrome, with an underlying history of obstructive sleep apnea.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case510/1350x900.gif", "_type": "mcq", "_caseId": 510}, {"question": "Elderly man complains of palpitations. The ECG is most consistent with which ONE of the following? (Note: V2 and V3 are likely reversed.)", "options": ["Multifocal (multiform) atrial tachycardia (MAT)", "Atrial fibrillation", "Atrial flutter with variable block", "Unifocal atrial tachycardia (AT) with variable AV block", "Sinus tachycardia with AV Wenckebach"], "correct": 0, "explanation": "The ECG shows classic multifocal atrial tachycardia (MAT). The effective ventricular rate at rest is quite fast (about 130) and irregular, with a narrow (normal) QRS complex duration. The rhythm simulates atrial fibrillation. But, note the true, discrete P waves, with at least three different morphologies occurring sequentially. In addition, there are non-specific ST-T changes and somewhat prominent left precordial R waves without definitive criteria for LVH. See Questions/Answers # 149 & 506 for comparison and further discussion.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case511/1350x900.gif", "_type": "mcq", "_caseId": 511}, {"question": "This striking ECG obtained at rest from a middle-aged woman shows which ONE of the following rhythms?", "options": ["Monomorphic ventricular tachycardia (VT)", "Atrial fibrillation (AF) with Wolff-Parkinson-White (WPW) pre-excitation", "Polymorphic VT - Torsades de pointes", "Polymorphic VT - Catecholaminergic type", "AF with right bundle branch block aberrancy"], "correct": 1, "explanation": "This ECG shows a classic example of AF with the WPW syndrome (pre-excited AF), with anterograde conduction down the bypass tract. There is a wide complex tachycardia at an average rate of approximately 200 bpm (and as fast as 250 bpm early in the recording). The major clues toward diagnosis include the torrentially rapid ventricular rate and the grossly irregular cadence of ventricular response. Monomorphic VT may be irregular, but this degree of irregularity would be unusual at such a very fast rate. Polymorphic VTs are a consideration, but the QRS complexes are suggestive of delta waves; actual \"turning of points\" morphology is not seen. The variability in QRS morphology here is attributable to different degrees of pre-excitation, with wider complexes due to predominant accessory pathway conduction, and narrower ones with fusion of AV nodal and bypass tract conduction. A correct and prompt diagnosis is very important because drugs that slow conduction in AV-nodally mediated AF (e.g., verapamil, diltiazem, digoxin, adenosine, amiodarone, or beta-blockers) are not useful, and may be even hazardous by inducing increased conduction down the bypass tract, which can precipitate ischemia and ventricular fibrillation. Antiarrhythmic drugs of choice (because they prolong the effective refractory period of the bypass tract) are IV procainamide or ibutilide. If these agents are unsuccessful or unavailable, DC cardioversion should be performed promptly, if not otherwise contraindicated. See: 2015 ACC/AHA/HRS Guideline for the Management of Adult Patients With Supraventricular Tachycardia: Executive Summary. J Am Coll Cardiol 2016;67(13):1575-1623 and any subsequent society guidelines. Tentative localization of the bypass tract on the surface 12-lead ECG can be a useful exercise prior to definitive EP study and ablation therapy. The negative delta waves here in the inferior leads suggest a postero-septal location, and the positive delta wave in lead V1 suggests it is left-sided (since the mean depolarization vector is directed away from the left, toward right sided precordial leads).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case512/1350x900.gif", "_type": "mcq", "_caseId": 512}, {"question": "This ECG obtained at rest from a 65 year old woman shows which ONE of the following rhythms? (Note the baseline artifact.)", "options": ["Sinus tachycardia with 2:1 AV block", "Sinus rhythm with marked PR prolongation (first degree AV block)", "(Ectopic) atrial tachycardia (AT) with 2:1 AV block (conduction)", "Typical atrial flutter with 2:1 AV block (conduction)", "Atrioventricular reentrant tachycardia (AVRT) with a concealed bypass tract"], "correct": 2, "explanation": "The ECG shows definite P waves, which at first glance may seem sinus in origin. However, more careful inspection reveals that there are actually two P waves/QRS, one partly hidden at the end of the QRS complexes. The atrial rate is regular at 160/min, too fast for resting sinus tachycardia in a person of this age, but fully consistent with (ectopic) atrial tachycardia, The mean P wave vector is rightward in the frontal plane and directed toward the positive pole of lead V1, consistent with a left atrial origin. The arrhythmia occurred in the context of a history of atrial fibrillation, with prior pulmonary vein isolation (PVI) procedures using ablation technology. At the time of repeat cardiac EP study, a macro-reentrant type mechanism was observed and the left atrial tachycardia was successfully ablated. The rate is too slow for classic atrial flutter. Moreover, typical counterclockwise atrial flutter is usually associated with negative atrial waves in lead II and positive ones in V1; clockwise atrial flutter usually with the opposite. Here the P waves are positive in both leads V1 and II. (However, inferring the mechanism and exact locus of atrial tachyarrhythmias from the surface ECG lacks precision; thus intra-atrial verification prior to interventional therapy is needed.) The ECG also shows borderline low voltage, nonspecific ST-T changes and QS waves in V1-V2. The latter finding raises consideration of underlying anterior MI, but is not diagnostic. Note also that the P wave superimposed on the end of the QRS gives a \"pseudo-intraventricular conduction delay (IVCD)\" pattern. Finally, atrial tachycardia may be sustained, as was the case here, or paroxysmal (\"PAT\"). Although atrial tachycardia with block may be caused by digitalis toxicity, most cases, including this one, are not.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case513/1350x900.gif", "_type": "mcq", "_caseId": 513}, {"question": "A middle-aged man, with recent psychological stress, presented with chest pain, heart failure and elevated troponin levels, but no angiographically apparent obstructive coronary artery disease. Prior ECGs (24-48 hrs) before this tracing showed slight diffuse ST elevations. (There was a prior history of hypertrophic cardiomyopathy with mild left ventricular outflow obstruction.) Which ONE of the following scenarios best applies to this ECG in the present context?", "options": ["Apical hypertrophic cardiomyopathy (Yamaguchi&apos;s syndrome)", "Brugada pattern/syndrome", "Takotsubo cardiomyopathy with Wellens&apos;-type T wave inversions", "Memory T wave inversions associated with intermittent left bundle branch block", "Pulmonary embolism with right ventricular overload (\"strain\")"], "correct": 2, "explanation": "The ECG shows sinus rhythm with T wave inversions (and QT prolongation) consistent with \"Wellens&apos; pattern,\" usually a sign of high grade left anterior descending obstruction. However, in this case the finding appeared in the context of takotsubo syndrome, a combination that has been reported primarily in case studies. (e.g., Clin Pract Cases Emerg Med. 2017;3:175; Marra MP et al. Heart Rhythm. 2013;10:70.) Takotsubo syndrome, in general, may closely mimic the ECG of acute coronary syndromes due to obstructive coronary disease, with ST elevations or depressions, T wave inversions and left bundle branch block (Eur J Heart Fail 2016;18:8-27). The ECG also shows left atrial abnormality and left ventricular hypertrophy. The long QT is consistent with prolongation of action potential duration in the area of myocardial injury. Transthoracic echocardiogram here showed classical apical ballooning. The other choices are excluded as follows: Brugada pattern (see Case #253) is associated with right precordial ST elevations sometimes with T wave inversions and a \"pseudo\" right bundle branch block morphology. Intermittent left bundle branch block or right ventricular pacing may induce T wave inversions in normally conducted beats that previously showed a QS or rS pattern with the wide QRS, and would not account for the T wave inversions seen here in leads aVL and I (Shvilkin A, et al. Circulation. 2005;111:969-974). Yamaguchi&apos;s syndrome (see Case #14) is classically associated with very deep mid-precordial T wave inversions. Pulmonary embolism, due to right heart overload, may present with right precordial T wave inversions, as well as rightward axis shifts, S1Q3T3 patterns, qR in V1, peaked T waves, none of which is seen here (see Case #32). See also: Singh T, et al. Circulation. 2022;145:1002~1019.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case514/1350x900.gif", "_type": "mcq", "_caseId": 514}, {"question": "This complex ECG, from a patient status post aortic valve replacement, is most consistent with which ONE of the following rhythms? The patient reportedly was on metoprolol and amiodarone at the time. (Note: revised as of 10/20/2022.)", "options": ["Atypical atrial flutter (or atrial tachycardia) variant with a slow ventricular response", "Atrial fibrillation with complete heart block (junctional escape rhythm)", "Sinus bradycardia with tremor artifact", "Atrial fibrillation (AF) with electronic ventricular pacing", "Multifocal atrial tachycardia with complete heart block (junctional escape rhythm)"], "correct": 0, "explanation": "This ECG poses a challenging pattern. At first glance, the variable underlying atrial waveforms appear diagnostic of atrial fibrillation (AF) with a regularized ventricular response (approximately 60/min), suggesting complete heart block with a junctional escape mechanism. However, on closer inspection the atrial wave pattern is almost exactly superimposable from one section to the next, most consistent with an atrial flutter (or tachycardia) variant, not atrial fibrillation. The periodic atrial waves also appear notched, which may be due to an unusual alternans pattern. Furthermore, the interval between the last part of the atrial wave and the next QRS is constant, strong evidence against complete heart block. The QTc is ~450 ms, at the upper limits of normal. There is non-diagnostic notching of the QRS in V1 with a delayed precordial transition zone. However, no frank intraventricular conduction delay is noted. Nonspecific ST-T changes are present. The S1Q3 pattern is non-diagnostic. The patient was on metoprolol as well as amiodarone (given to treat an episode of AF with a rapid ventricular response). Tremor artifact should be excluded; however, with tremor (e.g. Parkinsonian), sinus P waves can usually be discerned in at least one lead. Electronic pacing is perhaps the most common cause of atrial fibrillation with a near constant rate. However, it would be most unusual to have the escape rate set this low and pacing stimuli (spikes), which may be of very low amplitude, are not seen. Transthoracic echocardiography revealed normal left ventricular (LV) systolic function, moderate concentric LV hypertrophy, and a well-seated bioprosthetic aortic valve. With cessation of amiodarone and metoprolol, the regularized AF resolved, and subsequent ECGs revealed recurrence of definite AF with a faster, variable rate. Intracardiac recordings were not available. (We anticipate \"variable\" interpretations from EP mavens) Also see cases 74, 432, 456, 493 and 495.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case515/1350x770.jpg", "_type": "mcq", "_caseId": 515}, {"question": "This ECG, from a young adult man with progressive weakness and dyspnea is most consistent with which ONE of the following diagnoses?", "options": ["Hypertrophic cardiomyopathy", "Ebstein&apos;s anomaly of the tricuspid valve", "Normal variant", "Posterior myocardial infarction", "Duchenne muscular dystrophy"], "correct": 4, "explanation": "The ECG shows sinus rhythm with right axis deviation. The right-mid precordial R waves are very prominent, with a drop-off in voltage laterally. The P waves are notched raising consideration of left atrial abnormality. The T waves are inverted in the right precordial leads. While the findings raise consideration of right ventricular hypertrophy, they do not account for the P waves (one might expect RAA). In the context of the neuromuscular history in a young adult male, these findings are most consistent with Duchenne muscular dystrophy. The tall right precordial R waves are attributable to posterior-basal fibrosis. Additional features often include prominent Q waves laterally, producing a pseudo-infarction pattern (posterolateral MI mimic), and sometimes concomitant atrial arrhythmias and other conduction disturbances.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case516/1350x464.png", "_type": "mcq", "_caseId": 516}, {"question": "ECG from a 40-year old man with palpitations and weakness, in the context of complex medical problems, including a toxic shock-type syndrome. Which ONE of the following arrhythmias is present?", "options": ["Multifocal atrial tachycardia (MAT)", "AV nodal reentrant tachycardia (AVNRT)", "Sinus tachycardia with sinus arrhythmia", "Atrial flutter with variable AV block", "Atrial fibrillation (AF) with a rapid ventricular response (RVR)"], "correct": 4, "explanation": "A narrow complex tachycardia is present with a very rapid ventricular rate (mean about 168/min). The cadence is irregular with the QRS rate varying from about 150 to 190/min over 10 seconds. Baseline artifact is present; but in V1 the characteristic \"squiggly\" pattern of atrial fibrillation is seen. Occasionally the low amplitude fibrillatory waves are more prominent and may be mistaken for true P waves. The R-R intervals are constantly varying, but at this fast a rate \"pseudo-regularization\" may cause confusion. For example, consider that the difference between 9 and 10 small (40 ms box widths) between R-R intervals represents instantaneous rates of 166 and 150/min, respectively. Sinus tachycardia at this rate (usually achieved only transiently with vigorous exercise) is usually quite regular; no sinus P waves are seen. AVNRT is among the most metronically regular rhythms. No atrial flutter waves are seen. Non-specific ST-T changes are present in the inferior leads, with a non-diagnostic Q in lead III. No evidence of acute myocardial infarction was observed. Variability in QRS amplitude is noted, which is not uncommon with AF. This variability may be due to respiration, subtle variations in conduction, etc. The patient underwent successful DC cardioversion.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case517/1350x650.png", "_type": "mcq", "_caseId": 517}, {"question": "Narrow complex tachycardia from a critically ill 85-year-old patient in the ICU shows diffusely low voltage, and which ONE of the following arrhythmias?", "options": ["Sinus tachycardia with premature atrial complexes", "Atrial flutter with variable AV conduction (predominantly 2:1)", "Atrial fibrillation", "AV nodal reentrant tachycardia (AVNRT)", "Atrial tachycardia with 1:1 AV conduction"], "correct": 1, "explanation": "This ECG poses a challenge because of the diffusely low voltage (due to anasarca and pancreatitis, not pericardial effusion) that makes atrial activity harder to discern at the usual gain. For most of the recording, one sees a very regular narrow complex (i.e., normal duration QRS) tachycardia at a ventricular rate of 150/min, with intermittent, abrupt slowing of the rate. The atrial activity is predominantly negative in lead II and positive in V1. Careful inspection reveals a section of the \"hidden,\" second atrial wave, partly apparent just after the QRS. Thus, the atrial rate is actually 300/min and the ventricular rate is usually exactly half that. The only rhythm in adults that meets these specs is atrial flutter (typical, counterclockwise here) with predominant 2:1 AV conduction. As a rule of thumb, sustained resting QRS rates of 150/min or more are almost never seen in octogenarians, and the negative polarity of the atrial waves in II definitively excludes a sinus mechanism.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case518/1350x713.png", "_type": "mcq", "_caseId": 518}, {"question": "ECG from an elderly woman with \"cough\" shows underlying sinus rhythm with which ONE of the following causes of \"dropped\" beats?", "options": ["Mobitz type I (second-degree) AV block (AV Wenckebach)", "Mobitz type II (second-degree) AV block", "Intermittent complete AV heart block", "Intermittent blocked premature atrial complexes (PACs)", "Intermittent sinoatrial (SA) exit block"], "correct": 1, "explanation": "Sinus rhythm is present at a rate of about 85/min with intermittent non-conducted P waves. Left bundle branch block (LBBB) is present with borderline left axis deviation. (Low/borderline low voltage QRS complexes are noted in the limb and lateral chest leads.) The P waves come \"on time,\" ruling out non-conducted (blocked) PACs as well as SA exit block. The PR interval is within normal limits (about 160 msec) and is constant in all of the conducted beats. With AV Wenckebach, the PR interval after the non-conducted P wave is characteristically shorter than the PR preceding the non-conducted P wave. Mobitz II AV block is consistent with severe infra-nodal conduction disease, further supported by the presence of the LBBB here. This presentation of Mobitz II AV block, with a widened QRS and no reversible causes, even in the absence of overt cardiac symptoms of syncope or near syncope, is a Class I indication for implantation of a dual-chamber pacemaker due to high risk of sudden progression to complete AV block.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case519/1350x900.gif", "_type": "mcq", "_caseId": 519}, {"question": "70 yr-old woman with worsening heart failure symptoms. The ECG is diagnostic of which ONE of the following rhythms?", "options": ["Sinus tachycardia", "(Focal) atrial tachycardia with 1:1 AV conduction", "Atrial fibrillation", "Atrial flutter with 2:1 AV conduction", "Multifocal atrial tachycardia"], "correct": 3, "explanation": "The differential diagnosis of a very regular, narrow complex tachycardia (NCT), as illustrated here, focuses on the following 3 most common electrophysiologic syndromes in adults: sinus tachycardia, atrial flutter (usually with 2:1 and rarely 1:1 AV conduction) and paroxysmal (or persistent) supraventricular tachycardia (PSVT). The latter category, in turn, subtends three major variants: AV nodal reentrant tachycardia (AVNRT), atrioventricular reentrant (bypass-mediated) tachycardia (AVRT), and focal atrial tachycardia (AT) with 1:1 or 2:1 conduction. The resting ventricular rate here, close to 150/min, effectively excludes sinus tachycardia in a 70 yr. old. (Recall that estimated maximal heart rate at rest is 220-age.) Most important, the negative atrial waves in lead II definitively exclude sinus tachycardia. The atrial rate of close to 300/min is too fast for atrial tachycardia, but consistent, with atrial flutter with 2:1 conduction given the ventricular rate. Classic flutter (F) waves are clearly seen in lead V1 where they are positive and in lead II where they appear negative. This polarity is consistent with typical atrial flutter (i.e., isthmus-dependent) with a counterclockwise rotation of the macro-reentrant wave in the right atrium. Note that in lead II, one of the two flutter waves/QRS is partly hidden the ST segment, which may cause diagnostic confusion. Also, note that F waves (as well as fibrillatory [f] waves) are not true P waves, since the former represent continuous atrial activity, while the latter, seen for example, with sinus or ectopic atrial or junctional rhythms, are due to discrete atrial depolarization followed by a (usually isoelectric) repolarization phase. The ECG also shows borderline left axis deviation and a delayed precordial transition zone.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case520/1350x740.jpg", "_type": "mcq", "_caseId": 520}, {"question": "This ECG shows an unusual appearance most consistent with which ONE of the following diagnoses?", "options": ["Ectopic atrial rhythm", "Left posterior fascicular block", "Sinus rhythm with limb lead reversal", "Right ventricular hypertrophy", "Dextrocardia"], "correct": 2, "explanation": "The negative P, normal PR and negative QRS in lead I are the first set of clues to a lead reversal. However, this is not the usual LA/RA lead reversal. A second clue is the almost zero potential QRS voltage in lead II, which should be configured as LL-RA voltages. However, to get a zero potential in a bipolar lead can only be readily accounted for by a spurious lead configuration based on the difference of LL and RL potentials, which are nearly equal. (Recall that the RL electrode functions as an electrical ground in standard ECGs.) Third, since aVR=aVF here, the RA and a leg electrode must be reversed. (The chest leads are essentially normal, with minimal nonspecific ST-T changes.) To account for all of these findings, this ECG must show inadvertent reversal of RA and RL electrodes. Thus, lead II=LL-RL (not RA), so that aVR=aVF, as observed. Lead III (LL-LA) should be unaffected. Lead I will be LA-RL. Rx: repeat tracing with correct lead placement!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case521/1350x765.jpg", "_type": "mcq", "_caseId": 521}, {"question": "Middle-aged woman with severe, progressive dyspnea. This ECG, which is unchanged over several months, is most consistent with which ONE of the following diagnoses?", "options": ["Anterior wall ischemia (Wellens&apos; syndrome)", "Right ventricular (RV) overload due to severe pulmonary hypertension", "Aortic stenosis", "Mitral valve stenosis", "Takotsubo syndrome"], "correct": 1, "explanation": "This ECG, which has been unchanged over several months, is most consistent with a severe right heart overload syndrome, evidenced by resting sinus tachycardia, peaked (tall, narrow) P waves in multiple leads (inferior, V1, etc) consistent with right atrial overload (abnormality), right axis deviation (about +95 degrees), and T wave inversions in V1 and V2, consistent with RV overload (\"strain\") in this context. In addition, there is relatively low voltage in the limb and lateral precordial leads. R wave transition is somewhat delayed, with terminal S waves laterally and relatively prominent R waves in V1-V2. The primary underlying cause was severe pulmonary hypertension due to pulmonary fibrosis from chronic obstructive pulmonary disease (COPD). While anterior ischemia cannot be excluded (as with Wellens&apos; or takotsubo syndromes), the chronicity of the findings and the constellation of ECG abnormalities, make right heart overload the leading diagnosis, as confirmed by transthoracic echocardiogram. Cardiac enzyme biomarkers were negative. (Mitral valve stenosis will cause RV overload, but should be associated with marked left atrial abnormality or atrial fibrillation.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case522/1350x760.jpg", "_type": "mcq", "_caseId": 522}, {"question": "Middle-aged man with multifactorial chronic heart failure syndrome. The tachycardia is diagnostic of which ONE of the following arrhythmias?", "options": ["Atrial flutter with left bundle branch block (LBBB)", "Atrial fibrillation with LBBB", "Monomorphic (right) ventricular tachycardia", "Sinus tachycardia with LBBB", "Atypical AV nodal reentrant tachycardia (AVNRT) with LBBB"], "correct": 0, "explanation": "This ECG shows a very regular (ventricular rate about 150/min) wide complex tachycardia with a typical left bundle branch block (LBBB) pattern and left axis deviation (-50 degrees). (An identical LBBB pattern was noted on previous ECGs with sinus rhythm.) Atrial activity is present, which may be mistaken for discrete P waves, but actually represents typical atrial flutter (rate 300/min) with 2:1 AV conduction. Major clues are the negative polarity of the atrial activity in lead II and the partly hidden, second atrial waves in lead V1. Always consider atrial flutter with 2:1 conduction with a regular tachycardia at about 150, with negative atrial waves in lead II. Given the very prominent voltage and left axis deviation, along with the arrhythmia, underlying left ventricular hypertrophy (confirmed by echocardiogram) is most likely present.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case523/1350x759.jpg", "_type": "mcq", "_caseId": 523}, {"question": "70 year-old man with a life-threatening syndrome. This ECG is most consistent with which ONE of the following diagnoses?", "options": ["Mitral valve stenosis (rheumatic)", "Ebstein&apos;s anomaly of the tricuspid valve", "Severe pulmonary disease with right heart overload", "Coronary artery disease with anterior ischemia, right bundle branch block and left posterior fascicular block", "Ostium primum atrial septal defect"], "correct": 2, "explanation": "The underlying problem is respiratory failure due to COPD and advanced pulmonary malignancy. Sinus tachycardia is present with complete right bundle branch block (RBBB) and right axis deviation (estimated at about +95-100 degrees based on the first 100 ms of the QRS). The P waves (e.g., in lead II) are relatively tall, but not widened, most consistent with right atrial overload. The T wave inversions in leads with an rSRˊ morphology are secondary to the RBBB (and may be partly attributable to RV overload (\"strain\"). RBBB and left posterior fascicular block (a form of \"bifascicular block\") is a diagnosis of exclusion, which requires ruling out RV overload syndromes and other causes of RBBB/RAD, including RV overload syndromes and also lateral MI with RBBB. Ostium primum atrial septal defects are rare in older age individuals and are associated with signs of RV overload with left axis deviation. Ebstein&apos;s anomaly of the tricuspid valve (rarely seen in older individuals) is associated with bizarre right ventricular conduction delays with fragmented QRS complexes and often giant (\"Himalayan\") P waves. Mitral valve stenosis should be associated with marked left atrial abnormality (or atrial fibrillation).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case524/1350x733.jpg", "_type": "mcq", "_caseId": 524}, {"question": "This ECG from a 75 year-old man is most consistent with which ONE of the following diagnoses?", "options": ["(Right) ventricular pacemaker with an underlying junctional rhythm", "Atrial fibrillation with left bundle branch block (LBBB), with an accelerated junctional escape rhythm", "Atrial fibrillation (AF) with (right) ventricular pacing", "Atrial flutter with (right) ventricular pacing", "Dual chamber pacing with atrial sensing (underlying sinus rhythm) and right ventricular pacing"], "correct": 2, "explanation": "This ECG shows atrial fibrillation (not flutter) with a regularized wide-complex QRS, which has a left bundle branch block (LBBB) morphology. However, careful inspection reveals subtle pacemaker stimuli (nearly invisible in some leads) before the QRS (e.g., V2, V3). You can confirm this on the magnified view. The LBBB morphology is due to right ventricular pacing. It is very important to ascertain the underlying atrial mechanism with ventricular pacing since atrial fibrillation is often overlooked, especially when the rate is very regular. Whenever you see an apparent LBBB pattern (especially with a rate around 70/min) always look carefully to make sure you are not missing right ventricular pacing.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case525/1350x807.jpg", "_type": "mcq", "_caseId": 525}, {"question": "This ECG, from an elderly man with dyspnea, is most consistent with which ONE of the following diagnoses?", "options": ["Extensive pulmonary embolism", "Acute left pneumothorax", "Acute aortic dissection", "Pericardial effusion with cardiac tamponade", "Alternating bundle branch block (trifascicular disease)"], "correct": 3, "explanation": "The ECG shows a characteristic triad of findings: sinus tachycardia, electrical alternans (best seen in multiple chest leads), and relatively low voltage diffusely. The patient underwent emergency pericardiocentesis with echocardiographic guidance, revealing metastatic pulmonary adenocarcinoma. The total electrical alternans pattern, associated with to-fro swinging of the heart under pressure in the fluid filled pericardial sac, is referred to as 2:1 alternation. The triad of findings seen here is a highly specific, but not sensitive ECG sign of pericardial effusion. This distinct type of pathologic waveform alternation should not be confused with the slower alternation of QRS amplitude due to respiration or to the erratic, beat-to-beat variations in QRS amplitude associated with atrial fibrillation. QRS alternans (2:1) may also be seen with various types of paroxysmal supraventricular tachycardia (PSVT), such as atrio-ventricular reentrant tachycardia (AVRT), or in some cases of ventricular tachycardia. These other causes of QRS alternans, with non-sinus tachycardia, are likely due to subtle, periodic changes in ventricular conduction on a beat-to-beat basis, not to the \"swinging heart\" phenomenon.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case526/1350x736.jpg", "_type": "mcq", "_caseId": 526}, {"question": "73 year-old woman presents with dyspnea and palpitations (rapid heartbeat sensation). This ECG is most consistent with which ONE of the following diagnoses?", "options": ["Atrial flutter (typical) with 2:1 AV conduction", "Atrial tachycardia with 1:1 AV conduction", "Atrial fibrillation with a regularized ventricular response", "AV nodal reentrant tachycardia (AVNRT)", "Atrioventricular reentrant (bypass tract-mediated) tachycardia (AVRT)"], "correct": 0, "explanation": "The ECG shows a very regular, narrow complex (normal QRS duration) tachycardia with a ventricular rate of about 150/min. Close inspection reveals two atrial waves per QRS, which are best seen in leads III and V1 in this case. These deflections are not true (discrete) P waves. Rather, they represent continuous atrial activity due to a typical atrial flutter circuit, involving a large (macro-) reentrant wave traversing the right atrium in a counterclockwise direction, involving the zone (isthmus) between the tricuspid valve and inferior vena cava. This directionality is associated with the \"negative,\" asymmetric appearance of the flutter (F) waves in the inferior limb leads, and with their positive polarity in V1 and V2. The ECG also shows borderline left axis deviation, slow precordial R wave progression and non-specific ST-T changes. The patient had an idiopathic cardiomyopathy with moderate-severe mitral regurgitation and moderately reduced left ventricular ejection fraction by transthoracic echocardiogram. The patient also had a history of atrial fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case527/1350x752.jpg", "_type": "mcq", "_caseId": 527}, {"question": "75 year-old woman with history of dizziness. What is the rhythm?", "options": ["Sinus rhythm with complete AV heart block and junctional escape", "Atrial fibrillation with complete heart block and junctional escape", "Atrial flutter with high degree AV block", "Sinus bradycardia with artifact", "Junctional bradycardia"], "correct": 3, "explanation": "At first (and perhaps second) glance this ECG appears to show atrial fibrillation with a slow, regularized ventricular response at 50/min, suggesting complete heart block. But (!) more careful inspection reveals discrete, sinus P waves (upright in lead II) with a normal PR interval. (The broad, negative P waves in V1 are suggestive of left atrial abnormality.) The QRS interval is borderline wide (118 msec by computer assessment), consistent with an intraventricular conduction delay, and there is left axis deviation (-30 to -40 degrees). Slow r wave progression is noted in V1-V2 raising consideration of underlying anterior MI. Nonspecific ST-T changes are also present, raising consideration of lateral ischemia. The patient had a classic tremor due to Parkinson&apos;s disease to account for the pseudo-atrial fibrillatory oscillations. Subsequent stress testing did not show evidence of active ischemia. Transthoracic echocardiogram showed mild left ventricular dilation with preserved ejection fraction and left atrial enlargement. The patient had a history of hypertension.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case528/1350x752.jpg", "_type": "mcq", "_caseId": 528}, {"question": "Elderly woman with lightheadedness and slow pulse. What is the rhythm? (Note the baseline artifact.)", "options": ["Sinus rhythm with AV Wenckebach (Mobitz I) variant", "Sinus rhythm with complete AV block", "Sinus rhythm isorhythmic AV dissociation and junctional escape", "Sinus rhythm with predominant 2:1 AV block", "Sinus rhythm with advanced (including 3:1) second degree AV block"], "correct": 1, "explanation": "Sinus rhythm (with artifact) is present at an atrial rate of about 75/min (with possible biatrial abnormality), well seen in lead II and V1 rhythm strips. Complete AV block is present with an escape pacemaker at a regular rate of about 33 beats/min. No relationship exists between the P waves and QRS complexes. The wide QRS complexes have a right bundle branch block/left anterior fascicular block morphology consistent with severe infra-nodal disease. Prior anterior MI cannot be excluded. There is probable left ventricular hypertrophy (history of hypertension; not aortic stenosis). The prominent T wave inversions may associated with high-degree AV block, and/or due to ischemia/MI, etc. Cardiac enzyme biomarkers for acute MI were negative. No reversible causes of AV block were found. The patient underwent dual chamber pacemaker implantation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case529/1350x751.jpg", "_type": "mcq", "_caseId": 529}, {"question": "70 year-old man with a life-threatening syndrome. The ECG is most consistent with which ONE of the following?", "options": ["Mitral valve stenosis (rheumatic)", "Aortic stenosis", "Severe pulmonary fibrosis", "Coronary artery disease with anterior ischemia, right bundle branch block and left posterior fascicular block", "Amyloid cardiomyopathy (transthyretin variant)"], "correct": 2, "explanation": "Sinus tachycardia at rest is present (about 110 beats/min) with the following findings strongly suggesting a right heart overload syndrome, in this case due to advanced idiopathic pulmonary fibrosis. 1) right bundle branch block (RBBB) variant with a polyphasic rSr&apos;S&apos; pattern; 2) tall, narrow P waves (\"P pulmonale\"); 3) T wave inversions V1-V4. Note that the T wave inversions in leads with an rSR&apos;-type morphology may be secondary to the RBBB. T wave inversions extending to V3 and V4, however, are most consistent with RV overload (\"strain\") in the context of the other findings. RBBB and left posterior fascicular block (a form of \"bifascicular block\") is a diagnosis of exclusion that requires ruling out RV overload syndromes and other causes of RBBB/RAD, also including antero-lateral MI with RBBB. Mitral stenosis may be associated with right ventricular overload, but one would expect left atrial abnormality (or atrial fibrillation). Cardiac amyloidosis may have a wide variety of ECG presentations, including low voltage, nonspecific ST-T changes and pseudo-infarct Q waves.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case530/1350x797.jpg", "_type": "mcq", "_caseId": 530}, {"question": "A 65 year old man presents with a slow pulse and dyspnea. The ECG shows ALL but which ONE of the following findings?", "options": ["Sinus rhythm", "Complete AV heart block", "High-grade (advanced) degree AV block (likely infranodal)", "Left atrial abnormality", "Wide-complex escape beats"], "correct": 1, "explanation": "Sinus rhythm at about 75 beats/min is present (with left atrial abnormality). Advanced second-degree AV block is present. When 2:1 conduction is seen, the PR is at the upper limits of normal (200 ms) and there is a left bundle branch block (LBBB). The third P wave in each of these sequences is interrupted by a wide-complex beat with a right bundle branch block/marked left axis deviation morphology, suggesting that it arises from the left posterior fascicle. (Note that 3:1 block cannot be excluded because of the interruptive escape beats.) However, complete AV block is NOT present. A dual chamber pacemaker is indicated for symptomatic, advanced second-degree AV block. Severe infranodal (type II) conduction disease can be inferred by the LBBB pattern in conducted beats and the consistent (but not prolonged) PR interval of the conducted beats. With complete heart block and sinus rhythm, the ventricular rate is substantially slower than the atrial rate and unrelated to it. PACs are not seen. These findings occurred in the clinical context of underlying heart failure with preserved LV ejection fraction in a patient with a history of hypertension and prominent concentric LVH on transthoracic echocardiogram. (Note: Amended 4/3/2023.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case531/1350x773.jpg", "_type": "mcq", "_caseId": 531}, {"question": "This rhythm recorded from a 75 year-old woman in the ICU is most consistent with WHICH ONE of the following diagnoses? (Note: The patient had multiple medical problems and no prior history of tachycardia.)", "options": ["Sinus tachycardia with a very prolonged PR interval", "Atrial flutter with 2:1 AV conduction", "Paroxysmal supraventricular tachycardia (PSVT): (Focal) atrial (non-sinus) tachycardia with 1:1 AV conduction", "PSVT: Atrioventricular reentrant tachycardia (AVRT) via a concealed bypass tract", "PSVT: AV nodal reentrant tachycardia (AVNRT)"], "correct": 4, "explanation": "The ECG shows a very regular, narrow complex (normal QRS duration) tachycardia (NCT) at about 150 beats/min. A sinus mechanism is unlikely given sinus tachycardia at this rate would be exceptionally fast in a resting 75 year-old. Furthermore, sinus P waves should precede the QRS and are always upright in II. Non-sinus P waves are present here, negative in the inferior leads and positive in aVR; they come just after the QRS (hence dubbed \"pseudo-S\" and \"pseudo-R waves\"). AV reentrant tachycardias (AVRTs), which involve a concealed bypass tract, demonstrate (usually retrograde) P waves, often slightly further delayed from the preceding QRS than those seen here. Unlike AVNRT, AVRT is more common in males and usually appears first during younger ages. The AVNRT mechanism involves \"dual pathway\" physiology in which the AV node behaves as if there are two asymmetric conduction pathways, one that conducts more slowly than the other but recovers more quickly. The tachycardia is usually initiated by a (un)fortuitously timed premature atrial complex that blocks in the fast pathway, goes down the slow pathway, and reenters the fast pathway in a retrograde direction. Thus, the typical AVNRT repetitive, rotary trajectory follows a \"slow-fast\" AV loop, with retrograde (bottom to top) atrial depolarization. See other Wave-Maven cases and an expansive literature for further discussion of the complex topic of NCTs, including addressing these questions: What are the therapeutic options? What are the potential side effects of relevant medications and their interactions?", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case532/1350x714.jpg", "_type": "mcq", "_caseId": 532}, {"question": "An elderly man with chest discomfort and mild elevation of cardiac troponin-T. What is the most likely diagnosis?", "options": ["Early repolarization (normal) variant", "Acute myopericarditis", "Acute myocardial infarction", "Acute pulmonary embolism", "Takotsubo syndrome"], "correct": 1, "explanation": "The rhythm is sinus tachycardia at rest. Of note are diffuse ST elevations, with discordant PR segment deviations (up in aVR and down in infero-lateral leads). Electrical alternans, a specific but not sensitive sign of pericardial effusion, usually with hemodynamic compromise, is not present. Transthoracic echocardiogram showed normal biventricular function and no pericardial effusion. Clinically, the patient responded to colchicine, with normalization of the ECG and resolution of pleuritic chest pain. Chest computed tomographic angiography (CTA) showed no evidence of pulmonary embolization or aortic dissection. Renal function was normal. COVID-19 testing was negative, without recent m-RNA vaccination. The ECG is most consistent with acute pericarditis or myopericarditis, the latter favored by slight cardiac enzyme elevations. The differential diagnosis is broad, encompassing viral, bacterial and parasitic infections, autoimmune diatheses (e.g., systemic lupus erythematosus, rheumatoid arthritis), metastatic neoplasms, etc. See other Wave-Maven cases for further discussion of the ECG changes in this and related settings.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case533/1350x760.jpeg", "_type": "mcq", "_caseId": 533}, {"question": "A middle-aged woman complains of increasing shortness of breath and tiredness. Which ONE of the following is the most likely diagnosis?", "options": ["Scleroderma (with marked pulmonary artery hypertension)", "Rheumatic heart disease (with severe mitral stenosis)", "Coronary artery disease (ischemic cardiomyopathy)", "Aortic stenosis (calcific)", "Non-ischemic cardiomyopathy with left posterior fascicular block"], "correct": 0, "explanation": "The rhythm is sinus at about 84 beats/min. The PR interval is at the upper limits of normal (190-200 ms). Of particular note are the peaked P waves (V1), right axis deviation, right-sided intraventricular conduction delay (120 ms) with an rSRʹsʹ morphology in lead V1. This constellation of findings is highly specific for marked right ventricular hypertrophy/right atrial abnormality caused by a severe pressure overload syndrome. T wave inversions in the right to mid-precordial leads are also consistent with right ventricular overload with an associated repolarization abnormality (\"strain\" pattern) in this context and nonspecific ST-T changes elsewhere. Of the choices, only scleroderma with severe pulmonary artery hypertension would account for all these findings. Severe mitral stenosis, another cause of right ventricular overload, should show evidence of marked left atrial abnormality (or atrial fibrillation). Left posterior fascicular block requires not only marked right axis deviation, but the absence of its other more common causes (i.e., right ventricular hypertrophy as in this case; lateral Q-wave myocardial infarction, etc). Severe calcific aortic stenosis usually produces evidence of left ventricular hypertrophy, not present in this case. The constellation of findings present are also not consistent with ischemic cardiomyopathy (no evidence of prior MI, normal voltage QRS complexes, no ischemic ST-T wave changes).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case534/1350x643.jpg", "_type": "mcq", "_caseId": 534}, {"question": "ECG recorded from a middle-aged man. What is the diagnosis?", "options": ["Right bundle branch block (RBBB)", "Right ventricular hypertrophy", "Inferior myocardial infarction with RBBB", "Wolff-Parkinson-White (WPW) pre-excitation", "Left ventricular hypertrophy with RBBB"], "correct": 3, "explanation": "The ECG shows sinus rhythm with a classical WPW pre-excitation pattern. Note the triad of a: short PR interval (100 ms), wide QRS (140 ms), and delta waves (slurring of the QRS onset). The QRS morphology is indicative of a posterior (probably postero-septal) bypass tract. This pattern mimics an inferior (-posterior) infarct, and also may mistaken for RVH and/or RBBB. The ST-T changes are secondary to the altered depolarization pattern, which is opposite in polarity to the major QRS vector in the frontal and horizontal planes. The patient presented with a narrow complex tachycardia consistent with a reentrant circuit (down the AV node and back up the bypass tract in a retrograde direction). This type of paroxysmal supraventricular tachycardia (PSVT) is referred to as orthodromic atrioventricular reentrant tachycardia (AVRT).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case535/1350x817.jpg", "_type": "mcq", "_caseId": 535}, {"question": "70 year-old woman with a history of hypertension presents with chest discomfort and dyspnea. Cardiac enzyme markers were mildly elevated. Coronary angiography revealed no significant epicardial coronary disease. The findings are most consistent with WHICH ONE of the following diagnoses?", "options": ["High grade left anterior descending stenosis (Wellens&apos; syndrome)", "Takotsubo (stress) cardiomyopathy", "\"Memory T wave inversions\" secondary to intermittent right ventricular pacing", "Acute pulmonary embolism", "Apical hypertrophic cardiomyopathy"], "correct": 1, "explanation": "The ECG shows borderline sinus tachycardia (about 96 beats/min) with prominent, widespread T wave inversions most apparent in the anterior and lateral leads: I, aVL, V3-V6, as well as in II and aVF. Left axis deviation is present, along with QT/QTc prolongation (420/478 ms). Prominent voltage in aVL is consistent with left ventricular hypertrophy (history of hypertension), along with probable left atrial abnormality (biphasic P wave in V1 with a broad negative component). In the context of the clinical findings, the most likely diagnosis is takotsubo (stress or apical ballooning) cardiomyopathy. Left ventriculography performed during coronary angiography revealed apical akinesis. Intermittent right ventricular pacing (or intermittent left bundle branch block) can induce anterior (\"memory\") T wave inversions. However, these changes are not usually seen in leads I and aVL. Right ventricular overload due to acute pulmonary embolism may cause T wave inversions in the right to mid-precordial leads (formerly called \"right ventricular strain\") usually in conjunction with sinus tachycardia, and sometimes with an S1Q3T3 pattern, right axis shift and peaked P waves. However, T waves inversions in 1 and aVL would not be expected. Apical hypertrophic cardiomyopathy (Yamaguchi&apos;s syndrome) would be unlikely to present in this manner at this age. This syndrome is marked by very deep (\"spade-like\") T wave inversions usually most apparent in the mid precordial leads, as opposed to the pattern of broadly inverted antero-lateral T wave inversions. Refs: Hughes RK, et al. Apical hypertrophic cardiomyopathy: the variant less known. J. Am. Heart Assoc. 2020;9:e015294. Shvilkin A, et al. T-vector direction differentiates postpacing from ischemic T-wave inversion in precordial leads. Circulation. 2005:111:969. Singh T, et al. Takotsubo syndrome: pathophysiology, emerging concepts, and clinical implications. Circulation. 2022;145:1002.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case536/1350x595.jpg", "_type": "mcq", "_caseId": 536}, {"question": "A middle age woman presents with a remote history of congenital heart disease and no prior surgery. She is referred for an \"abnormal ECG.\" What is the likely diagnosis?", "options": ["Tetralogy of Fallot", "Ebstein&apos;s anomaly of the tricuspid valve", "Aortic stenosis with left bundle branch block", "Anomalous origin of the right coronary with prior inferior MI", "Ventricular septal defect"], "correct": 1, "explanation": "The ECG shows sinus rhythm with a classic Wolff-Parkinson-White (WPW) pre-excitation pattern. Relatively small, positive deltas waves are present in the right precordial leads in concert with predominantly negative QRS complexes in those leads. The mean QRS axis is horizontal (-10 degrees), but not frankly leftward (-30 or more). These findings are consistent with right-sided pre-excitation. The ECG might be mistaken for a LBBB pattern; as well for a prior Q-wave inferior MI. Transthoracic echocardiograms confirmed Ebstein&apos;s abnormality with right ventricular apical displacement of the septal tricuspid valve leaflet associated with mild tricuspid regurgitation. No atrial or ventricular septal defects were present. There was no history of tachycardia. Accessory pathways are present in an estimated 10-30~ of cases of Ebstein&apos;s anomaly, a very rare congenital type of heart disease. Patients with Ebstein&apos;s anomaly without pre-excitation patterns may show a right bundle branch block variant (sometimes with a fractionated QRS), as well as giant (so-called \"Himalayan\") P waves not seen here. See: He B, et al. Ebstein&apos;s anomaly: review of arrhythmia types and morphogenesis of the anomaly. J Am Coll Cardiol EP. 2021; 7:1198. https://doi.org/10.1016/j.jacep.2021.05.008", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case537/1350x716.jpg", "_type": "mcq", "_caseId": 537}, {"question": "Elderly woman with palpitations and dyspnea. What is the rhythm?", "options": ["Atrial flutter with 2:1 AV conduction", "Focal atrial tachycardia with 1:1 AV conduction", "AV nodal reentrant tachycardia (AVNRT)", "Atrioventricular reentrant (bypass-tract mediated) tachycardia (AVRT)", "Sinus tachycardia"], "correct": 0, "explanation": "The ECG shows classic (typical) atrial flutter consistent with counterclockwise reentry in the right atrium, the lower loop involving the inferior vena cava/tricuspid isthmus area. The atrial depolarization rate is 270/min and the ventricular rate is 135/min. Note the negative/positive appearing continuous F (not true discrete P) waves in lead II, with every other atrial wave partly hidden in the ST segment. Other findings include left axis deviation consistent with left anterior fascicular block, delayed precordial transition zone, nonspecific ST-T changes and voltage for left ventricular hypertrophy (R in aVL plus S in V3 > 20 mm in women; Cornell criteria). The patient underwent successful caval tricuspid isthmus (CTI) ablation with resumption of sinus rhythm (with large, broad P waves showing a left atrial abnormality /intra-atrial conduction delay pattern). Atrial flutter with 2:1 AV conduction is one of the most frequent missed-diagnosed arrhythmias. Clues include a highly regular, narrow complex rhythm (unless a bundle branch block is present) with predominantly negative atrial waves in lead II and a partly hidden one in the ST segment region).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case538/1350x744.jpg", "_type": "mcq", "_caseId": 538}, {"question": "Elderly woman with hypotension and an acutely rapid heart rate. Which ONE of the following arrhythmias is seen? (Artifact is present in lead V4.)", "options": ["Multifocal atrial tachycardia (MAT)", "Focal atrial tachycardia (AT)", "AV nodal reentrant tachycardia (AVNRT)", "Atrioventricular reentrant (bypass-tract mediated) tachycardia (AVRT)", "Atrial fibrillation (AF) with a very rapid ventricular response"], "correct": 4, "explanation": "The ECG shows AF with a very rapid ventricular response (mean resting rate is nearly 200/min.) The torrentially rapid rate is unusual in a patient this age. She was hypotensive and septic, accounting for a hyper-adrenergic state. Thyroid function was normal. She converted promptly to sinus rhythm with pharmacologic therapy. The ECG also shows criteria for left ventricular hypertrophy (R wave in aVL plus S wave in V3 > 20 mm in a woman), confirmed by transthoracic echocardiogram. Nonspecific ST-T changes are present. Of note, AF with a very rapid ventricular response is sometimes mistaken for a paroxysmal supraventricular tachycardia (e.g., AVNRT) because the fibrillatory (f) waves (which are not actual P waves, as would be seen in MAT) are difficult to discern at rapid ventricular rates and the ventricular rate may appear regular (\"pseudo-regularization\"). However, careful inspection shows that within this 10-sec recording, the instantaneous ventricular rate (beat/min) actually varies markedly between about 150 and nearly 250/min (count the small number of boxes [40 ms in width] between consecutive R waves and divide that number into 1500). See also Case 516.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case539/1350x738.jpg", "_type": "mcq", "_caseId": 539}, {"question": "What is your diagnosis of the rhythm in this 60-year old woman? (Note also the other waveform findings.)", "options": ["Multifocal atrial tachycardia (MAT)", "Sinu }

}
