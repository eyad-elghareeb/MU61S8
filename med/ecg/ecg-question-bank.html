on", "Incomplete right bundle branch block", "Low limb lead voltage"], "correct": 1, "explanation": "Electrical alternans is not present; all of the other findings are seen. There is sinus tachycardia at about 110/min and borderline right axis deviation of the QRS (+100 degrees). The rSR� in lead V1 with a QRS duration of about 110 ms indicates an incomplete right bundle branch block (RBBB.) The combination of findings is consistent with acute or subacute right ventricular overload due to any number of causes, including severe pneumonitis, pulmonary embolism, etc. The QRS voltage in each of the limb leads is about 5mm (0.5mV) or less, qualifying for low voltage. Low voltage is common in patients in the ICU due to anasarca, pleural effusions, chronic obstructive pulmonary disease (COPD), ventilator effects, etc. Pericardial tamponade is an important cause of low voltage and was excluded here by echocardiogram. Electrical alternans (beat to beat alternation in QRS axis/amplitude) is a specific but not sensitive marker of cardiac tamponade and is not present here. Note also: left posterior fascicular block (LPFB) is a cause of right axis deviation. However, this diagnosis requires exclusion of other causes, including left-rght arm lead reversal, normal and positional variants, right heart overload/pulmonary disease (present here) and lateral myocardial infarction. Also, classic LPFB (hemiblock) produces marked right axis deviation (-120 degrees or so).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case236/1350x900.gif", "_type": "mcq", "_caseId": 236}, {"question": "A 78-year-old man was brought to the Emergency Department. His wife noted that he had a fever and was more difficult to rouse this morning. All of the following statements about his ECG are true EXCEPT:", "options": ["The rhythm is sinus tachycardia", "The PR interval is borderline prolonged", "There is a complete left bundle branch block", "There is left atrial abnormality", "There is borderline low voltage in the limb leads"], "correct": 2, "explanation": "The rate is approximately 100 beats per minute, and there are upright P waves in lead II, fulfilling the criteria for sinus tachycardia. The PR interval is slightly prolonged at 0.21 second (normal PR 0.12 second 2. A wide deep QS complex in V1 3. A wide tall R wave in V6 Additional comments: Even a �mild� sinus tachycardia at rest, especially in an elderly individual, may signal a major abnormality. Generally, sinus tachycardia results from conditions that either increase sympathetic tone or decrease vagal tone. Here is a partial differential diagnosis for resting sinus tachycardia. Can you think of other causes? 1. Fever, infection, septic shock 2. Volume depletion (blood loss, dehydration, pancreatitis, diarrhea, vomiting) 3. Anxiety, pain, excitement 4. Endocrine disorders (hyperthyroidism, pheochromocytoma) 5. Anemia 6. Pulmonary embolism 7. Acute myocardial infarction with pump dysfunction 8. Stimulants, such as nicotine, caffeine, cocaine, ecstasy, methamphetamine, ephedra, and some antidepressants 9. Anticholinergics, such as atropine This patient was diagnosed with a urinary tract infection and treated with antibiotics.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case237/1350x900.gif", "_type": "mcq", "_caseId": 237}, {"question": "A 21-year-old man presents to the Emergency Department after having a witnessed seizure. All of the following statements about this ECG are true EXCEPT:", "options": ["The QRS axis is within normal limits", "The rhythm is sinus tachycardia", "The QT interval is normal for the rate", "There is no evidence of left ventricular hypertrophy", "There is a complete right bundle branch block"], "correct": 4, "explanation": "The QRS axis is normal at approximately +70�. The rate is approximately 110 beats per minute, and there are upright P waves in lead II, fulfilling the criteria for sinus tachycardia. The QTc interval is normal at 0.37 second (normal QTc 0.12 second 2. In V1, an rSR complex with a wide terminal R wave 3. In V6, a qRS complex with a wide S wave Additional comments:Changes in heart rate have long been noted to occur during seizures, both partial and generalized. While sinus bradycardia and even sinus arrest have been described infrequently, sinus tachycardia is a common occurrence during seizure activity. Other rhythm abnormalities have also been reported, though rarely, and include atrial and ventricular premature depolarizations, atrial fibrillation, and torsade de pointes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case238/1350x900.gif", "_type": "mcq", "_caseId": 238}, {"question": "A 67-year-old man is admitted to the hospital for a large abscess in his lower abdomen with surrounding cellulitis. Which of the following statements about his admission ECG is (are) correct:", "options": ["The rhythm is sinus tachycardia", "There is right axis deviation", "There is a complete right bundle branch block", "a and c", "All of the above"], "correct": 3, "explanation": "d) a and c The rate is approximately 100 beats per minute upright P waves in lead II, fulfilling the criteria for sinus tachycardia. His tachycardia is likely related to pain and to his infection. The QRS axis is -15�, borderline left axis. Frank left axis deviation is usually defined by an axis between -30� and -90�. Finally, there is a complete right bundle branch block (RBBB). The criteria for complete RBBB include: 1. QRS duration of 0.12 second or greater 2. In V1, an rSR' complex with a wide terminal R wave 3. In V6, a qRS complex with a wide S wave Additional comments:RBBB may be seen in normal hearts but is usually associated with an underlying pathology. Conditions such as chronic obstructive pulmonary disease (COPD), pulmonary hypertension, atrial septal defect (ASD), or pulmonic stenosis may, in the long run, result in RBBB because of the hypertrophy that occurs in response to pressure or volume overloads. The conduction systems of aging hearts may also undergo degenerative changes, causing RBBB in the absence of any other pathology. Occlusion of the left anterior descending artery (LAD), causing an acute anterior myocardial infarction, can also cause RBBB because the LAD typically supplies the proximal right bundle. The lesions causing RBBB typically occur in the proximal right bundle, though they can also occur at the level of the moderator band and in the terminal portion of the right bundle. Also note the T wave inversions in leads V1 and V2. T wave inversions in leads with tall R� waves are typical in RBBB and are called secondary changes. Since depolarization of the right ventricle is delayed with RBBB, repolarization is delayed as well. This altered sequence changes the direction of the repolarization vector, resulting in T wave inversions in leads with terminal R waves. In contrast, primary T wave abnormalities reflect an intrinsic disturbance of the action potentials, which may occur with ischemia, electrolyte abnormalities, or drug toxicity. This patient had his abscess drained under anesthesia. His cellulitis was treated with antibiotics and improved.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case239/1350x900.gif", "_type": "mcq", "_caseId": 239}, {"question": "A 61-year-old man with a history of hypertension and congestive heart failure presents to the emergency department with shortness of breath after eating breakfast. All of the following statements about his ECG are correct EXCEPT:", "options": ["The QRS axis is normal", "The rhythm is sinus tachycardia", "The PR interval is within normal limits", "There is a complete left bundle branch block", "The voltage in the chest leads meets criteria for left ventricular hypertrophy"], "correct": 3, "explanation": "d) The QRS axis is normal at approximately 0�. The rate is approximately 100 beats per minute, and there are upright P waves in lead II, fulfilling the criteria for sinus tachycardia. This patient is likely tachycardic because of neurohormonal changes related to congestive heart failure (CHF) exacerbation, namely increased sympathetic tone and decreased vagal tone. The PR interval is normal at 0.16 second (normal PR 0.12 second 2. A wide deep QS complex in V1 3. A wide tall R wave in V6 Additional comments: LVH can lead to a number of ECG abnormalities, including prominent voltage in the chest leads and selected limb leads, a widened QRS, T wave inversions in leads with tall R waves, left axis deviation, and left atrial abnormality (LAA). Voltage criteria for left ventricular hypertrophy (LVH) should be used with caution, as various criteria have limited sensitivity or specificity. Commonly used voltage criteria include one or more of the following: 1. SV1 + RV5 or V6 > 35 mm (3.5 mV) 2. RaVL > 11 mm (1.1 mV) 3. For men: SV3 + RaVL > 28 mm (2.8 mV) 4. For women: SV3 + RaVL > 20 mm (2.0 mV) This ECG shows clear evidence of LVH with LAA, T wave inversions in the lateral leads, and very prominent voltage in the chest leads (SV1 + RV5 = 45 mm). The lateral T wave inversions could be related to LVH or they could indicate lateral wall ischemia. However, this patient�s serial cardiac enzymes were all negative. His shortness of breath was due to worsening of his CHF, resulting in pulmonary edema. He improved with standard therapy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case240/1350x900.gif", "_type": "mcq", "_caseId": 240}, {"question": "A 76-year-old woman who has had severe asthma since age 18 comes to the emergency department complaining of increased shortness of breath. Which one of the following statements is true concerning her admission ECG?", "options": ["The PR interval is prolonged", "The QRS axis is normal", "There is normal R wave progression", "There is a complete right bundle branch block", "There is evidence of right ventricular hypertrophy"], "correct": 4, "explanation": "E) Sinus rhythm is present with a relatively fast resting rate (93/min). The PR interval is normal at approximately 0.16 second (normal PR < 0.20 second). The QRS axis is approximately 180� (biphasic in lead aVF and positive in lead aVR) and thus dramatically deviated to the right. The R wave progression is reversed, with tall right precordial R waves and an rS complex in the left chest leads! Recall that in the normal ECG, there is an rS complex in lead V1. The R wave becomes relatively larger and the S wave smaller in lead V2. The ratio of the R wave to the S wave becomes 1 at the so-called transition zone, usually in lead V3 or V4. By lead V6, the QRS complex has usually evolved to become a qR complex. This process is referred to as normal R wave progression. In this ECG, however, there is a qR complex in lead V1 and an rS complex in lead V6. There is an incomplete, not complete right bundle branch block (RBBB) (QRS duration between 0.10 and 0.12 second). The tall right precordial R waves (with a qR complex in lead V1) and the right axis deviation (RAD) are essentially diagnostic of right ventricular hypertrophy (RVH.) The ST-T changes in V1-V3 are also consistent with RV overload (sometimes called an �RV strain� pattern). The P waves in lead II are slightly peaked but do not meet strict criteria for right atrial overload (2.5mm or more in height). Additional comments: RV hypertrophy occurs over time in response to pressure or volume overload in conditions such as primary pulmonary hypertension, chronic obstructive pulmonary disease (COPD), pulmonic stenosis, and atrial septal defect (ASD). This patient was diagnosed with an asthma exacerbation superimposed on severe COPD and improved with oral steroids and albuterol nebulizer therapy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case241/1350x900.gif", "_type": "mcq", "_caseId": 241}, {"question": "A 55-year-old man was admitted to the hospital for a bleeding peptic ulcer. His admission ECG is notable for the all of the following EXCEPT:", "options": ["The rhythm is sinus tachycardia", "The QRS axis is normal", "The precordial transition zone is in lead V3", "There is probable left ventricular hypertrophy", "The PR interval is within normal limits"], "correct": 3, "explanation": "d) The rate is approximately 100 beats per minute, and there are upright P waves in lead II, fulfilling the criteria for sinus tachycardia. This patient is likely tachycardic because of volume depletion and anemia secondary to blood loss. The QRS axis is normal at +15�. The transition zone is in lead V3, where the ratio of R wave to S wave equals approximately 1. The PR interval is normal at 0.17 second (normal PR < 0.20 second). There is no ECG evidence of left ventricular hypertrophy (LVH), such as prominent voltage in the chest leads, left ventricular conduction delay, T wave inversions in leads with tall R waves, left axis deviation, or left atrial abnormality. Let�s take a moment to review the steps you should follow every time you read an ECG. Try to get into the habit of following the steps in the same order each time: 1. Check the standardization and quality of the ECG (The usual calibration is 25 mm/sec and 10mm/mV) 2. Calculate the heart rate 3. Analyze the rhythm (Is it sinus; sinus plus ectopic beats; or some entirely non-sinus mechanism such as atrial fibrillation, ventricular tachycardia or a junctional escape rhythm?) 4. Check the PR interval 5. Check the P wave size 6. Check the QRS width 7. Check the QT interval 8. Check the mean QRS electrical axis 9. Check the QRS voltage 10. Check the R wave progression in the chest leads 11. Look for abnormal Q waves 12. Look for ST segment abnormalities 13. Look for T wave abnormalities 14. Look for prominent U waves", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case242/1350x900.gif", "_type": "mcq", "_caseId": 242}, {"question": "87 year old man with slow pulse. What is the rhythm? (Note: there is artifact in lead V4.)", "options": ["Sinus bradycardia with complete heart block", "Sinus  bradycardia with Wolff-Parkinson-White preexcitation", "Sinus bradycardia with AV Wenckebach", "Sinus bradycardia with isorhythmic AV dissociation", "Sinus rhythm with Mobitz II AV block"], "correct": 3, "explanation": "This ECG shows classic findings of sinus bradycardia (rate around 43 BPM) with isorhythmic AV dissociation (AVD). Note that the P waves appear to glide �in and out� of QRS complexes which have a nearly identical rate, hence the term �isorhythmic.� (This finding also accounts for the apparently short, but slightly variable PR intervals.) This rhythm is sometimes confused with complete heart block. But in isorhythmic AVD there is a functional dissociation of the sinus pacemaker (normal P waves) and a junctional escape mechanism (narrow QRS) at about the same rate, and not true conduction block. It is as if the two pacemakers (sinus and AV junction) get �out of synch� transiently. In contrast, actual complete heart block is due, as the name implies, to true conduction block, not to functional dissociation. In most cases of complete (third-degree AV block), the atrial rate is substantially faster than the ventricular rate and none of the P waves can conduct. In isorhythmic AVD, there may be intermittent conduction of sinus P waves. AV Wenckebach is characterized by progressive PR prolongation with non-conducted P waves and group beating pattern, not seen here. This ECG also does not show finding of abrupt nonconducted sinus P waves seen with Mobitz II AV block. Note of semantic confusion: Complete heart block is often considered as a type of AV dissociative rhythm. However, there are multiple different types of AV dissociation rhythms other than complete heart block. Isorhythmic AV dissociation is one such example. Isorhythmic AV dissociation may occur as a functional variant in healthy individuals (e.g., during sleeping hours with high vagal tone), or due to drugs (especially beta-blockers and calcium channel blockers), or hyperkalemia. In other cases, it may be related to primary sinus node dysfunction.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case243/1350x900.gif", "_type": "mcq", "_caseId": 243}, {"question": "71 year old male was admitted to the hospital for increased shortness of breath. His admission ECG is notable for all of the following EXCEPT?", "options": ["Left atrial abnormality", "Anterolateral and inferior infarct patterns", "Intraventricular conduction delay (IVCD)", "Sinus rhythm with Mobitz II AV block", "Left ventricular hypertrophy"], "correct": 3, "explanation": "This markedly abnormal ECG shows sinus rhythm at rate of about 100 beats per minute with AV Wenckebach (Type I AV block) with 3:2 conduction and a single (junctional or ventricular) escape beat (4th QRS complex from the end of the rhythm strip). Note the progressive PR prolongation in the 3:2 Wenckebach cycles with the non-conducted sinus P wave followed by a relatively shorter (but still slightly prolonged) PR interval. The presence of ~group~ beating is easily recognized and characteristic of Wenckebach.~~~~In contrast, Mobitz II AV block shows abrupt non-conducted sinus P waves, not the progressive pattern of PR prolongation seen here. ~~~~Extensive inferior and anterior wall infarction patterns are present. The rSR~ complex in lead V5 is notable and has been reported as a marker of ventricular dyskinesis/aneurysm (El-Sherif sign). ~~~~Criteria are also fulfilled for IVCD (QRS 0.12 seconds); left ventricular hypertrophy (R in aVL plus S in V3 = 2.8 mV [28mm], and left atrial abnormality. There is also borderline low limb lead ~~QRS voltage.~~~~The patient~s echocardiogram showed severe left ventricular dysfunction (history of severe coronary disease) with an estimated left ventricular ejection fraction of 30~, with hypokinesis of the anterior and lateral walls and dyskinesis of the left ventricular apex.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case244/1350x900.gif", "_type": "mcq", "_caseId": 244}, {"question": "What is the rhythm in this 19 year old female?", "options": ["Wandering atrial pacemaker", "Sinus rhythm with SA exit block", "Sinus rhythm with blocked atrial premature beats", "Respiratory sinus arrhythmia", "Sinus rhythm with Mobitz 1 AV block (AV Wenckebach)"], "correct": 3, "explanation": "This ECG shows an important physiologic finding called �respiratory sinus arrhythmia� (RSA) associated with respiration. The rate of the sinus pacemaker progressively goes from slower to faster and back to relatively slower at the end of the strip. This variability is dependent on cyclic changes in vagal tone associated with the phases of respiration (see Case # 217). RSA is an important marker of intact cardiac autonomic (parasympathetic) function and is best seen in young healthy individuals. As one ages RSA declines as it does with pathologic conditions that impair neuroautonomic regulation, such as diabetes mellitus and congestive heart failure. Note that the PR intervals are constant which excludes AV Wenckebach. The P waves are also of the same, normal morphology and polarity, excluding wandering atrial pacemaker. There is no evidence for blocked atrial premature beats. Sino-atrial (SA) exit block is associated with either an abrupt drop in an entire P-QRS cycle or with more subtle �group beating� due to SA Wenckebach. Neither pattern is present here. SA exit block differs from RSA which shows a gradual increase and decrease in sinus P wave intervals (see Case # 221.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case245/1350x900.gif", "_type": "mcq", "_caseId": 245}, {"question": "This ECG from an 18 year old male shows all of the following EXCEPT?", "options": ["Normal variant early repolarization pattern", "Physiologic sinus arrhythmia", "Normal AV conduction", "Left axis deviation", "Transition zone in lead V3"], "correct": 3, "explanation": "This ECG shows a normal variant that is commonly referred to as �early repolarization pattern.\" There are ST elevations in leads V2-V6 and in some of the limb leads. Slight notching of the terminal QRS (V4) is often seen in conjunction with this pattern see (Case # 130.) The ST segment retains its normal upward concavity. The QRS axis here is normal (about +30 degrees). The QRS transition zone (R=S) is in lead V3, a normal finding. AV conduction is normal, indicated by the normal PR interval (about 0.14 sec.) The slight variation in heart rate is due to physiologic (respiratory) sinus arrhythmia (see Case # 217.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case246/1350x900.gif", "_type": "mcq", "_caseId": 246}, {"question": "51 year male seen in the emergency department. What is the diagnosis?", "options": ["Atrial fibrillation with Wolff-Parkinson-White pattern", "Torsade de pointes", "Atrial flutter with left bundle branch block", "Monomorphic ventricular tachycardia", "Ventricular fibrillation/ventricular flutter"], "correct": 4, "explanation": "This is a classic ECG obtained during a ventricular fibrillation (VF) cardiac arrest. The findings are typical of ventricular fibrillation with more organized ventricular electrical activity in the second half of the strip consistent with ventricular flutter. There is no evidence of any atrial activity ruling out atrial fibrillation with Wolff-Parkinson-White (WPW )( see Case # 15 ) or atrial flutter with a bundle branch block. The characteristic, systematic variation in QRS axis of torsade (see Case # 152 ) is not seen here (although torsade may degenerate terminally into ventricular fibrillation.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case247/1350x900.gif", "_type": "mcq", "_caseId": 247}, {"question": "This ECG is consistent with all of the following EXCEPT?", "options": ["Digitalis effect", "Hypocalcemia", "Risk of torsade de pointes", "Amiodarone effect", "Sotalol effect"], "correct": 0, "explanation": "The ECG shows a very long QT/QTc=0.56 sec/ 0.60 sec. The patient has renal failure with a serum calcium of 7.2 (normal range 8.4-10.2 mg/dL); a serum albumin level of 2.5 (normal range 3.4-4.8 g/dL); low normal serum potassium of 3.6 (normal range 3.5-5.0 mEq/L) after therapy for hyperkalemia, and low normal serum magnesium 1.7 mg/dL (normal 1.6-2.6 mg/dL) about the time this ECG was obtained. Sotalol and amiodarone may also prolong the QT interval, along with a wide range of other medications. Ventricular repolarization prolongation (QT-U) is the major risk factor for torsade de pointes type of ventricular tachycardia. Digitalis, in contrast, shortens ventricular repolarization (QT interval), often producing �scooping� of the ST-T complex.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case248/1350x900.gif", "_type": "mcq", "_caseId": 248}, {"question": "This ECG from a 41 year-old man is consistent with which one of the following diagnoses?", "options": ["Pulmonary sarcoid", "Coarctation of the aorta", "Marfan�s syndrome with aortic regurgitation", "Rheumatic heart disease with mitral stenosis", "Posterior myocardial infarction"], "correct": 0, "explanation": "The ECG shows borderline resting sinus tachycardia with evidence of right ventricular overload, including a tall terminal R wave in lead V1 as part of a narrow QRS complex with an rsR� morphology and with borderline right axis deviation (about +96 degrees). In addition, there are T wave inversions in the right to mid-precordial leads as well. The absence of left atrial abnormality excludes mitral stenosis. Both coarctation of the aorta and aortic regurgitation would be associated with left ventricular hypertrophy. Posterior MI produces tall initial R waves in lead V1 (or V1-V2), usually with concomitant evidence of inferior and/or lateral Q wave myocardial infarction. Borderline low limb lead voltage is present, a non-specific finding. This patient has severe pulmonary sarcoid with restrictive lung disease. Echocardiogram showed evidence of pulmonary hypertension with normal left and right ventricular systolic function.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case249/1350x900.gif", "_type": "mcq", "_caseId": 249}, {"question": "This ECG is notable for all of the following EXCEPT?", "options": ["Left bundle branch block with secondary ST-T abnormalities", "Left axis deviation", "Sinus rhythm with atrial bigeminy", "Left atrial abnormality", "AV Wenckebach with 3:2 conduction"], "correct": 4, "explanation": "The rhythm is sinus with a prominent left bundle branch block (LBBB) pattern (QRS duration 0.15-0.16 second) with LAD. The ST-T abnormalities are consistent with the LBBB, although other causes cannot be excluded. There are frequent premature atrial complexes (PACs) which appear in a bigeminal pattern, accounting for the �group beating� pattern. This paired pattern simulates sinus rhythm with AV Wenckebach with 3:2 conduction. However, in the latter case, the P waves are the same and �come on time.� In this case, the second P wave in each couplet is premature and has a different morphology, since it comes from an ectopic atrial site. R wave progression is slow due to the LBBB. The biphasic P waves with a prominent negative component in lead V1 are indicative of left atrial abnormality. A number of findings here suggest severe underlying myocardial disease, including the LBBB with left axis deviation and the left atrial abnormality. A subtle but important supportive finding is the distinct notching of the ascending part of the S wave in lead V5 with the LBBB. This finding (in leads V3-V5 with LBBB) is referred to as Cabrera�s sign and is a marker of myocardial scarring due to myocardial infarction or other causes (e.g., cardiomyopathy) with this ventricular conduction disturbance. This patient has a diagnosis of chemotherapy-induced cardiomyopathy. Biventricular heart failure was present with severe left ventricular systolic dysfunction with a left ventricular ejection fraction of 20-25% and both mitral and tricuspid regurgitation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case250/1350x900.gif", "_type": "mcq", "_caseId": 250}, {"question": "Which one of the following statements about this ECG from a 24- year-old male is CORRECT?", "options": ["The ECG shows right ventricular hypertrophy", "The ECG shows left ventricular hypertrophy", "The ECG is within the normal limits", "The ECG is consistent with severe hypokalemia", "The ECG shows left atrial abnormality"], "correct": 2, "explanation": "The ECG shows sinus rhythm with a physiologic sinus arrhythmia at an average rate of about 60 bpm and is completely within the normal limits. The basic intervals (PR interval 0.15 sec, QRS 0.09 sec, and QT 0.39 sec) are all within normal limits. The P wave duration and morphology are normal. The precordial leads show normal R wave progression with very slight ST segment elevations (V2-V6) consistent with normal variant early repolarization. The QRS axis is normal at about +60 degrees. There is no evidence of left or right ventricular hypertrophy. Severe hypokalemia generally causes repolarization (QT-U) prolongation (usually with flat T waves and sometimes ST sagging), often with prominent U waves.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case251/1350x900.gif", "_type": "mcq", "_caseId": 251}, {"question": "What is the rhythm in this 79-year-old woman with complaint of shortness of breath?", "options": ["Multifocal atrial tachycardia", "Ventricular tachycardia", "Atrial flutter/fibrillation with rapid ventricular response", "Sinus tachycardia", "Paroxysmal supraventricular tachycardia with AV nodal reentry"], "correct": 2, "explanation": "The rhythm is atrial flutter/fibrillation with a rapid ventricular response rate of about 120 bpm with left axis deviation (LAD) and a borderline intraventricular conduction delay (QRS duration=0.11 second). Slow R progression and non-specific ST-T changes are present. There is no evidence of discrete P waves, either normal or ectopic, excluding sinus tachycardia or a type of atrial tachycardia. The baseline shows some artifact with atrial flutter/coarse atrial fibrillatory activity. The regularized response at the beginning is consistent with flutter and the more erratic response response later suggests intermittent atrial fibrillation. Not uncommonly, these two \"cousin\" atrial tachyarrhythmias alternate or co-exist, so the term flutter/fibrillation, or \"fib-flutter\" is used clinically.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case252/1350x900.gif", "_type": "mcq", "_caseId": 252}, {"question": "This ECG is from an asymptomatic 61-year-old male is consistent with all of the following EXCEPT?", "options": ["Acute (\"silent\") right ventricular ischemia", "Brugada pattern (primary)", "Hyperkalemia", "Type 1C antiarrhythmic drug effect", "Complete right bundle branch block"], "correct": 4, "explanation": "The ECG is notable for ST elevations in leads V1-V3 with a \"coved\" appearance in V1-V2, associated with slight T wave inversion. This finding has generated considerable interest because it may represent the primary (hereditable) Brugada pattern, which in turn, may be associated with increased risk of ventricular tachyarrhythmias and even sudden cardiac death (Brugada syndrome). Similar acquired ECG findings may occur with acute right ventricular ischemia (not present here) or hyperkalemia (normal K+ here) and with type 1C antiarrhythmic drugs like flecainide or certain other medications (no relevant drugs reported here). Of note, there is no true complete right bundle branch block (RBBB) in this case, consistent with the Brugada variant which produces a ~pseudo~ RBBB appearance in the right precordial leads. In contrast to typical RBBB, prominent S waves are not present with the Brugada pattern in V5-V6. The Brugada pattern can also be simulated by a normal variant (early repolarization pattern) in the right chest leads (usually with a \"saddle-back\" ST appearance). The distinction between normal variants and an actual Brugada abnormality can be difficult. Management of asymptomatic individuals with a negative family history and a Brugada-type ECG pattern is a subject of active basic and clinical interest and investigation and some controversy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case253/1350x900.gif", "_type": "mcq", "_caseId": 253}, {"question": "The following ECG with a heart rate of 32 bpm shows what bradyarrhythmia?", "options": ["Idioventricular rhythm", "Sinus bradycardia", "Slow junctional escape rhythm", "Sinus rhythm with complete heart block", "Atrial fibrillation with a slow regularized ventricular response"], "correct": 2, "explanation": "AV junctional bradycardia is indicated by the normal (narrow) QRS complexes with retrograde P waves seen just afterward causing pseudo S waves in lead II and pseudo terminal R waves in V1. There is also a prolonged QT interval. The QRS duration is normal excluding idioventricular rhythm. No sinus P waves are seen and conduction is retrograde (1:1) from junction to atria, excluding complete heart block or atrial fibrillation. The cause of the junctional bradycardia here was intrinsic SA node disease. Serum potassium and thyroid function were normal. No �culprit� drugs were identified (e.g., beta blockers, certain calcium channel blockers such as diltiazem or verapamil, lithium carbonate, sotalol, amiodarone, etc). Symptomatic sick sinus syndrome (e.g., with syncope or pre-syncope, fatigue or heart failure) without reversible causes is an indicator for pacemaker therapy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case254/1350x900.gif", "_type": "mcq", "_caseId": 254}, {"question": "ECG diagnosis is sinus rhythm with what conduction abnormality?", "options": ["Complete right bundle branch block", "Complete left bundle branch block", "Wolff-Parkinson-White  pre-excitation (right-sided bypass tract)", "Left anterior fascicular block", "Left posterior fascicular block"], "correct": 1, "explanation": "The ECG shows sinus rhythm with a complete left bundle branch block (LBBB) pattern (QRS duration 0.16 second) with secondary ST-T wave changes. Bundle branch blocks usually produce \"secondary\" T wave changes such that the ST-T wave vector points opposite in direction of the major vector of the QRS. These secondary ST-T changes are due to the altered sequence of ventricular activation. In a typical right bundle branch block (RBBB), an rSR�-type complex will be seen in lead V1. Wolff-Parkinson-White (WPW) pre-excitation produces the classic triad a short PR, wide QRS and delta waves, not present here (see Case # 97). Left anterior and left posterior fascicular blocks (hemiblocks) do not cause prominent widening or the QRS duration, and are associated with marked left (-45 degrees or more) or right (+100 degrees or more) axis deviation, respectively. Complete LBBB may be associated with a normal, leftward, or rarely rightward QRS axis. LBBB may mask or mimic the pattern of underlying myocardial infarction. LBBB is also important since it is often a marker of underlying organic heart disease (e.g., due to hypertension, severe coronary disease, cardiomyopathy or valvular disease). In addition, LBBB disrupts the normal activation/contraction pattern of the ventricles. As a result, left ventricular function may be impaired or worsened, especially in patients with congestive heart failure syndromes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case255/1350x900.gif", "_type": "mcq", "_caseId": 255}, {"question": "A 69-year-old man presents with chest pain lasting for 12 hours. What is the most likely diagnosis?", "options": ["Acute myocardial infarction", "Acute pericarditis", "Ventricular aneurysm", "Brugada syndrome", "Prinzmetal~s angina"], "correct": 1, "explanation": "The ECG shows sinus rhythm and classic findings of acute pericarditis with diffuse (anterior-lateral and inferior distribution) upsloping (concave upward) ST segment elevations (epicardial current of injury pattern) in leads I, II, aVL, aVF and V3-V6. Lead aVR shows reciprocal ST depression. Very subtle PR segment deviations that are discordant to the ST deviations (i.e., up in lead aVR and down in the inferolateral leads) are due to a concomitant atrial injury current. The combination of findings strongly favors acute pericarditis, rather than the other choices given. (Also see Wave-Maven Cases 3, 34, 60, 62, 71, 80, 134, 205, 207 and 231 for further discussion of pericardial syndromes and comparison.) For discussion of Brugada patterns and syndrome see Case 255. ~~~~Ventricular aneurysm after myocardial infarction may be associated with persistent ST segment elevations usually with pathologic Q waves. Prinzmetal~s angina is associated with transient transmural ischemia due to coronary vasospasm. The ST segment elevations due to acute myocardial infarction, Prinzmetal~s angina or ventricular aneurysm may be concave upward or convex (coved) and are usually in one lead distribution (anterior/lateral vs. inferior/posterior). Reciprocal changes (i.e., slight ST depressions) may be present in the other lead set. ~~~~Distinction between acute pericarditis and normal variant early repolarization can be difficult. Precordial ST elevations in the latter are usually oriented more toward leads V3-4, while in acute pericarditis (as is case here) ST elevations persist out to V5-V6, more laterally. The presence of PR deviations (up in aVR and down in the infero-lateral leads) with pericarditis is also often helpful. ~~~~Physical examination was unremarkable without audible friction rub. Cardiac enzymes were negative. Chest X-Ray was unremarkable. Echocardiogram showed normal ventricular systolic size and function and no pericardial effusion. ~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case256/1350x900.gif", "_type": "mcq", "_caseId": 256}, {"question": "What is the \"syncopated\" cardiac rhythm?", "options": ["Sinus with a single premature ventricular complex (PVC)", "Sinus with SA exit block", "Sinus with A-V Wenckebach", "Sinus with a single premature atrial complex (PAC)", "Respiratory sinus \"arrhythmia\" (normal variant respiratory heart rate variability)"], "correct": 3, "explanation": "This ECG shows sinus rhythm, rate about 70 bpm with normal intervals and normal R wave progression. A single isolated premature atrial complex (PAC) (7th beat) is present. The P wave comes very early and there is a slightly different P wave morphology from the sinus beats. The QRS complex is identical to sinus beats. There is also evidence of physiologic early repolarization variant with slight notching of the J point in the antero-lateral leads, e.g. lead V5 (see Case # 130, 246). Respiratory sinus arrhythmia causes more gradual increases and decreases in heart rate variability associated with inspiration and expiration, respectively (see Cases # 217, 245). Note that the terms premature beat, complex and depolarization are used interchangeably. These terms are preferable to \"premature contractions\" since not all atrial or ventricular premature depolarizations are actually associated with a mechanical response. Isolated atrial ectopy of this type is very common and may be seen in physiologic and pathologic contexts without any specific clinical implications.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case257/1350x900.gif", "_type": "mcq", "_caseId": 257}, {"question": "What is the rhythm and what is the conduction abnormality in this ECG from an 88-year-old female?", "options": ["Atrial fibrillation with right bundle branch block", "Multifocal atrial tachycardia with right bundle branch block", "Atrial flutter with variable conduction and right bundle branch block", "Atrial flutter with Wolff-Parkinson-White pattern", "Atrial tachycardia with variable conduction and left bundle branch block"], "correct": 2, "explanation": "This ECG shows atrial flutter with variable block with an atrial rate of about 260 bpm. The flutter waves appear to be positive (upright) in the inferior leads, suggesting a clockwise rotation pattern to the flutter reentrant mechanism, rather than the more common counterclockwise pattern that is associated with negative flutter waves in the inferior leads. A classic right bundle branch block pattern with left anterior fascicular block is present as well. Unifocal or multifocal atrial tachycardia is excluded as there are no true, discrete P waves, but rather continuous F (flutter) waves. The very fast atrial rate here (about 260/min) also strongly favors flutter rather than atrial tachycardia. The rapid, irregular oscillatory pattern of atrial fibrillation is not seen. Wolff-Parkinson-White (WPW) pattern of conduction is excluded as no delta waves are seen.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case258/1350x900.gif", "_type": "mcq", "_caseId": 258}, {"question": "28 year old female with symptoms of palpitations and lightheadness. What is the arrhythmia?", "options": ["Intermittent Wolff-Parkinson-White pattern", "Torsade de pointes polymorphic ventricular tachycardia", "Monomorphic ventricular tachycardia", "Atrial tachycardia with left bundle branch block aberration", "Atrial flutter with left bundle branch aberration"], "correct": 2, "explanation": "This ECG shows sinus rhythm (normal QTc) with runs of non-sustained monomorphic ventricular tachycardia (starting 2nd beat, rate 170 bpm). The ventricular beats have a left bundle branch block pattern and inferior/borderline rightward QRS axis raising consideration of repetitive monomorphic ventricular tachycardia arising from the right ventricular outflow tract (RVOT). Isolated premature ventricular complexes (PVCs) and two ventricular couplets are also present with the same morphology. ~~~~Atrial tachycardia is excluded as there are no premature P waves prior to the runs. The P waves associated with the wide complex beats appear to be retrograde consistent with ventricular-atrial conduction. No atrial flutter waves are seen. There is no delta wave to suggest Wolff-Parkinson-White pattern. ~~~~The patient had an idiopathic cardiomyopathy with global mild ventricular hypokinesis. Previous attempts at ablation in the RVOT region had been made. At the time of repeat cardiac electrophysiologic study, the arrhythmia was not inducible, despite intensive programmed electrical and pharmacologic stimulation. The diagnosis was monomorphic ventricular tachycardia of unknown mechanism, possibly arising from the superior portion of the interventricular septum. ~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case259/1350x900.gif", "_type": "mcq", "_caseId": 259}, {"question": "74 year old male with symptoms of lightheadedness and dizziness. What is this bradyarrhythmia?", "options": ["Sinus bradycardia with Wolff-Parkinson-White pre-excitation", "Sinus rhythm with SA exit block", "Sinus rhythm with right bundle branch block, 2:1 AV conduction block followed by complete heart block", "Sinus rhythm with blocked premature atrial complexes (PACs) in a bigeminal pattern", "Sinus rhythm with Type 1 (2nd degree ) heart block"], "correct": 2, "explanation": "The rhythm is sinus with right bundle branch block (RBBB)/left axis deviation pattern and 2:1 conduction for the 1st 2nd and 3rd beats (sinus rate 65 bpm). This is followed by complete heart block (4th & 5th beats) with an escape bradycardia at rate about 33 bpm. Note the subtle change in the QRS morphology, likely indicating a shift to a lower site in the His-Purkinje system with the escape rhythm. The RBBB/marked left axis in the conducted beats indicates bifascicular block (RBBB and left anterior fascicular block) and the intermittent complete heart block is consistent with trifascicular disease and infranodal block. A subtle finding here is that the sinus P-P interval is shorter when there is an intervening QRS complex. This phenomenon (sometimes seen with high grade AV block) is called ventriculo-phasic sinus arrhythmia. The mechanism is attributed to rapid, baroreceptor-mediated changes in vagal tone associated with the presence or absence of ventricular contraction (see Case #219.) Wolff-Parkinson-White pattern is excluded as there is no evidence of a delta wave or short PR interval. SA exit block would not produce non-conducted P waves and the non-conducted P waves are not premature excluding blocked PACs in a bigeminal pattern. Cardiac enzymes were normal. (Minuscule r waves are present in leads III and aVF so that prior inferior wall MI is not excluded.) The patient underwent insertion of a dual-chamber rate responsive pacemaker the following day.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case260/1350x900.gif", "_type": "mcq", "_caseId": 260}, {"question": "What is the rhythm in this 82 year old female? What is a possible culprit?", "options": ["Sinus rhythm with Wolff-Parkinson-White pattern", "Monomorphic ventricular tachycardia", "Atrial tachycardia with 2:1 AV conduction (block) and right bundle branch block", "Atrial flutter with 2:1 AV conduction (block) with right bundle branch block", "AV nodal reentrant tachycardia with right bundle branch block"], "correct": 2, "explanation": "The ECG shows atrial tachycardia (atrial rate 200/min) with 2:1 AV block (ventricular rate 100/min). Look closely at V1 and you will see two distinct P waves before each QRS (one superimposed on the T wave of the preceding beat). A typical right bundle branch block (RBBB) pattern is also present with rSR� complexes in leads VI-V3. Non-specific ST segment depressions are present. Atrial tachycardia with block should always prompt a search for digitalis toxicity, which may induce concomitant increased atrial automaticity and AV conduction impairment. One specific mechanism for the increased ectopic atrial activity may be atrial myocardial cell calcium loading due to digitalis, leading, in turn, to triggered activity from delayed afterdepolarizations. Digitalis also increases vagal tone so that the atrial tachyarrhythmia is typically combined with Type 1 AV block in this setting. Hypokalemia may play a contributory role. A digoxin level drawn the same day as this ECG was elevated at 2.3 ng/ml. It is worth noting that atrial tachycardia with AV block also often occurs in the absence of digitalis therapy due to other factors such as atrial disease, increased catecholamines, etc. Sinus rhythm with Wolff-Parkinson-White pattern is excluded as there is no evidence of a delta wave and there are 2 ectopic P waves for each QRS. Atrial flutter is excluded as there are discrete P waves and no flutter (F) waves and the atrial rate is 200 bpm (although �slow� atrial flutter with a flutter rate well below 250/min may occur especially to drugs or atrial disease). These considerations also exclude AV nodal reentrant tachycardia and monomorphic ventricular tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case261/1350x900.gif", "_type": "mcq", "_caseId": 261}, {"question": "What is the rhythm in this 47 year-old woman with bacterial endocarditis?", "options": ["Atrioventricular reentrant (bypass tract) tachycardia (AVRT)", "AV nodal reentrant tachycardia (AVNRT)", "Atrial flutter", "Sinus tachycardia with prolonged AV conduction", "Atrial tachycardia with 2:1 block"], "correct": 3, "explanation": "The ECG shows sinus tachycardia at rate about 110 bpm with a prominent AV conduction delay (PR interval=0.28 second) and diffuse, non-specific ST-T changes. The P wave is just visible at the end of the T wave. (Ectopic atrial tachycardia with 1:1 conduction cannot be excluded based on this single ECG. However, the patient had clear evidence of sinus rhythm on multiple ECGs with PR prolongation.) The prolonged PR interval is especially notable in the presence of sinus tachycardia since this rhythm is usually associated with a PR interval at the lower range of normal due to increased sympathetic and decreased vagal tone. The patient had a history of intravenous drug use and had recurrent bacterial endocarditis with a non-coronary sinus abscess, and was status post aortic valve replacement, accounting for the prolonged AV conduction in the presence of sinus tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case262/1350x900.gif", "_type": "mcq", "_caseId": 262}, {"question": "Elderly man seen in emergency department in transfer with chest pain. All of the following findings are present EXCEPT?", "options": ["Marked ST depressions consistent with severe global ischemia", "Left atrial abnormality", "Left axis deviation", "Prior inferior and probable lateral Q wave myocardial infarction", "Baseline artifact"], "correct": 2, "explanation": "The ECG shows sinus rhythm at about 65 bpm with profound ischemic ST segment depression, most marked in the precordial leads, consistent with severe subendocardial ischemia and probable acute non-Q wave myocardial infarction. The QT interval (about 420 ms) and the PR interval are at the upper limits of normal (0.20 second). The QRS axis is normal. Broad P waves are present (biphasic in lead V1 with 60-80 ms low, amplitude component--esp. on magnified gain) consistent with left atrial abnormality. Q waves (40-50ms) in the inferior-lateral leads are consistent with prior myocardial infarction(s). Baseline artifact is most evident in limb leads. Profound ST depressions of this type usually indicate severe multivessel disease, and sometimes left main coronary disease. The fact that the ST depressions are most marked in the antero-lateral leads, and seen in the inferior leads, is against these ST depressions being reciprocal from an acute posterior ST elevation MI. In the latter, case ST depressions are usually most marked in V1-V3. The use of postero-lateral lateral leads (V7-V9) may be useful in selected cases in looking for \"hidden\" evidence of acute ST elevation MI. The patient experienced severe chest pain and was transferred from an outside facility in cardiogenic shock. En route to the cardiac catheterization laboratory, he developed refractory pulseless electrical activity and ventricular fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case263/1350x900.gif", "_type": "mcq", "_caseId": 263}, {"question": "75 yr-old woman: what is the most appropriate triage?", "options": ["Cardiac catheterization laboratory for percutaneous coronary intervention (PCI) procedure", "Cardiac electrophysiology (EP) laboratory for mapping/ablation procedure for ventricular arrhythmias", "Cardiothoracic surgery for aortic valve replacement", "Cardiothoracic surgery for  left ventricular aneurysmectomy", "Cardiac catheterization laboratory for pericardiocentesis with surgical back-up"], "correct": 0, "explanation": "The ECG shows sinus rhythm with a single ventricular couplet (2nd & 3rd beats) followed by a single junctional escape beat (4th beat) and then premature ventricular complexes (PVCs) in a bigeminal pattern starting with the 5th beat. The key underlying abnormality is the acute/evolving ST elevation anterolateral myocardial infarction pattern (I and aVL) with reciprocal ST depressions inferiorly. Very subtle ischemic ST-T coving is present in leads V5 and V6 as well. Cardiac catheterization in this patient with a history of coronary disease, status post coronary bypass graft surgery and recent stent placement, showed acute stent thrombosis in the saphenous vein graft to the diagonal branch. She underwent successful management of the ST elevation lateral MI using rheolytic thrombectomy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case264/1350x900.gif", "_type": "mcq", "_caseId": 264}, {"question": "This ECG from a 68 year-old woman is consistent with which of the following?", "options": ["Physiologic respiratory arrhythmia", "Sinus rhythm with 3:2 AV Wenckebach", "Atrial tachycardia with AV block", "Sinus rhythm with SA exit block", "Sinus rhythm with atrial premature beats"], "correct": 4, "explanation": "This ECG shows sinus rhythm at rate about 90 bpm with normal intervals (PR 0.18 second, QRS 0.08 second and QT 0.36 second). There are frequent isolated atrial premature beats (APBs): 3rd, 7th 10th beats. The P wave for the atrial premature beats is located on the T wave of the preceding sinus beats. The QRS axis is about +90 degrees, which may be physiologic or indicate borderline right axis deviation in adults. Non-specific T wave inversion is seen in V1-V2 which could be physiologic or might be associated with right ventricular overload, ischemia, etc. Left atrial abnormality is present. The previous ECG of the same day showed atrial fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case265/1350x900.gif", "_type": "mcq", "_caseId": 265}, {"question": "What is the rhythm in this 68 year-old female?", "options": ["Multifocal atrial tachycardia", "Wandering atrial pacemaker", "Atrial fibrillation with rapid ventricular response", "Atrial flutter with rapid ventricular response", "Sinus arrhythmia with tremor artifact"], "correct": 2, "explanation": "This ECG shows an irregular narrow complex tachycardia, which is atrial fibrillation with a rapid ventricular response rate at about 120 bpm, with borderline right axis deviation. Non-specific ST-T changes are present. There is possible left ventricular hypertrophy and possible biventricular hypertrophy. Note that fibrillatory (f) waves may mimic true, discrete P waves, causing diagnostic confusion. ~~~~Multifocal atrial tachycardia and wandering atrial pacemaker are excluded as there is no evidence of discrete P waves, either normal or ectopic. Atrial flutter is excluded because of the erratic response whereas in flutter there is a more regularized response. ~~~~This patient underwent successful DC cardioversion and was returned to sinus rhythm the same day see (Case # 265.)~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case266/1350x900.gif", "_type": "mcq", "_caseId": 266}, {"question": "This ECG is consistent with which one of the following diagnoses in a 61 year-old man with dyspnea?", "options": ["Acute pulmonary embolus", "Acute anterior myocardial infarction", "Rheumatic heart disease/mitral stenosis", "Chronic obstructive pulmonary disease", "Severe aortic stenosis"], "correct": 3, "explanation": "This ECG shows sinus rhythm at about 70 bpm with a complete right bundle branch block (rSR� in V1 with QRS=0.12 second) pattern and peaked P waves (lead II) raising consideration of right atrial overload. There is borderline low limb lead voltage. This constellation, while not pathognomonic, is consistent with chronic obstructive pulmonary disease. The absence of left atrial abnormality (or atrial fibrillation) excludes severe rheumatic mitral stenosis. The absence of sinus tachycardia is against acute pulmonary embolism. For more detailed information on the varied ECG signs of pulmonary embolism, see Case # 32. Severe aortic stenosis is most often associated with signs of left ventricular hypertrophy (typically with left atrial abnormality). There is no ECG evidence of acute ischemia. The clinical diagnosis was severe emphysema.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case267/1350x900.gif", "_type": "mcq", "_caseId": 267}, {"question": "85-year-old female with asymptomatic bradycardia. What does this ECG show?", "options": ["Atrial tachycardia with 2:1 block", "Complete heart block with underlying sinus rhythm", "Sinus rhythm  with 3:1 AV conduction (advanced second degree AV block)", "Sinus rhythm with AV Wenckebach", "Sick sinus syndrome with sino-atrial exit block"], "correct": 2, "explanation": "This ECG shows borderline sinus tachycardia (about 105/min) and a ventricular rate of about 35/min, yielding 3:1 \"advanced\" AV block. There is an intraventricular conduction delay with right bundle branch block and left anterior fascicular block (QRS = 0.13 second, with marked left axis deviation). The conducting P (\"third) wave has a prolonged PR interval of about 230 ms and is constant. Left atrial abnormality and left ventricular hypertrophy are noted. ~~~~The constancy of the conducted PR intervals rules out AV Wenckebach. The consistent sinus P waves (at a rate close to 105 bpm) rules of out sick sinus syndrome/SA exit block. Complete heart block is excluded as every 3rd P wave is conducted. This pattern is referred to as advanced second degree AV block. The finding of 3:1 block with bifascicular block is consistent with advanced infranodal disease and is an indication for permanent pacemaker even without overt symptoms.~~~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case268/1350x900.gif", "_type": "mcq", "_caseId": 268}, {"question": "27 year-old female with variable pulse. What is the rhythm?", "options": ["Sinus rhythm with SA exit block", "Sinus rhythm with AV Wenckebach", "Physiologic (respiratory) sinus arrhythmia", "Ectopic atrial rhythm", "Sinus rhythm with a blocked premature atrial beat"], "correct": 2, "explanation": "This ECG shows a physiologic sinus arrhythmia, a normal variant, associated with respiration and, therefore, termed as respiratory sinus arrhythmia (RSA). This finding is most apparent in young healthy individuals and decreases or disappears with aging and autonomic dysfunction. The rate of the sinus pacemaker increases (starting the 3rd beat with inspiration and decreases starting the 6th beat with expiration). This variability is associated with cyclic changes in vagal tone occurring during the phases of respiration. For a more detailed explanation see Cases # 217 and 245. Ectopic atrial rhythm and blocked premature atrial complexes are excluded as the P wave has a normal axis and is not premature. SA exit block (see Case # 221) would not produce the graduated fluctuations in sinus rates seen here. There are no non-conducted sinus P waves as part of AV Wenckebach type second degree AV block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case269/1350x900.gif", "_type": "mcq", "_caseId": 269}, {"question": "89 year-old male admitted for chest pain and tachycardia. What abnormalities does the ECG show?", "options": ["Ventricular tachycardia and atrial fibrillation", "Ventricular tachycardia with fusion beats", "Atrial fibrillation with left bundle branch block aberrancy", "Atrial fibrillation with intermittent Wolff-Parkinson-White conduction", "Atrial flutter with right bundle branch block aberrancy"], "correct": 0, "explanation": "This first 4 beats of this ECG show termination of a run of wide-complex tachycardia at rate about 150 bpm. The 5th and the 6th beats show supraventricular conduction, with underlying atrial fibrillation now apparent. The conducted supraventricular beats suggest underlying inferior myocardial infarction with prominent Q waves in leads II and aVF and a borderline intraventricular conduction delay (QRS=110 msec). Starting with the 7th beat and continuing to the end, the wide-complex ventricular tachycardia resumes. The wide-complex tachycardia (QRS about 160 msec) has left bundle branch block morphology, with an inferior QRS axis. ~~~~This ECG shows two features strongly favoring ventricular tachycardia over supraventricular tachycardia with left bundle aberrancy, namely: 1) a broad R wave (40 msec or more in duration) in leads V1-V2, and 2) a delayed intrinsicoid deflection great than 70 msec in V1-V2 measured from the initial onset of the QRS to the nadir of the S wave. (The absence of these findings does not exclude ventricular tachycardia, however.) ~~~~This patient ruled in for a small acute myocardial infarction with an elevated troponin, but normal creatine kinase. Echocardiogram showed a major infero-lateral wall motion abnormality consistent with prior myocardial infarction as well. He had recurrent episodes of ventricular tachycardia and underwent successful ablation of an ectopic focus in the crest of the interventricular septum, under the left coronary cusp, consistent with the monomorphic ventricular tachycardia seen here with a left bundle branch block, inferior QRS axis morphology. The patient refused an implanted cardioverter-defibrillator (ICD) device.~~~~~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case270/1350x900.gif", "_type": "mcq", "_caseId": 270}, {"question": "What is the rhythm in this asymptomatic 47 year-old man?", "options": ["Sinus with pre-excitation variant", "Atrial tachycardia with 2:1 block", "Respiratory sinus arrhythmia", "Ectopic atrial rhythm", "AV junctional escape rhythm"], "correct": 3, "explanation": "This ECG shows an ectopic atrial rhythm with inverted (negative) P waves in lead II,III, aVF, V5-V6. There is a normal PR interval of 0.15 second. The apparently short PR in V1 and V2 is due to the fact that the beginning of the P wave is nearly isoelectric in these leads (see simultaneously recorded lead II in rhythm strip.) The QRS duration is normal (0.09 second.) Sinus arrhythmia and sinus with pre-excitation are excluded as there are no sinus P waves (upright in lead II invariably). Junctional escape rhythms are usually at slower rates and the P wave is typically hidden within the QRS or appears just before or just after the QRS. The P wave here occurs distinctly before the QRS consistent with an ectopic atrial focus, probably left atrial given the P wave axis. Ectopic atrial rhythms (usually transient) may occur without organic heart disease or with a variety of different cardiac syndromes. The ECG here is otherwise entirely unremarkable.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case271/1350x900.gif", "_type": "mcq", "_caseId": 271}, {"question": "26 year-old female with complaint of palpitations. The ECG shows all of the following findings, EXCEPT?", "options": ["Sinus bradycardia at about 58 bpm", "Right axis deviation", "Ventricular bigeminy", "Aberrated atrial premature beats (APBs)", "Non-specific inferolateral ST-T wave abnormalities"], "correct": 3, "explanation": "This ECG shows sinus bradycardia at about 58 bpm, with frequent premature ventricular premature beats (VPBs) in a bigeminal pattern. Sinus beats have right axis deviation with a borderline intraventricular conduction delay (QRS=110 msec). The precordial leads have prominent voltage with possible left ventricular hypertrophy (deep S wave in V2) and the rightward axis also raises consideration of biventricular hypertrophy. (Young adults may have prominent precordial voltage as a physiologic finding.) The VPBs have right bundle branch block morphology with a superior-rightward axis consistent with an origin in the apicolateral portion of the left ventricle. Aberrated APBs are excluded as there are no ectopic P waves seen prior to the QRS of the premature beat. The sinus P waves actually �march through� (partly obscured at times), giving a classic compensatory pause pattern characteristic of VPBs. This patient had an idiopathic cardiomyopathy and episodes of ventricular tachycardia from a site or sites in the apical left ventricle not amenable to ablation therapy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case272/1350x900.gif", "_type": "mcq", "_caseId": 272}, {"question": "52 year-old man transferred by ambulance. The ECG is diagnostic of which one of the following conditions?", "options": ["Massive pulmonary embolism", "Brugada-type pattern", "Hyperkalemia", "Pericarditis with cardiac tamponade", "Acute large ST elevation anterior myocardial infarction"], "correct": 4, "explanation": "This ECG shows sinus rhythm at about 90 bpm with acute ST elevations in leads I, aVL and V2-V6. These striking antero-lateral ST elevations are due to an extensive �current of injury� and the pattern is technically known as a �monophasic current of injury.� Reciprocal ST depressions are present in leads III and aVF. Incipient Q waves are present in leads V3-V6. Borderline left axis deviation is present, with minuscule r waves in III and aVF and a small Q in II, raising the possibility of prior inferior infarction. The accompanying tall T waves are so-called hyperacute T waves. In housestaff parlance, the term �tombstone pattern� is often used (but not encouraged) in this context, due to the distinctive shape and high amplitude of the ST-T elevations and the life-threatening clinical implications. This patient was immediately transferred to the cardiac catheterization laboratory with cardiogenic shock syndrome. He underwent primary angioplasty of a 99% mid-left anterior descending lesion and an intra-aortic balloon pump was placed. An initial echocardiogram showed a markedly reduced left ventricular ejection fraction of 20-25%.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case273/1350x900.gif", "_type": "mcq", "_caseId": 273}, {"question": "78 year-old man with a history of �heart attack� comes into the emergency department with complaints of palpitations and shortness of breath. What is the wide-complex rhythm? Note: serum K+ was normal and he was not on any antiarrhythmic drugs.", "options": ["Atrial tachycardia with Wolff-Parkinson-White pre-excitation", "Atrial tachycardia with right bundle branch block aberration", "Monomorphic ventricular tachycardia", "Atrial flutter with right bundle branch block aberration", "Sinus tachycardia with left bundle branch block aberration"], "correct": 2, "explanation": "This ECG shows a very wide-complex (between 180-200 msec) tachycardia at a rate about 180 bpm with a right bundle branch (RBBB) morphology. The diagnosis of monomorphic ventricular tachycardia with a RBBB morphology is strongly supported by the following criteria: 1) Wide QRS (greater than 140 ms) in the absence of drugs or hyperkalemia (the QRS here is extremely wide); 2) wide monophasic R wave in lead V1 (or RS or QR complex in that lead); 3) QR complexes in the inferior leads with extreme axis deviation; 4) rS or QS waves in V6. A resting rate of 180 bpm excludes sinus tachycardia, especially in this age group. There is no evidence of atrial flutter or atrial tachycardia, and, as described, the QRS morphology here is strongly against aberrant supraventricular conduction. This patient had a complicated cardiac history of coronary artery disease, status post bypass graft surgery and prior inferior infarction. He had recurrent ventricular tachycardia, likely originating the area of the prior inferior infarct. An echocardiogram revealed showed a dilated left atrium and left ventricle, extensive thinning with an akinetic scar of the inferior base and moderately severe mitral regurgitation. Estimated left ventricular ejection fraction was 35%. Under conscious sedation the patient was converted to sinus rhythm with a 300-joule shock An automatic implantable cardioverter-defibrillator (ICD) was placed the following day. Compare this ECG with Case #270 showing monomorphic ventricular tachycardia with a left bundle branch block morphology and underlying myocardial infarction. Also, note that the QRS duration in lead II may appear to be normal, with the false appearance of a P wave at the end. However, if you draw lines down from the onset and end of the QRS in simultaneously acquired lead I, you will see that the QRS in lead II is actually close to 200 msec wide and that the terminal deflection is not a P wave, but part of the QRS.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case274/1350x900.gif", "_type": "mcq", "_caseId": 274}, {"question": "80 year-old man presented to emergency department complaining of fatigue and shortness of breath? What is the rhythm?", "options": ["Sinus tachycardia", "Atrial tachycardia", "AV nodal reentrant tachycardia (AVNRT)", "Atrial flutter with 2:1 conduction", "Atrial fibrillation"], "correct": 3, "explanation": "This ECG shows typical atrial flutter with 2:1 block. The atrial rate is 320 with 2:1 AV block (conduction), yielding a ventricular response is 160 bpm. There are classic flutter �F� waves (consistent with a typical counterclockwise right atrial reentrant circuit) giving a �saw tooth� appearance to the atrial activity. (see also Cases 87,129,202.) A resting rate of 160 bpm excludes sinus tachycardia in this age group. Atrial fibrillation is ruled out because of the regularity of the ventricular response. Apparent flutter waves at 320/min exclude AVNRT or atrial tachycardia. This patient was treated with calcium channel blockade for rate control and electrically cardioverted to sinus rhythm.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case275/1350x900.gif", "_type": "mcq", "_caseId": 275}, {"question": "32 year-old male transferred from another facility. This ECG is diagnostic of which of the following conditions?", "options": ["Acute pericarditis", "Normal variant early repolarization with musculo-skeletal pain", "Acute pulmonary embolism", "Acute anterior ST elevation myocardial infarction (STEMI)", "Hyperkalemia"], "correct": 3, "explanation": "This ECG shows sinus at about 80 bpm with marked ST elevations in I, aVL and VI-V5. ST depressions, consistent with reciprocal changes, are seen in II, III and aVF. Very slow R wave progression is present in leads VI-V3 and hyperacute T waves accompany the ST elevations in leads V2-V5. (See Case # 273.) The finding of ST elevations in this extensive distribution of leads is consistent with proximal occlusion of the left anterior descending coronary artery proximal to the first septal perforator and diagonal branches. The marked degree of the ST-T changes and the presence of reciprocal changes rules out normal variant or acute pericarditis. Hyperkalemia does not produce ST elevations in antero-lateral leads. (The serum potassium was normal.) There is not evidence of acute right ventricular overload to suggest acute pulmonary embolism. This young adult man had multiple risk factors for premature coronary artery disease. He presented with acute anterior myocardial infarction (initial CK 2,979 IU) and was transferred immediately to the cardiac catheterization lab where he was found to have a 100 % occlusion of the proximal left anterior descending artery (LAD) with abundant thrombus. He was treated successfully with a percutaneous coronary intervention procedure, including angioplasty and stenting of the LAD. An echocardiogram performed 4 days later revealed a left ventricular ejection fraction of 50%.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case276/1350x900.gif", "_type": "mcq", "_caseId": 276}, {"question": "What is the rhythm?", "options": ["Sinus rhythm with baseline artifact", "A-V sequential pacing", "Atrial (electronic) pacing with normal AV conduction", "Sinus rhythm with bi-atrial abnormality", "Ventricular pacemaker with failure to sense"], "correct": 2, "explanation": "This ECG shows a fully atrial (electronically) paced (not sinus) rhythm at a rate of 90 bpm. There is normal (intrinsic) AV conduction. The QRS is within normal limits at 0.08 second, without a preceding ventricular pacing spike. Non-specific ST-T changes are present. This ECG was done post-operatively (accounting also for the low limb lead voltage) just after the patient had undergone a mitral valve replacement for rheumatic valvular disease. In A-V sequential pacing you will find an atrial spike that initiates the P wave and then a ventricular spike that precedes the QRS with the resultant wide QRS complex, generally with a left bundle branch morphology QRS (see Case # 158.) There is no ventricular pacing on this ECG.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case277/1350x900.gif", "_type": "mcq", "_caseId": 277}, {"question": "Resting ECG in a 65 year-old male with complaint of palpitations. What is the tachycardia?", "options": ["Sinus tachycardia", "Atrial flutter with 2:1 conduction", "AV nodal reentrant tachycardia (AVNRT)", "Atrial fibrillation (AF) with rapid ventricular response", "Atrial tachycardia with 2:1 block"], "correct": 2, "explanation": "This ECG shows a regular, narrow complex tachycardia at a rate of 150 bpm without preceding P waves. However, if you look very closely, there appears to be a negative (retrograde) P wave in the early part of the ST segment of lead V6 and a subtle P waves just after the terminus of the S waves in leads II, III and aVF, along with a positive P wave in lead aVR causing a �pseudo� R wave pattern. The most likely diagnosis, therefore, and is AV nodal reentrant tachycardia, a common type of paroxysmal supraventricular tachycardia (PSVT). Also see Cases 7, 106, 222. The resting rate of 150 bpm by itself is strongly against sinus tachycardia in this older gentleman and no sinus P waves are identifiable. No atrial flutter waves are seen and the near-metronomically regular and rapid rate is not consistent with atrial fibrillation. Voltage criteria for left hypertrophy are present. The ventricular rate here (150/min) also precludes atrial tachycardia with 2:1 block since this would yield an atrial rate of 300/min, too fast for atrial tachycardia (but typical of atrial flutter).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case278/1350x900.gif", "_type": "mcq", "_caseId": 278}, {"question": "ECG from a 69 year old woman. The ECG is most consistent with which of the following drug effects?", "options": ["Amiodarone", "Digoxin", "Verapamil", "Metoprolol", "Enalapril"], "correct": 0, "explanation": "This ECG shows sinus rhythm at a rate 60 bpm left atrial abnormality (with leftward P wave axis) and a borderline leftward QRS axis. The prominent negative component of the P waves in leads II, III and aVF is likely related to an intra-atrial conduction delay which may be a marker of increased risk of atrial fibrillation. AV conduction is normal. The QT interval is prolonged at 0.47 sec for the rate of 60 bpm (QTc= .47) consistent with the patient�s history of atrial fibrillation treated with the class III agent, amiodarone. (The T wave is somewhat notched here as well, probably related to drug effect on repolarization.) Other factors that can cause a long QT were excluded here (e.g., electrolytes were normal and no other relevant drugs were being taken.) Digoxin shortens the QTc interval and the other drugs listed above do not have any major direct effects.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case279/1350x900.gif", "_type": "mcq", "_caseId": 279}, {"question": "61 year-old asymptomatic gentleman. What does this ECG show?", "options": ["Sinus rhythm with prominent U waves", "Atrial tachycardia with 2:1 block", "Atrial flutter with block", "Sinus with prolonged PR interval (first degree AV �block�)", "Sinus rhythm with isorhythmic AV dissociation"], "correct": 3, "explanation": "This ECG is striking for marked PR interval prolongation at about 0.40 second. The rhythm is sinus at a rate of 64 bpm with a QT interval at the upper limits of normal or minimally prolonged (0.44 sec). The QRS complex is of normal duration. The patient was not on any medications that may prolong AV nodal conduction, such as beta-blockers, certain calcium channel blockers (verapamil, diltiazem), or digoxin. There was no evidence of other possible contributors with specific clinical implications such as Lyme disease, sarcoid, endocarditis (with AV junction involvement) or acute ischemia. Thus, the prolonged PR interval here likely represents intrinsic AV node disease. Pacemaker therapy is not indicated for asymptomatic PR prolongation (first degree AV �block�). Appropriate management, in addition to looking for reversible or other clinically important causes, includes follow-up to track possible progression to symptomatic or asymptomatic degrees of higher degree AV block. Holter monitoring may be useful in such cases. It should be noted that the term �first degree AV block� is actually something of a misnomer since this finding represents conduction delay rather than block per se. An alternative designation advocated by some electrophysiologic purists is to simply say �prolonged PR interval� or �prolonged AV conduction.�", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case280/1350x900.gif", "_type": "mcq", "_caseId": 280}, {"question": "70 year-old female following coronary artery bypass graft surgery developed a rhythm with intermittent wide complex beats. The ECG shows which of following?", "options": ["Sinus rhythm with ventricular bigeminy", "Sinus rhythm with intermittent Wolff-Parkinson-White pattern", "Bidirectional ventricular tachycardia", "Atrial bigeminy with aberration", "Sinus rhythm with intermittent right bundle branch block"], "correct": 0, "explanation": "This ECG shows sinus rhythm with ventricular bigeminy (every other beat is a ventricular premature beat or complex (VPB or VPC, for short) of the same morphology in each lead. Note also the minimal diffuse ST elevations (with non-specific T wave inversions). These repolarization changes are consistent with sub-clinical perioperative pericarditis, a ECG common finding after coronary artery bypass graft (CABG) surgery.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case281/1350x900.gif", "_type": "mcq", "_caseId": 281}, {"question": "This ECG is from an elderly woman and is most consistent with which one of the following severe abnormalities?", "options": ["Hypercalcemia", "Hyperkalemia", "Hypernatremia", "Hypokalemia", "Hypocalcemia"], "correct": 1, "explanation": "This ECG shows an extremely wide complex rhythm (QRS duration 0.28 second) at a rate of 70 bpm. This pattern is approaching that of a so-called �sine-wave� morphology indicative of severe hyperkalemia. Atrial activity is not apparent. The patient�s serum potassium level done about � hr before was 6.8 mEq/L (and was likely higher at the time of this ECG). She had end-stage renal disease with a BUN of 78 mg/dL and a serum creatinine of 5.2 mg/dL. Emergency therapy of hyperkalemia is required based on this ECG finding.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case282/1350x900.gif", "_type": "mcq", "_caseId": 282}, {"question": "This ECG is most consistent with which of the following diagnoses?", "options": ["Aortic stenosis", "Chronic obstructive pulmonary disease", "Mitral stenosis", "Acute anterior wall myocardial infarction", "Brugada pattern"], "correct": 1, "explanation": "The rhythm is sinus with intermittent multifocal atrial rhythm/multifocal atrial tachycardia (MAT) at a rate of about 95 bpm. MAT is strictly defined by 3 or more consecutive, non-sinus P waves at a rapid rate. If you look closely in leads 2 and 3, for example, there are, intermittently, multiple consecutive P wave morphologies somewhat marred by baseline artifact. Four other findings of note here are: low limb lead voltage, borderline right axis deviation of the QRS (+95 degrees), and a vertical P wave axis (about +80 degrees), with slow R wave progression V1-V3. This constellation of findings is very suggestive of chronic obstructive lung disease. (The P waves are also intermittently somewhat peaked, suggesting right atrial abnormality, another supportive finding in this context.) Compare with Case # 149, another example of MAT with chronic obstructive lung disease. This patient�s pulmonary function studies revealed a marked obstructive ventilatory defect.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case283/1350x900.gif", "_type": "mcq", "_caseId": 283}, {"question": "21 year old female with complaint of palpitations. What does this ECG show?", "options": ["Sinus tachycardia with intraventricular conduction block", "Atrial tachycardia with 2:1 conduction", "Sinus rhythm with Wolff-Parkinson-White pattern", "Sinus rhythm with left anterior fascicular block", "Ventricular tachycardia with AV dissociation"], "correct": 2, "explanation": "This ECG shows the classic Wolff-Parkinson-White (WPW) pattern with the triad of a short PR interval, a wide QRS and a delta wave. The delta wave is represented by notching or slurring of the initial portion of the QRS complex due to ventricular pre-excitation. See Case # 218 for a detailed explanation of this finding and its significance. The polarity of the delta wave in this case (negative in V1 and positive laterally) is consistent with a right-sided bypass tract. The complaint of palpitations in patients with WPW pattern raises a strong possibility of atrio-ventricular reentrant tachycardia (AVRT), a type of paroxysmal supraventricular tachycardia (PSVT). However, the symptom could be due to other mechanisms, related or non-related to the WPW pattern, including AV nodal reentrant tachycardia (AVNRT), atrial fibrillation, sinus tachycardia, etc.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case284/1350x900.gif", "_type": "mcq", "_caseId": 284}, {"question": "Young adult male is found unresponsive. The ECG is most consistent with one of the following diagnoses?", "options": ["Systemic hypothermia", "Hypercalcemia", "Tricyclic antidepressant overdose", "Hypoglycemia", "Myxedema"], "correct": 0, "explanation": "This ECG shows classic signs of systemic hypothermia with prominent sinus bradycardia (about 45 bpm) with marked J (Osborn) waves (see, e.g., leads V4 and V5, simulating a bundle branch block or ischemic pattern). There are also prominent T wave inversions and QT prolongation. The patient, with a history of polysubstance abuse, was found unresponsive, last seen the day before. His rectal temperature was 80.0 degrees F. Following rewarming, his ECG completely normalized. For comparison examples of typical hypercalcemia, see Cases # 9 and 67, and for tricyclic
