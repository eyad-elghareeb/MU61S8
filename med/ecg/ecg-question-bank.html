/* [QUESTION_BANK_START] */
const QUESTION_BANK = [{"question": "21-year-old female with a history of \"seizure\" disorder. She is on no medications and her electrolytes are normal. This ECG is most consistent with which ONE of the following?", "options": ["Wolff-Parkinson-White (WPW) pre-excitation", "Long QT syndrome", "Hypokalemia", "Tricyclic overdose", "Hypothyroidism"], "correct": 1, "explanation": "Dx: Congenital (hereditary) long QT syndrome. The ECG demonstrates sinus rhythm with a very prolonged QT interval of 0.6 second. Note the broad T waves with notching (or possibly U waves) in the precordial leads. This characteristic may identify patients with long QT syndrome at increased risk for torsade de pointes and syncope and sudden death. Patients at high risk of recurrent syncope or sudden death are usually considered for implantable cardioverter defibrillator therapy along with beta-blockade. Over a dozen different \"channelopathies\" have been identified in the pathogenesis of congenital long QT syndrome. (Lehnart SE et al..Inherited arrhythmias: a National Heart, Lung, and Blood Institute and Office of Rare Diseases workshop consensus report about the diagnosis, phenotyping, molecular mechanisms, and therapeutic approaches for primary cardiomyopathies of gene mutations affecting ion channel function Circulation. 2007; 116:2325-45. T wave morphology can be helpful in determining the type of congenital LQTS (Moss AJ et al. ECG T-wave patterns in genetically distinct forms of the hereditary long QT syndrome. Circulation 1995; 92: 2929-34). Multiple medications can cause acquired LQTS also increasing the risk of torsade de pointes and sudden death. The measurement of the QT poses a number of challenges and controversies. Visually, one should use the longest QT (often best seen in chest leads), and not restrict measurement to lead II or any single other lead. A number of rate-correction algorithms have been proposed; none has emerged as a consensus method. A variety of automated methods have also been devised--but computer generated QT measures (and indeed, all computer assessments) should always be visually validated. Low amplitude, but prolonged T waves may lead to underestimation by eye or computer.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case1/1350x900.gif", "_type": "mcq", "_caseId": 1}, {"question": "18-year-old pre-op ECG for knee surgery. What does this ECG show?", "options": ["Limb lead reversal", "Ectopic atrial rhythm (EAR)", "Dextrocardia", "Coronary sinus rhythm", "Multifocal atrial rhythm (MAT)"], "correct": 0, "explanation": "Limb lead reversal. The left and right arm leads are reversed. The clue is inversion of the P wave and QRS complex in lead I. Whenever you see a negative P wave and QRS complex in lead I the likely diagnosis is limb lead reversal. Dextrocardia is another possibility, but in dextrocardia there is loss of R wave progression in the left chest leads which is not seen in this tracing. Another clue is the dissimilarity of the morphology of the QRS complexes in lead I and V6. No evidence of multiple P wave morphologies are present ruling out MAT. (The variability in heart rate here is due to respiratory sinus arrhythmia, a physiologic finding that is most apparent in younger healthy subjects.) Also, note the slight J point/ST elevations in leads with a positive QRS, consistent with normal variant (benign) early repolarization pattern.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case2/1350x900.gif", "_type": "mcq", "_caseId": 2}, {"question": "History: 36-year-old male with hypertension and hypercholesterolemia presents to the emergency room with 3 hrs of chest pain and the following ECG. How would you manage this patient based on this ECG?", "options": ["Thrombolytic therapy", "Urgent cardiac angiography and stand-by angioplasty", "Conservative management with nonsteroidal analgesia", "Work-up for pulmonary embolism", "Urgent trans-esophageal echocardiogram"], "correct": 2, "explanation": "This patient&apos;s ECG is consistent with acute pericarditis. Always consider myocardial infarction first when you see ST elevations, but don&apos;t forget the differential diagnosis of ST elevations not only includes 1) ischemic heart disease (MI, Prinzmetal angina, ventricular aneurysm) but also 2) pericarditis, 3) left bundle branch block (LBBB) (in V1-V3) and 4) normal (\"early repolarization\") variant (J point elevation). In this ECG two features point to pericarditis: First, the diffuseness of the ST elevations (I, II, III, aVF, V3-V6). In myocardial infarction the ST elevations tend to be localized (inferior, anterior, posterior, lateral), often, but not always with reciprocal ST depressions. Second, the PR segment displacement which has been attributed to subepicardial atrial injury. PR elevation can be seen in aVR and PR depression is best seen in II, aVF, V4-V6. Obviously troponin and CK-MB blood tests and possible transthoracic echocardiogram (for effusion and possible evidence of diffuse myocarditis) will be helpful, following a careful history and physical exam. Reference: Spodick DH. Diagnostic electrocardiographic sequences in acute pericarditis: significance of PR segment and PR vector changes. Circulation 1973; 48:575.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case3/1350x900.gif", "_type": "mcq", "_caseId": 3}, {"question": "Elderly female admitted with obtundation. What electrolyte abnormality is strongly suggested?", "options": ["Hyponatremia", "Hypernatremia", "Hyperkalemia", "Hypokalemia", "Hypercalcemia"], "correct": 2, "explanation": "Hyperkalemia (K+ = 8.7 mEq/L) secondary to acute renal failure. The ECG shows symmetrically peaked (\"tented\") T waves associated with potassium levels in excess of 6 mEq/L. The tracing also shows broad and flattened sinus P waves that may precede frank sino-ventricular conduction seen with severe hyperkalemia (i.e., conduction from the sinus node to the ventricles through specialized inter-nodal tissue without atrial depolarization). This conduction pattern may simulate a junctional rhythm. The narrow QRS complex in this tracing is somewhat atypical for severe hyperkalemia. Milder degrees of hyperkalemia may actually facilitate AV conduction. Note that T wave peaking with hyperkalemia is a relative finding: the absolute magnitude of the T waves cannot be used to rule in or rule out hyperkalemia. Indeed, in some cases of hyperkalemia with left ventricular hypertrophy, the T wave peaking may affect inverted T waves or cause relative normalization. The presence of relatively low voltage and sinus bradycardia in this clinical setting should also raise consideration of hypothyroidism/myxedema, which by itself usually also causes T wave flattening. Note is made that even relatively high levels of potassium may not produce classic changes on the ECG depending on a number of factors, including the rate that the K+ goes up. Thus specific levels of serum potassium cannot be linked to unique ECG patterns.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case4/1350x900.gif", "_type": "mcq", "_caseId": 4}, {"question": "85-year-old male without symptoms and on no pertinent cardiac medications. What is the rhythm here?", "options": ["Atrial tachycardia with AV block", "Sinus bradycardia (marked) conistent with sick sinus syndrome", "Sinus rhythm with 2:1 AV block", "Sinus rhythm with complete (third degree) AV block", "Sinus rhythm with 3:2 AV Wenckebach"], "correct": 2, "explanation": "The ECG shows a very slow ventricular rate (about 32/min) with non-conducted sinus P waves alternating with normally conducted P waves. The sinus (P) wave rate is about 64. The conducted PR intervals are constant at about 200ms. It is not possible to identify with certainty the location of block (nodal vs. infranodal) from this single ECG showing 2:1 AV conduction. The site of block could be proximal (in the AV node) or more distal, in the His-Purkinje system, especially intra-Hisian in this case given the narrow QRS. In general, with 2:1 block, involvement of the AV node is favored by a narrow QRS complex and a prolonged PR interval, or by the presence of intermittent AV Wenckebach. Block that is infranodal (in the His-Purkinje system) would be favored by a concomitant bundle branch block and/or a PR interval of 160 ms or less. Possibly useful bedside diagnostic tests for locating the site of chronic 2:1 block (in the absence of active ischemia) would include autonomic interventions. Sympathetic stimulation (e.g. by mild exercise) should increase heart rate and improve conduction with a nodal location of block, but worsen conduction in infra-nodal block. Carotid sinus massage (if not contraindicated) would decrease heart rate and worsen AV conduction in the case of nodal block but might improve AV conduction in infra-nodal block. Pacemaker placement is indicated for symptomatic 2:1 block at any site without a reversible cause (e.g., drug effect, Lyme disease) and for asymptomatic 2:1 block due to infranodal disease. Intracardiac His bundle electrograms would definitively locate the site of block. This patient had intermittent 3:2 AV Wenckebach at other times, and then resumed 1:1 conduction on subsequent ECGs, consistent with AV node disease. The ECG also shows left atrial abnormality, borderline left axis deviation and LVH by voltage, along with non-specific ST-T changes. The LVH could be from systemic hypertension, but always raises concern about aortic stenosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case5/1350x900.gif", "_type": "mcq", "_caseId": 5}, {"question": "71-year-old female with mitral stenosis and a history of atrial fibrillation. What is the rhythm now?", "options": ["Atrial flutter with variable AV block", "Multifocal atrial tachycardia with variable AV block", "Sinus rhythm with variable AV block", "Ectopic atrial rhythm with variable AV block", "Accelerated idioventricular rhythm"], "correct": 3, "explanation": "Rhythm: Ectopic atrial (non-sinus) rhythm (borderline for atrial tachycardia -- atrial rate around 95/min) with 2:1 block and 3:2 AV Wenckebach (beats 4 and 5), accounting for the bradycardic QRS rate (about 48/min). Note the negative P waves in lead II indicating a non-sinus pacemaker. Other important abnormalities: right bundle branch block, left anterior fascicular block and a markedly prolonged QT(U) interval. This patient was on digoxin and quinidine. The evidence for quinidine excess (assuming the serum potassium is normal and no other factors prolonging ventricular repolarization are identifiable) is the very long QT(U) interval best seen in V2-V5. This finding predisposes to torsade de pointes and may occur with \"therapeutic\" or \"subtherapeutic\" levels of quinidine or other class 1A antiarrhythmic drugs. Atrial rhythm/ tachycardia with Mobitz I block also strongly raises the question of digitalis toxicity in patients on that class of medication. (However, atrial tachycardias with AV block in the general population are usually not due to digitalis excess.) With pure 2:1 AV block, it may be impossible from the surface ECG to tell if the non-conducted beats are due to nodal or infranodal block. The clue here centers on beats 4 and 5 where 3:2 Wenckebach is evident, indicating block in the AV node. The atrial rate of close to 100 cycles/min is faster than the usual ectopic atrial escape rhythm, so this ECG can be read as accelerated ectopic atrial rhythm or \"slow/borderline atrial tachycardia\" with AV block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case6/1350x900.gif", "_type": "mcq", "_caseId": 6}, {"question": "49-year-old woman with a \"rapid heart beat\" has the following ECG. What is the rhythm?", "options": ["Sinus tachycardia", "AV nodal reentrant tachycardia", "Atrial flutter with 2:1 AV block", "Atrial fibrillation", "Atrial tachycardia"], "correct": 1, "explanation": "The ECG shows classic AV nodal reentrant tachycardia (AVNRT). This tracing demonstrates a regular, narrow complex tachycardia at a rate of 150 bpm. The differential diagnosis of a regular narrow tachycardia in general includes 5 major mechanisms: sinus tachycardia, AVNRT, atrial tachycardia, orthodromic atrio-ventricular reentrant tachycardia (AVRT) involving retrograde conduction over a \"concealed\" bypass tract, or atrial flutter with 2:1 block. If P waves can be located it can be helpful in determining the mechanism of the tachycardia. In this tracing, P waves can be located at the end of the QRS in lead II (best seen on the rhythm strip). In the beginning of the tracing, P waves are buried in the end of QRS complex, but then gradually come further out behind it. By the end of the tracing inverted P waves can be clearly seen in the rhythm strip. This finding rules out the diagnosis of AV re-entry due to a concealed bypass tract (in which case the R-P interval is fixed and cannot be as short as in the beginning of this tracing since the ventricles and atria are activated sequentially). There is clearly a 1:1 AV relationship here with no extra atrial waves in between ruling out atrial flutter with 2:1 AV conduction. That leaves 2 diagnoses: AVNRT and atrial tachycardia. Often it is impossible to tell the difference between the two unless initiation or termination of arrhythmias is recorded. However, in this case there are subtle but important diagnostic clues allowing one to infer the exact diagnosis. Note that not only the R-P relationship is changing, but ventricular rate is becoming faster. At the same time, the P-R interval gets shorter. Usually, if ectopic P waves are conducted over the AV node, the PR interval increases with increased heart rate consistent with decremental properties of the AV node. In this case PR interval gets shorter suggesting that P waves are unrelated to the subsequent QRS. This strongly supports the diagnosis of AVNRT. The gradual increase in the R-P interval (slowing of conduction over the ~fast~ AV nodal pathway can often be seen in typical AVNRT prior to spontaneous termination (that typically occurs in the ~fast~ pathway). Slowing of fast pathway conduction results in more delayed engagement of the ~slow~ pathway giving it more time to recover, hence the apparent shortening of PR the interval. Absence of visible P waves or the presence of a \"pseudo S\" pattern in II, III, or aVF, or a \"pseudo R prime\" pattern in V1 is characteristic of AVNRT due to near simultaneous activation of the atrium and the ventricle from the AV node. If the diagnosis is still in doubt, adenosine (if not contraindicated) may be useful in slowing conduction in the AV node. Reentrant rhythms (AVNRT or AVRT) may \"break\" abruptly, converting to sinus; the ventricular response of either atrial tachycardia or atrial flutter will sometimes slow abruptly often revealing underlying atrial activity. (Note: the final \"wide complex\" waveform appears to be an artifact superimposed on an AVNRT beat.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case7/1350x900.gif", "_type": "mcq", "_caseId": 7}, {"question": "The ECG is from a 56-year-old male with known severe mitral regurgitation and history of adenocarcinoma who presented to the emergency ward in shock and died after aggressive attempts at resuscitation. He did not have a pericardial effusion. All of the following statements about this ECG are correct EXCEPT for which ONE of the following?", "options": ["The rhythm is atrial fibrillation", "Right axis deviation is present", "The ECG is absolutely diagnostic of an underlying anterior wall MI", "The ECG is consistent with a non-ischemic cardiomyopathy", "Low limb lead voltage is present"], "correct": 2, "explanation": "The surprising diagnosis was cardiomyopathy associated with a widely disseminated adenocarcinoma of unknown primary origin. The ECG shows atrial fibrillation with markedly decreased voltage in the limb leads, a rightward axis, and loss of R wave progression V1-V3. A transthoracic echocardiogram showed no significant pericardial effusion. The differential diagnosis also includes anterior myocardial infarction, myocarditis, severe chronic obstructive pulmonary disease, and an infiltrative process such as amyloidosis or more rarely, tumor resulting in a \"pseudo-infarction\" pattern of this type. However, as illustrated here, loss of R wave progression, sometimes with frank Q waves, is not pathognomonic of anterior MI.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case8/1350x900.gif", "_type": "mcq", "_caseId": 8}, {"question": "This is the admitting ECG of a previously healthy 49-year-old man who presented with progressive muscle weakness and constipation. He had no chest pain or dyspnea. The ECG is most consistent with which ONE of the following diagnoses?", "options": ["Hypokalemia", "Hyperkalemia", "Hypocalcemia", "Hypercalcemia", "Hypothyroidism"], "correct": 3, "explanation": "The ECG shows sinus rhythm with the following key abnormality: a very short ST segment with a consequently short QT interval (about 300 msec here). The differential diagnosis of a short QT (lower limits are not well-defined) is much narrower than that of prolonged QT. The two chief causes of a short QT are hypercalcemia and digoxin therapy (associated with characteristic \"scooping\" of the ST-T complex). A third and relatively rare cause is hereditary short QT (\"channelopathy\"-related) that may be associated with ventricular arrhythmia and sudden cardiac arrest. (see Gussak I, et al. Idiopathic short QT interval: a new clinical syndrome? Cardiology 2000;94:99~102). Cardiac arrhythmias, however, are unusual with hypercalcemia; but AV block, sinus arrest, sino-atrial block, ventricular tachycardia, and cardiac arrest have been reported, usually in patients receiving rapid IV injections of calcium. This patient&apos;s serum calcium was 16 mg/dl. He was found to have hyperparathyroidism; at surgery, he had successful resection of a parathyroid carcinoma, an unusual cause of hypercalcemia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case9/1350x900.gif", "_type": "mcq", "_caseId": 9}, {"question": "The patient is an elderly man who presented to the emergency ward with dizziness and new renal failure. What is the cause of the very wide QRS?", "options": ["Dx: Hyperkalemia (7.6 mEq/L), secondary to the renal failure. The ECG demonstrates findings consistent with severe hyperkalemia -- most importantly ma..."], "correct": 0, "explanation": "Dx: Hyperkalemia (7.6 mEq/L), secondary to the renal failure. The ECG demonstrates findings consistent with severe hyperkalemia -- most importantly marked widening of the QRS complex. The QRS complex here shows an intraventricular conduction delay (IVCD) with a left bundle branch block (LBBB) morphology and left axis deviation. However, the QRS duration (about 240 ms) is much wider than that seen with an \"uncomplicated\" LBBB (or with left anterior fascicular block) due to intrinsic conduction disease. There is also peaking of the T waves with prolongation of the PR interval and flattening of the P waves. If the hyperkalemia is left untreated, the ECG will progress to a sinusoidal pattern and eventually asystole with subsequent hemodynamic collapse and death.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case10/1350x900.gif", "_type": "identify", "_caseId": 10}, {"question": "51-year-old male with bicuspid aortic valve, aortic insufficiency and hypertension had an episode of chest pain 2 days prior to this tracing. In this context, this type of pattern of prominent T wave inversions is most likely attributable to which ONE of the following?", "options": ["Non-Q wave MI (with a variant of Wellens&apos; syndrome)", "Takotsubo syndrome", "Evolving pericarditis", "Central nervous system pathology (especially intracranial bleed)", "Apical hypertrophic cardiomyopathy"], "correct": 0, "explanation": "This ECG shows sinus rhythm at about 65 beats/min with diffuse, very prominent anterior T wave inversions consistent with probable ischemia/non-Q wave myocardial infarction (MI). Sometimes this pattern is referred to as Wellens&apos; T waves (de Zwaan C, Bar FW, Janssen JH, et al. Angiographic and clinical characteristics of patients with unstable angina showing an ECG pattern indicating critical narrowing of the proximal LAD coronary artery. Am Heart J. 1989;117:657- 665 or the \"LAD-T wave\" pattern. The ECG also shows findings consistent with left atrial abnormality and left ventricular hypertrophy, along with non-specific mild PR prolongation (220 msec), QT prolongation for rate (480 msec), and borderline left axis deviation. Ischemia/infarction should be on the top of your differential diagnosis list in this patient with a recent history of chest pain. A tracing during the episode of chest pain revealed 1-2 mm ST elevation in leads I, aVL, V3-V6. Cardiac catheterization revealed noncritical coronary artery disease and global left ventricular dysfunction. A subsequent echocardiogram taken on the day of this tracing revealed normal left ventricular function. Most likely the patient had a transient thrombus or spasm in the proximal LAD, with severe myocardial \"stunning.\" Cardiac enzymes were only slightly elevated. Other specific diagnoses to consider in a patient with diffuse deeply inverted T waves include 1) CNS disease--not clinically present here (intracranial hemorrhage, head injury, tumor); 2) apical hypertrophic cardiomyopathy (usually most marked in the mid-lateral precordial leads; 3) intermittent right ventricular pacing or intermittent LBBB (\"memory T waves\"; however this syndrome is usually associated with with upright T waves in I and aVL (Shvilkin A, Ho KKL, Rosen MR, Josephson ME. The T vector direction differentiates post-pacing from ischemic T wave inversion in the precordial leads. Circulation 2005; 111:969-974); 4) takotsubo (stress) cardiomyopathy (left ventricular apical \"ballooning\" pattern on angiogram), which is most often reported in middle-aged to older women, and 5) Evolving pericarditis, which may be associated with diffuse T wave inversions, but they are relatively low amplitude (usually <5mm),", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case11/1350x900.gif", "_type": "mcq", "_caseId": 11}, {"question": "The patient is an elderly female with a known history of left bundle branch block who presented to the emergency ward with shortness of breath. What is your diagnosis?", "options": ["Dx: Sinus bradycardia, left bundle branch block (LBBB ) with primary ST-T wave changes. The ECG demonstrates an LBBB morphology with primary biphasic ..."], "correct": 0, "explanation": "Dx: Sinus bradycardia, left bundle branch block (LBBB ) with primary ST-T wave changes. The ECG demonstrates an LBBB morphology with primary biphasic and inverted T waves in leads 2, 3 and F. Uncomplicated bundle branch blocks should only have \"secondary\" T wave changes. That is the ST-T waves should be opposite in direction to the major vector of the QRS. For example, if this ECG with LBBB was uncomplicated, the ST-T waves in the inferior leads would be upright. This patient has inverted T waves suggesting that a \"primary\" or ischemic process is evolving in the inferior distribution. However, the absence of primary ST-T changes does not exclude ischemia/MI. The patient did in fact rule in for a myocardial infarction, with positive cardiac biomarkers. This example illustrates that ischemic ECG changes can sometimes be read despite the presence of a left bundle branch block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case12/1350x900.gif", "_type": "identify", "_caseId": 12}, {"question": "A middle-aged woman with a history of a \"heart murmur\" since childhood presents with worsening dyspnea. The ECG is most consistent with which ONE of the following major diagnoses?", "options": ["Mitral regurgitation", "Mitral stenosis", "Aortic regurgitation", "Aortic stenosis", "Pulmonic stenosis"], "correct": 1, "explanation": "The ECG reveals sinus rhythm with the following abnormalities: left atrial abnormality (LAA) in concert with a relatively tall R wave (increased Rs ratio) in lead V1 and an inverted T wave in that lead, along with right axis deviation (RAD). The combination of a predominant R wave (even with overall low amplitude QRS voltage) and rightward axis deviation with a normal QRS duration suggests right ventricular hypertrophy. This pattern along with left atrial abnormality should make one strongly consider mitral stenosis. An important finding on this ECG is the relatively tall R wave in V1. The differential diagnosis of this finding includes: normal, childhood ECG, posterior myocardial infarction (usually with Q&39;s inferiorly), RVH (usually with right axis and T wave inversions in V1-V2), rightward displacement of the heart (e.g. left pneumothorax), Wolff-Parkinson-White pattern due to posterior or lateral wall pre-excitation, hypertrophic cardiomyopathy with large septal forces (usually see large lateral Q waves as well), RBBB. In this case, the presence of RAD and anterior T wave strain suggests RVH as the cause for the tall R in V1, and the concomitant presence of LAA strongly suggests the diagnosis of mitral stenosis. The patient in fact had severe mitral stenosis, which was treated surgically. Note: The S1Q3T3 pattern ( rS complex in lead I, qR and T wave inversion in lead III) noted here is sometimes attributable to RV overload due to pulmonary embolism (see Case 146). However, this pattern is non-specific and may be seen with a variety of causes of RV overload, acute and chronic, as well as in other settings. The presence of marked left atrial abnormality and the absence of sinus tachycardia are both against a unifying diagnosis of acute pulmonary embolism in this case. Also of note is the absence of the anticipated right precordial T inversions often associated with RV overload syndromes (formerly called an RV \"strain\" pattern). Note that evidence for LAA here is best seen at higher gain. The P waves are broad (>120ms in duration) in multiple leads and there is a biphasic P wave in lead V1 with a broad (>40ms) terminal portion. The late P wave forces also go toward lead aVL.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case13/1350x900.gif", "_type": "mcq", "_caseId": 13}, {"question": "36-yr-old male with the development of chest pain at rest, transferred for cardiac evaluation after a presumed myocardial infarction. (However, serial cardiac enzymes were negative). This ECG is most consistent with which ONE of the following?", "options": ["Normal variant/athlete's heart", "Apical hypertrophic cardiomyopathy/Yamaguchi's syndrome", "Dilated cardiomyopathy", "Anterior wall ischemia (left anterior descending distribution)", "Critical valvular aortic stenosis"], "correct": 1, "explanation": "Hypertrophic cardiomyopathy, apical variant (Yamaguchi's syndrome). The ECG shows sinus bradycardia at about 58/min with marked left ventricular hypertrophy (LVH) and unusual, very deep (\"giant\") T wave inversions in the precordial and limb leads. ST depressions are seen in the lateral chest leads. Yamaguchi's cardiomyopathy is characterized by isolated apical hypertrophy. The surface ECG shows LVH and T wave inversions predominantly in V3-V5 but often present in other leads. Apical hypertrophic cardiomyopathy as well as more common forms of hypertrophic cardiomyopathy are important causes of pseudo-infarct patterns. The initial report of Yamaguchi's syndrome can be found in Am J Cardiol 44:401,1979.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case14/1350x900.gif", "_type": "mcq", "_caseId": 14}, {"question": "59-year-old female with sudden palpitations and lightheadedness. What is the rhythm?", "options": ["Atrial fibrillation with WPW (Wolff-Parkinson-White) pre-excitation", "Ventricular tachycardia (monomorphic)", "Ventricular tachycardia (torsades de pointes)", "Atrial fibrillation with right bundle branch block aberrancy", "Tremor artifact with Parkinson's disease"], "correct": 0, "explanation": "The ECG shows a dramatic example of atrial fibrillation with the Wolff-Parkinson-White (WPW) syndrome, with conduction down the bypass tract. This rhythm is for the most part a wide complex tachycardia with a rate of about 230 beats/min. The differential diagnosis includes 1) ventricular tachycardia, 2) supraventricular tachycardia with aberrancy, and 3) WPW with conduction down the bypass tract. The major clues include the \"irregularly irregular\" rhythm and the extremely rapid rate. Ventricular tachycardia may be mildy irregular but this degree of irregularity would be unusual at this very fast rate. The short refractory period of certain bypass tracts can allow extremely rapid heart rates, especially during atrial fibrillation. A correct diagnosis is very important because drugs that slow AV conduction (verapamil, beta blockers, digoxin, adenosine) are not useful. Verapamil by vasodilation and reflex neuroautonomic changes may increase conduction down the bypass tract. The effects of digoxin are still controversial and this drug may shorten the refractory period of the bypass tract. Call cardiac EP experts stat! A drug of choice is IV procainamide and if this is unsuccessful, DC cardioversion should be performed promptly, if not otherwise contraindicated.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case15/1350x900.gif", "_type": "mcq", "_caseId": 15}, {"question": "60-yr-old female with a history of anti-phospholipid syndrome who presented with anterior chest discomfort.", "options": ["Sinus rhythm is present (note the positive P waves in lead II) with AV Wenckebach causing 4:3 conduction in the setting of an acute/evolving ST elevat..."], "correct": 0, "explanation": "Sinus rhythm is present (note the positive P waves in lead II) with AV Wenckebach causing 4:3 conduction in the setting of an acute/evolving ST elevation/Q wave inferior wall infarction. The ECG demonstrates pathologic Q waves and prominent ST elevations in leads 2, 3, and aVF. There are also ST segment depressions in leads 1 and aVL, consistent with reciprocal changes; slight ST depressions in V2-3 are also noted. In this context these ST depressions are likely reciprocal to posterior--lateral ST elevations (not seen on the standard 12-lead). The rhythm, as described, is sinus with AV Wenckebach showing progressive prolongation of the PR intervals, shortening of the R-R intervals (not always seen) and block of every fourth P wave. Note that the PR of the conducted P wave after the non-conducted (\"dropped\") one is shorter than the PR before the last conducted PR in each cycle. This is the key marker of AV Wenckebach. The presence of \"group\" beating is an important clue and characteristic of second degree blocks. Group beating may also be seen with pauses after atrial (conducted or blocked) or ventricular premature beats. AV Wenckebach in the context of an acute inferior MI is attributed to high vagal tone and/or nodal ischemia. The block proximal, i.e., at the level of the AV node and transient. The findings are consistent with occlusion of a dominant right coronary that also supplies the AV node and the posterior and possibly lateral wall. Of further note, is the subtle finding that the 4th P wave in each Wenckebach cycle comes somewhat earlier than anticipated. This pattern is most consistent with a ventriculo-phasic sinus arrhythmia, and not to a blocked PAC. The term ventriculo-phasic response (VR) refers to transient shortening of the sinoatrial cycle interval when a QRS complex occurs between two sinus P waves during second or third degree AV block. The actual mechanism is not fully ascertained; it may be related to mechano-electrical interactions.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case16/1350x900.gif", "_type": "identify", "_caseId": 16}, {"question": "This 52-year-old man with a history of \"a cardiac condition\" presents with near syncope. He has no coronary disease. The ECG is most consistent with which ONE of the following diagnoses?", "options": ["Severe mitral valve stenosis", "Hypertrophic cardiomyopathy", "Critical valvular aortic stenosis", "Severe pulmonic stenosis", "Neurocardiogenic syncope"], "correct": 1, "explanation": "The ECG reveals sinus rhythm with marked PR prolongation, left ventricular hypertrophy (LVH) by voltage criteria, right bundle branch block (RBBB) with left anterior fascicular block (LAFB), or \"hemiblock\", a prominent initial R in V1, and prominent Q waves laterally. The LVH, and the narrow, morphology of the Q's should suggest the diagnosis of hypertrophic cardiomyopathy (HCM) with asymmetric septal hypertrophy. 93% of patients with HCM have abnormal ECG's. They often have P wave evidence of left atrial abnormality, due to reduced ventricular compliance and the frequent coexistence of mitral regurgitation. Most have ECG criteria for LVH. They sometimes have prominent Q waves in the lateral leads, likely due to septal hypertrophy (the initial forces of left to right septal activation are unusually prominent). Tall broad R waves in V1 are often seen; the differential Dx of this finding includes: HCM, RVH, posterior infarct, Wolff-Parkinson-White, and Duchenne's muscular dystrophy. The absence of evidence of an inferior infarct, the absence of a short PR interval and delta waves, the left axis, and the patient's age rule out these other possibilities. In this case, there is evidence of significant conduction system disease: PR prolongation, RBBB, and LAFB. The patient later developed 2:1 heart block, and had improvement of AV conduction with vagal maneuvers. This improvement suggests that the PR prolongation was due to impaired infranodal conduction (as AV node conduction proper should worsen with increased vagal tone); this type of block is worrisome for progression to high grade heart block. The patient had a cardiac electrophysiology study (EPS), which confirmed infranodal block. He had improvement in his symptoms with a pacemaker. His near syncope may have been due to brady- or tachyarrhythmias, or due to the hemodynamic consequences of his left ventricular outflow tract obstruction. Note that LAFB and LVH can co-exist, as is this case.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case17/1350x900.gif", "_type": "mcq", "_caseId": 17}, {"question": "79-year-old woman with shortness of breath requiring intubation. Which ONE of the following findings is NOT present?", "options": ["Atrial fibrillation", "qR in lead V1", "Marked left axis deviation", "Relatively low voltage diffusely", "Delayed  precordial transition zone"], "correct": 2, "explanation": "The ECG shows atrial fibrillation with a rapid ventricular response; and marked right (not left) axis deviation and a qR morphology in V1 without a full right bundle branch block. The latter two findings are consistent with right ventricular hypertrophy (RVH). This patient has severe mitral stenosis with pulmonary congestion, pulmonary hypertension, and right heart failure. A qR in lead V1 (with a relatively normal QRS duration) is one of the most specific signs for right ventricular hypertrophy. Other causes of a qR in V1 include a right bundle branch block (RBBB) in patients with an anterior myocardial infarction; usually the Q's extend to V2/V3 and with RBBB and left anterior fasicular block (very small q waves may be present). This patient has right axis deviation in addition to the qR in V1 which suggests RVH. Given atrial fibrillation and RVH one should strongly consider mitral stenosis. Other diagnoses would include severe cor pulmonale from COPD, and coronary artery disease with a large lateral MI (although the absence of Q waves in the lateral chest leads is against this diagnosis.) See below. Additional note on differentiating right ventricular hypertrophy (RVH) from lateral MI: In some cases of severe (RVH) with marked right axis deviation, leads I and aVL may show rS or even QS waves, simulating lateral MI. In this case, lead V1 notably shows a narrow qR complex (not just a tall R wave) strongly suggestive of RVH, rather than posterior-lateral MI. Also, the lateral precordial leads here show rS type complexes, not QR waves. Physical examination, echocardiogram and other imaging modalities also provide often essential important information about RVH vs. lateral MI or mtrial stenosis in cases where the ECG is ambiguous.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case18/1350x900.gif", "_type": "mcq", "_caseId": 18}, {"question": "The patient is 40-yr-old female admitted with atypical chest pain and a big surprise on the ECG. (Repeat ECG showed same appearance.) The findings are most consistent with which ONE of the following diagnoses?", "options": ["Extensive anterior infarction", "Massive pulmonary embolism", "Dextrocardia", "Hypertrophic cardiomyopathy", "Tetralogy of  Fallot"], "correct": 2, "explanation": "Dextrocardia defined as rotation of the heart so that the left atrium (LA) and ventricle are on the right side of the right atrium (RA) and right ventricle (RV). The apex of the heart is therefore formed by the left ventricle (LV) that faces the right axillary line in the right side of the chest. The ECG is notable for 1) inverted P waves in 1 and aVL; 2) negative QRS complex and T wave in 1; 3) progressively decreasing voltage across the precordium. The differential diagnosis of negative P waves (with normal PR) in 1 and aVL include arm lead reversal and dextrocardia. The striking abnormalities in QRS voltage across the precordium are typical of dextrocardia and not seen with limb lead reversal. Other findings consistent with dextrocardia include P ,QRS and T waves in lead 2 that represent the normal morphology in lead 3 and vice versa. Dextrocardia in the adult is most often accompanied by situs inversus or right sided malposition of the abdominal viscera. Isolated dextrocardia without abdominal visceral malposition is uncommon in the adult. The presence of the heart in the right side of the chest with the LA and LV remaining to the left of the RA and RV is called dextroversion when it is a primary process and dextroposition when it results from hyperinflation of the lungs.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case19/1350x900.gif", "_type": "mcq", "_caseId": 19}, {"question": "This ECG from a 58-yr-old man shows evidence of WHICH one of the following groups of diagnoses?", "options": ["Brugada pattern", "Left bundle branch block", "RIght bundle branch block with acute anteroseptal MI", "Hyperkalemia", "RIght ventricular hypertrophy"], "correct": 2, "explanation": "The ECG reveals an acute (likely large) anteroseptal myocardial infarction (MI) in the setting of a (preexisting) right bundle branch block (RBBB). This is a dramatic example of the fact that ischemia and infarction can still be diagnosed, even in the setting of conduction abnormalities. The anterior precordial leads reveal a qR pattern (analagous to an RSR' with the R replaced by a pathologic Q), marked ST elevation, and upright T waves. This pattern is essentially pathognomonic for an acute infarction. Three points are worth making with regard to a RBBB: 1) Secondary T wave inversions are typically seen in the right precordial leads (only in those leads with a terminal R'). Upright T waves in such leads might indicate ischemia, etc. T wave inversions in leads with no terminal R' might also be ischemic. 2) ST elevations are not normally seen in RBBB. 3) Right precordial Q waves may be seen in RBBB without an infarct (especially in the setting of acute right ventricular overload), but if the Q waves extend past V2 or if they are slurred or wide, they suggest pathology. Bottom Line: Bundle branch block, especially RBBB does not render the ECG uninterpretable!!", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case20/1350x900.gif", "_type": "mcq", "_caseId": 20}, {"question": "The patient is a 47-yr-old, asymptomatic woman with the following ECG finding, reportedly persent since birth.", "options": ["The tracing shows sinus rhythm with complete heart (AV) block and an A-V junctional (narrow QRS) type escape rhythm. Note that the P-P intervals \"surr..."], "correct": 0, "explanation": "The tracing shows sinus rhythm with complete heart (AV) block and an A-V junctional (narrow QRS) type escape rhythm. Note that the P-P intervals \"surrounding\" individual QRS complexes are shorter than the P-P intervals between two QRS complexes. Sinus rate variation of this type with complete heart block is called ventriculophasic sinus arrhythmia. The patient had congenital complete heart block. This entity is usually idiopathic but may be secondary to placental transfer of anti-Ro and La antibodies from the mother. The spectrum of disease ranges from patients who are born with severe bradycardia and require pacemakers in infancy to patients who live full life spans without artificial pacemakers. The escape rhythm in this instance is proximal in the conduction system and a pacemaker was not required at this time.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case21/1350x900.gif", "_type": "identify", "_caseId": 21}, {"question": "A 60-year-old woman with increasing exertional dyspnea and orthopnea is awaiting a cardiac surgical procedure. She gave a history of having a \"heart murmur\" and an \"extra heart sound\" first noted in her teenage years. Which ONE of the following is the likely cause of her problem? (Focus point clues: P waves, QRS axis, and R/S ratio in lead V1.)", "options": ["Aortic stenosis", "Mitral stenosis", "Tricuspid stenosis", "Mitral regurgitation", "Ebstein&apos;s anomaly of the tricuspid valve"], "correct": 1, "explanation": "Her ECG shows sinus rhythm with ventricular premature complexes. The relatively prominent R wave in V1 (by R/S ratio; not absolute R wave magnitude) in combination with right axis deviation is consistent with right ventricular hypertrophy (RVH). In addition, there is also prominent left atrial abnormality (LAA) evidenced by a biphasic P in V1 with a broad negative component and wide, notched P waves elsewhere). The ST-T changes inferiorly are non-specific. The combination of ECG findings consistent with RVH with marked left atrial abnormality (LAA) is strongly suggestive of mitral stenosis, usually due to rheumatic heart disease. The patient was pre-op for mitral valve replacement. Auscultation in the left lateral decubitus position revealed a diastolic \"rumble,\" following an opening snap.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case22/1350x900.gif", "_type": "mcq", "_caseId": 22}, {"question": "54-year-old man with chronic heart failure. What is the rhythm most likely (recorded at rest)?", "options": ["Atrial flutter with variable AV block", "SInus tachycardia with variable AV block", "Sinus tachycardia with complete heart block", "(Ectopic) atrial tachycardia with variable AV block", "(Ectopic) atrial tachycardia with complete heart block"], "correct": 3, "explanation": "Atrial tachycardia (not sinus tachycardia) is present with variable block is present. Also left ventricular hypertrophy (LVH) and left axis deviation are present. This is not complete heart block, either. Note that the QRS rate is not slow and regular. Instead, the changing PR is due to variable AV block. This patient had a history of rheumatic heart disease (mitral and aortic regurgitation) and underwent a cardiac electrophysiology procedure with ablation of the ectopic atrial site that was the source of the tachycardia. Always consider digoxin excess (not present here) in cases of atrial tachycardia with block.~~~~Strongly weighing against the atrial mechanism being sinus tachycardia is the very rapid atrial (wave) rate (150/min) in a well-compensated middle aged man with heart failure. This atrial rate would be near maximal in a man this age during near maximal activity. This patient is at rest. (Also, factors causing sinus tachycardia tend to enhance AV nodal conduction.) The fact that the P waves resemble sinus P waves may be due to firing of an automatic ectopic focus near the sinus node. )The atrial rate is also much too slow for atrial flutter.)~~~~~~Note: the subtle variation in QRS morphology, e.g., in leads II,III and aVF, which is due to varying degrees of superposition of the P waves on the QRS complexes and also, possibly, to slight changes in QRS conduction at different rates. This nonspecific finding should be distinguished from 2:1 electrical alternans patterns.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case23/1350x900.gif", "_type": "mcq", "_caseId": 23}, {"question": "A 68-year-old man presents with dyspnea. What does the ECG show?", "options": ["Ventricular paced rhythm with underlying complete heart block (sinus P waves, with left atrial abnormality, \"march\" through independently at a rate of..."], "correct": 0, "explanation": "Ventricular paced rhythm with underlying complete heart block (sinus P waves, with left atrial abnormality, \"march\" through independently at a rate of about 70/min). Most important is the superimposed current of injury with hyperacute ST-T changes inferiorly and laterally with reciprocal change V1-V3 consistent with acute infero-postero-lateral ischemia/ myocardial infarction (MI). Pacemaker patterns, like left bundle branch block (LBBB), often mask acute or chronic MI. But sometimes, as in the present case, the ischemic changes \"show through.\" The unusually marked notching (possibly equivalent to a fractionated electrogram) of the initial and latter portions of the paced QRS complexes, which have a LBBB morphology, raise consideration of underlying ventricular scarring from prior infarction.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case24/1350x900.gif", "_type": "identify", "_caseId": 24}, {"question": "A 38-yr-old woman with weakness. Previous ECG was normal and she was on no medications. What is the most likely diagnosis?", "options": ["Hypercalcemia", "Hypernatremia", "Hypokalemia", "Hypocalcemia", "Hyponatremia"], "correct": 2, "explanation": "The ECG shows sinus bradycardia with diffuse T wave flattening or inversions, and markedly prominent U waves. These are best seen in leads V2 and V3, but are essentially invisible in lead aVL. The two most common causes of this finding are 1) Hypokalemia (K+ here was 2.4 mEq/L) and 2) Drugs, especially the class 1A antiarrhythmics (like quinidine, procainamide, disopyramide) and related agents (like the phenothiazines and tricyclics), etc. Patients with hereditary (congenital) long QT syndromes due to \"channelopathies\" may show a similar finding (see Case 1). This ventricular repolarization prolongation pattern is of great importance because it identifies patients at high risk of torsade de pointes type of polymorphic ventricular tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case25/1350x900.gif", "_type": "mcq", "_caseId": 25}, {"question": "This ECG \"speaks\" to some key clues about the underlying major medical condition in this 77-year-old woman. What does it say? What are the clues and what inference might you make by integrating these findings?", "options": ["ECG shows sinus rhythm with left ventricular hypertrophy (LVH), left atrial abnormality and tall peaked T waves best seen in the precordial leads (wit..."], "correct": 0, "explanation": "ECG shows sinus rhythm with left ventricular hypertrophy (LVH), left atrial abnormality and tall peaked T waves best seen in the precordial leads (with non-specific infero-lateral ST depressions). (The QRS duration is slightly prolonged at 110-120 ms,) Also present are left axis deviation consistent with left anterior fascicular block and a long QTc (maximally about 470 ms) Putting it all together, the peaked T waves indicate increased K+ (6.3 mEq/L), with LVH consistent with renal failure associated with hypertension, which was the case here. The long QT, with a \"stretched out\" ST segment phase, is consistent with decreased serum calcium, seen with renal failure as well. ST depressions could be from LVH or primary ischemia, in addition to multiple other causes. So when you see the triad of \"tented\" T waves (hyperkalemia) with a long QT (due to ST segment prolongation consistent with hypocalcemia) and LVH (consistent with hypertension), the findings speak strongly for underlying renal failure, although other combinations are not excluded. Also, not all of the triad needs to be present to suggest renal failure (e.g., peaked T wave and LVH alone are suggestive. but could also be due to hypertension plus drug effects that tend to increase serum K+).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case26/1350x900.gif", "_type": "identify", "_caseId": 26}, {"question": "A 52-year-old man. What is his chief complaint? What is the rhythm disturbance? Look carefully at both ends of strip.", "options": ["Acute infero-lateral and probably posterior myocardial infarction (MI) with inferior Q waves and hyperacute ST-T complexes inferiorly and laterally wi..."], "correct": 0, "explanation": "Acute infero-lateral and probably posterior myocardial infarction (MI) with inferior Q waves and hyperacute ST-T complexes inferiorly and laterally with reciprocal ST depressions V1-V3. Tall initial R waves in V1-V3 with right bundle branch block. There is second degree AV block (Type 1) with 2:1 block initially and then 3:2 AV Wenckebach with underlying sinus rate of about 85/min. Left axis deviation is present. However, since this is an inferior MI, a pacemaker is not usually indicated: block here is in the AV node usually due to ischemia and increased vagal tone. In contrast, new right bundle with left axis with acute anterior-septal MI would be indication for prophylactic pacemaker. AV block in that setting is due to Type II mechanism associated with severe involvement of His-Purkinje system and carries ominous prognosis with high risk of complete heart block with slow (or no) escape rhythm.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case27/1350x900.gif", "_type": "identify", "_caseId": 27}, {"question": "67-year-old man after VF arrest. What is the underlying disease?", "options": ["ECG shows sinus rhythm with right bundle branch block (RBBB) and left axis deviation, the latter consistent with left anterior fascicular block.There ..."], "correct": 0, "explanation": "ECG shows sinus rhythm with right bundle branch block (RBBB) and left axis deviation, the latter consistent with left anterior fascicular block.There are pathologic anterior Q waves V1-V3 with very slow R wave progression thereafter. The patient had severe coronary artery disease (CAD) with a trans-thoracic echo showing septal dyskinesis and apical akinesis. Note the rSr&39; morphology in V4. This polyphasic QRS phenotype in the left chest leads has been reported with ventricular aneurysm (El-Sherif sign). The patient was treated with amiodarone for ventricular tachyarrhythmias associated with chronic CAD with extensive scarring of left ventricle.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case28/1350x900.gif", "_type": "identify", "_caseId": 28}, {"question": "ECG from a 38-year-old man on the surgical service. What does this pre-admission ECG show?", "options": ["Postero-lateral mycardial infarction", "Right ventricular hypertrophy", "Wolff-Parkinson-White pre-excitation patttern", "Normal variant", "Right bundle branch block"], "correct": 2, "explanation": "The ECG shows sinus rhythm with a subtle (very, very subtle if you missed it) Wolff-Parkinson-White (WPW) pattern. Note shortish PR and delta wave, best seen in lead V4 (on zoomable PDF) as slurring of initial QRS, with tall R (positive delta wave) in V1, negative in aVL, compatable with lateral bypass tract. What is the differential diagnosis of a tall R in V1/V2? You should consider: 1) normal variant, esp children, but also some adults, or lead (mis)-placement; 2) altered chest/mediastinal configuration with the heart in a more rightward orientation; 3) posterior myocardial infarction (MI) (inferior/lateral ischemia/MI usually also seen); 4) right ventricular hypertrophy (usually associated with rightward axis); 5) WPW with a posterior or lateral bypass tract; 6) right ventricular conduction abnormality; 7) hypertrophic cardiomyopathy (HCM) with or without obstruction; 8) Duchenne muscular dystrophy (due to postero-basal fibrosis). One way of testing hypothesis (not included here) that this pattern is WPW variant would be to increase vagal tone modulation, e.g., during Valsalva maneuver. Increased vagal tone should slow conduction down the AV node, accentuating contribution of bypass tract conduction, and making the WPW pattern more apparent.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case29/1350x900.gif", "_type": "mcq", "_caseId": 29}, {"question": "A 43-year-old man diagnosed with \"lateral subendocardial ischemia\" based on ST depressions in aVL. Do you agree?", "options": ["You shouldn&apos;t! There are subtle but real ST elevations inferiorly (II,III and aVF) and in V5 and V6, and very slight ST depressions in V2. Cardia..."], "correct": 0, "explanation": "You shouldn&apos;t! There are subtle but real ST elevations inferiorly (II,III and aVF) and in V5 and V6, and very slight ST depressions in V2. Cardiac catheterization/angiography showed postero-basal hypokinesis and he underwent circumflex/obtuse marginal angioplasty after ruling in for a small MI. ST depressions here in aVL are reciprocal to primary ST elevations infero-laterally. Slight ST depressions in V2 may be reciprocal lateral or posterior involvement. Whenever you see ST depressions, always look in contralateral leads for ST elevations. Remember that you do not get reciprocal ST elevations with acute ischemia. Extra leads V7-V9 may be useful in such cases to help reveal lateral and posterior involvement.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case30/1350x900.gif", "_type": "identify", "_caseId": 30}, {"question": "82-yr-old woman. What is the rhythm?", "options": ["Be careful here. This may look superficially like sinus but if you look in V1, you can see P waves just before the QRS (there is right bundle branch b..."], "correct": 0, "explanation": "Be careful here. This may look superficially like sinus but if you look in V1, you can see P waves just before the QRS (there is right bundle branch block (RBBB) and also P waves in the T wave (halfway in between) which are partly hidden. Atrial rate is about 150, ventricular rate 75. This is an atrial tachycardia with 2:1 block (paroxysmal atrial tachycardia or \"PAT with block\" if it occurs paroxysmally) which may be due to digoxin toxicity, atrial disease, etc. If you got this right, PAT yourself on back; if you choked on it, a more forceful interscapular blow may be indicated. (Note that \"PAT\" is often a misnomer since the tachycardia may be sustained. So the term \"atrial tachycardia with block\" is most accurate here.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case31/1350x900.gif", "_type": "identify", "_caseId": 31}, {"question": "39-year-old man with acute dyspnea and \"muscle strain\" in left leg.", "options": ["The ECG shows sinus tachycardia with an indeterminate (not \"indeterminant\") axis and prominent T wave inversions in V1-V4 with delayed precordial tran..."], "correct": 0, "explanation": "The ECG shows sinus tachycardia with an indeterminate (not \"indeterminant\") axis and prominent T wave inversions in V1-V4 with delayed precordial transition zone (R=S in V6). The QT is at upper normal limits and there is an S wave in lead I with a minuscule R in III and aVF. P waves are peaked (well, almost) in II. Obviously it doesn&apos;t take an Oslerian wizard to think of anterior ischemia when you see poor wave progression and T wave inversions. But you should always think about acute right ventricular (RV) overload (\"strain\") due to pulmonary embolus, etc. That&apos;s what this patient with a history of deep vein thrombosis (DVT) had. Contrary to common wisdom, there is no diagnostic ECG in pulmonary embolus, but there are suggestive ones. Unfortunately, most of the time the ECG is non-specific; although, with a large PE, sinus tachycardia is usual. Possible other findings include: T wave inversions in the right to mid chest leads; Poor R wave progression--due to acute RV dilation; the latter may also lead to S1Q3 pattern simulating inferior myocardial infarction (MI); P pulmonale; RV conduction delays; right axis shift.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case32/1350x900.gif", "_type": "identify", "_caseId": 32}, {"question": "64-year-old man with increasing pedal edema. What is the ECG diagnosis?", "options": ["Sinus rhythm with left atrial abnormality. Most striking are tall right precordial R waves with pathologic inferior and lateral Q waves giving a \"reve..."], "correct": 0, "explanation": "Sinus rhythm with left atrial abnormality. Most striking are tall right precordial R waves with pathologic inferior and lateral Q waves giving a \"reverse\" type R wave progression. There are also ST-T abnormalities in I, aVL, V6. Thus the patient has coronary artery disease (CAD), s/p large infero-(postero)-lateral myocardial infarction (MI) accounting for congestive heart failure (CHF) findings. Recall that differential diagnosis of tall right precordial R waves includes: 1) Normal/positional variants, 2) Right ventricular hypertrophy (RVH) (look for right axis deviation, P pulmonale), 3) Posterior/lateral MI (usually signs of inferior MI, too), 4) hypertrophic cardiomyopathy/idiopathic hypertrophic subaortic stenosis (HCM/IHSS), 5) right bundle branch block (RBBB), 6) Wolff-Parkinson-White (WPW ) variants with posterior/lateral pre-excitation 7) Duchenne muscular dystrophy (young men with myopathy).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case33/1350x900.gif", "_type": "identify", "_caseId": 33}, {"question": "A 47-yr-old man with \"double ECG troubles\" noted after coronary bypass graft surgery.", "options": ["The ECG shows sinus rhythm with normal QRS axis and intervals. The two notable findings are 1) inferior Q-wave myocardial infarction (MI) of indetermi..."], "correct": 0, "explanation": "The ECG shows sinus rhythm with normal QRS axis and intervals. The two notable findings are 1) inferior Q-wave myocardial infarction (MI) of indeterminate age, and 2) diffuse ST elevations in anterior and lateral leads, with PR deviations (up in lead aVR, down in lateral precordial leads), consistent with acute pericarditis. The history was that of a patient with a prior MI, with ECG evidence of pericarditis post-coronary artery bypass graft (CABG) surgery. Kudos to anyone in training who got this right (the first time); you are a Wave-Maven superstar and hopefully en route to a cardiology fellowship.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case34/1350x900.gif", "_type": "identify", "_caseId": 34}, {"question": "Tachycardia and a touch of cyanosis (rhythm and blues). What is major finding in this patient with congestive heart failure (CHF)?", "options": ["Sinus tachycardia", "Atrial flutter", "Atrial fibrillation", "Multifocal atrial tachycardia", "Av nodal reentrant tachycardia (AVNRT)"], "correct": 1, "explanation": "The major finding is narrow complex tachycardia with atrial rate of about 300 indicating atrial flutter with a slightly variable ventricular response (2:1 conduction, some 3:1 and probably some AV Wenckebach). Atrial flutter is sometimes mistaken (by housestaff at institutions other than your own) for sinus tachycardia. Look, for instance, at V1 where the flutter waves are hard to see vs. lead II where they are more apparent. If only a V1 type lead were available, the mechanism could be readliy mistaken.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case35/1350x900.gif", "_type": "mcq", "_caseId": 35}, {"question": "A 65-year-old man presents for evaluation of weakness. What should you do before calling the interventional cardiology team for what was called a \"hyperacute myocardial infarction\" pattern?", "options": ["Put the \"lytes\" on! This is classic hyperkalemia with tall peaked T waves, along with PR prolongation and probable underlying left ventricular hypertr..."], "correct": 0, "explanation": "Put the \"lytes\" on! This is classic hyperkalemia with tall peaked T waves, along with PR prolongation and probable underlying left ventricular hypertrophy (LVH). The patient has renal disease with hypertension. Note the QRS prolongation also seen with moderate-severe hyperkalemia. The serum potassium level was 9.6mEq/L. Important note:not all tall positive T waves are \"hyperacute.\" The latter term should be reserved for increased T wave positivity secondary to transmural ischemia. Major clues to hyperkalemia include narrowness (tenting) of T waves along with other findings noted above. Note also that LVH here is supported by extremely deep S waves in lead V2 and probable left atrial abnormality (broad P waves on magnified views). LVH in adults is usually but not always associated with a horizontal to leftward QRS axis. Here the axis is vertical (inferior) at about +80 degrees). The latter finding could (in absence of prior ECGs for comparison) be due to physiologic factors, COPD, biventricular enlargement, partial left posterior fascicular block due to hyperkalemia, etc. Also of interest (and for extra credit) are the PR segment elevations in lead aVR and the PR segment depressions most notable in the inferior-lateral leads. In this clinical context, these subtle findings (even without accompanying ST elevations) raise consideration of uremic pericarditis, which could be asymptomatic and not detectable by an audible friction rub. Emergency therapy would include intravenous administration of calcium gluconate and of insulin/glucose.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case36/1350x900.gif", "_type": "identify", "_caseId": 36}, {"question": "A 67-year-old man. What is the QRS duration? What is going on?", "options": ["The QRS duration is normal. What may appear to be a wide QRS in leads V2-V6 is actually massive ST elevation due to acute transmural anterior ischemia..."], "correct": 0, "explanation": "The QRS duration is normal. What may appear to be a wide QRS in leads V2-V6 is actually massive ST elevation due to acute transmural anterior ischemia/myocardial infarction (MI) here. There is reciprocal inferior lead ST depression. Q waves are starting to appear in the precordial leads. This ST pattern, called \"tombstones\" in the earthy parlance of the housestaff, is more technically known as a \"monophasic current of injury.\" This is also the pattern you see if you touch the epicardium of the heart with a needle (e.g. during pericardiocentesis). Sometimes this pattern is mistaken for a bundle branch block. The left anterior descending (LAD) was occluded here and was opened with emergency catheterization and a \"precutaneous transluminal et (PTCA) procedure\" was the therapy of choice in this setting.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case37/1350x900.gif", "_type": "identify", "_caseId": 37}, {"question": "A 71-yr-old man has a routine ECG as part of yearly clinic visit. What major findings does this outpatient ECG show?", "options": ["BorderSinus tachycardia (about 120/min) with 2:1 AV block and left bundle branch (LBBB) block", "SInus rhythm (60/min) with LBBB", "Acute anterior ST elevation MI with left bundle branch block", "Atrial flutter with LBBB", "Sinus rhythm with right bundle branch block and left anterior fascicular block"], "correct": 0, "explanation": "The ECG appears to show sinus rhythm at 60/min with left bundle branch block (LBBB). In actuality, it shows sinus tachycardia at about 120/min with 2:1 AV block (hidden P waves in T waves, e.g. leads V2 and V3) and left bundle branch block (LBBB). This most likely is Type 2 (infranodal) block given its occurrence with sinus tachycardia and presence of LBBB. The patient was referred for evaluation for a pacemaker. Remember the \"meet me halfway\" rule: always look halfway in between obvious P waves for hidden ones. A longer rhythm strip and recording under different physical activity (e.g., with a Holter monitor) might be very useful in this of case where there is ambiguity about wheter a hidden P wave is present with presumed underlying sinus rhythm. Note also that in presence of LBBB, the slow R wave progression is non-diagnostic and some degree of J point elevation is typically seen in right chest leads (i.e., with wide QS waves) in LBBB that may simulate ischemia. LBBB may both mask and mimic ischemia/MI.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case38/1350x900.gif", "_type": "mcq", "_caseId": 38}, {"question": "A 41-yr-old man presents with recent chest discomfort. What is the most likely diagnosis?", "options": ["Acute pericarditis", "Acute lateral wall STEMI", "Brugada&apos;s pattern", "Normal variant early repolarization", "Acute anterior ST depression MI"], "correct": 1, "explanation": "Sinus rhythm is present with a PR at the upper normal limits. Note the primary ST segment elevations in V4, V5 and V6. In addition, there is subtle ST straightening with minimal ST depression in leads V2 and V3, consistent with reciprocal changes. Inferior Q waves are borderline, raising the question of prior or concurrent inferior wall MI. The patient had an occluded left circumflex artery at coronary angiography. Differential diagnosis of precordial ST elevations includes normal variant early repolarization. But this is not likely because the changes are in V5/V6 mainly, not the mid-chest leads there are reciprocal-appearing ST depressions in V2 and V3. The latter finding also excludes acute pericarditis. Focal myocarditis, of course, could look exactly like MI, but is rare (and not one of choices). Brugada&apos;s pattern is related to distinctive right precordial ST elevations with a right bundle branch block-appearing morphology.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case39/1350x900.gif", "_type": "mcq", "_caseId": 39}, {"question": "Predict the future!", "options": ["Sinus bradycardia at a rate of 55/min. The QT interval appears prominent, measuring about 0.52 sec in lead II and 0.56 in lead V2. Using Bazett's form..."], "correct": 0, "explanation": "Sinus bradycardia at a rate of 55/min. The QT interval appears prominent, measuring about 0.52 sec in lead II and 0.56 in lead V2. Using Bazett's formula, the QTc is between 0.50 and 0.54 sec.(Best to take the longest one.) The patient developed torsade de pointes, subsequently. The patient was taking erythromycin and haloperidol. Note that there is no consensus on the formula that should be used to rate-correct the QT. Also, note that the QT can be less than half than R-R interval at slower rates and still be markedly prolonged.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case40/1350x900.gif", "_type": "identify", "_caseId": 40}, {"question": "69-yr-old female with a long history of \"heart murmurs\" since teenage years. 1) What single valve was most likely replaced? 2) What is the rhythm? 3) What questions are raised by the ventricular repolarization waveform?", "options": ["1) The patient had undergone mitral valve replacement. The ECG here is suggestive, but not diagnostic of biventricular hypertrophy, with a borderline ..."], "correct": 0, "explanation": "1) The patient had undergone mitral valve replacement. The ECG here is suggestive, but not diagnostic of biventricular hypertrophy, with a borderline left ventricular hypertrophy (LVH) type pattern in the precordial leads, but with a vertical (albeit not frankly right) axis of about +80 degrees. This combination, especially in adults, (prominent precordial voltage due to presumptive LVH) with an inferior/rightward, (not leftward) axis may occur with rheumatic heart disease with mitral regurgitation/mitral stenosis. Finding of left atrial abnormality or atrial fibrillation may be present. 2) Here, the rhythm is junctional, evidenced by retrograde P waves (negative in II; positive in aVR) with a relatively long RP interval and with single ventricular premature beat. 3) Also of note is the long repolarization interval with prominent U waves, raising the question of drug effect/toxicity or hypokalemia in an older adult in whom congenital long QT is less likely. The patient was on a phenothiazine-type agent. The patient was also on low dose digoxin, which in concert with the LVH, may account for the lateral ST depressions in the absence of ischemia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case41/1350x900.gif", "_type": "identify", "_caseId": 41}, {"question": "A 64-yr-old man is admitted to an intensive care unit. The ECG is most consistent with which ONE of the following major underlying diagnoses?", "options": ["Mitral stenosis", "Mitral regurgitation", "Aortic stenosis", "Chronic obstructive pulmonary disease (COPD)", "Hypertrophic obstructive cardiomyopathy"], "correct": 3, "explanation": "Multiple signs here point to a patient with severe chronic obstructive pulmonary disease (COPD), likely in the MICU. The rhythm is sinus tachycardia with frequent atrial ectopy. There is evidence of right atrial overload (peaked P waves). The QRS axis is markedly superior. This type of very superior (\"northward\") QRS axis or right axis deviation may be seen with severe COPD. This superior axis pattern of COPD may be a variant of left anterior fascicular block (LAFB) but the axis is more superior than that seen with a pure LAFB. In addition, slow R wave progression with a delayed precordial transition is present. The P wave axis is vertical to rightward at about +90 degrees. Severe COPD may simulate anterior myocardial infarction (MI) and sometimes inferior MI. In some cases, the R wave progression can be at least partly normalized in COPD/emphysema by recording the chest leads an interspace below usual due to the inferior displacement of the heart and diaphragm associated with hyperinflation of the lungs. The present ECG findings, of course, do not indicate the cause(s) of interim decompensation of the COPD (e.g., pneumonia, bronchitis, medication non-compliance, natural history of disease, and so forth).~~~~You may have asked if this rhythm qualifies for multifocal atrial tachycardia (MAT). The dividing line between sinus tachycardia with frequent atrial ectopy and frank MAT is somewhat arbitrary and this ECG is on the brink of the latter (esp. in the context of COPD). We did not call it since the strictest definition of MAT requires a run of 3 or more (usually more to be convincing) consecutive ectopic atrial (nonsinus) beats at 100 or more with different P wave morphologies (often different PR intervals) with a very erratic rate. Here, most of P waves are probably sinus in origin with frequent atrial ectopy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case42/1350x900.gif", "_type": "mcq", "_caseId": 42}, {"question": "51-year-old woman with cardiac surgical appointment. Can you figure out the procedure? Clue: mind the P waves.", "options": ["Mitral vave replacement/repair for mitral regurgitation", "Mitral valve replacement/repair for mitral stenosis", "Atrial septal defect (secundum) closure", "Aortic valve replacement for aortic stenosis", "Coarctation of aorta repair"], "correct": 1, "explanation": "The patient had severe mitral stenosis (MS) and was in for mitral valve replacement. The findings here are quite subtle and illustrate limitations of the ECG in diagnostic sensitivity. The major ECG finding is prominent left atrial abnormality (LAA) with a very minimal RV conduction delay (V2). You can re-look at this P waves under increased magnification, esp. in lead II and V1 The negative component of the P wave in lead V1 is of low amplitude but of increased duration (at least 80 ms).. Most patients with severe MS have combination of right ventricular hypertrophy (RVH) with LAA or atrial fibrillation (AF). The QRS axis here is normal. The subtle ECG findings in concert with the major anatomic abnormality make this case notable. Whenever you see marked LAA, always think about occult mitral valve disease, as well as cardiomyopathy, etc.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case43/1350x900.gif", "_type": "mcq", "_caseId": 43}, {"question": "30-yr-old man, not on any medication. What waveform is prominent? What is the likely diagnosis, assuming prior normal ECG?", "options": ["There are very (!) prominent U waves with Q-T or QT(U) prolongation. He had severe hypokalemia (1.5 mEq/L) due to diarrhea. Calcium was normal, as was..."], "correct": 0, "explanation": "There are very (!) prominent U waves with Q-T or QT(U) prolongation. He had severe hypokalemia (1.5 mEq/L) due to diarrhea. Calcium was normal, as was magnesium (remember pure hypocalcemia prolongs the ST segment primarily but does not give large U waves.) Obviously, this acquired-type long-QT(U) syndrome puts the subject at risk for torsade de pointes which he fortunately did not have before coming to hospital. The same type ECG may occur with drug-related QT(U) prolongation syndromes and with hereditary long QT(U) syndromes related to \"channelopathies,\" including the previousl designated, classic Romano-Ward and Jervell Lange-Nielsen syndromes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case44/1350x900.gif", "_type": "identify", "_caseId": 44}, {"question": "An elderly man complains of increasing weakness. Which ONE of following is the most likely diagnosis from the ECG alone?", "options": ["Hypokalemia", "Hypocalcemia", "Parkinson&apos;s disease with baseline tremor artifact", "Intermittent runs of torsades de pointes", "Intermittent atrial fibrillation"], "correct": 2, "explanation": "This ECG shows sinus rhythm with normal intervals and classic pseudo atrial flutter/fib type waves associated with Parkinsonian tremor. These artifactual waves can also mimic ventricular tachyarrhythmias. The marked amplitude of the waves, absence of an irregular ventricular rate and subtle, hidden true P waves in selected leads (lead 2, intermittently seen; aVR) indicate underlying sinus rhythm.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case45/1350x900.gif", "_type": "mcq", "_caseId": 45}, {"question": "What is the rhythm?", "options": ["Atrial flutter. Don't miss hidden atrial (F) wave just after QRS. This is atrial flutter with 2:1 conduction. Note that with atrial flutter there aren..."], "correct": 0, "explanation": "Atrial flutter. Don't miss hidden atrial (F) wave just after QRS. This is atrial flutter with 2:1 conduction. Note that with atrial flutter there aren't P waves per se but atrial waves. So if you talk about atrial flutter do not say \"the P waves....\" since once you say P wave, the informed listener will probably assume it's not atrial fibrillation or atrial flutter. On the other hand, depending on whom you are talking to, this may not be an issue. Also note left ventricular hypertrophy (LVH) and left axis with possible prior inferior wall myocardial infarction (MI) here. Note that typical flutter waves have negative polarity in lead II, as is the case here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case46/1350x900.gif", "_type": "identify", "_caseId": 46}, {"question": "39-yr-old man with chest discomfort. What is the diagnosis and treatment? CLUE: Abnormalities are very subtle!", "options": ["Acute inferior transmural ischemia/MI. Note very subtle ST elevations and ST straightening in inferior leads with reciprocal ST depressions in I and a..."], "correct": 0, "explanation": "Acute inferior transmural ischemia/MI. Note very subtle ST elevations and ST straightening in inferior leads with reciprocal ST depressions in I and aVL. Such reciprocal changes are not seen with pericarditis or early repolarization variant. The patient had a high grade proximal right coronary artery lesion. He was treated with a percutaneous transluminal coronary intervention procedure and ruled in for MI.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case47/1350x900.gif", "_type": "identify", "_caseId": 47}, {"question": "73-yr-old woman. What is the rhythm?", "options": ["Sinus. This is another case of pseudo-flutter waves due to artifact (probably Parkinsonian tremor). Some leads show clear sinus P wave, e.g. V2, V3."], "correct": 0, "explanation": "Sinus. This is another case of pseudo-flutter waves due to artifact (probably Parkinsonian tremor). Some leads show clear sinus P wave, e.g. V2, V3.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case48/1350x900.gif", "_type": "identify", "_caseId": 48}, {"question": "78-yr-old man with complaint of paroxysmal nocturnal dyspnea (PND) and findings of increased jugular venous pressure, bi-basilar rales, a widely but physiologically split S2, a loud S3 gallop, and moderate pedal edema.. He has had the same appearing ECG for 5 yrs, with a history of hypertension and a \"large heart attack\" in the past. What are the major ECG findings? Cardiac enzyme biomarkers were negative. What did the echocardiogram likely show?", "options": ["ECG findings include sinus rhythm at 70/min with PR prolongation (\"first degree\" AV
