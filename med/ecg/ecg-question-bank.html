rapid ventricular response of about 150/min and baseline artifact. Left axis deviation consistent with left anterior fascicular block is present. Slow R wave progression, a delayed precordial transition zone is present, along with non-specific ST-T changes. There are borderline voltage criteria (Cornell: S in V3 + R in aVL > 28 mm in men); S in V3 + R in aVL > 20 mm in women) for left ventricular hypertrophy in this patient with documented coronary artery disease and long-standing hypertension.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case398/1350x900.gif", "_type": "mcq", "_caseId": 398}, {"question": "ECG from an elderly woman with recurrent palpitations. The rhythm is most consistent with which ONE of the following mechanisms?", "options": ["AV nodal reentrant tachycardia (AVNRT)", "Atrial flutter with 2:1 AV conduction", "Sinus tachycardia", "Atrial fibrillation (AF)", "Multifocal atrial tachycardia (MAT)"], "correct": 0, "explanation": "The ECG shows a narrow (normal QRS) complex, very regular tachycardia (paroxysmal supraventricular ventricular tachycardia/PSVT) at about 150/min. Probable small �pseudo�-S waves are evident in lead II and �pseudo�-R waves in aVR and V1, consistent with AVNRT as specific mechanism, with these retrograde (negative) P waves coming just after the QRS. Nonspecific ST-T changes are present, along with an early precordial R wave transition.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case399/1350x900.gif", "_type": "mcq", "_caseId": 399}, {"question": "23 year-old male with a �variable pulse rate.� What is the rhythm?", "options": ["Sinus rhythm with respiratory sinus arrhythmia (RSA)", "Sinus rhythm with 2:1 AV conduction (block)", "Wandering atrial pacemaker", "Sinus rhythm with sinus pauses (sick sinus syndrome)", "Sinus rhythm with atrial premature beats (APBs)"], "correct": 0, "explanation": "This ECG shows prominent sinus arrhythmia consistent with physiologic respiratory-related variations. The variability is due to changes in cardiac vagal tone modulation associated with respiratory phase (increase in heart rate with inspiration and decrease with expiration). Prominent precordial voltage with somewhat prominent R waves in lead VI and narrow lateral Q waves are most likely due to physiologic variants, especially in young adults (although left ventricular hypertrophy or hypertrophic cardiomyopathy cannot be excluded). Slight ST segment elevations are consistent with normal variant (benign) early repolarization.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case400/1350x900.gif", "_type": "mcq", "_caseId": 400}, {"question": "69 year-old woman with a history of drug refractory atrial tachycardia following one procedure and before another in the cardiac EP laboratory. The ECG shows atrial tachycardia (variable P waves) with which ONE of the following AV mechanisms?", "options": ["Second degree (Mobitz type I) AV block", "Second degree (Mobitz type II) AV block", "Isorhythmic AV dissociation", "Complete (3rd degree) AV block", "Ventricular pre-excitation"], "correct": 3, "explanation": "This ECG shows atrial tachycardia with at least two atrial foci, the first apparent in the first half of the tracing and the other(s) in the latter half of the tracing. There is complete AV heart block with an underlying escape rhythm at about 46 bpm. The escape QRS complexes have a right bundle branch block morphology. Prominent, diffuse T wave inversions seen in leads II, III, aVF and V3-V6 are non-diagnostic in this context of complete AV block and prior ventricular pacing. The latter may induce so-called �memory T waves� that can simulate ischemia. The patient, as noted, was s/p AV nodal ablation for incessant, refractory atrial tachycardia and en route to a permanent pacemaker implantation. Echocardiogram showed normal ventricular function.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case401/1350x900.gif", "_type": "mcq", "_caseId": 401}, {"question": "Elderly female with a history of coronary artery disease (CAD) and paroxysmal atrial fibrillation who presented with CHF exacerbation and a recent history of syncope. The following ECG is most consistent with which ONE of the following diagnoses?", "options": ["Dofetilide toxicity & torsades de pointes polymorphic ventricular tachycardia (VT)", "Digoxin toxicity and bidirectional VT", "Hyperkalemia with intermittent VT", "Hypercalcemia and polymorphic VT", "Acute ST elevation MI with polymorphic VT"], "correct": 0, "explanation": "This ECG shows underlying sinus rhythm (of note, there is right/ left arm lead reversal!) with prominent Q-T/U prolongation and bursts of polymorphic ventricular tachycardia, rate about 190 bpm, diagnostic of non-sustained torsades de pointes. This life-threatening arrhythmia may be the result of a wide variety of drugs, electrolyte disturbances, especially hypokalemia and hypomagnesemia, high degree AV heart blocks, as well as hereditary long QT syndromes (\"channelopathies\"). In some cases, a combination of factors may contribute. This woman was on dofetilide therapy (a class III drug) for treatment of paroxysmal atrial fibrillation. An echocardiogram revealed mildly-moderately depressed left ventricular ejection fraction of with mid to distal septal and inferior/lateral hypokinesis. Note the QS complexes in V1-V2. Torsades de pointes here was induced by the dofetilide, in the setting of underlying coronary heart disease and reduced renal clearance.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case402/1350x900.gif", "_type": "mcq", "_caseId": 402}, {"question": "This ECG from a 62 year old woman with a history of atrial fibrillation is most consistent with which ONE of the following rhythms?", "options": ["Sinus tachycardia with right bundle branch block", "Monomorphic ventricular tachycardia", "Hyperkalemia sine-wave pattern", "Torsade(s) de pointes", "Atrial fibrillation with aberrancy"], "correct": 1, "explanation": "The ECG shows a regular wide complex tachycardia at about 150/min. In strong favor of ventricular tachycardia are two major findings: the broad RS waves in V1 and V2 with an atypical RBBB morphology and the very wide QRS duration (180 msec). No atrial activity is apparent. The patient had a history of mitral valve replacement and prior inferior-lateral MI with left ventricular (LV) dilation and a reduced LV ejection fraction of 35-40~. This rhythm required DC cardioversion and the patient underwent successful radiofrequency catheter ablation of VT sites in the LV at the inferior wall to mitral valve regions.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case403/1350x900.gif", "_type": "mcq", "_caseId": 403}, {"question": "32 year-old male with history of a recent syncopal episode. Which ONE of the following diagnoses applies to this ECG ?", "options": ["Severe hypokalemia", "Right ventricular hypertrophy (RVH)", "Left atrial abnormality (LAA)", "Normal ECG", "Left ventricular hypertrophy (LVH)"], "correct": 3, "explanation": "This ECG shows sinus rhythm at about 67 bpm with all intervals being within normal limits; PR .08s; QRS .08 s; and QT/QTc 0.40s/0.41s. The QRS axis is also within the normal limits at +68 degrees. There is no evidence of left or right ventricular hypertrophy and the precordial leads shown normal R wave progression. A diagnosis of probable vasovagal episode was made since this occurred after he had been standing and had a prior history of a similar episode.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case404/1350x900.gif", "_type": "mcq", "_caseId": 404}, {"question": "ECG from a middle-aged woman with severe dyspnea. Which of the following echocardiogram reports would you anticipate?", "options": ["Normal chamber size and function", "Severe mitral regurgitation", "Severe aortic stenosis with left ventricular hypertrophy", "Marked right ventricular hypertrophy/dilation with severe pulmonary hypertension", "Anterior wall hypokinesis consistent with coronary disease"], "correct": 3, "explanation": "The ECG shows sinus rhythm with a constellation of findings diagnostic of severe right heart overload, especially from a sustained (months to years) pressure load: 1) very peaked P waves (inferior leads and V1) with a vertical (about +85 degrees) P wave axis; 2) very marked right axis deviation of the QRS (around +150 degrees); 3) prominent T wave inversions in leads V1 with biphasic T waves in V2 (with nonspecific changes elsewhere) and 4) terminal S waves in the left chest leads, without a true �transition zone,� and 5) a prominent R wave in V1, although R/S ratio is still less than one. These ECG findings do not indicate a specific etiology to the pathophysiology. In this case, the patient had both stage IV pulmonary sarcoidosis (i.e., with pulmonary fibrosis) and recurrent pulmonary emboli causing very severe pulmonary hypertension (pulmonary artery systolic pressure of about 104 mmHg).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case405/1350x900.gif", "_type": "mcq", "_caseId": 405}, {"question": "Elderly man with hypertension and an irregular pulse. What is the rhythm?", "options": ["Atrial flutter", "Atrial fibrillation", "Multifocal atrial tachycardia", "Artifact with underlying sinus rhythm", "Atrial tachycardia with variable block"], "correct": 1, "explanation": "This ECG shows ~coarse\" atrial fibrillation with a ventricular response of about 90/min at rest. Borderline voltage criteria for left ventricular hypertrophy are present, consistent with a history of hypertension. (Aortic stenosis should always be considered as well.) ~~~~What definitively distinguishes atrial fibrillation from atrial flutter here are the facts that: 1) the rate and 2) the morphology of the atrial (f) waves are highly variable and 3) the atrial rate is intermittently very rapid (cycle length less than 180 ms, or 4.5 small box widths on the standard ECG). Atrial activity in atrial flutter has a highly patterned and consistent appearance (the ~F~ waves are always the same in any lead) and the atrial (F-F) cycle length (inverse of atrial rate) is usually more >180ms.~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case406/1350x900.gif", "_type": "mcq", "_caseId": 406}, {"question": "ECG from a 48 year old man a severe underlying problem. What is the most likely diagnosis?", "options": ["Pericardial tamponade", "Dilated cardiomyopathy", "Mitral stenosis", "Acute anterior infarction", "Chronic obstructive pulmonary disease"], "correct": 1, "explanation": "This ECG shows sinus tachycardia (about 112/min at rest). There is prominent left atrial abnormality (LAA). Non-specific ST-T abnormalities are present. The limb lead voltage is relatively low; the precordial voltage is prominent consistent with left ventricular hypertrophy, and very slow R wave progression is present (R/S ratio <1 in V4). The latter triad is a relatively specific, but not sensitive sign of dilated cardiomyopathy. The LAA is consistent with this finding. The patient had very severe idiopathic dilated cardiomyopathy (no obstructive coronary disease, with estimated left ventricular ejection fraction of 15-20~ by transthoracic echocardiogram).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case407/1350x900.gif", "_type": "mcq", "_caseId": 407}, {"question": "This ECG from a 35 year old woman is most consistent with which ONE of the following serum laboratory findings?", "options": ["Calcium: 6.9 mg/dL", "Calcium: 14.5 mg/dL", "Potassium: 1.9mEq/L", "Phosphorus 1.5mg/dL", "Digoxin: 5.2 ng/ml"], "correct": 0, "explanation": "The ECG shows sinus rhythm at about 90/min. The QRS axis is vertical (about +85 degrees), but not frankly rightward. There are nonspecific ST-T abnormalities in the lateral leads. Most important is the (subtle!) prolongation the QT/QTc at 430msec/480 obtained using Hodges formula: QTc = QT + 1.75 (heart rate � 60). The patient had renal failure with prominent hypocalcemia (6.9 mg/dL in concert with hyperphosphatemia (8.0 mg/dL) Her albumin was reduced at 2.9g/dL, but not enough to account for the hypocalcemia. Serum potassium was minimally elevated (5.1mEq/L). Hypocalcemia causes relatively uniform prolongation by �stretching out� the plateau (phase 2) of the ventricular action potential (corresponding to the ST-segment phase). This case is of interest because of the subtlety of the ECG findings.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case408/1350x900.gif", "_type": "mcq", "_caseId": 408}, {"question": "This ECG from a 41 year old woman status post a sudden cardiac arrest and ICD placement is most suggestive of which ONE of the following?", "options": ["Mitral stenosis", "Mitral valve prolapse", "Hypertrophic cardiomyopathy", "Brugada syndrome", "WPW pre-excitation"], "correct": 2, "explanation": "The ECG shows sinus rhythm at a rate of about 60/min. Intervals and QRS axis are normal. The recording is notable for notched Q waves in leads V2 and V3 and prominent narrow Q waves (as QR complexes) in V4-V6. The lateral T waves are tall and symmetrical. The pattern resembles an anterior MI. Pseudo-infarct patterns (especially with narrow, deep Q waves) are not uncommon with hypertrophic cardiomyopathy. Echocardiogram showed normal overall left ventricular wall motion with classic asymmetric septal hypertrophy. There was a resting left ventricular outflow gradient of 15 mmHg, increasing to 18 mmHg during the strain phase of the Valsalva maneuver.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case409/1350x900.gif", "_type": "mcq", "_caseId": 409}, {"question": "This ECG from a 48 year old man is most consistent with which ONE of the following clinical scenarios?", "options": ["Arrhythmogenic right ventricular cardiomyopathy (ARVC)", "Persistent juvenile T wave inversions (normal variant)", "Athlete�s heart syndrome (normal variant)", "Evolving anterior wall myocardial infarction (MI)", "Acute pulmonary embolism"], "correct": 3, "explanation": "Sinus rhythm is present at about 70/min with a normal frontal plane QRS axis (about +50 degrees) and normal PR, QRS and QT intervals. The key finding is prominent T wave inversion in the precordial leads (especially V2-V4), with slight biphasic T waves in V5, as well as I and aVL. R wave progression is slow in V1-V2. The P waves are consistent with left atrial abnormality. The patient had sustained a recent anterior infarction, with a near total occlusion of the left anterior descending coronary artery at angiography and was treated with an emergency percutaneous coronary intervention procedure. Echocardiogram showed moderate global left ventricular dysfunction, with focal abnormalities of the septum and anterior apical walls. The left atrium was dilated. This ischemic T wave inversion pattern is sometimes referred to as the �LAD T-wave inversion pattern� or as �Wellens� T waves.� The patient had presented with chest discomfort and elevated cardiac enzymes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case410/1350x900.gif", "_type": "mcq", "_caseId": 410}, {"question": "A young adult woman presents with a history of palpitations and has high grade ventricular arrhythmias. This ECG is most consistent with which ONE of the following diagnoses?", "options": ["Dilated cardiomyopathy", "Long QT syndrome (LQTS)", "Brugada syndrome", "Hypertrophic cardiomyopathy", "Arrhythmogenic right ventricular cardiomyopathy (ARVC)"], "correct": 4, "explanation": "The ECG shows sinus rhythm with normal intervals and QRS axis. There is borderline low limb lead voltage. The QRS shows a narrow rSr morphology in V1 and V2, with T wave inversions in V1-V3/V4 and nonspecific inferior ST-T changes as well. The patient had ARVC, formerly called arrhythmogenic right ventricular dysplasia (ARVD), and required an implanted cardioverter-defibrillator for recurrent sustained ventricular tachycardia. A variety of ECG findings have been reported with ARVC including: T wave inversions V1-V3/V4 (present here), right ventricular conduction delays (narrow rSr only here), wide right precordial S waves (>55ms) in V1-V3, and epsilon waves in V1/V2 (very small amplitude high frequency waves in the ST segment of right precordial leads; not seen here). In addition, ventricular ectopy, especially with a left bundle branch block morphology, may be seen. For a review, see Jain R, et al. Circulation 2009;120: 477.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case411/1350x900.gif", "_type": "mcq", "_caseId": 411}, {"question": "A 64 year old man with a history of hypertension and atrial flutter is noted to have �group beating� on his ECG. What is the rhythm?", "options": ["Sinus rhythm with atrial bigeminy", "Sinus rhythm with 3:2 AV Wenckebach", "Sino-atrial  (SA) Wenckebach", "Atrial tachycardia with block", "Sinus rhythm with ventricular bigeminy"], "correct": 0, "explanation": "The ECG shows sinus rhythm with atrial bigeminy (i.e., each sinus beat is coupled to a premature atrial complex). In addition there are findings of left atrial abnormality, left ventricular hypertrophy (LVH) and non-specific ST-T changes. Note that the P waves of the atrial premature complexes �sit on� the T waves of the preceding sinus beats, giving the misleading appearance of Q-T(U) prolongation. Echocardiogram confirmed left atrial enlargement and symmetric LVH, consistent with hypertension. The echocardiogram also showed right atrial enlargement, which cannot be diagnosed from the ECG in this case. Sinus rhythm with AV Wenckebach would require the consistent appearanc of sinus P waves with prolonging PR intervals, followed by a non-conducted P wave. This pattern is not seen here. SA Wenckebach is usually at slower rate and P waves should be identical. Here, the second P wave in each group is not only premature, but varies in morphology from the previous sinus. The QRS complexes of the premature beats are nearly identical with sinus conducted beats, further indicating supraventricular, not ventricular bigeminy. There is no evidence of atrial tachycardia here, although atrial bigeminy, particularly with atrial overload syndromes may be associated with increased risk of sustained atrial tachyarrhythmias such as atrial fibrillation, atrial flutter and atrial tachycardia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case412/1350x900.gif", "_type": "mcq", "_caseId": 412}, {"question": "57 year old man with this ECG, read by computer as ~possible atrial flutter~ shows which of ONE of following?", "options": ["Sinus rhythm with artifact", "Multifocal atrial tachycardia", "Atrial flutter", "Atrial fibrillation with a regularized ventricular response", "Atrial tachycardia with block"], "correct": 0, "explanation": "This ECG is within normal limits. Baseline artifact misled the computer algorithm into raising the possibility of atrial flutter.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case413/1350x900.gif", "_type": "mcq", "_caseId": 413}, {"question": "A 64 year old man with a history of hypertension presents with palpitations. What is the ECG diagnosis?", "options": ["Sinus tachycardia", "AV nodal reentrant tachycardia (AVNRT)", "Atrial tachycardia with 1:1 AV conduction", "Atrial flutter with 2:1 AV conduction", "Atrial fibrillation"], "correct": 3, "explanation": "The ECG shows a very regular, narrow complex (normal QRS duration) tachycardia. The pattern is that of typical, counterclockwise atrial flutter with 2:1 AV block (conduction). The atrial rate is 270 cycles/min and the QRS (effective ventricular) rate is 135 beats/min. Note the negative flutter (F, not true P) waves in the inferior limb leads and positive flutter waves in V1 and V2. Every other F wave is partly hidden in the end of the QRS/early ST segment. Nonspecific ST-T changes are also present", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case414/1350x900.gif", "_type": "mcq", "_caseId": 414}, {"question": "58 year old woman with dyspnea. What is the most likely diagnosis based on this ECG?", "options": ["Extensive anterior infarction and heart failure", "Mitral stenosis", "Cor pulmonale due to severe emphysema", "Aortic stenosis", "Mitral regurgitation due to mitral valve prolapse"], "correct": 2, "explanation": "The ECG shows a number of findings consistent with the diagnosis of very severe chronic obstructive pulmonary disease. The rhythm is borderline resting sinus tachycardia with atrial premature beats. The P waves are somewhat peaked (but not 2.5mm or more) with a rightward P wave axis (about +80 degrees) and there is frank right axis deviation of the QRS (close to +100 degrees). Slow R wave progression is present and the precordial transition zone is delayed until at least V6. In addition, there are non-specific ST-T changes. Of interest, despite the severity of the COPD, the QRS voltage here is not absolutely low, but is relatively low overall.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case415/1350x900.gif", "_type": "mcq", "_caseId": 415}, {"question": "What is the likely underlying diagnosis in this middle-aged man?", "options": ["Mitral stenosis", "Heart failure due to dilated cardiomyopathy", "Wolff-Parkinson-White pre-excitation", "Hyperkalemia", "Acute infero-lateral ST elevation MI"], "correct": 1, "explanation": "The patient had a history of severe, idiopathic dilated cardiomyopathy, with a transthoracic echocardiogram showing global left ventricular (LV) hypokinesis (estimated LV ejection fraction of 20~). The ECG shows dual chamber pacemaker function with underlying sinus rhythm at about 80/min (atrial sensing) and biventricular (BiV) pacing. (Note the two separate ventricular spikes seen about 40 ms apart.) Compared with the prior available record of about 6 months previous, which showed sinus rhythm with left bundle branch block (LBBB), the BiV pacing was new. This case is an example of the use of cardiac resynchronization therapy (CRT) for the treatment of chronic heart failure with an underlying LBBB.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case416/1350x900.gif", "_type": "mcq", "_caseId": 416}, {"question": "Elderly man with a history of �heart disease.� What did the echocardiogram show?", "options": ["Mitral stenosis", "Dilated cardiomyopathy", "Pulmonic stenosis", "Atrial septal defect", "Anterior wall aneurysm"], "correct": 1, "explanation": "The ECG shows borderline resting sinus tachycardia (95/min). The constellation of low limb lead voltage, prominent precordial voltage and slow R wave progression (rS here in V4) has been reported as a relatively specific, but non-sensitive triad in dilated cardiomyopathy. The marked left atrial abnormality noted here (low amplitude but very broad P waves, with a prolonged negative phase in V1) are also consistent with this diagnosis. The QRS axis is borderline leftward. Non-specific ST-T changes are present. Echocardiogram showed marked biventricular and biatrial dilation with severely reduced left ventricular (LV) ejection fraction and global LV dysfunction. The etiology of the cardiomyopathy was not certain, but possibly related to prior chemotherapy for Waldenstrom�s macroglobulinemia. Cardiac amyloid (more likely to be associated with diffusely low voltage) was not seen on myocardial biopsy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case417/1350x900.gif", "_type": "mcq", "_caseId": 417}, {"question": "57 year old man with an irregular pulse. The ECG shows which ONE of the following rhythms?", "options": ["Marked sinus arrhythmia", "Atrial fibrillation", "Atrial tachycardia with block", "Sinus rhythm with frequent atrial couplets", "Sinus rhythm with AV Wenckebach (Mobitz type I block)"], "correct": 3, "explanation": "The ECG shows underlying sinus rhythm at about 75/min with frequent atrial ectopic (premature) beats that appear as couplets (two in a row following some of the sinus beats). Subtle P' waves can be seen in the ST-T complexes. The premature atrial beats show slight variations in QRS morphology, without actual aberrancy. The remainder of the ECG is unremarkable. The patient had severe chronic obstructive lung disease and was using an albuterol inhaler, which may account for the increased atrial ectopy. The latter is a non-specific finding, one precipitant of which is enhanced cardiac sympathetic stimulation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case418/1350x900.gif", "_type": "mcq", "_caseId": 418}, {"question": "Elderly man with a history of coronary bypass surgery and aortic valve replacement. This ECG, with some baseline artifact, shows which ONE of the following rhythms?", "options": ["Atrial fibrillation (AF) with ventricular pacing", "Sinus rhythm with ventricular pacing", "Atrial pacing with left bundle branch block", "Atrial flutter with ventricular pacing", "Multifocal atrial tachycardia (MAT) with ventricular pacing"], "correct": 0, "explanation": "The rhythm is atrial fibrillation (see V1) with right ventricular (apical) pacing yielding a left bundle branch block morphology with left/superior axis deviation. When reading an ECG with ventricular pacing it is always important to identify the underlying atrial mechanism, and especially to consider the possibility of atrial fibrillation. Pacemakers in patients with intermittent or permanent AF do not protect against thromboembolic risk. This patient was on warfarin.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case419/1350x900.gif", "_type": "mcq", "_caseId": 419}, {"question": "Middle-aged woman in the ICU with multiple organ dysfunction syndrome (MODS) and sepsis in the setting of metastatic colon cancer. The likely differential diagnosis includes all of the following EXCEPT which ONE?", "options": ["Anasarca", "Pericardial effusion", "Pleural effusion", "Chronic obstructive pulmonary disease (COPD)", "Myxedema coma"], "correct": 4, "explanation": "The ECG shows sinus tachycardia at about 105/min with a relatively short PR interval (consistent with the increased sinus rate), without evidence of pre-excitation. The QRS voltages are low in the limb leads (5 mm or less) and relatively low in the chest leads (10 mm or less in most of them). Non-specific ST-T changes are present, along with slow R wave progress. The patient had anasarca associated with end stage metastatic colon cancer and multiple organ dysfunction syndrome (MODS) associated with sepsis. No significant pericardial or pleural effusions were present. The combination of sinus tachycardia and low voltage QRS complexes is consistent with all of the listed diagnoses, except for myxedema coma which is usually associated with sinus bradycardia, although hypothyroidism should be excluded as a contributory cause to unexplained bradycardia and/or pericardial effusion. With COPD, low voltage and slow R wave progression are sometimes accompanied by rightward QRS and P wave deviation, as well as peaked P waves (right atrial overload; P pulmonale), which are not present here. With pericardial effusion, especially with tamponade pathophysiology, electrical alternans may be seen, a highly specific, but only moderately sensitive finding in this condition.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case420/1350x900.gif", "_type": "mcq", "_caseId": 420}, {"question": "50 year old woman with dyspnea. What is the most likely syndrome based on this ECG?", "options": ["Extensive anterior infarction and heart failure", "Mitral stenosis", "Cor pulmonale due to pulmonary hypertension/chronic lung disease", "Aortic stenosis", "Mitral regurgitation due to mitral annular calcification"], "correct": 2, "explanation": "The patient has severe pulmonary hypertension that is likely multifactorial, including chronic obstructive and restrictive lung disease. Relevant ECG findings include resting sinus tachycardia, right axis deviation, right atrial overload (note peaked P waves in V2), relatively low limb voltage, and slow R wave progression with delayed precordial transition (S waves in V5 and V6). Nonspecific ST-T changes are also present, with slight T wave inversions in V2 and V3 that might relate to right ventricular overload.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case421/1350x900.gif", "_type": "mcq", "_caseId": 421}, {"question": "This ECG from a 56 year old man who was found unresponsive is most consistent with which ONE of the following clinical scenarios?", "options": ["Renal failure", "Systemic hypothermia", "Tricyclic antidepressant overdose", "Myxedema coma", "Hypercalcemia"], "correct": 1, "explanation": "The ECG shows atrial fibrillation (AF) with an average ventricular response of about 100/min. Nonspecific ST-T changes are present with QT prolongation (about 400 ms). Of special note are the prominent Osborn waves, seen at the J junction (at end of the QRS and beginning of ST segment). Not including the J waves, the QRS duration (width) is at the upper limits of normal or slightly prolonged. The patient had severe hypothermia (rectal temperature of (28.4 degrees C or 83.1 F). Serum potassium was borderline low (3.3 mEq/L) and serum calcium was normal. The AF converted spontaneously back to sinus rhythm. The J wave of hypothermia has been attributed to altered action potential characteristics in epicardial cells leading to a voltage gradient between the endocardium and the outer ventricular layers at the time the J wave is inscribed. (See: Yan G-X, Antzelevitch C. Cellular basis for the electrocardiographic J wave. Circulation. 1996; 93:372�379.) Renal failure would be associated with signs of hyperkalemia, not seen here. Tricyclic antidepressant overdose is typically associated with resting sinus tachycardia, a wide QRS and a long QT. ECG findings in myxedema coma would include sinus bradycardia and diffusely low QRS voltage. Hypercalcemia is associated with QT (ST segment portion) shortening.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case422/1350x900.gif", "_type": "mcq", "_caseId": 422}, {"question": "Elderly woman with multiple co-morbidities in the ICU. This ECG is most consistent with which ONE of the following life-threatening conditions?", "options": ["Tricyclic antidepressant overdose", "Hypokalemia", "Hypocalcemia", "Digitalis toxicity", "Hypothyroidism"], "correct": 3, "explanation": "The ECG is very suggestive of digitalis overdose. The underlying rhythm is atrial fibrillation with predominant ventricular bigeminy (note the fixed coupling of the premature ventricular complexes). Toward the end of the rhythm strip there is a slow (escape-type) ventricular couplet. An intraventricular conduction delay is present in the supraventricular beats which, in addition, show slow R wave progression, two non-specific findings that may be associated with ventricular dysfunction. The patient had a history of heart failure and atrial fibrillation in the context of ischemic heart disease, as well as chronic obstructive lung disease. The relatively short QT with �scooping� of the ST segment is typical of digitalis effect (which does not imply digitalis toxicity per se.). These ST changes may also be due to ischemia or left ventricular hypertrophy, or some combination thereof. The combination of atrial fibrillation with a slow or regularized ventricular response, premature ventricular complexes and ST-T changes consistent with digitalis �effect� is strongly suggestive of digitalis excess. The latter can lead to fatal ventricular tachyarrhythmias if not recognized. The serum digoxin level at about the time of this ECG was markedly elevated at 4.0 ng/ml, decreasing the next day to 2.5 ng/ml (still elevated) after the drug was stopped.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case423/1350x900.gif", "_type": "mcq", "_caseId": 423}, {"question": "62 year old woman with palpitations. The ECG shows which ONE of the following rhythms?", "options": ["Sinus tachycardia with atrial premature beats", "Atrial fibrillation with a rapid ventricular response", "Atrial flutter with variable block", "Multifocal atrial tachycardia (MAT)", "Atrial tachycardia with block"], "correct": 1, "explanation": "This narrow complex tachycardia is atrial fibrillation with a rapid ventricular response. The mean ventricular (QRS) rate is about 120/min at rest (range about 70-150/min). Non-specific ST-T changes are present in the inferior leads. TSH was within normal limits.This rhythm might be mistaken for atrial flutter, MAT or even a PSVT variant. However, the ventricular cadence when looked at carefully shows definite irregularity and the baseline has irregular, low amplitude atrial (f) waves consistent with atrial fibrillation. In contrast, atrial flutter shows monotonously consistent \"saw-tooth\" atrial (F) waves that are invariant across the recording. The ventricular response is either highly regular (usually 2:1 AV conduction) or shows some patterning due to variable block (e.g., 3:2; 3:1; AV Wenckebach variants). Occasionally, atrial fibrillation will change to flutter or vice versa in the same short recording, and patients who show one pattern may show the other on different days, with drug effects or ablation interventions, etc.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case424/1350x900.gif", "_type": "mcq", "_caseId": 424}, {"question": "Asymptomatic 60 year old man with ECG as part of pre-operative assessment. What is the rhythm?", "options": ["Sinus tachycardia with atrial premature beats", "Atrial fibrillation", "Atrial flutter with variable block", "Wandering atrial pacemaker", "Atrial tachycardia with block"], "correct": 1, "explanation": "The rhythm is atrial fibrillation with an average ventricular response at rest of about 84/min (range about 70-120/min). Relatively low voltage is present diffusely, a non-specific finding that may be seen as a physiologic variant, with obesity, anasarca, pericardial effusion or constriction, chronic obstructive lung disease, amyloid cardiomyopathy, etc. Borderline left axis deviation is also present.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case425/1350x900.gif", "_type": "mcq", "_caseId": 425}, {"question": "A 37 yr old male with a history of an �abnormal ECG� is referred for further evaluation. He has no cardiac symptoms. On exam, blood pressure is normal and a soft systolic murmur is heard, unchanged with Valsalva maneuver or standing. The ECG is most consistent with which ONE of the following diagnoses?", "options": ["Pulmonic stenosis", "Ebstein�s anomaly of the tricuspid valve", "Athlete�s heart", "Apical hypertrophic cardiomyopathy (Yamaguchi�s syndrome)", "Atrial septal defect (secundum type)"], "correct": 3, "explanation": "The ECG shows sinus rhythm at 70/min with normal intervals and a normal QRS axis of about 25 degrees. Notable features are very prominent QRS voltages with deep, �spade-like� T wave inversions in leads I, II, aVF, aVL, V3-V6, and ST depressions, especially in the mid-lateral precordial leads. These findings are typical of the apical variant of hypertrophic cardiomyopathy, also called Yamaguchi�s syndrome. This diagnosis was confirmed by transthoracic echocardiography. The depth of the T wave inversions distinguishes this ECG from more common LVH variants. The very prominent voltages and, especially the ST depressions distinguish it from physiologic athlete�s ECGs. See also Case 14 and Eur. Heart J 2010: 31:243.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case426/1350x900.gif", "_type": "mcq", "_caseId": 426}, {"question": "Patient post-op following mitral valve repair is noted to be bradycardic. The ECG shows which ONE of the following rhythms?", "options": ["Sinus bradycardia", "Atrial fibrillation with a slow ventricular response", "Junctional bradycardia", "Wandering atrial pacemaker", "Sinus bradycardia with complete heart block"], "correct": 2, "explanation": "The ECG shows a classic junctional bradycardia at about 44/min. There is a somewhat long RP interval, with retrograde P waves (negative in II, positive in aVR) partly hidden in the T waves. Low limb voltage is also present with non-specific ST-T changes. This type of escape rhythm is usually associated with suppression of the underlying sinus node pacemaker. The latter may be due to or potentiated by a variety of factors, singly or in combination, including drugs (e.g., beta-blockers, verapamil, diltiazem, lithium carbonate, digoxin), hyperkalemia, hypothyroidism, acute SA node ischemia, increased vagal tone, chronic sick sinus syndrome, etc. In this case, the rhythm was attributed to recent cardiac surgery and to beta-blockade effects. Sinus rhythm reappeared within several days.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case427/1350x900.gif", "_type": "mcq", "_caseId": 427}, {"question": "This ECG, from an elderly man with chronic heart failure, is relatively unchanged over at least 6 months. What did the echocardiogram show?", "options": ["Very low left ventricular ejection fraction (LVEF) with anterior-lateral wall motion abnormalities (�ischemic cardiomyopathy�)", "Critical aortic stenosis", "Critical mitral stenosis", "Apical hypertrophic cardiomyopathy", "Arrhythmogenic right ventricular cardiomyopathy/dysplasia"], "correct": 0, "explanation": "The ECG shows borderline resting sinus tachycardia at about 100/min with relatively low limb lead voltage and prominent precordial voltage; an intraventricular conduction delay with a right ventricular component; left atrial abnormality and left ventricular hypertrophy, and extensive pathologic Q waves from V1-V6 with ST elevations in V1-V5, as well as an rSr�s� morphology in I and aVL. Inverted T waves are present in V5 and V6. The persistence of ST elevations and Q waves weeks to months after an MI suggests the presence of a severe wall motion abnormality, sometimes with frank dyskinesis (aneurysm). The finding of rSr� type complexes in the left precordial leads has also been reported in this context (El-Sherif sign). The sinus tachycardia, low limb/prominent precordial voltage and left atrial abnormality, along with the other findings are also consistent with severe ventricular dysfunction. Echocardiogram also showed a possible apical left ventricular thrombus, which may occur with large akinetic or dyskinetic zones.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case428/1350x900.gif", "_type": "mcq", "_caseId": 428}, {"question": "ECG from a middle aged woman not on any medications known to affect the ECG. Which ONE of the following abnormalities is most likely present based on these waveforms?", "options": ["Hypoaldosteronism", "Hypokalemia", "Hypocalcemia", "Hyponatremia", "Hypophosphatemia"], "correct": 1, "explanation": "The ECG shows borderline resting sinus tachycardia at 95/min. Most notable, and relatively subtle in some leads, is the prolongation of repolarization (QT-U) with prominent U waves that are best seen in the precordial leads (e.g., V2). The serum potassium was 2.4 mEq/L. The patient was diabetic with a serum glucose of 462 mg/dL at the time of this ECG.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case429/1350x900.gif", "_type": "mcq", "_caseId": 429}, {"question": "Young adult woman presenting with vertigo, is on no cardioactive medications. This ECG is most consistent with which ONE of the following diagnoses? (Note: rhythm is sinus tachycardia.)", "options": ["Myocardial ischemia/infarction from left anterior descending occlusion", "Apical hypertrophic cardiomyopathy", "Cerebellar hemorrhage", "Brugada pattern", "Hypokalemia"], "correct": 2, "explanation": "The ECG is notable for marked QT-U prolongation (for example in V1 a giant U wave appears to be appended to the T wave, creating a slight discontinuity in waveform morphology). The T-U waves are massively inverted in the inferior and lateral leads. The QRS voltage is somewhat prominent but there was no history of hypertension. The cardiac troponin and CK-MB levels were not elevated. Serum potassium and other electrolytes were normal. This ECG exemplifies some of the classic manifestations of the so-called CVA (cerebrovascular accident) T wave pattern, most commonly associated with subarachnoid hemorrhage or other intracranial bleeds. The mechanisms are not fully delineated but may relate to excessive catecholamine stimulation causing direct myocardial injury (myocytolysis). Takotsubo syndrome may occur in some cases. The long QT-U may predispose to torsade(s) de pointes. Apical hypertrophic cardiomyopathy (Yamaguchi~s syndrome) is associated with deep, but relatively narrow (spade-like) T wave inversions, most marked in the mid-precordial leads. This pattern seen here with giant T wave inversions and a long QT-U is also very unusual with ischemia.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case430/1350x900.gif", "_type": "mcq", "_caseId": 430}, {"question": "This ECG from a 50 year old man shows findings consistent with all of the following EXCEPT for which one?", "options": ["Prior inferior Q-wave myocardial infarction (MI)", "Acute/evolving anterior ST elevation/Q-wave MI", "Sinus rhythm", "Borderline low limb lead voltage", "Left posterior fascicular block"], "correct": 4, "explanation": "The ECG shows sinus rhythm with baseline artifact. The QRS axis is vertical but not frankly rightward. The major findings are related to an acute/evolving anterior Q-wave/ST elevation MI. Inferior Q waves consistent with a prior MI in that distribution are present. Cardiac catheterization and coronary angiography showed evidence of a recently formed thrombus in the proximal left anterior descending (LAD) vessel and an old occlusion of the right coronary artery. The patient underwent angioplasty and stenting of the LAD lesion. About one month later, a transthoracic echocardiogram showed overall LV systolic function to be moderately-to-severely depressed (estimated ejection fraction about 30 percent) associated with persistent severe hypokinesis of the interventricular septum and anterior free wall and akinesis of the apex.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case431/1350x900.gif", "_type": "mcq", "_caseId": 431}, {"question": "This ECG from a 68 year old woman immediately status post valve repair for severe mitral regurgitation shows which ONE of the following rhythms? Note: the most recent previous ECG showed atrial fibrillation with a moderate ventricular response and right bundle branch block with left axis deviation.", "options": ["Atrial flutter with complete heart block (CHB) and a junctional escape mechanism", "Sinus rhythm with CHB and a junctional escape", "Atrial asystole with a junctional escape", "Atrial fibrillation (AF) with CHB and a junctional escape", "Atrial tachycardia with CHB and a junctional escape"], "correct": 3, "explanation": "The ECG shows fine (low amplitude, rapid) atrial fibrillation with a slow (45/min), very regular QRS rate, consistent with a junctional escape mechanism. RBBB and left axis deviation (the latter consistent with left anterior fascicular block) are present, as noted on prior ECGS. There is relatively low voltage diffusely, not uncommon after cardiac surgery. The need for a permanent pacemaker would depend on whether this post-operative rhythm was transient or persistent.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case432/1350x900.gif", "_type": "mcq", "_caseId": 432}, {"question": "This ECG from a middle-aged woman is most consistent with which ONE of the following diagnoses?", "options": ["Aortic stenosis", "Posterior myocardial infarction", "Pulmonary hypertension syndrome", "Aortic regurgitation", "Mitral valve prolapse"], "correct": 2, "explanation": "This ECG shows prominent resting sinus tachycardia (at 120/min) with PR prolongation, especially for this sinus rate (210 ms). The most notable findings are right atrial abnormality (tall, peaked P waves in leads II and V1), markedly rightward QRS axis deviation in the frontal plane (about +120 degrees), relatively tall R waves in V1-V2 and T wave inversions in V1-V3. This constellation of findings is virtually diagnostic of a severe right heart overload syndrome. In this case, the patient had chronic pulmonary hypertension (multifactorial), including severe restrictive lung disease.~~~~Note that a relatively tall R wave in lead V1 is an ECG marker of posterior infarction (equivalent to a pathologic Q wave in posterior leads, which are not generally recorded). However, posterior infarction would not account for the ensemble of findings, also including right axis deviation of the QRS, peaked P waves consistent with right atrial abnormality and ST-T wave abnormalities, consistent with right ventricular overload. Furthermore, what is called \"posterior MI\" by ECG is usually associated with concomitant evidence of inferior and/or lateral wall involvement.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case433/1350x900.gif", "_type": "mcq", "_caseId": 433}, {"question": "An elderly woman presents with palpitations and shortness of breath. What is the rhythm?", "options": ["Sinus tachycardia with premature atrial complexes (PACs)", "Atrial flutter with variable block", "Atrial fibrillation (AF) with a rapid ventricular response", "Multifocal atrial tachycardia (MAT)", "AV nodal reentrant tachycardia (AVNRT)"], "correct": 2, "explanation": "This resting ECG shows a very fast ventricular rate (average about 170/min). The cadence is irregular if you measure it carefully, without any pattern. Atrial fibrillatory activity is difficult to see because of the short R-R intervals and the low amplitude of the f waves. The rate is too fast for sinus in an elderly patient at rest and the apparent P waves are actually coarse fibrillatory (f) waves. No flutter waves are seen and AVNRT is usually highly regular. The ECG also shows borderline left axis deviation, non-specific ST-T changes and delayed precordial R wave transition, all non-diagnostic findings. The slight variability in QRS morphology is not unusual in AF and may be due to subtle change in ventricular conduction and/or respiration. The patient was not hyperthyroid. She did have a history of hypertension and her echocardiogram showed concentric LVH, left atrial dilation and mild-moderate mitral regurgitation associated with thickening of the valve leaflets. This episode of AF occurred in the context of recent orthopedic surgery and the rapid rate was related to stress with increased catecholamine levels facilitating AV nodal conduction in a patient with multiple risk factors for AF.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case434/1350x900.gif", "_type": "mcq", "_caseId": 434}, {"question": "The following ECG is from a elderly man with advanced coronary disease. What is the rhythm? (Also, at least four other abnormalities are present. Can you find them?)", "options": ["Sinus rhythm with complete AV heart block", "Sinus rhythm with atrial premature beats", "Sinus rhythm with 3:2 SA Wenckebach", "Sinus rhythm with 3:2 AV Wenckebach", "Sinus bradycardia with supraventricular escape beats"], "correct": 3, "explanation": "The rhythm is sinus (P wave rate about 75/min) with 3:2 AV Wenckebach (Mobitz I block), yielding an effective ventricular (pulse) rate of about 50/min. The group beating pattern (repeating QRS pairs) here is due to the Wenckebach conduction. The AV Wenckebach is consistent with block in the AV node (note also the long PR interval that initiates each sequence, further indicating prolonged proximal AV conduction, even after a pause). This finding could be due to intrinsic AV node disease and/or AV nodal blocking agents. ~~~~Of note, the ECG shows a number of other major abnormalities including: right bundle branch block (RBBB) and right axis deviation, the latter raising consideration of left posterior fascicular block in this context. Together, these findings would constitute evidence of bifascicular block due to infra-nodal disease. The combination of left atrial abnormality and RBBB raise consideration of underlying left ventricular hypertrophy (LVH). In addition, prominent inferior lead Q waves raise suggestion of previous inferior MI. The patient had undergone multi-vessel coronary bypass grafting with occlusion of all three major native coronary branches. Echocardiogram showed left atrial enlargement, LVH, overall preserved LV function with antero-apical hypokinesis. The patient developed more advanced AV block with symptoms and required dual chamber pacemaker insertion.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case435/1350x900.gif", "_type": "mcq", "_caseId": 435}, {"question": "This ECG from a 78-year-old woman in critical condition shows all of the following EXCEPT?", "options": ["Sinus tachycardia at about 100/min", "Mobitz type I second degree AV block (3:2 and 2:1)", "ST elevation inferior MI with probable posterior and/or lateral involvement", "Frequent atrial premature beats", "Borderline low limb lead voltage"], "correct": 3, "explanation": "The ECG shows sinus tachycardia (P wave rate of 100/min) with Mobitz I AV block (3:2 and 2:1) in the context of an acute ST elevation inferior and possibly posterolateral MI. The effective ventricular (pulse rate) is about 66/min. The AV Wenckebach periodicity simulates atrial premature beats. Note the reciprocal ST segment depressions in leads I, aVL, V2 and V3, with a relatively tall R wave in V2 (the latter consistent with postero-lateral involvement) as well as incipient Q waves inferiorly. ST depressions in V4-V6 also raise strong consideration of lateral involvement. Borderline low limb lead QRS voltage is present. ST segment elevation in lead III >II (with ST depression in I) is consistent with total occlusion of a dominant right coronary (RCA) artery supplying the posterior descending artery (confirmed at angiography), as opposed to a dominant left circumflex occlusion. This large infarct was complicated by an acquired ventricular septal defect (VSD) due to the extensive myocardial necrosis.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case436/1350x900.gif", "_type": "mcq", "_caseId": 436}, {"question": "This ECG is from a young adult woman on no cardioactive medications who had a previously normal ECG in the past. The findings are most consistent with which ONE of the following severe abnormalities?", "options": ["Hyponatremia", "Addison�s disease", "Hypocalcemia", "Hypophosphatemia", "Hypokalemia"], "correct": 4, "explanation": "The ECG shows sinus rhythm with a vertical (inferior) QRS axis, which is within normal for age. The major abnormality is marked ventricular repolarization prolongation, including ST depression in some leads (simulating ischemia), flat T waves and apparent giant U waves. She had a profoundly low serum potassium concentration (about 1.5mEq/L) at this time due to gastric fluid losses and metabolic alkalosis. There is some of debate in the ECG literature about whether hypokalemia causes true QT prolongation, whether the repolarization prolongation is due to a T-U fusion wave, or whether the U wave is actually a bifid T wave. Spatio-temporal dispersion of recovery may also contribute the findings. The mechanism of pathologic repolarization prolongation with hypokalemia is also not fully understood but appears related to a decrease or delay in inward potassium movement during the ventricular action potential. This degree of repolarization prolongation creates a risk of torsade(s) de pointes type of polymorphic ventricular tachycardia. Hypocalcemia (not present here) causes QT prolongation associated with a long ST segment, but without U waves. Serum magnesium was also normal here. The previously normal ECG and the absence of drugs exclude hereditary long QT syndrome or pharmacologic toxicity.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case437/1350x900.gif", "_type": "mcq", "_caseId": 437}, {"question": "This ECG, from a 57-year-old woman with dyspnea, is most consistent with which ONE of the following diagnoses?", "options": ["Mitral stenosis", "Decompensated chronic obstructive pulmonary disease (COPD)", "Acute anterior wall myocardial infarction", "Hypertrophic obstructive cardiomyopathy", "Atrial septal defect (ostium secundum type)"], "correct": 1, "explanation": "The ECG shows resting sinus tachycardia (about 100 beats/min) with a single premature ventricular complex (PVC). Note the compensatory pause associated with the PVC. Peaked P waves, consistent with right atrial overload (�P pulmonale� pattern; P amplitude >2.5 mm tall in the inferior leads, with normal duration and with an inferior P wave axis) are present, along with relatively low limb lead voltage (also V1-V4) and slow R wave progression. This constellation of findings is consistent with an exacerbation of chronic obstructive lung disease (COPD). Slight non-specific ST-T changes are present.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case438/1350x900.gif", "_type": "mcq", "_caseId": 438}, {"question": "This ECG, from a 69-year-old woman, is most consistent with which ONE of the following clinical scenarios?", "options": ["Infective endocarditis of a mitral valve bioprosthesis", "Decompensated chronic obstructive pulmonary disease", "Acute anterior wall myocardial infarction", "Severe valvular aortic stenosis", "Atrial septal defect, previously undiagnosed"], "correct": 0, "explanation": "The ECG shows marked sinus tachycardia (about 130 beats/min) at rest, consistent with neuroautonomic activation. A key clue is related to the large (notched in multiple leads and predominantly negative in V1) P waves. These P waves (previously referred to as �P mitrale�) are consistent with marked left atrial abnormality/enlargement. The only diagnosis listed that would account for the sinus tachycardia and left atrial overload is infective endocarditis/sepsis associated with a mitral valve bioprosthesis. The ECG also shows non-specific ST-T changes and relatively low limb lead voltage. Atrial septal defects are usually associated with right ventricular conduction delays. The S1Q3 pattern here with the sinus tachycardia is a non-specific finding but raises a question of pulmonary embolism (not present).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case439/1350x900.gif", "_type": "mcq", "_caseId": 439}, {"question": "This ECG from a middle-aged woman brought to the Emergency Department having been found comatose is most consistent with which ONE of the following diagnoses?", "options": ["Hypercalcemia", "Tricyclic overdose", "Subarachnoid hemorrhage", "Hyperkalemia", "Hyperglycemia with diabetic ketoacidosis"], "correct": 2, "explanation": "The ECG shows sinus rhythm at about 85/min. Artifact is present, which in some leads mimics a premature ventricular complex . The most notable findings are prolongation of QT/QTc (460/484msec, by Hodges formula) and somewhat prominent positive anterior T waves. Brain imaging studies showed a massive subarachnoid hemorrhage (SAH). Serum potassium at the time was normal. While the classic ECG associated with intracranial bleeds consists of prominent T wave inversions, with a long QTc and often sinus bradycardia (~CVA T wave pattern~), broad upright T waves with QT prolongation have also been reported. The mechanism of the long QTc in SAH is uncertain; sympathetic nervous system hyperactivity has been suggested. Some patients develop torsade(s) de pointes. An extensive literature exists on proposed cerebro-cardiac connections and ECG findings in various CNS diseases. Hypercalcemia shortens the QTc. Tricyclic overdose may prolong the QTc and the QRS, but is usually associated with sinus tachycardia. Neither hyperkalemia (tall, narrow T waves with a wide QRS in more advanced stages) nor severe hyperglycemia (changes usually related to serum potassium) account for the observed findings here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case440/1350x900.gif", "_type": "mcq", "_caseId": 440}, {"question": "A 48 year-old woman with a history of hypertension presents with palpitations. What does this ECG show?", "options": ["Atrial flutter (AFl) with variable block", "Atrial fibrillation (AF) with a rapid ventricular response", "AV nodal reentrant tachycardia (AVNRT)", "Multifocal atrial tachycardia (MAT)", "Sinus tachycardia with frequent atrial premature beats"], "correct": 1, "explanation": "The ECG shows atrial fibrillation (AF) with a rapid ventricular response (average over 10 sec at rest of about 130/min; range about 100-165/min). AF with a rapid ventricular response is sometimes misdiagnosed as one of the other rhythms listed above. Fibrillatory waves may be hard to see at this ventricular rate. Furthermore, the fast ventricular rate, while still irregular, may be mistaken for a regular (�pseudo-regularized�) narrow-complex tachycardia (e.g., AVNRT). On the other hand, AF is sometimes overcalled (false positive diagnosis). See for example: J Electrocardiol 2007; 40:450-456. Both types of error can have very serious consequences.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case441/1350x900.gif", "_type": "mcq", "_caseId": 441}, {"question": "This ECG from an elderly man with dementia is diagnostic of which ONE of the following conditions?", "options": ["Hypercalcemia", "Tricyclic overdose", "Subarachnoid hemorrhage", "Mitral stenosis", "Hyperkalemia"], "correct": 4, "explanation": "The ECG shows sinus rhythm at about 65/min. The PR interval is slightly prolonged. ECG findings of left atrial abnormality (LAA) and probable left ventricular hypertrophy (LVH) are present. There is an intraventricular conduction delay with marked left axis deviation (LVH; the latter consistent with left anterior fascicular block; LAFB). The q wave in V2 raises the possibility of prior antero-septal infarction, but may be associated with LAFB. The delayed precordial transition is non-diagnostic. Most striking are the tall, narrow-based (�peaked�) T waves typical of hyperkalemia The wide QRS may also be related to this finding. The serum potassium was markedly elevated at 8.7mEq/L in the setting of renal insufficiency, dehydration and angiotensin-receptor blockade use for hypertension. Prior echocardiograms confirmed LAA and concentric LVH, but showed normal LV systolic function. Treatment of the hyperkalemia was associated with normalization of the QRS duration with persistent left axis deviation and with normalization of the PR interval.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case442/1350x900.gif", "_type": "mcq", "_caseId": 442}, {"question": "This ECG, from a young adult, is consistent with which ONE of the following diagnoses?", "options": ["Left bundle branch block", "Sinus node dysfunction", "Brugada pattern", "Wolff-Parkinson-White (WPW) pre-excitation pattern", "Systemic hypothermia"], "correct": 3, "explanation": "The ECG shows prominent sinus arrhythmia (probably respiratory, a common finding in young adults), as well as two atrial premature beats (APBs). The PR is very short in the sinus beats and the QRS is prolonged, with a classic delta wave (positive in V1-V3, lead II, etc). The overall QRS axis is horizontal (+25 degrees or so), but not frankly leftward. These findings are consistent with WPW pre-excitation from a right-sided bypass tract. The first APB does not show pre-excitation, probably because it originates in the low left atrium (negative P~ in aVL), close to the AV node, and also conducts during a period of decreased vagal tone (note the relatively increased heart rate during inspiration). These factors would enhance the likelihood of predominant nodal vs. bypass tract conduction. The second APB does conduct with some degree of pre-excitation. This beat has a shorter coupling interval compared to that betwen the prior sinus beat with the previous APB and occurs during a period of increased vagal tone modulation (consistent with the expiratory phase of breathing), as inferred from the longer R-R intervals. Both factors would tend to increase AV nodal delay and favor conduction down the bypass tract. The patient had syncope, which by history sounded vaso-vagal/orthostatic, not arrhythmogenic in origin. Referral to cardiology was made for further assessment of possible WPW-related tachyarrhythmias (i.e., the WPW syndrome, not just the pattern).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case443/1350x900.gif", "_type": "mcq", "_caseId": 443}, {"question": "This ECG, from a 68 year old man with dyspnea, is most consistent with which ONE of the following diagnoses?", "options": ["Chronic obstructive pulmonary disease (COPD)", "Anterior wall myocardial infarction (AWMI)", "Mitral valve stenosis", "Pericardial tamponade", "Left pneumothorax"], "correct": 0, "explanation": "The ECG shows baseline artifact with resting sinus tachycardia (about 100/min) and a single atrial premature beat that is conducted with aberrancy. The sinus P waves are very tall and peaked (about 3mm in lead II), consistent with right atrial abnormality (�P pulmonale� sign). The P wave axis is relatively rightward (+85 degrees) and the QRS axis is vertical at about +75 degrees, but without frank right axis deviation. R wave progression is slow (rS complexes in V1-V3) and the QRS voltages are relatively low diffusely. This combination of findings is most consistent with the clinical diagnosis (by s=history, physical, pulmonary function testing and chest radiography) of severe chronic obstructive pulmonary disease (COPD), associated with pressure overload of the right side of the heart. Echocardiogram confirmed increased pulmonary artery pressures (estimated at 37mmHg) as well as right ventricular (RV) dilation and decreased RV systolic function. Right atrial size was not increased, however, and left atrial size was normal, as was left ventricular systolic function.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case444/1350x900.gif", "_type": "mcq", "_caseId": 444}, {"question": "Elderly woman with an irregular pulse. What is the rhythm? What other abnormalities are present.", "options": ["Paroxysmal supraventricular tachycardia (PSVT)", "Sinus tachycardia with atrial ectopy", "Multifocal atrial tachycardia", "Atrial flutter with variable block", "Atrial fibrillation"], "correct": 4, "explanation": "The ECG shows baseline artifact (simulating a premature ventricular complex at the end of the recording). The rhythm is atrial fibrillation with a relatively rapid ventricular response at rest (mean about 100/min; range about 85 to 125/min). A complete right bundle branch block (RBBB) is present. The QRS voltage is relatively low diffusely. Non-specific ST-T changes are present. Note that the fibrillatory waves are relatively �fine� (low amplitude and high frequency) and may be missed entirely. At times higher amplitude �f� waves simulate sinus P waves. The ventricular rate may look regular at first glance, but if you measure the R-R intervals carefully, beat-by-beat, they are always changing. AF is one of the most commonly over- and under-diagnosed major arrhythmias.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case445/1350x900.gif", "_type": "mcq", "_caseId": 445}, {"question": "Middle-aged woman with a rapid pulse rate What is this arrhythmia? What other abnormalities are present?", "options": ["Paroxysmal supraventricular tachycardia (PSVT)", "Sinus tachycardia with atrial ectopy", "Multifocal atrial tachycardia (MAT)", "Atrial flutter", "Atrial fibrillation"], "correct": 4, "explanation": "The ECG shows atrial fibrillation (AF; recurrent and paroxysmal in this patient) with a moderately rapid ventricular response at rest (mean about 104/min; range about 80 to 150/min). An intraventricular conduction delay (IVCD) is present with left axis deviation. Voltage criteria for LVH are present, along non-specific ST-T changes, slow initial �r� wave progression and a delayed precordial transition zone. Transthoracic echocardiogram showed findings consistent with hypertrophic cardiomyopathy (asymmetric septal hypertrophy) without an outflow gradient at rest or during the Valsalva maneuver. Left atrial enlargement was present. History was also notable for hypertension and obstructive sleep apnea, which also both predispose to atrial fibrillation. Note that at times the rhythm appears \"regular\" but actually is subtly erratic upon more careful inspection. (Try moving your caliipers or the equivalent, using the distance between every other or every third QRS as a template, looking for a pattern.) The atrial (f) waves are seen in lead II, varying morphology and rate, with short cycle lengths of 200 ms or less. Some of the fibrillatory (f) waves also mimic true P waves. Mistaking AF with a rapid ventricular response (because of hard to see f waves) for other rhythms, including sinus tachycardia, atrial flutter and MAT, is not uncommon.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case446/1350x900.gif", "_type": "mcq", "_caseId": 446}, {"question": "This ECG, from a middle-age man with dyspnea and recent hemodynamic collapse, is most consistent with which ONE of the following syndromes?", "options": ["Ischemic cardiomyopathy with apical-lateral infarction", "Hypertrophic cardiomyopathy", "Infiltrative cardiomyopathy due to cardiac amyloidosis", "Pulmonary hypertension with severe right heart overload", "Mitral valve stenosis"], "correct": 3, "explanation": "This highly unusual ECG shows resting sinus tachycardia at a rate of about 105/min. There is extreme QRS right axis deviation (about +165 degrees) The P waves are peaked (narrow and tall) in leads II, III and aVF with a relatively vertical P wave axis (+80 degrees) and negative, but narrow, prominent P waves in lead V1. The QRS is borderline prolonged 110 ms (RV conduction delay), with QR complexes in V1 and V2 and almost absent precordial initial R wave progression in V3-V6 (note: rS complex in V6). Limb lead voltage is borderline low and non-specific ST-T changes are present. In concert, these findings are most consistent with severe right heart overload (right atrial and right ventricular enlargement). The underlying cause was severe pulmonary hypertension (pulmonary artery systolic pressures from the echocardiogram were about 90mmHg) due to extensive and probably recurrent pulmonary emboli. The specific cause (chronic pulmonary emboli) of the pulmonary hypertension and right heart overload syndrome, however, cannot be inferred from the ECG alone. Note also that these ECG findings of marked right ventricular overload, while consistent with the clinical diagnosis of severe, sustained pulmonary hypertension, is not typical of a classic, single, acute episode of pulmonary emboli (see other cases at this site for examples of the latter). The absence of T wave inversions in the right to mid-chest leads is somewhat surprising given the diagnosis; but those in the inferior limb leads may be due to RV overload. The QR waves and in V1 and V2, and QS waves in I and aVL, and the very slow initial R wave progression represent a pseudo-infarct pattern due to severe RV dilation and hypertrophy. The constellation of signs right atrial overload, QR or qR-type waves in V1 and V2 and marked right axis deviation is a specific but not sensitive sign of right heart (pressure) overload. Note: the ECG does not show a classic complete right bundle branch block (RBBB) �there is a minimally widened QRS with QR, but not rSR� complexes, in V1 and V2. The extreme pathophysiologic perturbations were confirmed by echocardiogram and cardiac catheterization demonstrating RV pressure/volume overload. Left ventricular systolic function was normal. Due to hemodynamic collapse, the patient was initially supported with an RV-assist device.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case447/1350x900.gif", "_type": "mcq", "_caseId": 447}, {"question": "This ECG, from an elderly woman, is most consistent with which ONE of the following diagnoses?", "options": ["Hypokalemia", "Addison&apos;s disease", "Hypothyroidism", "Hypothermia", "Hypercalcemia"], "correct": 4, "explanation": "The ECG shows sinus rhythm at about 90/min with normal PR and QRS intervals. Visually, the ST segment looks abbreviated. Non-specific ST-T changes are present. Of particular note, the QTc interval, measured at its longest (e.g., in lead V4; 256ms) is only about 310 ms (Hodges formula). The lower limits of the QTc are not well-defined, but values less than 350ms, and certainly 330ms, are considered quite short. (Prior recordings had shown QTc values well within normal range.) The list of factors that shorten the QT at physiologic heart rates is itself quite limited, including: digitalis effect (but no characteristic \"scooping\" of the ST-T complexes here), hypercalcemia and hereditary short QT syndrome (a rare condition associated with various inherited channelopathies and susceptibility to ventricular arrhythmogenesis). This patient had metastatic lung cancer and a serum calcium of 14.9mg/dL, with normal blood magnesium and phosphate concentrations at the time of the ECG. Canny observers may note the slight PR segment deviations~up in aVR and down in most of the other leads. This finding, while non-diagnostic, in this context raises consideration of sub-clinical malignant pericarditis or even of tumor invasion of the atrium. However, the advanced metastatic disease here precluded pursuing further diagnostic work-up. The sensitivity of the ECG for hypercalcemia is highest for most elevated values and may be influenced by other abnormalities.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case448/1350x900.gif", "_type": "mcq", "_caseId": 448}, {"question": "This ECG, from a 68-year old man with advanced disease, is most consistent with which ONE of the following diagnoses?", "options": ["Chronic obstructive pulmonary disease (COPD)", "Hypertrophic cardiomyopathy (HCM)", "Atrial septal defect (secundum type)", "Mitral valve regurgitation (MR)", "Anterior myocardial infarction (MI)"], "correct": 0, "explanation": "This ECG is classic for severe COPD (emphysema). The recording shows: resting sinus tachycardia (105/min); peaked P waves with a vertical P wave axis, sometimes called the ~P pulmonale~ pattern (consistent with right atrial overload); relatively low limb lead voltage; a vertical to rightward QRS axis and very slow precordial R wave progression, with a markedly delayed precordial transition zone (RS complex in V6). These findings in COPD have been related to a combination of factors including: right heart pressure overload due to pulmonary hypertension, hyperinflation of the lungs and inferior displacement of the heart and diaphragm. Patients with COPD may show other ECG findings, not seen here, including right ventricular (RV) conduction delays, prominent T wave inversions in right-mid chest leads with rS complexes (formerly called the RV ~strain~), and atrial (e.g., unifocal and multifocal atrial tachycardia or atrial fibrillation) and ventricular tachyarrhythmias. Of note, since smoking is the most common cause of COPD and also a major risk factor for coronary artery disease (CAD), patients with COPD may have both conditions. In some cases of COPD, loss of precordial R wave progression can occur with either condition, singly or in combination. Therapy with beta-adrenergic stimulants may also play a role in provoking atrial and ventricular arrhythmias. Note this is the same patient, about one year later, whose ECG is recorded in Case 444.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case449/1350x900.gif", "_type": "mcq", "_caseId": 449}, {"question": "Why does this 68 year old man have palpitations?", "options": ["AV nodal reentrant tachycardia (AVNRT)", "Sinus tachycardia with atrial premature beats", "Atrial fibrillation (AF) with a rapid ventricular response", "Atrial flutter with variable block", "Multifocal atrial tachycardia (MAT)"], "correct": 2, "explanation": "The ECG shows atrial fibrillation (AF) with a rapid ventricular response at rest (average over 10 seconds of about 140/min and range of about 110-185/min). A single wide complex beat (probable premature ventricular complex) is present. Fibrillatory (f) waves are of low amplitude. The rapid ventricular response may give the false impression of regularity. Try measuring the distance between the first and third QRS complexes, then the second and fourth, and so on, to test the hypothesis that there is subtle, but definite irregularity in the ventricular response. Non-specific ST-T changes are present. The limb leads show borderline low QRS voltages (probably related to underlying emphysema).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case450/1350x900.gif", "_type": "mcq", "_caseId": 450}, {"question": "This ECG from a middle-aged man with a history of hypertension on atenolol who presented with complaint of dyspnea for several days. The findings are most consistent with which ONE of the following scenarios?", "options": ["Recurrent, extensive pulmonary emboli", "Acute/evolving antero-lateral myocardial infarction", "Aortic stenosis", "Pericarditis with a large effusion", "Mitral prolapse with flail leaflet and severe valvular regurgitation"], "correct": 0, "explanation": "This ECG shows sinus rhythm with left atrial abnormality (history of hypertension). The PR interval is at the upper limits of normal. The QTc is prolonged (476 msec) The differential diagnosis centers on choices A and B. The findings in support of A include: 1) a rightward QRS axis with an S1Q3T3 pattern, and 2) slow R wave progression and delayed precordial transition zone (V6), in concert with prominent precordial T wave inversions consistent with right ventricular (RV) overload (formerly called ~strain~). The absence of T wave inversions in leads I and aVL is against antero-lateral MI. The latter would also not account for the findings under item 1 above. Recent or evolving infarction was excluded by normal cardiac enzyme tests and the absence of focal, left ventricular wall motion abnormalities by transthoracic echocardiogram (TTE). Instead the TTE showed evidence of right ventricular dilation and dysfunction, as well as of right atrial enlargement and increased right atrial pressure. Concentric LVH and LA enlargement were noted as well, consistent with the prior history of systemic hypertension. Multiple pulmonary emboli were demonstrated on computerized tomographic angiography (CTA). Evidence of deep vein thrombosis (DVT) was shown by duplex Doppler studies of the lower extremities. The patient had had prolonged periods of relative inactivity recently during plane and car travel. Other notes: The absence of expected sinus tachycardia here may be due to the use of a beta-blocker (atenolol). The long QT could be a non-specific concomitant of prominent T wave inversions due to a right ventricular overload syndrome; the patient also had hypokalemia on admission (3.0 mEq/L).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case451/1350x900.gif", "_type": "mcq", "_caseId": 451}, {"question": "A 42 year-old man with a history of hypertension presented with recent vague chest discomfort. He had normal cardiac serum markers. This ECG was taken when the patient was asymptomatic. What is the most likely diagnosis?", "options": ["Evolving pericarditis", "Esophageal spasm", "Wellens&apos; syndrome (LAD T-wave pattern)", "Prinzmetal&apos;s variant angina", "Pulmonary embolism"], "correct": 2, "explanation": "This ECG shows sinus rhythm at a rate of about 66/min, with a single premature ventricular complex (PVC). The mean QRS axis is horizontal but not frankly leftward (about 0 degrees).Voltage criteria for left ventricular hypertrophy (LVH) are present, along with possible left atrial abnormality (see V1), not unexpected given the history of systemic hypertension. The QTc of about 440 msec near the upper limits of normal. The key findings are biphasic ST-T waves (ST elevations that are arched or bowed upward, followed by prominent, negative T waves) in anterior precordial leads V1-V4. These findings, especially in the context of anginal-type chest discomfort or other ischemic symptoms, are highly suggestive of a high-grade stenosis in the proximal segment of left anterior descending (LAD) coronary artery. The \"LAD-T wave pattern\" is also known as Wellens&apos; syndrome. Patients with this ECG finding are at very high risk of subsequent major, near-term anterior myocardial infarction. At cardiac catheterization and coronary angiography this patient was found to have an almost occluded, ostial LAD lesion, which was treated with angioplasty and stenting. Subsequent ECGs showed resolution of the T wave inversions. For aficionados (mavens), Wellens and colleagues suggested a sub-classification of this pattern into Types A and B based on repolarization morphology, depending on whether there was ST elevation preceding the T waves, as seen here (A) or an isoelectric or depressed ST segment (B). See their classic article in Am Heart J 103:730, 1982. However, to our knowledge, no clinical difference in these morphologic sub-types has been observed. T wave inversions may also be present in leads I and aVL with the LAD-T wave pattern, especially in concert with more extensive precordial changes.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case452/1350x900.gif", "_type": "mcq", "_caseId": 452}, {"question": "An elderly patient presents with fatigue. The ECG shows all of the following findings EXCEPT for which ONE?", "options": ["Sinus rhythm with blocked atrial premature beats (APBs)", "Underlying sinus rhythm with intermittent non-conducted P waves due to Mobitz II AV block", "Intermittent atrial escape beats following pauses", "~Left axis deviation with intermittent LBBB", "Left atrial abnormality (intra-atrial conduction delay)"], "correct": 0, "explanation": "The ECG shows sinus rhythm (with left atrial abnormality; see V1) and intermittent, abrupt non-conducted P waves consistent with Mobitz II (infranodal) AV block (not benign blocked APBs). The sinus P wave rate is about 75/min, while the average QRS (and hence, effective pulse) rate is about 50/min. In some instances, apparent atrial escape beats occur, evidenced by the change in P wave morphology. Intermittent LBBB (with left axis deviation) is also present. (Very slow r wave progression also raise consideration of underlying anterior MI.) The findings, consistent with severe infra-nodal disease (Mobitz II AV block and LBBB), are an indication for cardiac electrophysiologic (EP) assessment and likely immediate pacemaker implantation due to the high risk of abrupt complete heart block/ventricular asystole. There is also QTc prolongation (about 480 msec), raising question of drug effect or hypokalemia, particular. Slow r wave progression in the narrow QRS beats (e.g., V1-V3) is non-diagnostic. Transthoracic echocardiogram showed moderate calcific aortic stenosis and left atrial dilation. No regional wall motion abnormalities were noted and overall left ventricular systolic function was normal. Cardiac EP study confirmed intermittent infra-nodal block. A dual chamber pacemaker was implanted. The conduction disease here is likely related to sclerodegenerative pathology (fibrosis and calcification) due to advanced aging and/or involvement of the prox
