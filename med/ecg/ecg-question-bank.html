on of baseline artifact and sinus arrhythmia can mimic atrial fibrillation or other supraventricular arrhythmias. The phasic variation of sinus rate here (cyclically faster and slower) is due to respiration, and referred to as respiratory sinus arrhythmia (see Cases 217, 245 and 300).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case339/1350x900.gif", "_type": "mcq", "_caseId": 339}, {"question": "61 year old man with history of valvular heart disease and severe heart failure. The combination of ECG findings is most suggestive of which ONE of the following diagnoses?", "options": ["Hyperkalemia", "Digitalis toxicity", "Hypocalcemia", "Hyperthyroidism", "Ibutilide toxicity"], "correct": 1, "explanation": "The digoxin level was markedly elevated at 4.2ng/ml. The ECG shows atrial fibrillation (very fine fibrillatory waves) with a slow, regularized narrow QRS rate (possible junctional escape mechanism), with multiform ventricular bigeminy. In addition, the prominent precordial voltage with a vertical QRS axis (about +90 degrees) raises consideration of underlying biventricular hypertrophy (overload). Nonspecific ST-T changes are noted, along with low QRS voltage in the limb leads. Digitalis intoxication may have myriad presentations. The combination of atrial fibrillation with a slow, regularized response and ventricular ectopy is particularly suggestive. The ventricular ectopy in such cases may be related, at least in part, to digitalis-induced calcium overload and delayed afterdepolarizations, a distinct type of triggered-activity (Rosen MR. J Am Coll Cardiol 1985; 5A:22A).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case340/1350x900.gif", "_type": "mcq", "_caseId": 340}, {"question": "84 year old man on propafenone is admitted for knee replacement surgery. The ECG shows all of the following EXCEPT?", "options": ["Atrial fibrillation with a probable single premature ventricular complex (PVC)", "Left anterior fascicular block", "Prior anterolateral Q wave myocardial infarction", "Complete right bundle branch block (RBBB)", "Mild QT prolongation"], "correct": 2, "explanation": "This elderly man was taking propafenone for history of paroxysmal atrial fibrillation (PAF). The ECG shows AF with a single PVC (second to last beat of rhythm strip), along with evidence of bifascicular block (marked left axis deviation and right bundle branch block). The QT is slightly long for the rate on average, probably due to the wide QRS. Indeed, a notable finding here is that the QRS duration (about 180 ms) is wider than with the usual RBBB (typically 120-150 ms). This ~excess duration~ may be due to a number of factors, including Class 1 (sodium-channel blocking) or related drug effect (propafenone in this case), hyperkalemia, or severe myocardial disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case341/1350x900.gif", "_type": "mcq", "_caseId": 341}, {"question": "85 year old man admitted with shortness of breath and a �stable ECG� without change from previous month. Cardiac enzymes were negative. The ECG shows evidence of all of the following EXCEPT?", "options": ["Borderline sinus tachycardia", "Left anterior fascicular block", "Prior extensive anterior/lateral Q wave MI(s) with ST elevations consistent with left ventricular aneurysm", "Complete left bundle branch block (LBBB)", "First degree AV conduction delay (block)"], "correct": 3, "explanation": "This ECG shows sinus tachycardia at rate of about 100 bpm with marked left axis deviation consistent with left anterior fascicular block (QRS duration=0 .11 second). However, complete LBBB is NOT present. AV conduction is slightly prolonged (PR interval=0.22 second). There is virtually complete loss of R wave progression across the precordium with slight ST segment elevations, as well as Q waves in 1 and aVL. This patient had a long history of severe coronary artery disease, prior MIs and heart failure, with a markedly reduced left ventricular ejection fraction of 10-15%. Transthoracic echocardiogram showed severe global left ventricular wall motion disorder, with a very large apical ventricular aneurysm. The presence of pathologic Q waves and persistent ST elevations weeks to months after an MI is a relatively specific, but not sensitive sign of a left ventricular aneurysm. (A prominent R wave in lead aVR, as present here, has also been reported with this condition, probably due to left anterior fascicular block combined with loss of apico-lateral QRS forces. Another ECG sign of ventricular aneurysm, not seen here, is an rSr' pattern in left-sided leads.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case342/1350x900.gif", "_type": "mcq", "_caseId": 342}, {"question": "Middle aged man with palpitations, a history of coronary artery disease and the following ECG. What is the diagnosis?", "options": ["Atrial fibrillation with Ashman mechanism", "Sinus tachycardia with right bundle branch block", "Right ventricular hypertrophy", "Atrial flutter with right bundle branch block", "Monomorphic ventricular tachycardia"], "correct": 4, "explanation": "The ECG shows a relatively regular, very wide-complex tachycardia with a heart rate of 130/min and a QRS duration of about 180 ms. The QRS morphology is that of a right bundle branch block (RBBB) with a qRSR′ in V1, rS in V6 and a marked rightward axis. Underlying atrial activity is hard to discern with certainty but may be sinus with AV dissociation. These factors indicate ventricular tachycardia which was confirmed at cardiac electrophysiology study. A left ventricular tachycardia intramyocardial focus (associated with this ECG pattern) localized below the anterior papillary muscle was successfully eliminated with radiofrequency ablation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case343/1350x900.gif", "_type": "mcq", "_caseId": 343}, {"question": "90 year old female admitted with increased shortness of breath who ruled out for acute myocardial infarction. The ECG shows which ONE of the following?", "options": ["Sinus rhythm with AV Wenckebach (Mobitz I block)", "Sinus rhythm with isorhythmic A-V dissociation", "Sinus rhythm with normal AV conduction and ventricular bigeminy", "Sinus rhythm with second degree (Mobitz II) AV block", "Sinus rhythm with complete (third degree) AV heart block and ventricular premature complexes"], "correct": 4, "explanation": "This ECG shows underlying sinus mechanism with an atrial rate of about 88 beats per minute and a narrow complex junctional escape rate of less than 55/min with variable PR intervals due to probable complete AV heart block. In addition, there are multiform premature ventricular complexes. The supraventricular beats show a narrow QRS complex and a long QT with nonspecific ST-T changes. The patient underwent successful implantation of a dual-chamber pacemaker for presumed intrinsic, degenerative conduction disease, with high grade AV block. See Case 243 for a comparison of an ECG with isorhythmic AV dissociation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case344/1350x900.gif", "_type": "mcq", "_caseId": 344}, {"question": "76 year old man with a history of chronic heart failure. What is the rhythm?", "options": ["Atrial fibrillation (AF) with  right ventricular pacing", "Atrial flutter with high degree AV block and left bundle branch block (LBBB)", "Atrial tachycardia with high degree AV block", "Junctional bradycardia with LBBB", "Sinus bradycardia with AV sequential pacing"], "correct": 0, "explanation": "This ECG shows underling atrial fibrillation (AF) with ventricular pacing at 45 beats per minute. The pacemaker is programmed in the VVI mode due to the underlying AF with a slow intrinsic ventricular rate. The patient has a long history of coronary artery disease with congestive heart failure and chronic atrial fibrillation. The ST-T abnormalities are non-diagnostic in the presence of the paced ventricular rhythm (medications also included digoxin). The paced QRS complexes have the anticipated left bundle-branch block morphology due to the right ventricular site of pacing. (This case predated the era of biventricular pacing which is now employed in some cases of congestive heart failure where a pacemaker is needed.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case345/1350x900.gif", "_type": "mcq", "_caseId": 345}, {"question": "Elderly female admitted with dementia and mild congestive heart failure. What is the rhythm?", "options": ["Multifocal atrial tachycardia (MAT)", "Sinus tachycardia with marked sinus arrhythmia", "Atrial fibrillation", "Atrial flutter with variable block", "AV nodal reentrant tachycardia (AVNRT)"], "correct": 0, "explanation": "This ECG shows multifocal atrial tachycardia (MAT) at an average rate about 106 bpm. There are three or more consecutive non-sinus P waves present on the lead II rhythm strip at a rapid rate. Of interest, the ECG also shows right bundle branch block (RBBB) with marked right axis deviation. The differential diagnosis centers on right ventricular (RV) overload vs. RBBB with left posterior fascicular block. (The latter requires clinical exclusion of other causes of right axis deviation, especially RV overload and lateral infarction.) Left atrial abnormality and non-specific ST-T changes were noted. The patient refused an echocardiogram. MAT is most commonly seen in context of chronic obstructive pulmonary disease or congestive heart failure of various causes. The arrhythmia may be precursor of atrial fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case346/1350x900.gif", "_type": "mcq", "_caseId": 346}, {"question": "Pre-operative ECG from a 26 year-old female. What is the diagnosis?", "options": ["Left bundle branch block (LBBB)", "Left ventricular hypertrophy (LVH)", "Accelerated idioventricular rhythm (AIVR)", "Wolff-Parkinson-White (WPW)  pattern", "Wandering atrial pacemaker with intraventricular conduction delay (IVCD)"], "correct": 3, "explanation": "This ECG shows a classic Wolff-Parkinson-White (WPW) pre-excitation pattern. The key triad of findings includes: a short PR interval, a wide QRS complex and delta waves (notching or slurring of the initial portion of the QRS). Slightly positive delta waves in V1-V3 with a left bundle branch block-appearing morphology most likely indicate a right-sided bypass tract. A prominent physiologic sinus arrhythmia (normal finding) is also noted. Please see Case #218 and other related cases for more information about WPW patterns", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case347/1350x900.gif", "_type": "mcq", "_caseId": 347}, {"question": "54 year-old male status post mitral valve replacement with complaint of palpitations. What is the rhythm?", "options": ["Sinus tachycardia", "Paroxysmal supraventricular tachycardia (PSVT), probable atrial tachycardia", "Atrial flutter", "Multifocal atrial tachycardia (MAT)", "Atrial fibrillation (AF)"], "correct": 1, "explanation": "This ECG shows a regular paroxysmal supraventricular tachycardia (PSVT) at rate of 160 beats per minute with apparent positive P waves in lead II superimposed on the preceding T waves, suggesting atrial tachycardia with 1:1 AV conduction. There is borderline left axis deviation and non-specific ST-T wave changes. Very deep S waves in the right-mid precordial leads raise strong consideration of underlying left ventricular hypertrophy. See also Case # 222 The patient was treated with adenosine without change in rhythm, and then was given intravenous verapamil, unmasking atrial tachycardia with variable AV conduction. He was treated successfully with radiofrequency (RF) ablation of a high right atrial focus during a cardiac electrophysiology procedure. There are no atrial flutter (F) waves and the regularity of the R-R intervals excludes atrial fibrillation or MAT. The very high resting rate is strongly against sinus tachycardia in a subject of this age.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case348/1350x900.gif", "_type": "mcq", "_caseId": 348}, {"question": "51 year-old female with increasing shortness of breath. With which ONE of the following diagnoses is this ECG most consistent?", "options": ["Severe mitral stenosis", "Pericardial effusion/tamponade", "Chronic obstructive pulmonary disease (COPD)", "Myxedema", "Severe aortic stenosis"], "correct": 2, "explanation": "This ECG shows sinus tachycardia at rate of about 106 bpm with two atrial premature beats (8th and 13th beat on lead II rhythm strip). Other notable findings include: right axis deviation, peaked P waves, a subtle right ventricular conduction delay and non-specific ST-T abnormalities in V1-V3, along with a delayed precordial transition zone. Borderline low limb lead voltage is also present. The combination of these findings is strongly suggestive of acute or subacute right heart overload with severe chronic obstructive pulmonary disease (COPD). See also Case # 77. Admission arterial blood gases on room air revealed severe hypoxemia and hypercapnea with respiratory acidosis: p02 of 52 Torr and a pC02 of 88 Torr with a pH of 7.30. The patient had a COPD decompensation, associated with probable aspiration pneumonitis. Note that as a point of possible confusion, the P waves are negative in lead V1, suggesting left atrial abnormality (or biatrial abnormality). The latter cannot be excluded. However, it is important to recognize that pure right atrial overload (abnormality) can be associated with prominent negative and usually narrow P waves (a type of \"pseudo-LAA\" pattern). This finding is most likely to occur when the right atrium lies under the exploring V1 electrode, so that the depolarization forces are oriented away from that locus. Leads II, III, aVF, e.g., should show tall peaked (but not broad) P waves typical of RAA.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case349/1350x900.gif", "_type": "mcq", "_caseId": 349}, {"question": "A 76 year old man was seen in the emergency department after an episode of chest pain at home. What is the rhythm?", "options": ["Sinus rhythm with 2:1 AV block", "Sinus rhythm with non-conducted atrial premature beats in a bigeminal pattern", "Atrial tachycardia with 2:1 block", "Sinus bradycardia with prominent U waves", "Sinus rhythm with complete (third degree) heart block"], "correct": 0, "explanation": "This ECG shows sinus rhythm (P wave rate is 90/min) with 2:1 AV block with a ventricular rate of 45/min. Prolonged AV conduction (PR interval of 280 milliseconds) in the conducted beats suggests a nodal mechanism, although the QRS duration is somewhat wide (110-120 milliseconds), also raising question of infranodal block. There is left atrial abnormality and left ventricular hypertrophy (LVH). Prominent anterolateral T wave inversions are noted, raising consideration of ischemia/myocardial infarction (MI) superimposed on the LVH pattern. The QT interval is borderline prolonged for the rate. The patient, in fact, ruled in for a non-Q-wave MI. He underwent cardiac catheterization and was found to have multiple coronary artery lesions with a reduced left ventricular ejection fraction of 45 percent. Because of multiple co-morbid conditions, he was not a candidate for coronary artery bypass graft surgery and was treated medically. Subsequent ECGs showed intermittent AV Wenckebach, indicating that the 2:1 AV block here was nodal in origin.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case350/1350x900.gif", "_type": "mcq", "_caseId": 350}, {"question": "90 year old woman with sepsis and multiple ECG abnormalities. All of the following are present EXCEPT:", "options": ["Complete left bundle branch block (LBBB)", "Sinus tachycardia", "Left atrial abnormality", "Peaked T waves in leads V1-2  raising question of hyperkalemia (and/or ischemia)", "Right axis deviation"], "correct": 4, "explanation": "This ECG shows sinus tachycardia at a rate of 109 beats per minute with a complete left bundle branch block (QRS duration 140 milliseconds), left atrial abnormality and probable left ventricular hypertrophy. The sharply peaked and narrow (~tented~) T waves in leads V1-V2 raise the question of hyperkalemia and/or ischemia. The prominent lateral ST depressions in this context are non-diagnostic but could also relate to ischemia with left bundle branch block. The axis is leftward, not rightward. The patient ruled in for myocardial infarction with creatine kinase (CK) of 298 and elevated MB fraction of 9.4. Cardiac catheterization revealed severe 3-vessel disease, not amenable to angioplasty. Serum potassium was 7.2 mEq/L at the time of this ECG. The notching (fractionation) of the the ascending limb of the S wave in lead V4 (V3-V5, more generally) in complete LBBB has been reported as a sign (low sensitivity) of underlying myocardial scarring (Cabrera&apos;s sign).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case351/1350x900.gif", "_type": "mcq", "_caseId": 351}, {"question": "80-year old woman with a history of chronic bronchiectasis, as well as mitral regurgitation. Note that right precordial leads (V1R-V6R) are obtained here. This scenario is most consistent with which of the following diagnoses?", "options": ["Systemic hypothermia", "Acute right ventricular infarction", "Parkinson~s disease with artifact simulating atrial fibrillation", "Kartagener~s syndrome", "Wolff-Parkinson-White with atrial fibrillation and a left lateral wall bypass tract"], "correct": 3, "explanation": "The ECG shows atrial fibrillation (not artifact) with an average ventricular rate of about 96/min. Of note is the apparent marked right deviation with Q waves in I and aVL, but surprisingly with a left ventricular hypertrophy (LVH) pattern in the chest leads. However, the question notes that the chest leads are actually obtained in the V1R-V6R position, so the patient must have underlying situs inversus with dextrocardia. The limb leads here are not ~corrected~ (i.e., reversed), so they show the typical appearance with dextrocardia/situs inversus. The atrial fibrillation makes this more difficult since an abnormally rightward P wave vector (negative in lead I) is not discernible. The marked discordance between leads I and V6 is also unusual. You can visualize the limb leads as they would appear if the right and left arm/leg electrodes were reversed to correct for the situs inversus: lead I would be equivalent to negative lead I; leads II and III would be reversed; aVR and aVL would be switched and aVF would be nearly the same. So the limb leads actually show a horizontal/leftward axis. The history of chronic sinusitis with dextrocardia/situs inversus is consistent with the diagnosis of Kartagener~s syndrome, marked by the triad of dextrocardia/situs inversus (which by itself is benign) with chronic bronchiectasis and sinusitis, the latter two a result of ciliary dysfunction. The LVH here is not related to the Kartagener~s syndrome but was due to underlying hypertensive heart disease and mitral regurgitation.(See: Lillington GA. Clin Rev Allergy Immunol 2001; 21: 65-9.)~~~~ ~~~~~~ ~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case352/1350x900.gif", "_type": "mcq", "_caseId": 352}, {"question": "40 year-old female with chronic (permanent) atrial fibrillation. This ECG is most consistent with which ONE of the following major diagnoses?", "options": ["Severe aortic stenosis (AS)", "Severe mitral regurgitation (MR)", "Acute anterior myocardial infarction", "Chronic pulmonary disease (cor pulmonale syndrome)", "Tetralogy of Fallot"], "correct": 3, "explanation": "This ECG shows atrial fibrillation with an average ventricular response rate of about 55 bpm. Slow R wave progression waves in V1-V4, with right precordial T wave inversions, diffuse low voltage and right axis deviation are most consistent with right ventricular overload secondary to severe pulmonary disease. The clinical diagnoses included morbid obesity, pulmonary hypertension and severe pulmonary disease with respiratory failure. In contrast, right ventricular hypertrophy with tetralogy of Fallot (pulmonic stenosis) is associated with tall R waves in the right precordial leads.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case353/1350x900.gif", "_type": "mcq", "_caseId": 353}, {"question": "A 63 year-old man with chest discomfort beginning 3 days ago. The ECG is most consistent with of which ONE of the following?", "options": ["Acute (focal) pericarditis", "Lead reversal (left right/arm) with normal variant", "Recent pulmonary embolism", "Mitral stenosis", "Evolving lateral myocardial infarction (MI)"], "correct": 4, "explanation": "Borderline sinus rhythm is present at rate of about 57/min. The QRS axis is borderline rightward at about +95 degrees), associated with pathologic QS waves in lead I and aVL (or minuscule r waves in latter). Slight T wave inversions are also present in leads I and aVL (as well as in V2). (The rSr' in V1 with normal QRS duration is non-diagnostic.) Cardiac enzymes were elevated and coronary angiography showed total occlusion of small diagonal branch, treated with angioplasty. Echocardiogram the following day showed hypokinesis of the mid-distal anterior wall. Note that the rightward QRS axis here is due to loss of lateral forces with MI, not due to right ventricular overload or left posterior fascicular block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case354/1350x900.gif", "_type": "mcq", "_caseId": 354}, {"question": "A 51 year-old man with prolonged chest discomfort and dyspnea is transferred from a local hospital. The ECG is diagnostic of which ONE of the following?", "options": ["Acute pericarditis", "Acute anterior ST elevation/Q wave myocardial infarction", "Acute pulmonary embolism", "Left bundle branch block", "Acute left pneumothorax"], "correct": 1, "explanation": "Sinus rhythm is present at rate of about 78/min with relatively low voltage diffusely. The most notable findings are Q waves V2-V3 (normal QRS duration) with abnormal ST elevations most apparent in leads I, aVL, V2-V6. Emergency cardiac catheterization revealed multivessel coronary disease with a presumed �culprit� total occlusion of the mid-portion of the left anterior descending coronary artery after the first diagonal branch and main septal perforators. The patient underwent successful coronary angioplasty for this ST elevation/evolving Q wave MI. Algorithms to precisely localize the site of LAD occlusion from the surface ECG have been proposed but are necessarily limited in unselected cases by the presence of multivessel disease, collateral flow, ventricular conduction disturbances and time varying changes in perfusion and infarct evolution. In general, the absence of prominent ST elevation in V1,as in the present case, is against occlusion of the LAD proximal to the main septal perforator system.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case355/1350x900.gif", "_type": "mcq", "_caseId": 355}, {"question": "Elderly woman with e.coli sepsis and an irregular, fast pulse. The ECG shows a number of abnormalities. What arrhythmia is present?", "options": ["Sinus tachycardia with SA exit block", "Atrial fibrillation (AF)", "Multifocal atrial tachycardia (MAT)", "AV nodal reentrant tachycardia (AVNRT)", "Atrial tachycardia (unifocal) with block"], "correct": 2, "explanation": "Runs of multifocal atrial tachycardia (MAT) are present (probably with intermittent sinus beats). Low voltage QRS complexes are also noted with slow R wave progression (V1-V2). These findings could all be due to chronic obstructive pulmonary disease, although underlying anteroseptal myocardial infarction is not excluded. Other important causes of diffusely low voltage include pericardial effusion (not present by echocardiogram here) and anasarca. See also Case 346.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case356/1350x900.gif", "_type": "mcq", "_caseId": 356}, {"question": "67 year-old male with a history of idiopathic cardiomyopathy and atrial septal defect, with congestive heart failure. What is the rhythm?", "options": ["Atrial tachycardia with 1:1 conduction", "Atrial flutter with 2:1 conduction", "Sinus tachycardia", "Atrial fibrillation (AF)", "Multifocal atrial tachycardia (MAT)"], "correct": 1, "explanation": "This ECG shows typical atrial flutter (negative flutter waves in lead II) with 2:1 AV conduction. The ventricular rate is about 135/min with an atrial rate of 270/min (every other flutter wave is partly hidden in the QRS). Marked right axis deviation, an intraventricular conduction delay (IVCD) and slow R wave progression are also present. The triad of relatively low limb lead voltage, slow R wave progression and relatively prominent precordial voltage noted here has been reported with cardiomyopathy syndromes. Atrial tachycardia, sinus tachycardia and multifocal atrial tachycardia are ruled out as there are no discrete P waves. The atrial rate of 270/min with negative atrial waves in lead II confirms atrial flutter. See also Cases # 129 and 275. Echocardiogram showed a dilated left ventricle with severe global dysfunction and moderate right ventricular dysfunction. Mitral annular calcification was noted with mild to moderate mitral regurgitation. A secundum type atrial septal defect with significant left to right flow at rest was also noted.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case357/1350x900.gif", "_type": "mcq", "_caseId": 357}, {"question": "ECG from a 30-year old woman shows sinus rhythm and which ONE of the following?", "options": ["No abnormality (within normal limits)", "Left ventricular hypertrophy", "Right ventricular hypertrophy", "Right bundle branch block", "Left bundle branch block"], "correct": 0, "explanation": "This ECG is entirely within normal limits. The rhythm is sinus at a rate of about 70 bpm. The basic intervals are as follows: PR 0.13s; QRS duration 0.07s, and QT interval 0.38s--all within normal limits. The mean QRS axis is about +30 degrees. The P wave morphology and duration are normal. There is no evidence of left or right ventricular hypertrophy. R wave progression is normal in the chest leads and the T wave axis in the frontal and horizontal planes is normal. ST segments are normal. Note is made that a normal resting (or even exercise) ECG does not exclude underlying clinically important cardiac pathology or intermittent arrhythmias.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case358/1350x900.gif", "_type": "mcq", "_caseId": 358}, {"question": "57 year-old man with complaints of palpitations, dyspnea and a systolic murmur. What does the ECG show?", "options": ["Atrial fibrillation with Ashman beats", "Sinus rhythm with intermittent Wolff-Parkinson-White pattern", "Sinus rhythm with atrial premature beats (APBs) with aberration", "Sinus rhythm with intermittent right bundle branch block (RBBB)", "Sinus rhythm with frequent ventricular premature beats (VPBs)"], "correct": 4, "explanation": "This ECG shows sinus rhythm at a rate about 96 bpm with prominent left atrial abnormality (see V1). There are frequent isolated VPBs (right bundle branch block morphology consistent with left ventricular origin) in a bigeminal pattern and also 2 ventricular couplets. The patient had a history of mitral valve prolapse with chronic mitral regurgitation. A repeat echocardiogram revealed severe mitral regurgitation and a partially flail posterior leaflet secondary to a ruptured chorda tendinea. Cardiac EP study did not indicate inducible sustained ventricular tachycardia. Mitral valve surgery was scheduled.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case359/1350x900.gif", "_type": "mcq", "_caseId": 359}, {"question": "30 year-old woman with an intermittently irregular pulse and no other symptoms or cardiac history. This ECG showing underlying sinus rhythm is most consistent with which ONE of the following additional diagnoses to account for the non-conducted P waves?", "options": ["AV Wenckebach", "Mobitz II AV block", "Blocked atrial premature beats", "Concealed junctional/His extrasystoles with pseudo-AV block", "SA exit block"], "correct": 3, "explanation": "The ECG shows sinus rhythm at about 80min. The P waves are slightly peaked but not are diagnostic of right atrial overload. The 5th and 6th beats comprise a premature couplet with an aberrant morphology, followed by 2 sinus beats and then a single non-conducted P wave. The PR intervals of the conducted P waves are constant, ruling out classical AV Wenckebach. (SA exit block does not cause non-conducted P waves.) The non-conducted P wave also comes �on time,� excluding a premature atrial beat and there is no preceding sinus slowing. The diagnosis of Mobitz II block is suggested by the abrupt non-conducted P wave. However, its occurrence in the context of a narrow QRS complex and the preceding manifest premature beats is strongly suggestive of a concealed His/junctional extrasystole mechanism causing pseudo-AV block. The patient underwent 24 hr Holter monitoring which showed underlying sinus rhythm with frequent supraventricular and ventricular premature beats, one ventricular couplet and no ventricular tachycardia or AV Wenckebach. Frequent non-conducted P waves were noted with a narrow QRS, again supporting a concealed His/junctional extrasystole-type mechanism rather than true Mobitz II (infranodal) AV block. For a superb, critical review of AV block and its variants and simulators, see: Barold SS and Hayes DL, Mayo Clin Proc 2001; 76:44-57.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case360/1350x900.gif", "_type": "mcq", "_caseId": 360}, {"question": "Elderly woman admitted for peripheral vascular surgery is noted to have an irregular pulse. She has a history of severe coronary disease and an ICD/pacemaker device. The ECG is most consistent with which ONE of the following diagnoses?", "options": ["Hypokalemia", "Digoxin excess", "Hypocalcemia", "Intermittent WPW pre-excitation", "Atrial fibrillation with complete heart block"], "correct": 1, "explanation": "The ECG shows borderline sinus bradycardia (the P wave rate is about 60/min) with intermittent AV block and with electronic ventricular pacemaker escape beats (VVI at 40/min, with very low amplitude pacing spikes). Ventricular premature beats are also present. The QT interval in the supraventricular beats is short/normal and there are non-specific ST-T changes consistent with digitalis effect, left ventricular hypertrophy, ischemia, etc. Note: the scooping of the ST-T complex may be due to �digitalis effect� and does not necessarily indicate �digitalis excess.� The latter term relates to certain brady- and tachyarrhythmias and constitutional symptoms (e.g., visual changes, nausea, and even dementia) associated with digitalis toxicity. The diagnosis of digitalis excess in this case is suggested by the AV block in conjunction with ventricular ectopy and evidence of digitalis-related repolarization effects. The initial digoxin levels were elevated (up to 3.6ng/ml). Also note: the pacing appears to be a single lead ICD since it is not pacing the atrium. The programming is VVI 40, which is standard single lead ICD bradycardia programming to minimize the adverse effects of ventricular pacing (Dual-Chamber Pacing or Ventricular Backup Pacing in Patients With an Implantable Defibrillator: The Dual Chamber and VVI Implantable Defibrillator (DAVID) Trial JAMA 2002;288:3115-3123) in patients who do not have pacemaker indications at the time of the implant.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case361/1350x900.gif", "_type": "mcq", "_caseId": 361}, {"question": "This ECG, from an 80 year-old woman, shows sinus rhythm with which of the following?", "options": ["Acute inferior (posterior) ST elevation ischemia with ventricular bigeminy", "Acute pericarditis with ventricular bigeminy", "Wolff-Parkinson-White pattern with intermittent pre-excitation", "Intermittent right bundle branch block with alternating left and right axis deviation", "Intermittent ventricular pacing"], "correct": 0, "explanation": "This ECG shows sinus rhythm with ventricular premature beats (VPBs) in a bigeminal pattern. The VPBs have a right bundle branch/superior axis configuration, consistent with a left ventricular/inferior wall origin. The sinus conducted QRS complexes show inferior ST segment elevations with probable reciprocal ST segment depressions in leads 1 and aVL and V2-V3. The sinus beats also show right axis deviation raising consideration of left posterior fascicular block (no evidence of right ventricular hypertrophy by echocardiogram). Lateral ST depressions are also seen in leads V5/V6 consistent with ischemia in this zone. Low limb lead voltage and delayed precordial transition zone, which are non-specific findings, are present. The patient had an acute STEMI coronary syndrome with multi-vessel coronary disease at angiography including several 80-90~ lesions in the dominant right coronary artery. Overall left ventricular systolic function was preserved. She underwent urgent coronary artery bypass graft surgery.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case362/1350x900.gif", "_type": "mcq", "_caseId": 362}, {"question": "A young adult man with chest discomfort and dyspnea presents to the emergency ward. The ECG is diagnostic of which ONE of the following?", "options": ["Acute pericarditis", "Acute anterior ST elevation myocardial infarction", "Acute pulmonary embolism", "Early repolarization (normal) variant", "Brugada pattern"], "correct": 0, "explanation": "Borderline sinus tachycardia is present at rate of about 95/min. Precordial voltage is prominent. The ECG shows classic findings for acute pericarditis with diffuse (leads I, II, III, aVL, aVF, V2-V6) upsloping ST segment elevations and concomitant PR segment deviations (up in aVR and down in other leads that show ST depressions). Clinically, the patient had recurrent pericarditis, with an acute exacerbation or recurrence. He also had pericardial effusion, without tamponade physiology on the day of this ECG but with right ventricular collapse noted on the following day. Echocardiogram also showed a moderate pericardial effusion. He underwent pericardiocentesis and subsequently a subtotal pericardiectomy (�pericardial stripping�) procedure for his idiopathic pericardial inflammatory syndrome. The prominent precordial voltage here is non-diagnostic in a young adult male. The patient did have hypertension and concentric left ventricular hypertrophy. The only ECG evidence for hemodynamic compromise is the borderline resting tachycardia. Low voltage and electrical alternans are absent. Some useful references include: NEJM 2004: 351:21 and Circulation 2005;112:1921", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case363/1350x900.gif", "_type": "mcq", "_caseId": 363}, {"question": "68 year old man with irregular pulse rate. The ECG shows ischemic-appearing T wave inversions with QT prolongation in a patient with severe multivessel coronary artery disease and decreased left ventricular systolic function. Which ONE of the following rhythms is present?", "options": ["Atrial flutter with variable block", "Atrial fibrillation with a controlled ventricular response", "Multifocal atrial rhythm/wandering atrial pacemaker", "Atrial tachycardia with block", "Sinus rhythm with SA exit block"], "correct": 2, "explanation": "Superficially, this rhythm looks like atrial fibrillation. Closer inspection shows that there are discrete P waves with variable appearance and variable PR intervals. The rate is not fast enough for multifocal atrial tachycardia but shows more variability than the classic wandering atrial pacemaker. The term �multifocal atrial rhythm� can be used in such cases. This rhythm may be a precursor of atrial fibrillation. The patient was on metoprolol and amiodarone at the time of this ECG and had a history of atrial fibrillation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case364/1350x900.gif", "_type": "mcq", "_caseId": 364}, {"question": "39 year old-man with a very abnormal ECG. Which ONE of the following is present?", "options": ["Sinus rhythm  with left bundle branch block (LBBB)", "AV sequentially paced rhythm", "Accelerated idioventricular rhythm (AIVR)", "Wolff-Parkinson-White (WPW) pre-excitation pattern", "Inferior wall ST elevation myocardial infarction (STEMI)"], "correct": 3, "explanation": "This ECG shows the classic the Wolff-Parkinson-White (WPW) pre-excitation triad: short PR, wide QRS (140 msec) and delta waves. The polarity of the delta waves, negative in II, III and aVF, and positive in I and aVL, V2-V6 is consistent with a posterior bypass tract. The patterns of WPW may be mistaken for bundle branch blocks, hypertrophy and infarction due to the anomalous ventricular activation. Of interest (extra credit here) is the finding of marked left atrial abnormality (see prominent biphasic P in lead V1). The patient also had severe chronic aortic insufficiency, giving left ventricular hypertrophy (superimposed on the WPW) and left atrial abnormality/enlargement. For a more detailed explanation of WPW, see Case # 218 and others on this site.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case365/1350x900.gif", "_type": "mcq", "_caseId": 365}, {"question": "43 year-old man with idiopathic cardiomyopathy and an implantable cardioverter-defibrillator (IDC) is seen in the Emergency Department for shortness of breath, What is the rhythm?", "options": ["Sinus with paroxysmal atrial flutter", "Ectopic atrial rhythm", "Sinus rhythm with artifact", "Atrial tachycardia with variable block", "Sinus rhythm with paroxysmal atrial fibrillation"], "correct": 2, "explanation": "This ECG shows sinus rhythm at a rate of about 60, with a borderline intraventricular conduction delay (QRS =110 ms). Low amplitude P waves and mild QT prolongation (QTc=460 ms) are also present with a borderline left axis (about -15 degrees). Slow R wave progression with non-specific T wave flattening in the inferior leads and inverted T waves in leads V4-V6 are also present. Noisy fluctuations in the baseline are seen intermittently in all leads, most evident in the limb leads. This kind of artifact, which could be electronic in origin (or due to poor electrode contact, myopotentials, etc.) may simulate atrial flutter, atrial fibrillation or other atrial tachyarrhythmia. He did not have an atrial pacemaker. The fact that the underlying QRS cadence is regular and that true P waves can be seen in certain leads are major clues to the presence of artifact.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case366/1350x900.gif", "_type": "mcq", "_caseId": 366}, {"question": "51 year-old man with complaint of progressive shortness of breath for over a year. This ECG is most consistent with which ONE of the following diagnoses?", "options": ["Rheumatic valvular disease", "Aortic stenosis (bicuspid valve)", "Chronic obstructive pulmonary disease (COPD)", "Posterior myocardial infarction", "Digitalis toxicity"], "correct": 0, "explanation": "This ECG shows atrial fibrillation with a relatively rapid ventricular response rate of about 115 bpm. There is an indeterminate to rightward QRS axis and a right ventricular conduction delay (rSr~S~~ pattern in V1 and V2). This combination suggests a right ventricular overload syndrome. Prominent lateral precordial voltage raises consideration of biventricular hypertrophy. Non-specific ST-T wave changes are also present. The constellation of atrial fibrillation and right or biventricular hypertrophy, while not specific, is a classic combination in rheumatic heart disease. A transthoracic echo showed marked left atrial enlargement and stasis, along with findings that were typical of rheumatic mitral valve deformity and stenosis, and a reduced left ventricular ejection fraction of 40-46~. The patient underwent cardiac catheterization and was found to have severe mitral stenosis with a mean gradient of 15mmHg and calculated value area of 0.68 cm squared and underwent successful balloon-catheter mitral valvuloplasty via a trans-septal approach.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case367/1350x900.gif", "_type": "mcq", "_caseId": 367}, {"question": "59 year-old female with a history of hypertension and chronic obstructive pulmonary disease (COPD) is seen for lightheadedness. What is the rhythm?", "options": ["Sinus bradycardia with prominent U waves", "Sinus rhythm with 2:1 AV block", "Sinus rhythm with AV Wenckebach", "Sinus rhythm with non-conducted atrial premature beats in a bigeminal pattern", "Atrial tachycardia with 2:1 block"], "correct": 1, "explanation": "This ECG shows borderline resting sinus tachycardia (P wave rate is about 100 bpm) with 2:1 AV block with a resulting relatively slow ventricular rate of 50 bpm. The PR interval of the conducted beats is 170 milliseconds; the QRS duration is normal at 90 milliseconds and the QT interval is physiologic at 440 milliseconds. There are non-specific ST-T wave changes with an undefined, non-diagnostic precordial transition zone (possibly due to lead placement) and borderline left axis deviation. (V2 gives the appearance of an early transition while subsequent precordial leads show R=S.) She underwent a cardiac electrophysiology study that showed 2:1 block in the AV node with slight improvement in conduction after 1 mg atropine IV. Due to difficult to control blood pressure and the presence of symptomatic 2:1 block, a permanent, dual-chamber pacemaker was implanted.~~~~", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case368/1350x900.gif", "_type": "mcq", "_caseId": 368}, {"question": "Elderly male with history of coronary artery disease and end stage renal failure on hemodialysis is admitted with fever. He rules out for myocardial infarction. ALL of the following are present EXCEPT which ONE? (Note: Prior ECGs, including the day before, consistently showed an R wave in leads I and aVL.", "options": ["Atrial fibrillation with a rapid ventricular response", "Non-specific ST-T changes", "Left anterior fascicular block", "Left-right arm lead reversal", "Multifocal atrial tachycardia"], "correct": 4, "explanation": "This ECG shows atrial fibrillation with a rapid ventricular response rate at about 125 bpm. The right/left arm electrodes are reversed. Taking this into account (lead I is �upside down,� lead II=III, aVR= aVL), there is marked left axis deviation consistent with left anterior fascicular block.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case369/1350x900.gif", "_type": "mcq", "_caseId": 369}, {"question": "48 year-old man with palpitations. What is the rhythm?", "options": ["Sinus tachycardia", "AV nodal reentrant tachycardia (AVNRT)", "Atrial flutter with 2:1 conduction", "Atrial fibrillation (AF)", "Multifocal atrial tachycardia (MAT)"], "correct": 2, "explanation": "This ECG shows atrial flutter (note F waves are negative in lead II and upright in V1/V2) with 2:1 AV conduction. The atrial (F wave) rate is ~232 cycles/min and the ventricular response rate ~116 bpm. The flutter morphology and axis are consistent with typical (�isthmus-dependent�) counterclockwise atrial flutter. There is a borderline intraventricular conduction defect (QRS duration 0.11 second) and non-specific ST-T wave changes. This patient had a history chronic atrial fibrillation and was status post pulmonary vein isolation/ablation procedure but reverted back to atrial fibrillation and then to atrial flutter. The patient was on quinidine (type 1A agent) at the time of this ECG which likely accounts for the finding that the flutter (F) rate is somewhat slower than the usual 240-350 cycles/min).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case370/1350x900.gif", "_type": "mcq", "_caseId": 370}, {"question": "Elderly woman with known coronary artery disease, status post bypass surgery, is admitted for chest pain. What is the major diagnosis?", "options": ["Acute pulmonary embolism", "Acute pericarditis", "Brugada syndrome", "Acute (antero-)lateral ST elevation MI", "Acute inferior ST depression MI"], "correct": 3, "explanation": "The ECG shows sinus rhythm with a single isolated ventricular premature beat (VPB; 4th beat on the rhythm strip). There are ST segment elevations in leads I and aVL, and less apparent changes in V5 and V6, accompanied by reciprocal ST segment depressions in leads III and aVF. Two days prior to this ECG, the patient had had stents placed in the saphenous vein graft (SVG) to the obtuse marginal and diagonal vessels for treatment of an acute coronary syndrome. One day post procedure she re-developed substernal chest pain and was found to have in-stent thrombosis of the SVG to the diagonal vessel. She underwent a successful percutaneous intervention. Creatine kinase peaked at 2,181 IU. Note that different sources may use somewhat variable terminology for the the acute STEMI pattern shown here including lateral, high lateral, antero-lateral and anterolateral.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case371/1350x900.gif", "_type": "mcq", "_caseId": 371}, {"question": "21 year-old female seen in the emergency department with complaints of chest pain and shortness of breath. What does this ECG show?", "options": ["Right atrial abnormality", "Left ventricular hypertrophy (LVH)", "Left atrial abnormality (LAA)", "No abnormality", "Right ventricular hypertrophy"], "correct": 3, "explanation": "This ECG is entirely within the normal limits. The rhythm is sinus at about 78 bpm. Basic intervals are as follows: QRS duration 0.08s; PR interval 0.13s; and QT/QTc interval 0.36s/0.39s--all are within normal limits. The QRS axis is also normal at about +70 degrees. There is no ECG evidence of left or right ventricular hypertrophy. P wave morphology and duration are normal. R wave progression is normal, as are the ST-T waves.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case372/1350x900.gif", "_type": "mcq", "_caseId": 372}, {"question": "68 year-old man with a history of severe chronic obstructive pulmonary disease (COPD) with rapid heart rate. What is the rhythm? Note: Lead V2 is not recorded.", "options": ["Atrial fibrillation with a rapid ventricular response", "Atrial flutter with 2:1 conduction", "Paroxysmal atrial tachycardia (PSVT)", "Multifocal atrial tachycardia (MAT)", "Sinus tachycardia with brief runs of PSVT"], "correct": 0, "explanation": "This ECG shows atrial fibrillation with a rapid ventricular response rate at about 150 bpm. Diffuse non-specific ST-T wave changes are present. The highly irregular rate with an oscillatory (wavy) baseline is typical of atrial fibrillation. There are no discrete P waves which rules out sinus or atrial tachycardia and no atrial flutter waves. There is borderline low voltage diffusely, consistent with COPD. For reference also see cases # 310 and 332.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case373/1350x900.gif", "_type": "mcq", "_caseId": 373}, {"question": "21 year-old male with palpitations and near syncope. What does the ECG show?", "options": ["Left ventricular hypertrophy", "Biventricular hypertrophy", "Acute anterior ST elevation MI", "Wolff-Parkinson-White (WPW) pre-excitation", "Prior postero-lateral MI"], "correct": 3, "explanation": "The rhythm is sinus with classic triad of WPW pre-excitation with a short PR, delta waves and a wide QRS. The polarity (vector orientation of the delta wave)�negative in aVL, positive inferiorly and in the right to mid chest leads, is consistent with a left lateral bypass tract. (The delta wave vector points away from the area of earliest ventricular activation, namely the insertion of the bypass tract.) At cardiac EPS study, the patient had spontaneous orthodromic AV reentrant tachycardia (AVRT) and a left lateral bypass tract was successfully ablated. WPW patterns may simulate hypertrophy, bundle branch blocks and myocardial infarction, as in the case here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case374/1350x900.gif", "_type": "mcq", "_caseId": 374}, {"question": "An elderly man had a post-operative ECG following left lower lobectomy for lung cancer. A pre-operative ECG was normal. He had no chest discomfort or other cardiac symptoms. He was on a continuous epidural infusion of bupivacaine. Echocardiogram showed normal ventricular wall motion and serial CK-MB enzyme tests were normal. The ECG is most consistent with which ONE of the following diagnoses?", "options": ["Acute pericarditis", "Coronary vasospasm syndrome", "Acute right ventricular ST elevation MI", "Brugada-type pattern, drug-induced", "Benign early repolarization"], "correct": 3, "explanation": "The ECG shows sinus rhythm with unusual ST segment elevations/T wave inversions (~coved~ pattern) in V1 and V2. This morphology and localization is strongly suggestive of a Brugada-type pattern, which may be induced by certain drugs, especially sodium channel blocking agents, in susceptible individuals. The negative enzymes, normal echocardiogram and normalization of the ECG when the epidural bupivacaine was discontinued (the drug is a reported cause of this finding) are all consistent with the diagnosis drug-induced Brugada pattern. Failure to recognize this finding could result in inappropriate therapy for ST elevation MI or to development of life-threatening ventricular arrhythmias related to the Brugada pathophysiology. See Vernooy et al. Heart Rhythm 2006;3:1074.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case375/1350x900.gif", "_type": "mcq", "_caseId": 375}, {"question": "66 year old woman presents with chest pain. The ECG is consistent with which ONE of the following diagnoses?", "options": ["Acute pericarditis", "Acute ST elevation inferior (and possibly posterior) MI", "Acute anterior ST depression MI with reciprocal inferior ST elevation", "Brugada pattern", "Benign early repolarization"], "correct": 1, "explanation": "The rhythm is sinus with ST elevations in leads II, III and aVF, along with (reciprocal) ST depressions in I and aVL. Note that ST elevations in this context are always primary and not reciprocal. ST depressions in V2 and V3, along with nonspecific repolarization abnormalities in the lateral precordial leads may indicate reciprocal change from posterior involvement and possibly associated lateral ischemia. At cardiac catheterization, she was found to have a near total (95%) mid right coronary artery (RVA) occlusion in a dominant right coronary vessel. A percutaneous coronary intervention was successfully performed. Acute inferior STEMI is usually due to occlusion of the right coronary, and less frequently to occlusion of the left circumflex coronary. When the amplitude of ST elevation in lead III is greater than that in lead II, this finding strongly favors the right coronary, rather the circumflex, as the �culprit� artery. ST elevation in right precordial leads (not seen here) favors a proximal RCA occlusion with right ventricular involvement. See also Zimetbaum PJ, Josephson ME. Use of the electrocardiogram in acute myocardial infarction. N Engl J Med 2003; 348:933.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case376/1350x900.gif", "_type": "mcq", "_caseId": 376}, {"question": "44 year-old male with complaints of chest pain. Which ONE of the following diagnoses best applies to the ECG?", "options": ["Acute anterior wall myocardial infarction (MI)", "Wolff-Parkinson-White (WPW) preexcitation pattern", "Benign early repolarization pattern", "Complete right bundle branch block (RBBB)", "Junctional rhythm with intraventricular conduction defect (IVCD)"], "correct": 1, "explanation": "This ECG shows the classic Wolff-Parkinson-White (WPW) pre-excitation triad: short PR interval, wide QRS and delta waves. The latter are positive in the precordial leads and in leads II, III and aVF. The delta wave is predominantly negative in lead aVL and isoelectric in lead I. This delta wave vector orientation is most consistent with left lateral wall insertion of an atrioventricular bypass tract.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case377/1350x900.gif", "_type": "mcq", "_caseId": 377}, {"question": "56-year old woman with a history of breast cancer. She has severe chronic heart failure with a left ventricular ejection fraction of 20~. Her therapy includes digoxin, enalapril, spironolactone, carvedilol and furosemide. This ECG shows all of the following EXCEPT?", "options": ["Left ventricular hypertrophy (LVH)", "Intra-atrial conduction delay (IACD)", "Borderline left axis", "Non-specific ST-T abnormalities", "Left bundle branch block (LBBB)"], "correct": 4, "explanation": "This ECG shows sinus rhythm at a rate about 80 bpm with left ventricular hypertrophy and lateral non-specific ST-T abnormalities consistent with LVH, digoxin effect, myocardial disease, etc. The P wave is broad and notched (later phase is low amplitude) in lead II (see magnified view) consistent with left atrial abnormality/intra-atrial conduction delay. The prominent initial forces in V1 also raise consideration of biatrial abnormality. The QRS duration is 110 milliseconds which is at the upper limits of normal. Criteria for LBBB, however, are not met. The QRS axis is about -30 degrees. The patient had been treated with doxorubicin and cyclophosphamide therapy for the breast cancer and developed severe systolic left ventricular contractile dysfunction, which may be associated with this type of chemotherapy.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case378/1350x900.gif", "_type": "mcq", "_caseId": 378}, {"question": "66 year-old male status post left upper lobe lobectomy develops a rapid heart beat. What is the rhythm?", "options": ["Multifocal atrial tachycardia (MAT)", "Atrial fibrillation (AF) with rapid ventricular response", "Atrial flutter with 2:1 AV conduction", "Sinus tachycardia", "AV nodal reentrant tachycardia (AVNRT)"], "correct": 2, "explanation": "This ECG shows typical ~counterclockwise~ atrial flutter with 2:1 AV conduction with a ventricular response rate of about 140 bpm. The atrial flutter rate, therefore, is about 280 cycles/min. Non-specific ST-T wave changes are present. . The atrial flutter waves are inverted in lead II and upright in V1/V2, consistent with the counterclockwise rotation of the right atrial based macro-reentrant loop involving the fibrous \"isthmus\" between the inferior vena cava and tricuspid valve (isthmus-dependent).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case379/1350x900.gif", "_type": "mcq", "_caseId": 379}, {"question": "55 year-old African-American male with hypercholesterolemia and multiple complaints, including anginal sounding chest pain, as well as more atypical symptoms. This resting ECG was unchanged from previous. The ECG findings of ST elevation and tall T waves here are most consistent with which ONE of the following?", "options": ["Acute pericarditis", "Brugada pattern", "Benign early repolarization variant", "Acute anterior ST elevation MI (STEMI)", "Hyperkalemia"], "correct": 2, "explanation": "The ECG shows sinus rhythm 60 bpm with normal AV conduction (PR interval .18 sec). The precordial voltage is prominent without other signs of left ventricular hypertrophy. J point elevation (V2-V5) and a distinctive J point notching without PR segment deviations or reciprocal changes are most consistent with normal variant early repolarization Echocardiogram was normal. The patient ruled out for recent MI. Cardiac catheterization showed a 90% mid right coronary artery lesion which was treated with a percutaneous coronary intervention. The anterior ST segment changes are unrelated to his finding. The presence of a normal ECG does not rule out underlying heart disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case380/1350x900.gif", "_type": "mcq", "_caseId": 380}, {"question": "This ECG from a 69 year old woman is most consistent with which ONE of the following diagnoses?", "options": ["Pericardial effusion with tamponade", "Severe mitral stenosis", "Severe mitral regurgitation", "Severe pulmonic valve stenosis", "Chronic obstructive pulmonary disease (COPD) with emphysema"], "correct": 4, "explanation": "The ECG shows sinus tachycardia at about 105 bpm with several classic findings of COPD, including relatively low limb voltage and peaked P waves (~P pulmonale~) pattern, with a vertical P wave axis (about +85 degrees). The voltage in most of the precordial leads is also relatively low. Not seen is right axis of the QRS or T wave inversions in the right-mid chest leads due to right ventricular (RV) overload. The absence of marked left atrial abnormality/intra-atrial conduction delay patterns excludes mitral stenosis or mitral regurgitation. Pulmonic stenosis generally causes a severe pressure load type of RV hypertrophy with tall R waves in V1 and V2 and right axis deviation of the QRS. Pericardial effusion and tamponade may cause low voltage and sinus tachycardia. Beat-to-beat electrical alternans is not seen here and the peaked P waves would not be explained by a pericardial syndrome alone.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case381/1350x900.gif", "_type": "mcq", "_caseId": 381}, {"question": "34 year old woman presents with diastolic CHF syndrome and a hypertrophic cardiomyopathy variant. She was taking amiodarone for recurrent atrial tachyarrhythmias. The ECG shows all the following EXCEPT?", "options": ["Intraventricular conduction delay (IVCD)", "Epsilon waves", "Biatrial abnormality", "QTc prolongation", "Slow R wave progression"], "correct": 1, "explanation": "The ECG shows sinus bradycardia at 50 bpm. The QTc is prolonged consistent with the amiodarone. The P waves are strikingly prominent, tall and wide, consistent with biatrial abnormality confirmed by echocardiogram, which also showed an idiopathic hypertrophic type cardiomyopathy. A left ventricular IVCD is present with slow R wave progression. No coronary disease was present. The ECG does not show epsilon waves (rapid ST deflections in leads V1-V2 due to right ventricular cardiompathy and associated local fragmented electrograms.)", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case382/1350x900.gif", "_type": "mcq", "_caseId": 382}, {"question": "An 84 year old man presented with chest pain. The ECG is consistent with all but ONE of the following findings?", "options": ["Intermittent left bundle branch block (LBBB)", "Acute infero-lateral myocardial infarction (MI)", "Intermittent accelerated idioventricular rhythm (AIVR)", "Underlying sinus rhythm", "First degree AV conduction delay (prolonged PR interval)"], "correct": 0, "explanation": "The ECG shows underlying sinus rhythm with an intermittent accelerated idioventricular rhythm (AIVR), and not intermittent LBBB. The last two beats are fusion type beats. The ST elevations in the inferior leads and lateral leads are consistent with acute MI in that location. The patient had an occluded obtuse marginal artery accounting for the location of the MI. There are pathologic Q waves in leads V5 and V6. The ST depressions in V1-V3 may be reciprocal to a lateral (and possibly posterior) current of injury. AIVR is classically seen in the context of reperfusion with acute ischemia, but may occur in other settings. The polarity of the QRS vector in the AVIR beats (toward the positive pole of lead aVR) indicates an origin from the inferior-lateral wall. The PR interval is prolonged in the conducted sinus beats at about 250msec. Low voltage QRS complexes in the chest leads are non-specific.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case383/1350x900.gif", "_type": "mcq", "_caseId": 383}, {"question": "Abnormal ECG in a middle-aged, acyanotic woman. The findings are most consistent with which ONE of the following diagnoses?", "options": ["Right ventricular hypertrophy (pressure load) from severe pulmonary artery hypertension", "Critical aortic stenosis", "Atrial septal defect /secundum type with a left to right shunt (volume load)", "Atrial septal defect/ostium primum", "Dextrocardia (situs inversus)"], "correct": 0, "explanation": "The ECG shows sinus rhythm with classic findings of severe right ventricular hypertrophy (RVH) consistent with a sustained pressure load. Note the combination of a tall R wave in V1 with marked right axis deviation (normal QRS duration), along with tall peaked P waves due to right atrial overload. This triad is specific for marked right ventricular hypertrophy due to a pressure load with either severe pulmonary artery hypertension or pulmonic stenosis. Note also the delayed precordial transition zone and terminal S waves in the left chest leads as part of this pattern. There are non-specific ST-T abnormalities with slight T wave inversions in the right chest leads consistent with right ventricular overload in this context. Note that the P wave is quite negative in V1�this finding simulates left atrial abnormality and has to do with the exploring electrode being placed over a large right atrium that is depolarizing away from the positive pole of that lead. The narrowness of the P waves in the limb leads supports this contention. The patient had recurrent pulmonary emboli. Similar findings might be seen with pulmonary hypertension and RVH from other causes, including Eisenmenger�s syndrome, primary pulmonary hypertension, or end-stage pulmonary restrictive lung disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case384/1350x900.gif", "_type": "mcq", "_caseId": 384}, {"question": "ECG from a 74 year old man shows which of the following combinations?", "options": ["Sinus rhythm with left bundle branch block (LBBB) converting to ventricular tachycardia", "Sinus rhythm with LBBB converting to supraventricular tachycardia with aberration", "Dual pacemaker pacemaker pattern (atrial sensed/ventricular paced) converting to ventricular tachycardia", "Dual chamber pacemaker with pacemaker-mediated tachycardia", "Atrial tachycardia with LBBB and variable block"], "correct": 2, "explanation": "This complicated ECG shows an abrupt change between two patterns: sinus rhythm at about 85 beats/minute with atrial sensing and ventricular pacing (subtle spikes) for the first 6 beats converting (with a fusion beat) to prolonged monomorphic ventricular tachycardia (VT) at a rate of about 150 beats/minute through the end of the recording. The VT has a very wide (about 180ms) QRS duration with an RS configuration in V1 and a QS in V6) with a superior axis, consistent with an origin from the inferior apical region (confirmed by subsequent cardiac EP study). The patient had severe coronary disease with markedly reduced left ventricular function due to prior infarctions and a history of refractory VT treated with amiodarone and a biventricular pacemaker/ICD. The patient was being further evaluated for consideration of ablation therapy of VT site(s) of origin.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case385/1350x793.jpg", "_type": "mcq", "_caseId": 385}, {"question": "ECG from a middle-aged, non-cyanotic woman with dyspnea. Which of the following echocardiogram reports would you anticipate?", "options": ["Normal chamber size and function", "Severe mitral regurgitation", "Severe aortic stenosis", "Marked right ventricular hypertrophy/dilation with severe pulmonary hypertension", "Anterior wall hypokinesis consistent with coronary disease"], "correct": 3, "explanation": "The ECG shows sinus rhythm with a constellation of findings diagnostic of severe right heart overload: 1) peaked P waves with a vertical P wave axis; 2) right axis deviation of the QRS; 3) prominent T wave inversions in leads V1-V3 (with nonspecific changes elsewhere) and 4) terminal S waves in the left chest leads. These findings do not indicate a specific etiology to the pathophysiology. In this case, the patient had severe idiopathic pulmonary hypertension with right ventricular overload (as well as right atrial enlargement). History was positive for �recreational� drug use. Cardiac catheterization confirmed severe pulmonary hypertension and markedly elevated pulmonary vascular resistance. There was no evidence of pulmonary thromboembolic disease, Eisenmenger syndrome, pulmonic or mitral stenosis, connective tissue disease or arrhythmogenic right ventricular dysplasia (cardiomyopathy), liver disease or HIV infection. Pulmonary function testing showed a severe restrictive defect.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case386/1350x900.gif", "_type": "mcq", "_caseId": 386}, {"question": "ECG from a 74 year old woman with progressive increase in anginal-type chest discomfort. Which of the following statements is NOT correct?", "options": ["The rhythm is sinus at about 85/min", "The PR, QRS and QT intervals are normal", "A normal ECG excludes severe coronary disease", "The QRS axis is about +40 degrees (normal range)", "The transition zone is between V2 and V3"], "correct": 2, "explanation": "This ECG is within normal limits. Yet the patient had severe underlying coronary artery disease, was status post coronary artery bypass graft surgery with recurrent angina. A normal (or relatively normal) resting ECG does not exclude severe, multivessel coronary disease. Further, even patients with advanced coronary disease can have false negative exercise ECGs.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case387/1350x900.gif", "_type": "mcq", "_caseId": 387}, {"question": "70 year old woman with ECG showing which of the following major diagnoses?", "options": ["Junctional tachycardia with acute apico-lateral-inferior MI", "Sinus tachycardia with 2:1 block and acute apico-lateral-inferior MI", "Atrial flutter with variable block and pericarditis", "Sinus tachycardia with acute apico-lateral-inferior MI", "Atrial flutter with variable block and acute apico-lateral-inferior MI"], "correct": 4, "explanation": "The ECG shows a narrow complex tachycardia at an average ventricular rate of about 150/min. The cadence is predominantly very regular with occasional exceptions. The atrial morphology at a constant rate of about 300 cycles/min is that of typical atrial flutter, with predominant 2:1 AV conduction and some variable block. The monotonous consistency and appearance of the atrial waves and the preciseness of the R-R patterns indicates atrial flutter, not fibrillation. Q waves with ST elevations indicate an MI that is likely acute/evolving involving antero-apical/lateral and inferior segments. Relatively low limb and lateral precordial QRS voltage is present. The patient had underlying severe coronary artery disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case388/1350x900.gif", "_type": "mcq", "_caseId": 388}, {"question": "ECG from a patient status post a coronary angioplasty procedure shows which ONE of the following findings? (Note: lead V5 was not recorded.)", "options": ["Atrial fibrillation with a regularized ventricular response", "Right/left arm electrode (lead) reversal", "High lateral Q-wave myocardial infarction (MI)", "Right ventricular hypertrophy", "Left anterior fascicular block variant"], "correct": 1, "explanation": "This anomalous appearing ECG shows baseline artifact (simulating atrial fibrillation) with underlying sinus rhythm. Inadvertent reversal of the left and right arm electrodes accounts for the \"strange\" P wave and QRS axes, associated with a negative P and negative QRS combination in lead I (in concert with a positive P and positive QRS in lead aVR). The QRS findings mimic those of a high lateral Q wave MI. A �corrected� limb lead ECG can be imagined if you do the following: \"flip\" lead I, reverse leads II and III, and reverse leads aVR and aVL. After these corrective maneuvers, note that the true QRS axis is close to 0 degrees and, therefore, does not qualify for left axis deviation (-30 degrees or more negative), and certainly not for left anterior fascicular block (-45 degree or more negative).", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case389/1350x900.gif", "_type": "mcq", "_caseId": 389}, {"question": "63-year-old woman with a history of rapid palpitations seen on multiple occasions in the emergency department. What is the tachycardia?", "options": ["Multifocal atrial tachycardia (MAT)", "Sinus tachycardia", "Atrial flutter with 2:1 AV conduction", "AV nodal reentrant tachycardia (AVNRT)", "Atrial fibrillation with a rapid ventricular response"], "correct": 3, "explanation": "This ECG shows a very regular, narrow complex tachycardia with borderline left axis deviation at a rate of 162 bpm without evidence of a preceding P wave. There is however, a retrograde P wave in the early part of the ST segment that is positive in lead aVR and V1 (pseudo R waves) and negative in the leads II and V6 (pseudo S waves). The most likely diagnosis is AV nodal reentrant tachycardia (AVNRT), a common type of paroxysmal supraventricular tachycardia whose mechanism is based on dual AV nodal pathways. Because of her multiple recurrent episodes, highly symptomatic status and failure of drug therapy, the patient underwent electrophysiology (EP) study with easily inducible AVNRT and successful slow pathway ablation.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case390/1350x900.gif", "_type": "mcq", "_caseId": 390}, {"question": "This ECG from an elderly man shows all of the following EXCEPT?", "options": ["Infero-lateral MI (possibly recent or evolving)", "Baseline artifact", "Atrial flutter", "Borderline low voltage diffusely", "Left axis deviation consistent with left anterior fascicular block"], "correct": 2, "explanation": "The ECG shows baseline artifact with sinus bradycardia at about 57 bpm (NOT atrial flutter). The P waves are very low amplitude but clearly present and upright in lead II, where they are broad and notched consistent with left atrial abnormality (look at the ECG with the magnified view). Also the PR is quite long (abut 290ms) indicating marked first degree AV conduction delay. There are notched Q waves (or possibly minuscule r waves) in the infero-lateral leads along with T wave inversions consistent with prior MI. The patient had presented with an ST elevation MI about 10 weeks previously due to occlusion of the first obtuse marginal branch of the left circumflex coronary (in a left dominant system). Marked left axis deviation is present, consistent with concomitant left anterior fascicular block (LAFB; documented before the MI). The notching of the initial QS or rS waves in the inferior leads along with the other findings of ischemia/MI allows one to simultaneously diagnose the inferior MI and LAFB. Borderline low voltage is a non-specific finding here.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case391/1350x900.gif", "_type": "mcq", "_caseId": 391}, {"question": "ECG from a 40 year old woman a severe underlying condition and multiple prior admissions. What is the rhythm and which ONE of the following diagnoses is most likely?", "options": ["Atrial tachycardia; anterior infarction", "Sinus tachycardia; pericardial effusion", "Arial fibrillation; aortic stenosis", "Atrial flutter; obesity hypoventilation syndrome", "Sinus tachycardia;  mitral regurgitation"], "correct": 3, "explanation": "This ECG shows atrial flutter with predominant 2:1 conduction that is variable at times with an average ventricular rate of about 120/min. There is generalized low voltage with marked right axis deviation and a right ventricular conduction delay. Nonspecific ST-T changes are present along with slow initial R wave progression in the chest leads. This constellation of findings is most consistent with (but not diagnostic of) obesity/hypoventilation (�Pickwickian�) syndrome. Echocardiogram showed marked right ventricular enlargement and hypokinesis, as well as evidence of moderate pulmonary hypertension.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case392/1350x900.gif", "_type": "mcq", "_caseId": 392}, {"question": "70 year-old woman with type II diabetes mellitus presented to emergency room with complaint of chest pain. What is the diagnosis?", "options": ["Acute ST elevation infero-lateral myocardial infarction", "Benign early repolarization variant", "Acute anterior wall myocardial infarction", "Acute pericarditis", "Acute pulmonary embolism"], "correct": 0, "explanation": "The rhythm is sinus at about 65 bpm. ST elevations are present in leads II, III and aVF and V4-V6 with ST segment depressions in lead I, aVR, aVL and VI-V2. These findings are consistent with acute inferior-lateral wall (and possibly posterior) myocardial infarction. Cardiac enzymes were elevated. The patient was taken to the cardiac catheterization laboratory and found to have a totally obstructed left anterior descending vessel; a 20~ stenosis of the left main; the left circumflex system had 60-70 ~ stenoses and the right coronary artery had a 95~ sub-total occlusion of its mid-portion with distal thrombus. Echocardiogram showed a normal global left ventricular ejection fraction with moderate inferior hypokinesis. The patient underwent successful emergency coronary artery bypass grafting (CABG) for multivessel disease.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case393/1350x900.gif", "_type": "mcq", "_caseId": 393}, {"question": "This ECG from a middle-aged man shows which ONE of the following arrhythmias?", "options": ["Sinus tachycardia with frequent atrial premature beats", "Atrial flutter with variable block", "AV nodal reentrant tachycardia (AVNRT)", "Atrial fibrillation (AF)", "Multifocal atrial tachycardia (MAT)"], "correct": 3, "explanation": "The ECG shows atrial fibrillation (AF) with a very rapid ventricular response (about 168/min at rest here). Artifactual drift of the baseline is present. There are nonspecific ST-T changes and relatively slow R wave progression, also a non-diagnostic finding. The patient had a history of systemic hypertension. Echocardiogram showed mild concentric left ventricular hypertrophy (not evident on this ECG) and normal overall ventricular and valvular function.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case394/1350x900.gif", "_type": "mcq", "_caseId": 394}, {"question": "Elderly man with history of coronary disease and chronic atrial fibrillation presents with palpitations and hypotension. What is the mechanism of this wide-complex tachycardia?", "options": ["Atrial flutter with right bundle branch block  (RBBB)", "Monomorphic ventricular tachycardia", "Sinus tachycardia with RBBB", "Atrial tachycardia with left bundle branch block", "AV nodal reentrant tachycardia (AVNRT) with RBBB"], "correct": 1, "explanation": "This ECG shows a regular wide-complex (QRS duration 0.13 sec) tachycardia (rate of about 180/min). The QRS has a right bundle branch block (RBBB) morphology with a normal axis and QR complexes in V1-V3 consistent with monomorphic VT in the setting of underlying anterior MI. Under conscious sedation, the patient was cardioverted to his baseline atrial fibrillation with pathologic Q waves V1-V4, RBBB and a leftward axis with a QRS duration of 0.15 sec. (note: longer than that during VT). Cardiac EP testing revealed easily inducible VT of several morphologies, including that on the present ECG. He underwent ICD placement. He had documented prior anterior infarction, with a markedly reduced left ventricular ejection fraction of 25-30~.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case395/1350x900.gif", "_type": "mcq", "_caseId": 395}, {"question": "The ECG from a young adult man shows which ONE of the following mechanisms?", "options": ["AV nodal reentrant tachycardia (AVNRT) with intermittent aberrancy", "Atrial flutter  with variable block and a PVC", "Sinus tachycardia with artifact and a PVC", "Atrial fibrillation (AF) with right bundle branch block (RBBB) aberrancy (Ashman beat)", "Multifocal atrial tachycardia with RBBB aberrancy"], "correct": 3, "explanation": "The ECG shows classic atrial fibrillation (AF) pattern with an average ventricular response of about 100/min. The wide complex beat (4th in lead V1) has typical right bundle branch block (RBBB) morphology and is due to supraventricular aberrancy (so-called Ashman phenomenon). It is preceded by a relatively longer cycle length and comes during a relatively shorter cycle length. This finding may simulate a PVC (premature ventricular complex). A run of Ashman type beats may simulate ventricular tachycardia during AF but should be associated with an irregular rate, usually with a typical RBBB configuration. The aberrancy is due to the fact that the refractoriness of the His-Purkinje system is related to the preceding cycle length. A beat that traverses the AV node after a longer cycle may encounter the bundle branch system (especially the right bundle) in an absolute or relatively refractory state. This type of aberrancy is often classified as an example of so-called �phase-3 aberrancy.� It should be noted that a long cycle-short cycle pattern by itself, which is also seen with PVCs in AF, is not indicative of Ashman (supraventricular aberrancy) phenomenon. Classic reference: Gouaux JL, Ashman R. Auricular fibrillation with aberration simulating ventricular paroxysmal tachycardia. Am Heart J 1947; 34: 366. Also see helpful discussion by Amir MA: http://www.amc.edu/Amr/archives/200301/review01.html This patient had spontaneous conversion to sinus rhythm and was being evaluated for hyperthyroidism.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case396/1350x900.gif", "_type": "mcq", "_caseId": 396}, {"question": "The ECG from an elderly man with an \"irregular pulse\" shows which combination of mechanisms?", "options": ["Sinus rhythm with ventricular bigeminy", "Sinus rhythm with frequent atrial premature beats (APBs), including atrial bigeminy with right bundle branch block aberrancy", "Atrial fibrillation with ventricular bigeminy", "Multifocal atrial tachycardia with ventricular ectopy", "Sinus rhythm with transient Wolff-Parkinson-White pre-excitation"], "correct": 1, "explanation": "The ECG shows sinus rhythm with frequent atrial premature beats/depolarizations (APBs/APDs), including atrial bigeminy. Some of the APBs are conducted with RBBB aberrancy, simulating ventricular bigeminy. An atrial triplet (3-beat run of atrial tachycardia) is present toward the end of the recording. The sinus beats show left atrial abnormality and all beats have prominent left axis deviation consistent with left anterior fascicular block. Borderline voltage criteria (Cornell) are present for left ventricular hypertrophy. Non-specific ST-T changes are present. The patient had a history of atrial fibrillation/atrial flutter.", "_imageUrl": "https://ecg.bidmc.harvard.edu/mavendata/images/case397/1350x900.gif", "_type": "mcq", "_caseId": 397}, {"question": "The ECG from an elderly man shows which ONE of the following mechanisms?", "options": ["AV nodal reentrant tachycardia (AVNRT)", "Atrial flutter  with variable conduction", "Sinus tachycardia with artifact", "Atrial fibrillation (AF)", "Multifocal atrial tachycardia (MAT)"], "correct": 3, "explanation": "This ECG shows classic atrial fibrillation (AF) pattern with a
